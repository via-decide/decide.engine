      const container = document.getElementById("scrollContainer");
      const secLabel = document.getElementById("secLabel");
      const secName = document.getElementById("secName");
      const btnTranslate = document.getElementById("btnTranslate");
      const toast = document.getElementById("translationToast");
      const toastMsg = document.getElementById("toastMsg");
      const btnUndo = document.getElementById("btnUndoTranslate");

      let currentLang = "en";
      let toastTimer = null;

      /* Render */
      function renderSections(){
        container.innerHTML = "";
        SECTIONS.forEach((sec, idx) => {
          const wrap = document.createElement("div");
          wrap.className = "section-wrapper";
          wrap.setAttribute("data-index", String(idx));
          wrap.setAttribute("data-name", sec.name);

          wrap.innerHTML = `
            <article class="card">
              <header class="cardHeader">
                <div class="kicker">${sec.kicker}</div>
                <h1 class="h1">${sec.title[currentLang]}</h1>
              </header>
              <div class="cardBody">
                ${sec.html[currentLang]()}
              </div>
            </article>
            <div class="hint" aria-hidden="true">
              <span>Scroll for more</span>
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          `;
          container.appendChild(wrap);
          observer.observe(wrap);
        });

        // update total in pill
        secLabel.textContent = `SEC 1/${SECTIONS.length}`;
        secName.textContent = SECTIONS[0].name;
      }

      /* Observer */
      const observerOptions = { root: container, threshold: 0.6 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("is-active");
            const index = parseInt(entry.target.getAttribute("data-index") || "0", 10);
            secLabel.textContent = `SEC ${index + 1}/${SECTIONS.length}`;
            secName.textContent = entry.target.getAttribute("data-name") || "";
          } else {
            entry.target.classList.remove("is-active");
          }
        });
      }, observerOptions);

      /* Toast */
      function showToast(msg, canUndo){
        toastMsg.textContent = msg;
        btnUndo.style.display = canUndo ? "inline-flex" : "none";
        toast.classList.add("is-visible");
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("is-visible"), 3200);
      }

      /* Translation (this page supports Hindi; keep, but allow you to disable later) */
      btnTranslate.addEventListener("click", () => {
        if (currentLang === "en") {
          currentLang = "hi";
          renderSections();
          showToast("Translated to Hindi", true);
        } else {
          // already hi -> flip back
          currentLang = "en";
          renderSections();
          showToast("Reverted to English", false);
        }
      });
      btnUndo.addEventListener("click", () => {
        currentLang = "en";
        renderSections();
        showToast("Reverted to English", false);
      });

      /* Boot */
      renderSections();

    })();
