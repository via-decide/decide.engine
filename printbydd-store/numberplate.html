<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>3D Numberplate • PrintByDD</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    /* ══════════════════════════════════════
       GLOBAL UX PATCH
       A) Kills iOS/Android blue tap flash universally.
          -webkit-tap-highlight-color on * with !important
          beats any element-level override.
       A) :focus:not(:focus-visible) removes outlines
          for pointer/touch without breaking keyboard nav.
       A) ::selection replaces the default system-blue.
       B) user-select:none on all text-bearing elements;
          re-enabled with !important on all input surfaces.
    ══════════════════════════════════════ */

    *,
    *::before,
    *::after {
      -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
      tap-highlight-color: rgba(0,0,0,0) !important;
      -webkit-touch-callout: none;
    }

    /* Pointer/touch: no outline flash */
    a:focus:not(:focus-visible),
    button:focus:not(:focus-visible),
    [tabindex]:focus:not(:focus-visible) {
      outline: none !important;
      box-shadow: none !important;
    }
    /* Keyboard: keep accessible ring */
    a:focus-visible,
    button:focus-visible,
    [tabindex]:focus-visible {
      outline: 2px solid rgba(255,42,42,0.65) !important;
      outline-offset: 2px !important;
    }

    /* Custom selection colour */
    ::selection      { background: rgba(255,42,42,0.22); color: inherit; }
    ::-moz-selection { background: rgba(255,42,42,0.22); color: inherit; }

    /* (B) Disable text selection globally */
    body,
    h1, h2, h3, h4, h5, h6,
    p, span, div, label,
    .kicker, .big, .lead, .qt,
    .step-title, .step-desc,
    .ul, .ul li,
    .sv, .slbl,
    .pill, .back,
    .hint,
    .social-strip,
    .color-group-title, .color-active-badge,
    .stl-hint, .plate-preview-label,
    .urgency-text, .sp-text,
    .cs-item, .contrast-title, .contrast-msg {
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
    }

    /* (B) Re-enable for all input surfaces */
    input,
    textarea,
    select,
    [contenteditable="true"],
    .allow-select,
    pre,
    code {
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      user-select: text !important;
      -webkit-touch-callout: default !important;
    }

    /* ── DESIGN TOKENS ── */
    :root{
      --bg:#050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text:#fdfdfd;
      --text-muted: rgba(242, 242, 242, 0.65);
      --accent:#ff2a2a;
      --accent-glow: rgba(255, 42, 42, 0.15);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      --radius: 24px;
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);
      --maxw: 860px;
      --header-height: 60px;
      --warn:#f59e0b;
      --ok:#22c55e;
      --wa:#25D366;
    }

    *{ box-sizing:border-box; }
    html, body{
      height:100%; margin:0;
      background: var(--bg); color: var(--text);
      font-family: "Exo 2", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow:hidden; overscroll-behavior-y:none;
      -webkit-font-smoothing: antialiased;
    }
    body{ height:100vh; height:100svh; height:100dvh; }

    a{ color:inherit; text-decoration:none; }
    button{ background:none; border:none; color:inherit; font:inherit; cursor:pointer; }

    /* ===== HEADER ===== */
    .site-header{
      position:absolute; top:0; left:0; right:0;
      height:var(--header-height);
      background:rgba(5,5,5,0.88);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center; justify-content:space-between;
      padding:0 max(20px,env(safe-area-inset-right)) 0 max(20px,env(safe-area-inset-left));
      z-index:1000;
    }
    .site-header .logo{
      color:var(--accent); font-size:18px; font-weight:900;
      letter-spacing:-0.02em; cursor:pointer;
      display:flex; align-items:center; gap:8px;
    }
    .logo-dot{
      width:7px; height:7px; border-radius:50%;
      background:var(--accent); box-shadow:0 0 8px var(--accent);
      animation:logoPulse 2s infinite;
    }
    @keyframes logoPulse{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.8)} }

    .nav-container{ display:flex; align-items:center; gap:14px; }
    .site-header nav{ display:flex; gap:18px; align-items:center; }
    .site-header nav a{
      color:var(--text-muted); font-weight:700; font-size:13px;
      transition:color .2s; text-transform:uppercase; letter-spacing:.05em;
      cursor:pointer; position:relative; padding-bottom:2px;
    }
    .site-header nav a::after{
      content:''; position:absolute; bottom:-1px; left:0; right:0; height:2px;
      background:var(--accent); border-radius:2px;
      transform:scaleX(0); transition:transform .25s;
    }
    .site-header nav a:hover{ color:var(--text); }
    .site-header nav a:hover::after, .site-header nav a.active::after{ transform:scaleX(1); }
    .site-header nav a.active{ color:var(--text); }

    body.invert-mode .site-header{ filter:invert(1) hue-rotate(180deg); }
    body.invert-mode #appWrapper, body.invert-mode #translationToast, body.invert-mode #rotatePopup, body.invert-mode #errorToast{ filter:invert(1) hue-rotate(180deg); }
    body.invert-mode img, body.invert-mode video, body.invert-mode canvas{ filter:invert(1) hue-rotate(180deg); }

    #appWrapper{
      position:relative; width:100vw;
      height:100vh; height:100svh; height:100dvh;
      transform-origin:center center;
      transition:transform 0.4s cubic-bezier(0.25,1,0.5,1);
      overflow:hidden;
    }
    #appWrapper.forced-landscape{ width:100dvh; height:100vw; position:absolute; top:50%; left:50%; margin-top:-50vw; margin-left:-50dvh; }
    .bg-glow{ position:absolute; inset:0; pointer-events:none; background:radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%), radial-gradient(circle at 85% 100%, rgba(255,255,255,0.03), transparent 60%); z-index:0; }

    /* ===== TOP BAR ===== */
    .top{
      position:absolute; top:var(--header-height); left:0; right:0;
      padding:calc(16px + var(--safeTop)) calc(16px + var(--safeRight)) 16px calc(16px + var(--safeLeft));
      z-index:50; display:flex; align-items:center; justify-content:space-between; gap:12px;
      pointer-events:none;
      background:linear-gradient(180deg,rgba(5,5,5,0.95) 0%,rgba(5,5,5,0) 100%);
    }
    .top > *{ pointer-events:auto; }
    .top-actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

    .back, .pill, .btn-icon{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:10px 16px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(15,15,15,0.65);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      transition:all 0.2s ease;
    }
    .btn-icon{ padding:10px; font-weight:950; color:var(--accent); width:38px; height:38px; }
    .btn-icon:active, .back:active{ transform:scale(0.96); }
    .back{ color:rgba(255,255,255,0.92); font-weight:800; font-size:14px; cursor:pointer; }
    .pill{ font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); white-space:nowrap; }
    .pill b{ color:#fff; letter-spacing:0.1em; font-weight:950; }

    /* ===== SCROLL / SECTIONS ===== */
    .scroll-container{
      position:absolute; top:var(--header-height); left:0; right:0; bottom:0;
      overflow-y:auto; overflow-x:hidden;
      scroll-snap-type:y mandatory; scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch; z-index:10;
      height:calc(100% - var(--header-height));
    }
    .scroll-container::-webkit-scrollbar{ display:none; }

    .section-wrapper{
      height:100%; width:100%;
      scroll-snap-align:start; scroll-snap-stop:always;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      padding:calc(90px + var(--safeTop)) calc(16px + var(--safeRight)) calc(120px + var(--safeBottom)) calc(16px + var(--safeLeft));
      position:relative;
    }

    .card{
      width:100%; max-width:var(--maxw);
      flex:1; min-height:0;
      border-radius:var(--radius);
      border:1px solid var(--card-border);
      background:var(--card-bg);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      box-shadow:var(--shadow);
      display:flex; flex-direction:column; overflow:hidden;
      opacity:0.3; transform:scale(0.92) translateY(30px);
      transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .section-wrapper.is-active .card{ opacity:1; transform:scale(1) translateY(0); }

    .cardHeader{
      padding:24px 24px 20px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      background:rgba(0,0,0,0.3); flex-shrink:0;
    }
    .kicker{ font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; font-weight:950; }
    .h1{ margin:0; font-size:clamp(22px,5vw,28px); line-height:1.3; letter-spacing:-0.01em; font-weight:900; }
    .cardBody{ padding:24px; overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; }

    .big{ font-size:clamp(28px,6vw,46px); line-height:1.12; font-weight:900; letter-spacing:-0.03em; margin:0 0 18px; }
    .big .r, .r{ background:linear-gradient(135deg,#ff6b6b,#ff2a2a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .lead{ font-size:17px; line-height:1.65; color:rgba(255,255,255,0.85); margin:0 0 16px; }
    .qt{ margin:18px 0 10px; padding:14px 18px; border-left:3px solid var(--accent); background:linear-gradient(90deg,var(--accent-glow),transparent); border-radius:0 12px 12px 0; color:rgba(255,255,255,0.95); line-height:1.65; font-size:15px; font-style:italic; }

    .ul{ margin:14px 0; padding:0; list-style:none; color:rgba(255,255,255,0.78); font-size:15px; line-height:1.65; }
    .ul li{ position:relative; padding-left:22px; margin:10px 0; }
    .ul li::before{ content:'→'; position:absolute; left:0; color:var(--accent); font-weight:950; }

    .steps{ display:flex; flex-direction:column; gap:16px; margin:16px 0; }
    .step{ display:flex; gap:14px; align-items:flex-start; }
    .step-num{ flex-shrink:0; width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; font-weight:950; font-size:14px; display:flex; align-items:center; justify-content:center; }
    .step-title{ font-weight:900; font-size:15px; color:#fff; margin-bottom:4px; }
    .step-desc{ font-size:14px; color:rgba(255,255,255,0.72); line-height:1.6; }

    .sg{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .sn{ background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:14px 10px; text-align:center; }
    .sv{ font-size:22px; font-weight:900; color:#fff; line-height:1.1; letter-spacing:-0.02em; }
    .slbl{ font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.45); margin-top:6px; }

    /* ===== WHATSAPP CTA ===== */
    .wa-cta{
      display:flex; align-items:center; gap:12px;
      padding:16px 22px; border-radius:18px; border:none;
      background:linear-gradient(135deg, #128C7E, #25D366);
      color:#fff; font-weight:900; font-size:16px;
      cursor:pointer; width:100%; position:relative; overflow:hidden;
      box-shadow:0 10px 32px rgba(37,211,102,0.35);
      transition:transform .2s, filter .2s, box-shadow .2s;
    }
    .wa-cta:active{ transform:scale(0.97); filter:brightness(1.05); box-shadow:0 5px 16px rgba(37,211,102,0.2); }
    .wa-cta .wa-icon{ font-size:22px; flex-shrink:0; }
    .wa-cta .wa-text{ flex:1; text-align:left; }
    .wa-cta .wa-sub{ font-size:12px; font-weight:600; opacity:0.85; display:block; margin-top:2px; }
    .wa-cta .wa-arr{ font-size:18px; opacity:0.8; }
    .wa-cta .wa-pulse{
      position:absolute; inset:0;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
      animation:waSweep 2.5s infinite;
    }
    @keyframes waSweep{ 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

    .red-cta{
      display:flex; align-items:center; justify-content:center; gap:10px;
      border:none; border-radius:16px;
      background:linear-gradient(135deg,#ff4444,#b80000);
      cursor:pointer; overflow:hidden; position:relative;
      box-shadow:0 8px 28px rgba(255,42,42,0.38);
      transition:transform .2s,filter .2s;
      min-height:54px; width:100%; padding:0;
      color:#fff; font-weight:900; font-size:15px;
    }
    .red-cta:active{ transform:scale(0.97); }
    .cpulse{ position:absolute; inset:0; background:rgba(255,255,255,0.12); animation:cpa 2s infinite; }
    @keyframes cpa{ 0%,100%{opacity:0} 50%{opacity:1} }
    .ci{ position:relative; z-index:1; display:flex; align-items:center; gap:8px; color:#fff; font-weight:900; font-size:15px; padding:0 24px; }
    .ca{ background:rgba(255,255,255,0.2); border-radius:8px; padding:4px 10px; font-size:14px; }

    /* ===== URGENCY BANNER ===== */
    .urgency-bar{
      display:flex; align-items:center; gap:10px;
      padding:10px 14px; border-radius:12px;
      border:1px solid rgba(245,158,11,0.3);
      background:rgba(245,158,11,0.08); margin-bottom:14px;
    }
    .urgency-dot{ width:8px; height:8px; border-radius:50%; background:#f59e0b; animation:urgPulse 1.4s infinite; flex-shrink:0; }
    @keyframes urgPulse{ 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.7)} }
    .urgency-text{ font-size:13px; color:rgba(255,255,255,0.85); font-weight:700; line-height:1.4; }
    .urgency-text b{ color:#fbbf24; }

    /* Social proof */
    .social-proof{
      display:flex; align-items:center; gap:12px;
      padding:12px 16px; border-radius:14px;
      border:1px solid rgba(255,255,255,0.07);
      background:rgba(0,0,0,0.3); margin:12px 0;
    }
    .sp-avatars{ display:flex; }
    .sp-avatar{
      width:28px; height:28px; border-radius:50%;
      border:2px solid rgba(0,0,0,0.5);
      background:linear-gradient(135deg, var(--c1), var(--c2));
      margin-left:-8px; font-size:11px; font-weight:900;
      display:flex; align-items:center; justify-content:center; color:#fff;
    }
    .sp-avatar:first-child{ margin-left:0; }
    .sp-text{ font-size:13px; color:rgba(255,255,255,0.7); line-height:1.45; }
    .sp-text b{ color:#fff; }

    /* ===== 3D VIEWER ===== */
    .stl-viewer-wrap{
      position:relative; width:100%;
      height:220px; min-height:220px; max-height:220px;
      border-radius:16px; overflow:hidden;
      border:1px solid rgba(255,255,255,0.1);
      background:#0a0a0a; margin-bottom:12px;
      touch-action:none;
    }
    .stl-viewer-wrap canvas{ display:block; width:100%!important; height:100%!important; object-fit:contain; }
    .stl-loading{
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-size:12px; color:rgba(255,255,255,0.55);
      letter-spacing:0.12em; text-transform:uppercase;
      pointer-events:none; background:#0a0a0a;
      transition:opacity 0.4s; padding:16px; text-align:center; z-index:5;
      white-space:pre-line; flex-direction:column; gap:8px;
    }
    .stl-loading.hidden{ opacity:0; pointer-events:none; }
    .stl-load-spinner{
      width:28px; height:28px; border-radius:50%;
      border:2.5px solid rgba(255,255,255,0.1);
      border-top-color:var(--accent);
      animation:spin 0.8s linear infinite;
    }
    @keyframes spin{ to{transform:rotate(360deg)} }
    .stl-hint{
      position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
      font-size:10px; color:rgba(255,255,255,0.25); letter-spacing:0.08em;
      text-transform:uppercase; white-space:nowrap; pointer-events:none; z-index:5;
    }

    /* ===== LIVE 2D PLATE PREVIEW ===== */
    .plate-preview-block{ width:100%; margin-bottom:14px; }
    .plate-preview-label{
      font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
      color:rgba(255,255,255,0.35); font-weight:700; margin-bottom:8px;
      display:flex; align-items:center; gap:8px;
    }
    .preview-live-dot{ width:6px; height:6px; border-radius:50%; background:var(--ok); animation:urgPulse 1.4s infinite; }
    .plate-canvas-outer{
      width:100%; display:flex; align-items:center; justify-content:center;
      background:repeating-conic-gradient(rgba(255,255,255,0.03) 0% 25%, transparent 0% 50%) 0 0 / 12px 12px;
      border-radius:16px; padding:18px 14px;
      border:1px solid rgba(255,255,255,0.07);
      position:relative; overflow:hidden;
    }
    @keyframes plateFlash{
      0%{ box-shadow:0 0 0 0 rgba(255,255,255,0.3); }
      50%{ box-shadow:0 0 0 6px rgba(255,255,255,0); }
      100%{ box-shadow:0 0 0 0 rgba(255,255,255,0); }
    }
    .plate-flash{ animation:plateFlash 0.35s ease-out; }
    #plate2DCanvas{
      display:block; border-radius:10px;
      box-shadow:0 12px 36px rgba(0,0,0,0.6), 0 2px 8px rgba(0,0,0,0.4);
      max-width:100%; height:auto;
      transition:filter 0.15s;
    }

    /* ===== PLATE TEXT INPUT ===== */
    .plate-input-block{ margin-bottom:12px; }
    .plate-input-label{
      font-size:10px; letter-spacing:0.14em; text-transform:uppercase;
      color:rgba(255,255,255,0.35); font-weight:700; margin-bottom:6px;
      display:flex; align-items:center; justify-content:space-between; gap:10px;
    }
    .plate-meta{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }
    .plate-char-count{
      font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:0.06em;
      white-space:nowrap; flex-shrink:0; font-variant-numeric:tabular-nums;
    }
    .plate-warn{
      display:none; font-size:10px; letter-spacing:0.1em; text-transform:uppercase;
      padding:4px 10px; border-radius:999px;
      border:1px solid rgba(245,158,11,0.35); background:rgba(245,158,11,0.12);
      color:rgba(255,255,255,0.92); white-space:nowrap; gap:6px; align-items:center;
    }
    .plate-warn.show{ display:inline-flex; }
    .plate-warn .dot{ width:8px; height:8px; border-radius:50%; background:var(--warn); box-shadow:0 0 0 3px rgba(245,158,11,0.18); }

    .plate-input-row{ display:flex; align-items:center; gap:10px; }
    .plate-text-input{
      flex:1; min-width:0; height:58px;
      background:rgba(0,0,0,0.5);
      border:1.5px solid rgba(255,255,255,0.12);
      border-radius:16px; color:#fff;
      font-family:'Share Tech Mono', 'Courier New', monospace;
      font-size:22px; font-weight:700;
      letter-spacing:0.18em; text-align:center; text-transform:uppercase;
      padding:0 16px; outline:none;
      transition:border-color 0.2s, box-shadow 0.2s, background 0.2s;
      -webkit-appearance:none;
      /* Inputs must be selectable */
      -webkit-user-select:text !important;
      user-select:text !important;
      -webkit-touch-callout:default !important;
    }
    .plate-text-input::placeholder{ color:rgba(255,255,255,0.18); letter-spacing:0.1em; font-size:16px; }
    .plate-text-input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-glow);
      background:rgba(0,0,0,0.65);
    }

    /* (D) plate-hint-chip — converted from <span onclick> to accessible button-like element
       via JS; these CSS rules keep visuals identical while supporting :focus-visible. */
    .plate-hint-chips{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .plate-hint-chip{
      padding:5px 12px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.1);
      background:rgba(255,255,255,0.04);
      font-size:11px; font-family:'Share Tech Mono', monospace;
      color:rgba(255,255,255,0.5); cursor:pointer;
      transition:all 0.2s; letter-spacing:0.1em;
      /* Chips are interactive — suppress tap highlight */
      -webkit-tap-highlight-color: rgba(0,0,0,0) !important;
      display:inline-flex; align-items:center;
    }
    .plate-hint-chip:hover, .plate-hint-chip:active{
      border-color:rgba(255,255,255,0.25);
      background:rgba(255,255,255,0.1);
      color:#fff;
    }

    /* ===== COLOR PANEL ===== */
    .stl-color-panel{
      padding:14px; border-radius:16px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(0,0,0,0.22); margin-bottom:12px;

  <!-- ══════════════════════════════════════
       JS TAP-HIGHLIGHT POLISH (C)
       Runs at parse time — before any DOM
       interaction — so iOS never shows a ring
       from touch-triggered focus on non-inputs.
       Uses rAF defer so click events still fire.
       Does NOT block scroll or prevent default.
  ══════════════════════════════════════ -->
  <script>
  (function () {
    var touchPending = false;
    document.addEventListener('touchstart', function () {
      touchPending = true;
    }, { passive: true });
    document.addEventListener('touchend', function () {
      setTimeout(function () { touchPending = false; }, 400);
    }, { passive: true });
    document.addEventListener('focus', function (e) {
      if (!touchPending) return;
      var tag = (e.target.tagName || '').toUpperCase();
      if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' ||
          e.target.isContentEditable) return;
      requestAnimationFrame(function () {
        if (document.activeElement === e.target) e.target.blur();
      });
    }, true);
  })();
  </script>

<script>
(function(){
  "use strict";

  const DEBUG = (new URLSearchParams(location.search).get("debug") === "1");
  const dlog = (...a) => { if(DEBUG) console.log("[PBD]", ...a); };

  // ===== Error Toast =====
  const errorToast = document.getElementById("errorToast");
  const errorToastMsg = document.getElementById("errorToastMsg");
  const errorToastClose = document.getElementById("errorToastClose");

  function showErrorToast(msg){
    try{
      if(!errorToast || !errorToastMsg) return;
      errorToastMsg.textContent = String(msg || "Unknown error");
      errorToast.classList.add("show");
      clearTimeout(showErrorToast._t);
      showErrorToast._t = setTimeout(()=>errorToast.classList.remove("show"), 6500);
    }catch(e){}
  }
  if(errorToastClose) errorToastClose.addEventListener("click", ()=>errorToast.classList.remove("show"));
  window.onerror = function(message, source, lineno, colno, error){
    showErrorToast((error && error.message) ? error.message : message);
    return false;
  };
  window.addEventListener("unhandledrejection", function(ev){
    const r = ev && ev.reason;
    showErrorToast((r && r.message) ? r.message : String(r || "Unhandled rejection"));
  });

  // ===== Routing =====
  function routeTo(pathHtml, pathStore) {
    return location.hostname === 'store.viadecide.com' ? pathStore : pathHtml;
  }
  (function applyNavLinks(){
    try{
      const links = {
        'npLogo':    ['./index.html', '/printbydd/'],
        'npHome':    ['./index.html', '/printbydd/'],
        'npProducts':['./products.html', '/printbydd/products'],
        'npBlog':    ['./gifts-that-mean-more.html', '/printbydd/gifts'],
        'backBtn':   ['./index.html', '/printbydd/'],
      };
      Object.keys(links).forEach(id=>{
        const el = document.getElementById(id);
        if(el) el.href = routeTo(links[id][0], links[id][1]);
      });
    }catch(e){ dlog("nav init error", e); }
  })();

  const WA_NUMBER = "916351537770";

  // ===== THEME =====
  const THEME_KEY = "VD_INVERT_THEME";
  const themeBtns = Array.from(document.querySelectorAll(".theme-toggle"));
  function setInvert(on){
    document.body.classList.toggle("invert-mode", !!on);
    themeBtns.forEach(b => b.textContent = on ? "☀" : "☾");
    try{ localStorage.setItem(THEME_KEY, on ? "1" : "0"); }catch(e){}
  }
  (function initTheme(){
    try{
      let s="0"; try{ s = localStorage.getItem(THEME_KEY)||"0"; }catch(e){}
      setInvert(s==="1");
    }catch(e){}
  })();
  themeBtns.forEach(btn => btn.addEventListener("click", ()=>setInvert(!document.body.classList.contains("invert-mode"))));

  // ===== 3D STATE =====
  let scene=null, renderer=null, camera=null, group=null;
  let matBase3D=null, matChar3D=null, matBorder3D=null;
  let charGroup3D=null;
  let pointerDown=false, lastX=0, lastY=0, autoRotate=true;
  let initedCanvasEl=null, renderToken=0;

  // ===== STORAGE =====
  const COLOR_KEY = "PBD_NUMBERPLATE_COLORS_V2";
  const TEXT_KEY = "PBD_PLATE_TEXT_V2";

  // ===== INPUT RULES =====
  const MAX_LEN = 18;
  const ALLOWED_RE = /[A-Z0-9 -]/;

  function normalizePlateInput(raw){
    const up = String(raw||"").toUpperCase();
    let cleaned = "", removed = 0;
    for(let i=0;i<up.length;i++){
      let ch = up[i];
      if(ch==="_") ch="-";
      if(ALLOWED_RE.test(ch)) cleaned += ch;
      else if(ch!=="\n"&&ch!=="\r"&&ch!=="\t") removed++;
    }
    cleaned = cleaned.replace(/\s+/g," ").trim();
    if(!cleaned.includes(" ") && /^[A-Z0-9-]+$/.test(cleaned)){
      const m = cleaned.match(/^([A-Z]{2})(\d{1,2})([A-Z]{1,3})(\d{1,4})$/);
      if(m) cleaned = [m[1],m[2],m[3],m[4]].join(" ");
    }
    if(cleaned.length > MAX_LEN) cleaned = cleaned.slice(0, MAX_LEN).trim();
    return { value:cleaned, removed };
  }

  // ===== COLOR DEFINITIONS =====
  const BASE_COLORS = {
    black:{ hex:0x0d0d0d, css:'#0d0d0d', label:'Black' },
    white:{ hex:0xf0f0f0, css:'#f0f0f0', label:'White' },
    gray: { hex:0x2a2a2a, css:'#2a2a2a', label:'Gray'  },
    blue: { hex:0x1a6bd1, css:'#1a6bd1', label:'Blue'  }
  };
  const CHAR_COLORS = {
    white:{ hex:0xf0f0f0, css:'#f0f0f0', label:'White' },
    black:{ hex:0x0d0d0d, css:'#0d0d0d', label:'Black' },
    red:  { hex:0xff2a2a, css:'#ff2a2a', label:'Red'   },
    gold: { hex:0xd4af37, css:'#d4af37', label:'Gold'  },
    neon: { hex:0x22c55e, css:'#22c55e', label:'Neon'  }
  };
  const BOUNDARY_COLORS = {
    red:  { hex:0xff2a2a, css:'#ff2a2a', label:'Red'   },
    black:{ hex:0x0d0d0d, css:'#0d0d0d', label:'Black' },
    white:{ hex:0xf0f0f0, css:'#f0f0f0', label:'White' },
    blue: { hex:0x1a6bd1, css:'#1a6bd1', label:'Blue'  },
    steel:{ hex:0x9aa4b2, css:'#9aa4b2', label:'Steel' }
  };

  let customBaseHex=null, customCharHex=null, customBoundaryHex=null;
  let currentBaseKey="black", currentCharKey="white", currentBoundaryKey="red";
  let plateText = "MH 01 AB 1234";
  let fontsReady = false;

  (function restoreState(){
    try{
      const s = JSON.parse(localStorage.getItem(COLOR_KEY)||"{}");
      if(s.base && BASE_COLORS[s.base]) currentBaseKey=s.base;
      if(s.char && CHAR_COLORS[s.char]) currentCharKey=s.char;
      if(s.boundary && BOUNDARY_COLORS[s.boundary]) currentBoundaryKey=s.boundary;
      if(s.customBaseHex) customBaseHex=s.customBaseHex;
      if(s.customCharHex) customCharHex=s.customCharHex;
      if(s.customBoundaryHex) customBoundaryHex=s.customBoundaryHex;
      const pt = localStorage.getItem(TEXT_KEY);
      if(pt){ const n=normalizePlateInput(pt); plateText=n.value||plateText; }
    }catch(e){}
  })();

  function persistState(){
    try{
      localStorage.setItem(COLOR_KEY, JSON.stringify({
        base:currentBaseKey, char:currentCharKey, boundary:currentBoundaryKey,
        customBaseHex, customCharHex, customBoundaryHex
      }));
      localStorage.setItem(TEXT_KEY, plateText);
    }catch(e){}
  }

  // ===== COLOR GETTERS =====
  function getBaseColor(){ return customBaseHex ? parseInt(customBaseHex.replace('#',''),16) : BASE_COLORS[currentBaseKey].hex; }
  function getCharColor(){ return customCharHex ? parseInt(customCharHex.replace('#',''),16) : CHAR_COLORS[currentCharKey].hex; }
  function getBoundaryColor(){ return customBoundaryHex ? parseInt(customBoundaryHex.replace('#',''),16) : BOUNDARY_COLORS[currentBoundaryKey].hex; }
  function getBaseCss(){ return customBaseHex||BASE_COLORS[currentBaseKey].css; }
  function getCharCss(){ return customCharHex||CHAR_COLORS[currentCharKey].css; }
  function getBoundaryCss(){ return customBoundaryHex||BOUNDARY_COLORS[currentBoundaryKey].css; }

  // ===== CONTRAST =====
  function hexToRgb(hex){
    const h = String(hex||"").replace("#","").trim();
    if(!/^[0-9a-fA-F]{6}$/.test(h)) return {r:0,g:0,b:0};
    return {r:parseInt(h.slice(0,2),16),g:parseInt(h.slice(2,4),16),b:parseInt(h.slice(4,6),16)};
  }
  function srgbToLin(c){ c=c/255; return c<=0.03928?c/12.92:Math.pow((c+0.055)/1.055,2.4); }
  function relLuminance(rgb){ return 0.2126*srgbToLin(rgb.r)+0.7152*srgbToLin(rgb.g)+0.0722*srgbToLin(rgb.b); }
  function contrastRatio(a,b){
    const La=relLuminance(hexToRgb(a)), Lb=relLuminance(hexToRgb(b));
    const L1=Math.max(La,Lb),L2=Math.min(La,Lb); return (L1+0.05)/(L2+0.05);
  }
  function updateContrastUI(){
    const score = Math.min(contrastRatio(getBaseCss(),getCharCss()), contrastRatio(getBaseCss(),getBoundaryCss()));
    const badge = document.getElementById("contrastScore");
    const msg   = document.getElementById("contrastMsg");
    if(!badge||!msg) return;
    badge.textContent = score.toFixed(2)+"×";
    const good = score>=4.0;
    badge.classList.toggle("ok", good);
    badge.classList.toggle("warn", !good);
    if(good) msg.textContent = "Readability: Strong contrast.";
    else if(score>=2.5) msg.textContent = "Readability: Medium — consider higher contrast.";
    else msg.textContent = "Readability: Low — digits may blend in daylight.";
  }

  // ===== 2D PLATE CANVAS =====
  function roundRect(ctx, x, y, w, h, r){
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }

  function drawScrew(ctx, x, y, r, borderC){
    ctx.beginPath(); ctx.arc(x,y,r+1,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
    ctx.fillStyle='rgba(0,0,0,0.35)'; ctx.fill();
    ctx.beginPath(); ctx.arc(x,y,r*0.68,0,Math.PI*2);
    ctx.fillStyle=borderC; ctx.fill();
    ctx.save();
    ctx.strokeStyle='rgba(0,0,0,0.5)'; ctx.lineWidth=2; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(x-r*0.42,y); ctx.lineTo(x+r*0.42,y); ctx.stroke();
    ctx.restore();
  }

  function measureTextFit(ctx, text, maxWidth, startSize, minSize){
    let size = startSize;
    ctx.font = `bold ${size}px "Share Tech Mono", "Courier New", monospace`;
    while(ctx.measureText(text).width > maxWidth && size > minSize){
      size -= 1;
      ctx.font = `bold ${size}px "Share Tech Mono", "Courier New", monospace`;
    }
    return size;
  }

  let plateFlashTimer = null;
  function flashPlateCanvas(){
    const outer = document.querySelector('.plate-canvas-outer');
    if(!outer) return;
    outer.classList.remove('plate-flash');
    void outer.offsetWidth;
    outer.classList.add('plate-flash');
    clearTimeout(plateFlashTimer);
    plateFlashTimer = setTimeout(()=>outer.classList.remove('plate-flash'), 400);
  }

  function draw2DPlate(animate){
    try{
      const canvas = document.getElementById('plate2DCanvas');
      if(!canvas) return;
      const ctx = canvas.getContext('2d');
      if(!ctx) return;
      const W=560, H=130;
      canvas.width=W; canvas.height=H;
      const base=getBaseCss(), charC=getCharCss(), borderC=getBoundaryCss();
      const bw=11, r=16;
      ctx.clearRect(0,0,W,H);
      ctx.save();
      ctx.shadowColor='rgba(0,0,0,0.55)'; ctx.shadowBlur=18; ctx.shadowOffsetY=4;
      ctx.beginPath(); roundRect(ctx,0,0,W,H,r);
      ctx.fillStyle=borderC; ctx.fill();
      ctx.restore();
      ctx.beginPath(); roundRect(ctx,0,0,W,H,r);
      ctx.fillStyle=borderC; ctx.fill();
      const bevelGrad=ctx.createLinearGradient(0,0,0,H);
      bevelGrad.addColorStop(0,'rgba(255,255,255,0.15)');
      bevelGrad.addColorStop(1,'rgba(0,0,0,0.2)');
      ctx.beginPath(); roundRect(ctx,0,0,W,H,r);
      ctx.fillStyle=bevelGrad; ctx.fill();
      const ir=r-bw*0.7;
      ctx.beginPath(); roundRect(ctx,bw,bw,W-bw*2,H-bw*2,ir);
      ctx.fillStyle=base; ctx.fill();
      const plateGrad=ctx.createLinearGradient(bw,bw,bw,H-bw);
      plateGrad.addColorStop(0,'rgba(255,255,255,0.07)');
      plateGrad.addColorStop(0.5,'rgba(255,255,255,0.0)');
      plateGrad.addColorStop(1,'rgba(0,0,0,0.1)');
      ctx.beginPath(); roundRect(ctx,bw,bw,W-bw*2,H-bw*2,ir);
      ctx.fillStyle=plateGrad; ctx.fill();
      const indW=28, indX=bw, indH=H-bw*2, indR=Math.min(ir,6);
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(indX+indR,bw); ctx.lineTo(indX+indW,bw);
      ctx.lineTo(indX+indW,H-bw); ctx.lineTo(indX+indR,H-bw);
      ctx.quadraticCurveTo(indX,H-bw,indX,H-bw-indR);
      ctx.lineTo(indX,bw+indR); ctx.quadraticCurveTo(indX,bw,indX+indR,bw);
      ctx.closePath();
      ctx.fillStyle='#000080'; ctx.fill();
      ctx.save();
      ctx.translate(indX+indW/2, bw+indH/2);
      ctx.rotate(-Math.PI/2);
      ctx.font='bold 8px "Exo 2", sans-serif';
      ctx.fillStyle='#fff'; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('IND', 0, 0);
      ctx.restore();
      ctx.beginPath(); ctx.arc(indX+indW/2, bw+indH*0.15, 4, 0, Math.PI*2);
      ctx.fillStyle='#FF9933'; ctx.fill();
      ctx.restore();
      const screwY=H/2, screwR=7;
      drawScrew(ctx, bw+indW+14, screwY, screwR, borderC);
      drawScrew(ctx, W-bw-14, screwY, screwR, borderC);
      const text = (plateText||'MH 01 AB 1234').toUpperCase();
      const SCREW_MARGIN=50, RIGHT_MARGIN=34;
      const textAreaLeft = bw+indW+SCREW_MARGIN;
      const textAreaRight = W-bw-RIGHT_MARGIN;
      const textAreaW = textAreaRight - textAreaLeft;
      const fontSize = measureTextFit(ctx, text, textAreaW, 58, 18);
      ctx.font = `bold ${fontSize}px "Share Tech Mono", "Courier New", monospace`;
      ctx.fillStyle = charC;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.save();
      ctx.shadowColor='rgba(0,0,0,0.45)'; ctx.shadowBlur=3; ctx.shadowOffsetY=2; ctx.shadowOffsetX=1;
      ctx.fillText(text, textAreaLeft + textAreaW/2, H/2 + 1);
      ctx.restore();
      ctx.beginPath(); roundRect(ctx,0.5,0.5,W-1,H-1,r);
      ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=1; ctx.stroke();
      if(animate) flashPlateCanvas();
    }catch(e){ if(DEBUG) console.error("[PBD] draw2DPlate failed:", e); }
  }

  if(document.fonts && document.fonts.ready){
    document.fonts.ready.then(()=>{ fontsReady=true; draw2DPlate(false); });
  } else {
    setTimeout(()=>{ fontsReady=true; draw2DPlate(false); }, 1200);
  }

      document.querySelectorAll('[data-char-key]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-char-key')===currentCharKey&&!customCharHex));

      upgradePlateChips();

  // ===== (D) KEYBOARD ACCESSIBLE CHIPS =====
  // .plate-hint-chip elements are rendered as <span onclick> in HTML strings.
  // We upgrade them in place: add role="button" + tabindex="0" + Enter/Space handler.
  function upgradePlateChips(){
    document.querySelectorAll('.plate-hint-chip:not([data-upgraded])').forEach(function(chip){
      chip.setAttribute('role', 'button');
      chip.setAttribute('tabindex', '0');
      chip.setAttribute('data-upgraded', '1');
      chip.addEventListener('keydown', function(e){
        if(e.key === 'Enter' || e.key === ' '){
          e.preventDefault();
          chip.click();
        }
      });
    });
  }

      if(matChar3D){ matChar3D.color.setHex(getCharColor()); matChar3D.needsUpdate=true; }
      if(matBorder3D){ matBorder3D.color.setHex(getBoundaryColor()); matBorder3D.needsUpdate=true; }

  // ===== PLATE TEXT =====
  window.composeStructuredPlate = function() {

    var district = (document.getElementById('plateDistrict') || {value:''}).value.trim().toUpperCase();

  // ===== 3D PROCEDURAL =====
  const PW=5.0, PH=1.15, PD=0.18, BW=0.13;
  const CW=0.27, CH=0.63, ST=0.055, CD=0.10;

  function segBoxes(){
    const hH=(CH-ST)/2, qH=CH/4, armH=CH/2-ST*1.6;
    return {
      T: {x:0,y:hH,w:CW-ST*0.7,h:ST},
      M: {x:0,y:0,w:CW-ST*0.7,h:ST},
      B: {x:0,y:-hH,w:CW-ST*0.7,h:ST},
      TL:{x:-(CW-ST)/2,y:qH,w:ST,h:armH},
      TR:{x:(CW-ST)/2,y:qH,w:ST,h:armH},
      BL:{x:-(CW-ST)/2,y:-qH,w:ST,h:armH},
      BR:{x:(CW-ST)/2,y:-qH,w:ST,h:armH},
      CV:{x:0,y:0,w:ST,h:CH-ST*1.8}
    };
  }

  const CHAR_SEGS={
    '0':['T','TL','TR','BL','BR','B'],'1':['TR','BR'],'2':['T','TR','M','BL','B'],
    '3':['T','TR','M','BR','B'],'4':['TL','M','TR','BR'],'5':['T','TL','M','BR','B'],
    '6':['T','TL','M','BL','BR','B'],'7':['T','TR','BR'],'8':['T','TL','TR','M','BL','BR','B'],
    '9':['T','TL','TR','M','BR','B'],'A':['T','TL','TR','M','BL','BR'],'B':['T','TL','TR','M','BL','BR','B'],
    'C':['T','TL','BL','B'],'D':['TL','TR','BL','BR','B'],'E':['T','TL','M','BL','B'],
    'F':['T','TL','M','BL'],'G':['T','TL','M','BR','BL','B'],'H':['TL','TR','M','BL','BR'],
    'I':['T','CV','B'],'J':['TR','BR','BL','B'],'K':['TL','M','BL','TR','BR'],
    'L':['TL','BL','B'],'M':['T','TL','TR','BL','BR'],'N':['TL','TR','BL','BR'],
    'O':['T','TL','TR','BL','BR','B'],'P':['T','TL','TR','M'],'Q':['T','TL','TR','BL','BR','B'],
    'R':['T','TL','TR','M','BL'],'S':['T','TL','M','BR','B'],'T':['T','CV'],
    'U':['TL','TR','BL','BR','B'],'V':['TL','TR','BL','BR','B'],'W':['TL','TR','M','BL','BR'],
    'X':['TL','TR','M','BL','BR'],'Y':['TL','TR','M','BR'],'Z':['T','TR','M','BL','B'],
    '-':['M'],' ':[]
  };

  function buildCharMeshes(text){
    const THREE=window.THREE;
    if(!THREE||!matChar3D) return null;
    const sb=segBoxes();
    const chars=String(text||"").split('');
    const GAP=0.09, SPACE_W=CW*0.6;
    let totalW=0;
    chars.forEach(c=>{ totalW+=(c===' ')?SPACE_W:CW+GAP; });
    totalW-=GAP;
    const grp=new THREE.Group();
    let x=-totalW/2;
    chars.forEach(c=>{
      if(c===' '){ x+=SPACE_W; return; }
      const segs=CHAR_SEGS[c]||[];
      segs.forEach(sId=>{
        const s=sb[sId]; if(!s) return;
        const mesh=new THREE.Mesh(new THREE.BoxGeometry(s.w,s.h,CD),matChar3D);
        mesh.position.set(x+CW/2+s.x,s.y,PD/2+CD/2);
        grp.add(mesh);
      });
      x+=CW+GAP;
    });
    return grp;
  }

  function rebuild3DChars(){
    try{
      const THREE=window.THREE;
      if(!THREE||!group||!matChar3D) return;
      if(charGroup3D){ group.remove(charGroup3D); charGroup3D=null; }
      charGroup3D=buildCharMeshes((plateText||'MH 01 AB 1234').toUpperCase());
      if(charGroup3D) group.add(charGroup3D);
    }catch(e){}
  }

  function buildProceduralPlate(){
    const THREE=window.THREE;
    if(!THREE) throw new Error("Three.js not available.");
    while(group.children.length) group.remove(group.children[0]);
    charGroup3D=null;
    matBase3D   = new THREE.MeshStandardMaterial({color:getBaseColor(),roughness:0.62,metalness:0.06});
    matChar3D   = new THREE.MeshStandardMaterial({color:getCharColor(),roughness:0.42,metalness:0.10});
    matBorder3D = new THREE.MeshStandardMaterial({color:getBoundaryColor(),roughness:0.55,metalness:0.12});
    group.add(new THREE.Mesh(new THREE.BoxGeometry(PW,PH,PD),matBase3D));
    [{w:PW+BW*2,h:BW,d:PD+0.05,x:0,y:PH/2+BW/2},
     {w:PW+BW*2,h:BW,d:PD+0.05,x:0,y:-PH/2-BW/2},
     {w:BW,h:PH,d:PD+0.05,x:-PW/2-BW/2,y:0},
     {w:BW,h:PH,d:PD+0.05,x:PW/2+BW/2,y:0}].forEach(p=>{
      const m=new THREE.Mesh(new THREE.BoxGeometry(p.w,p.h,p.d),matBorder3D);
      m.position.set(p.x,p.y,0); group.add(m);
    });
    [{w:PW-BW*0.5,h:0.045,d:0.04,y:PH/2-0.08},
     {w:PW-BW*0.5,h:0.045,d:0.04,y:-PH/2+0.08}].forEach(p=>{
      const m=new THREE.Mesh(new THREE.BoxGeometry(p.w,p.h,p.d),matBorder3D);
      m.position.set(0,p.y,PD/2+0.02); group.add(m);
    });
    const screwMat=new THREE.MeshStandardMaterial({color:0x222222,roughness:0.85,metalness:0.3});
    [[-PW/2+0.28,0],[PW/2-0.28,0]].forEach(([sx,sy])=>{
      const rec=new THREE.Mesh(new THREE.CylinderGeometry(0.10,0.10,PD+0.06,10),screwMat);
      rec.rotation.x=Math.PI/2; rec.position.set(sx,sy,0); group.add(rec);
      const cap=new THREE.Mesh(new THREE.CylinderGeometry(0.07,0.07,0.04,10),matBorder3D);
      cap.rotation.x=Math.PI/2; cap.position.set(sx,sy,PD/2+0.02); group.add(cap);
      const slot=new THREE.Mesh(new THREE.BoxGeometry(0.10,0.018,0.05),new THREE.MeshStandardMaterial({color:0x111111,roughness:0.9}));
      slot.position.set(sx,sy,PD/2+0.045); group.add(slot);
    });
    charGroup3D=buildCharMeshes((plateText||'MH 01 AB 1234').toUpperCase());
    if(charGroup3D) group.add(charGroup3D);
    group.rotation.x=-0.22; group.rotation.y=0.55;
    const box=new THREE.Box3().setFromObject(group);
    const sz=new THREE.Vector3(); box.getSize(sz);
    group.scale.setScalar(2.6/Math.max(sz.x,sz.y)||1);
  }

  function isWebGLAvailable(){
    try{ const c=document.createElement("canvas"); return !!(window.WebGLRenderingContext&&(c.getContext("webgl")||c.getContext("experimental-webgl"))); }catch(e){ return false; }
  }

  window.initSTLViewer=function(){
    const wrap=document.getElementById('stl-viewer-wrap');
    const canvas=document.getElementById('stl-canvas');
    const loading=document.getElementById('stl-loading');
    if(!wrap||!canvas) return;
    if(!window.THREE){ if(loading) loading.textContent="3D preview unavailable.\n2D preview still works."; return; }
    if(!isWebGLAvailable()){ if(loading) loading.textContent="3D preview unavailable on this device.\n2D preview still works."; return; }
    if(initedCanvasEl===canvas&&renderer&&scene&&camera){ applyColors(); return; }
    renderToken++;
    const myToken=renderToken;
    try{ if(renderer) renderer.dispose(); }catch(e){}
    scene=null; camera=null; group=null; matBase3D=null; matChar3D=null; matBorder3D=null; charGroup3D=null;
    renderer=null; initedCanvasEl=canvas;
    const W=wrap.clientWidth||320, H=220;
    try{
      renderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true,powerPreference:"high-performance"});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
      renderer.setSize(W,H,false);
    }catch(e){
      if(loading) loading.textContent="3D preview unavailable.\n(WebGL init failed)\n2D preview still works."; return;
    }
    scene=new THREE.Scene();
    camera=new THREE.PerspectiveCamera(42,W/H,0.1,1000);
    camera.position.set(0,0.3,5.5); camera.lookAt(0,0,0);
    scene.add(new THREE.AmbientLight(0xffffff,0.60));
    const d1=new THREE.DirectionalLight(0xffffff,1.1); d1.position.set(3,4,3); scene.add(d1);
    const d2=new THREE.DirectionalLight(0xffffff,0.40); d2.position.set(-3,-1,-2); scene.add(d2);
    const d3=new THREE.DirectionalLight(0xffffff,0.25); d3.position.set(0,-3,2); scene.add(d3);
    group=new THREE.Group(); scene.add(group);
    try{ buildProceduralPlate(); }catch(e){
      if(loading) loading.textContent="3D preview unavailable.\n2D preview still works."; return;
    }
    if(loading) loading.classList.add('hidden');
    function onDown(e){ pointerDown=true; autoRotate=false; const t=e.touches?e.touches[0]:e; lastX=t.clientX; lastY=t.clientY; }
    function onMove(e){ if(!pointerDown||!group) return; const t=e.touches?e.touches[0]:e; group.rotation.y+=(t.clientX-lastX)*0.012; group.rotation.x+=(t.clientY-lastY)*0.008; lastX=t.clientX; lastY=t.clientY; }
    function onUp(){ pointerDown=false; }
    wrap.addEventListener("pointerdown",onDown); wrap.addEventListener("pointermove",onMove); window.addEventListener("pointerup",onUp);
    window.addEventListener('resize',()=>{
      try{ if(!wrap||!renderer||!camera) return; const w=wrap.clientWidth||320; renderer.setSize(w,220,false); camera.aspect=w/220; camera.updateProjectionMatrix(); renderer.render(scene,camera); }catch(e){}
    });
    (function animate(){
      if(myToken!==renderToken) return;
      requestAnimationFrame(animate);
      if(autoRotate&&group) group.rotation.y+=0.006;
      if(renderer&&scene&&camera) renderer.render(scene,camera);
    })();
    applyColors();
  };

  // ===== CUSTOMIZE HTML =====

  const container  = document.getElementById('scrollContainer');

  const secName    = document.getElementById('secName');

  const bnNext     = document.getElementById('bnNext');
  const bnDots     = document.getElementById('bnDots');
  const bnCta      = document.getElementById('bnCta');
  const bnCtaText  = document.getElementById('bnCtaText');
  const bnCtaTag   = document.getElementById('bnCtaTag');

  const CUSTOMIZE_IDX = SECTIONS.findIndex(s=>s.name==="CUSTOMIZE");
  const ORDER_IDX     = SECTIONS.findIndex(s=>s.name==="ORDER");
  let currentSecIndex = 0;
  let currentLang = 'en';

  function buildBottomDots(){
    if(!bnDots) return;
    bnDots.innerHTML='';
    for(let i=0;i<SECTIONS.length;i++){
      const d=document.createElement('button');
      d.type='button'; d.className='bn-dot';
      d.setAttribute('aria-label',`Section ${i+1}`);
      d.addEventListener('click',()=>scrollToIndex(i));
      bnDots.appendChild(d);
    }
  }

  function scrollToIndex(i){
    try{
      i=Math.max(0,Math.min(SECTIONS.length-1,i));
      const el=container.querySelector(`.section-wrapper[data-index="${i}"]`);
      if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
    }catch(e){ showErrorToast("Scroll failed"); }
  }

  window.scrollToSectionByName=function(name){
    const idx=SECTIONS.findIndex(s=>s.name===name);
    if(idx>=0) scrollToIndex(idx);
  };

  function updateBottomNav(){
    if(bnPrev) bnPrev.disabled=currentSecIndex<=0;
    if(bnNext) bnNext.disabled=currentSecIndex>=(SECTIONS.length-1);
    if(bnDots) bnDots.querySelectorAll('.bn-dot').forEach((d,i)=>d.classList.toggle('active',i===currentSecIndex));
    const isOrderSec = currentSecIndex===ORDER_IDX;
    const isCustomSec = currentSecIndex===CUSTOMIZE_IDX;
    if(bnCta) bnCta.classList.toggle('wa-mode', isOrderSec);
    if(bnCtaText && bnCtaTag){
      if(isOrderSec){ bnCtaText.textContent="WhatsApp"; bnCtaTag.textContent="📲"; }
      else if(isCustomSec){ bnCtaText.textContent="Order"; bnCtaTag.textContent="→"; }
      else { bnCtaText.textContent="Customize"; bnCtaTag.textContent="3D"; }
    }
  }

  function initBottomNav(){
    buildBottomDots(); updateBottomNav();
    if(bnPrev) bnPrev.addEventListener('click',()=>scrollToIndex(currentSecIndex-1));
    if(bnNext) bnNext.addEventListener('click',()=>scrollToIndex(currentSecIndex+1));
    if(bnCta) bnCta.addEventListener('click',()=>{
      if(currentSecIndex===ORDER_IDX) orderOnWhatsApp();
      else if(currentSecIndex===CUSTOMIZE_IDX) orderOnWhatsApp();
      else if(CUSTOMIZE_IDX>=0) scrollToIndex(CUSTOMIZE_IDX);
    });
  }

  // ===== ACTIVE SECTION DETECTION =====
  let observer=null, usingIO=false;

  function activateSectionByIndex(idx){
    idx=Math.max(0,Math.min(SECTIONS.length-1,idx));
    currentSecIndex=idx;
    if(secLabel) secLabel.textContent=`SEC ${currentSecIndex+1}/${SECTIONS.length}`;
    if(secName) secName.textContent=SECTIONS[currentSecIndex].name;
    updateBottomNav();
    if(SECTIONS[currentSecIndex].name==='CUSTOMIZE'){

        try{ window.initSTLViewer(); syncColorUI(); draw2DPlate(false); }catch(e){ showErrorToast("Customizer init failed"); }

  function setupIntersectionObserver(){
    try{
      if(typeof IntersectionObserver==="undefined") return null;
      const io=new IntersectionObserver((entries)=>{
        try{
          entries.forEach(entry=>{
            if(entry.isIntersecting){
              entry.target.classList.add('is-active');
              const idx=parseInt(entry.target.getAttribute('data-index'),10);
              if(!isNaN(idx)) activateSectionByIndex(idx);
            }else{
              entry.target.classList.remove('is-active');
            }
          });
        }catch(e){}
      },{root:container,threshold:0.6});
      usingIO=true; return io;
    }catch(e){ return null; }
  }

  let scrollRAF=0;
  function onScrollFallback(){
    if(scrollRAF) return;
    scrollRAF=requestAnimationFrame(()=>{
      scrollRAF=0;
      try{
        const sections=Array.from(container.querySelectorAll(".section-wrapper"));
        if(!sections.length) return;
        const viewMid=container.scrollTop+container.clientHeight*0.5;
        let bestIdx=0, bestDist=Infinity;
        for(const el of sections){
          const idx=parseInt(el.getAttribute("data-index"),10);
          if(isNaN(idx)) continue;
          const dist=Math.abs((el.offsetTop+el.offsetHeight*0.5)-viewMid);
          if(dist<bestDist){ bestDist=dist; bestIdx=idx; }
        }
        sections.forEach(s=>{ const idx=parseInt(s.getAttribute("data-index"),10); s.classList.toggle("is-active",idx===bestIdx); });
        activateSectionByIndex(bestIdx);
      }catch(e){}
    });
  }

  function renderSections(){
    if(!container){ showErrorToast("Fatal: scroll container missing."); return; }
    try{
      container.innerHTML='';
      if(observer&&usingIO){ try{ observer.disconnect(); }catch(e){} }
      observer=setupIntersectionObserver();

      SECTIONS.forEach((sec,index)=>{
        const w=document.createElement('div');
        w.className='section-wrapper';
        w.setAttribute('data-index',index);
        w.setAttribute('data-name',sec.name);
        const title=(sec.title&&sec.title[currentLang])||sec.title.en||"";
        const bodyHtmlFn=sec.html&&(sec.html[currentLang]||sec.html.en);
        const bodyHtml=(typeof bodyHtmlFn==="function")?bodyHtmlFn():"";
        w.innerHTML=`
          <article class="card">
            <header class="cardHeader">
              <div class="kicker">${sec.kicker||""}</div>
              <h1 class="h1">${title}</h1>
            </header>
            <div class="cardBody">
              ${bodyHtml}
              <div style="height:85px;"></div>
            </div>
          </article>
          <div class="hint">
            <span>Scroll for more</span>
            <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        `;
        container.appendChild(w);
        if(observer){ try{ observer.observe(w); }catch(e){} }
      });

      setTimeout(()=>{
        try{
          if(bnDots&&bnDots.children.length!==SECTIONS.length) buildBottomDots();
          updateBottomNav(); applyColors();
          container.removeEventListener("scroll",onScrollFallback);
          if(!observer){
            usingIO=false;
            container.addEventListener("scroll",onScrollFallback,{passive:true});
            onScrollFallback();
          }else{
            activateSectionByIndex(0);
          }
          draw2DPlate(false);
        }catch(e){ showErrorToast("Post-render init failed"); }
      },60);

    }catch(e){
      showErrorToast("Render failed: "+(e&&e.message?e.message:e));
      try{
        container.innerHTML=`<div class="section-wrapper is-active" data-index="0"><article class="card" style="opacity:1;transform:none;"><header class="cardHeader"><div class="kicker">RECOVERY</div><h1 class="h1">Something went wrong.</h1></header><div class="cardBody"><p class="lead">Please reload.</p><button class="red-cta" onclick="location.reload()"><span class="cpulse"></span><div class="ci">Reload <div class="ca">→</div></div></button></div></article></div>`;
      }catch(_){}
    }
  }

  // ===== TRANSLATION =====
  const btnTranslate=document.getElementById('btnTranslate');
  const toast=document.getElementById('translationToast');
  const btnUndo=document.getElementById('btnUndoTranslate');
  const toastMsg=document.getElementById('toastMsg');
  let toastTimer;

  function triggerTranslation(lang){
    currentLang=lang; renderSections();
    if(toast&&toastMsg&&btnUndo){
      toast.classList.add('is-visible');
      toastMsg.textContent=(lang==='hi')?"Translated to Hindi":"Back to English";
      btnUndo.style.display=(lang==='hi')?'block':'none';
      clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>toast.classList.remove('is-visible'),2200);
    }
  }
  if(btnTranslate) btnTranslate.addEventListener('click',()=>triggerTranslation(currentLang==='en'?'hi':'en'));
  if(btnUndo) btnUndo.addEventListener('click',()=>{ triggerTranslation('en'); if(toast) toast.classList.remove('is-visible'); });

  // ===== ROTATION POPUP =====
  const popup=document.getElementById('rotatePopup');
  const appWrapper=document.getElementById('appWrapper');
  let isForcedLandscape=false, targetRotationAngle=0;

  function showRotatePopup(a){ targetRotationAngle=a; if(!popup) return; popup.classList.add('is-visible'); popup.textContent=(a===0)?"Tap for Portrait":"Tap for Landscape"; }
  function hideRotatePopup(){ if(popup) popup.classList.remove('is-visible'); }

  try{
    window.addEventListener('deviceorientation',(e)=>{
      const g=e.gamma;
      if(g===null||typeof g==='undefined') return;
      if(!isForcedLandscape){ if(g>45) showRotatePopup(90); else if(g<-45) showRotatePopup(-90); else hideRotatePopup(); }
      else { if(Math.abs(g)<25) showRotatePopup(0); else hideRotatePopup(); }
    });
  }catch(e){}

  if(popup) popup.addEventListener('click',()=>{
    try{
      if(!appWrapper) return;
      if(targetRotationAngle!==0){ appWrapper.classList.add('forced-landscape'); appWrapper.style.transform=`rotate(${targetRotationAngle}deg)`; isForcedLandscape=true; }
      else { appWrapper.classList.remove('forced-landscape'); appWrapper.style.transform='none'; isForcedLandscape=false; }
    }catch(e){}
    hideRotatePopup();
  });

  // ===== BACK BUTTON =====
  const backBtn=document.getElementById("backBtn");
  if(backBtn){
    backBtn.addEventListener("click",function(e){
      e.preventDefault();
      if(window.history.length>1){ window.history.back(); }
      else { window.location.href=routeTo('./index.html','/printbydd/'); }
    });
  }

  // ===== INIT =====
  (function init(){
    try{
      const n=normalizePlateInput(plateText); plateText=n.value||plateText;
      initBottomNav(); renderSections(); applyColors();
    }catch(e){
      showErrorToast("Init failed: "+(e&&e.message?e.message:e));
      try{ renderSections(); }catch(_){}
    }
  })();

})();
</script>
</body>
</html>
