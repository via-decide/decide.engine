<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>3D Numberplate • PrintByDD</title>

  <!-- NOTE (offline):
    - This page can work offline ONLY if you also host these files locally:
      1) three.min.js (instead of CDN)
      2) the STL file next to this HTML (see STL_URL below)
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root{
      --bg:#050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text:#fdfdfd;
      --text-muted: rgba(242, 242, 242, 0.65);
      --accent:#ff2a2a;
      --accent-glow: rgba(255, 42, 42, 0.15);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      --radius: 24px;

      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);

      --maxw: 860px;
      --header-height: 60px;
    }

    *{ box-sizing:border-box; }
    html, body{
      height:100%; height:100dvh; margin:0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden; overscroll-behavior-y:none;
      -webkit-font-smoothing: antialiased;
    }

    /* Don't let user select text (like your reference) */
    body, .site-header, .top, .bottom-nav, .card, .cardHeader, .kicker, .h1, .cardBody, .lead, .qt, .ul, .steps, .usecases, .sg, .social-strip {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }
    /* Allow selection in inputs */
    input, textarea { user-select: text; -webkit-user-select: text; }

    a{ color:inherit; text-decoration:none; }
    button{ background:none; border:none; color:inherit; font:inherit; cursor:pointer; -webkit-tap-highlight-color: transparent; }

    /* ===== Site Header ===== */
    .site-header{
      position:absolute; top:0; left:0; right:0;
      height: var(--header-height);
      background: rgba(5,5,5,0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center; justify-content:space-between;
      padding: 0 max(20px, env(safe-area-inset-right)) 0 max(20px, env(safe-area-inset-left));
      z-index:1000;
    }
    .site-header .logo{ color:var(--accent); font-size:18px; font-weight:900; letter-spacing:-0.02em; }
    .nav-container { display:flex; align-items:center; gap:18px; }
    .site-header nav{ display:flex; gap:18px; align-items:center; }
    .site-header nav a{ color:var(--text-muted); font-weight:700; font-size:13px; transition:color .2s; text-transform:uppercase; letter-spacing:.05em; }
    .site-header nav a:hover, .site-header nav a.active{ color:var(--text); }

    /* Invert theme method (your store style) */
    body.invert-mode .site-header{ filter:invert(1) hue-rotate(180deg); }
    body.invert-mode #appWrapper, body.invert-mode #translationToast, body.invert-mode #rotatePopup{ filter:invert(1) hue-rotate(180deg); }
    body.invert-mode img, body.invert-mode video, body.invert-mode canvas{ filter:invert(1) hue-rotate(180deg); }

    #appWrapper{ position:relative; width:100vw; height:100dvh; transform-origin:center center; transition:transform 0.4s cubic-bezier(0.25,1,0.5,1); overflow:hidden; }
    #appWrapper.forced-landscape{ width:100dvh; height:100vw; position:absolute; top:50%; left:50%; margin-top:-50vw; margin-left:-50dvh; }

    .bg-glow{ position:absolute; inset:0; pointer-events:none; background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%), radial-gradient(circle at 85% 100%, rgba(255,255,255,0.03), transparent 60%); z-index:0; }

    .top{
      position:absolute; top:var(--header-height); left:0; right:0;
      padding:calc(16px + var(--safeTop)) calc(16px + var(--safeRight)) 16px calc(16px + var(--safeLeft));
      z-index:50; display:flex; align-items:center; justify-content:space-between; gap:12px;
      pointer-events:none;
      background:linear-gradient(180deg,rgba(5,5,5,0.95) 0%,rgba(5,5,5,0) 100%);
    }
    .top > *{ pointer-events:auto; }
    .top-actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

    .back, .pill, .btn-icon{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:10px 16px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(15,15,15,0.65);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      transition:all 0.2s ease;
    }
    .btn-icon{ padding:10px; font-weight:950; color:var(--accent); width:38px; height:38px; }
    .btn-icon:active, .back:active{ transform:scale(0.96); }
    .back{ color:rgba(255,255,255,0.92); font-weight:800; font-size:14px; cursor:pointer;}
    .pill{ font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); white-space:nowrap; }
    .pill b{ color:#fff; letter-spacing:0.1em; font-weight:950; }

    .scroll-container{
      position:absolute; top:var(--header-height); bottom:0; left:0; right:0;
      overflow-y:auto; overflow-x:hidden;
      scroll-snap-type:y mandatory; scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      z-index:10;
    }
    .scroll-container::-webkit-scrollbar{ display:none; }

    .section-wrapper{
      height:100%; width:100%;
      scroll-snap-align:start; scroll-snap-stop:always;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      padding:calc(90px + var(--safeTop)) calc(16px + var(--safeRight)) calc(120px + var(--safeBottom)) calc(16px + var(--safeLeft));
      position:relative;
    }

    .card{
      width:100%; max-width:var(--maxw);
      flex:1; min-height:0;
      border-radius:var(--radius);
      border:1px solid var(--card-border);
      background:var(--card-bg);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      box-shadow:var(--shadow);
      display:flex; flex-direction:column;
      overflow:hidden;
      opacity:0.3;
      transform:scale(0.92) translateY(30px);
      transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .section-wrapper.is-active .card{ opacity:1; transform:scale(1) translateY(0); }

    .cardHeader{
      padding:24px 24px 20px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      background:rgba(0,0,0,0.3);
      flex-shrink:0;
    }
    .kicker{ font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; font-weight:950; }
    .h1{ margin:0; font-size:clamp(22px,5vw,28px); line-height:1.3; letter-spacing:-0.01em; font-weight:950; }
    .cardBody{ padding:24px; overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; }

    .big{ font-size:clamp(28px,6vw,46px); line-height:1.12; font-weight:950; letter-spacing:-0.03em; margin:0 0 18px; }
    .big .r, .r{ background:linear-gradient(135deg,#ff6b6b,#ff2a2a); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .lead{ font-size:17px; line-height:1.65; color:rgba(255,255,255,0.85); margin:0 0 16px; }
    .qt{ margin:18px 0 10px; padding:14px 18px; border-left:3px solid var(--accent); background:linear-gradient(90deg,var(--accent-glow),transparent); border-radius:0 12px 12px 0; color:rgba(255,255,255,0.95); line-height:1.65; font-size:15px; font-style:italic; }

    .ul{ margin:14px 0; padding:0; list-style:none; color:rgba(255,255,255,0.78); font-size:15px; line-height:1.65; }
    .ul li{ position:relative; padding-left:22px; margin:10px 0; }
    .ul li::before{ content:'→'; position:absolute; left:0; color:var(--accent); font-weight:950; }

    .steps{ display:flex; flex-direction:column; gap:16px; margin:16px 0; }
    .step{ display:flex; gap:14px; align-items:flex-start; }
    .step-num{ flex-shrink:0; width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; font-weight:950; font-size:14px; display:flex; align-items:center; justify-content:center; }
    .step-title{ font-weight:950; font-size:15px; color:#fff; margin-bottom:4px; }
    .step-desc{ font-size:14px; color:rgba(255,255,255,0.72); line-height:1.6; }

    .sg{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .sn{ background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:14px 10px; text-align:center; }
    .sv{ font-size:22px; font-weight:950; color:#fff; line-height:1.1; letter-spacing:-0.02em; }
    .slbl{ font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.45); margin-top:6px; }

    .cp{
      display:flex; align-items:center; justify-content:center;
      border:none; border-radius:16px;
      background:linear-gradient(135deg,#ff4444,#b80000);
      cursor:pointer; overflow:hidden; position:relative;
      box-shadow:0 8px 28px rgba(255,42,42,0.38);
      transition:transform .2s,filter .2s;
      min-height:54px; width:100%; padding:0;
    }
    .cp:active{ transform:scale(0.97); }
    .cpulse{ position:absolute; inset:0; background:rgba(255,255,255,0.15); animation:cpa 2s infinite; }
    @keyframes cpa{ 0%,100%{opacity:0} 50%{opacity:1} }
    .ci{ position:relative; z-index:1; display:flex; align-items:center; gap:8px; color:#fff; font-weight:950; font-size:15px; padding:0 24px; }
    .ca{ background:rgba(255,255,255,0.2); border-radius:8px; padding:4px 10px; font-size:14px; }

    /* STL viewer */
    .stl-viewer-wrap{
      position:relative; width:100%;
      height: 280px; min-height: 280px; max-height: 280px;
      border-radius:16px; overflow:hidden;
      border:1px solid rgba(255,255,255,0.1);
      background:#0a0a0a; margin-bottom:14px;
      touch-action:none;
    }
    .stl-viewer-wrap canvas{ display:block; width:100%!important; height:100%!important; object-fit:contain; }
    .stl-loading{
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-size:12px; color:rgba(255,255,255,0.45);
      letter-spacing:0.12em; text-transform:uppercase;
      pointer-events:none; background:#0a0a0a;
      transition:opacity 0.4s; padding:16px; text-align:center; z-index:5;
    }
    .stl-loading.hidden{ opacity:0; pointer-events:none; }
    .stl-hint{
      position:absolute; bottom:10px; left:50%;
      transform:translateX(-50%);
      font-size:10px; color:rgba(255,255,255,0.25);
      letter-spacing:0.08em; text-transform:uppercase; white-space:nowrap;
      pointer-events:none; z-index:5;
    }

    /* Color panel */
    .stl-color-panel{ margin-top:8px; padding:12px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.22); }
    .stl-color-title{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.45); font-weight:950; margin:0 0 8px; }
    .stl-color-row{ display:flex; gap:10px; justify-content:flex-start; flex-wrap:wrap; margin:8px 0 0; }
    .stl-color-btn{
      display:flex; flex-direction:row; align-items:center; gap:10px;
      padding:10px 12px; border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(0,0,0,0.35);
      transition:all 0.2s;
      font-size:12px; font-weight:900;
      color:rgba(255,255,255,0.72);
      min-width:118px;
    }
    .stl-color-btn:active{ transform:scale(0.97); }
    .stl-color-btn.active{ border-color:var(--accent); background:var(--accent-glow); color:#fff; }
    .stl-swatch{ width:22px; height:22px; border-radius:50%; border:2px solid rgba(255,255,255,0.15); flex-shrink:0; }
    @media (max-width:420px){ .stl-color-btn{ min-width:46%; } }

    /* Toast + rotate */
    .rotate-popup{
      position:fixed; bottom:80px; left:50%;
      transform:translateX(-50%) scale(0.9);
      background:var(--accent); color:#fff;
      padding:12px 24px; border-radius:999px;
      font-size:14px; font-weight:950;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 12px 30px rgba(255,42,42,0.35);
      opacity:0; pointer-events:none;
      transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
      z-index:9999;
    }
    .rotate-popup.is-visible{ opacity:1; pointer-events:auto; transform:translateX(-50%) scale(1); }

    .translate-toast{
      position:fixed; top:calc(80px + var(--safeTop)); left:50%;
      transform:translateX(-50%) translateY(-20px);
      background:rgba(20,20,22,0.95);
      border:1px solid rgba(255,255,255,0.15);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      color:#fff;
      padding:10px 16px 10px 20px;
      border-radius:999px;
      font-size:14px;
      display:flex; align-items:center; gap:16px;
      box-shadow:0 16px 40px rgba(0,0,0,0.5);
      opacity:0; pointer-events:none;
      transition:all 0.3s cubic-bezier(0.16,1,0.3,1);
      z-index:9999;
    }
    .translate-toast.is-visible{ opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
    .btn-undo{ color:var(--accent); font-weight:950; text-transform:uppercase; font-size:12px; letter-spacing:0.05em; padding:6px 12px; background:rgba(255,42,42,0.15); border-radius:999px; }

    /* Bottom nav */
    .bottom-nav{
      position:fixed;
      left:max(10px,var(--safeLeft)); right:max(10px,var(--safeRight));
      bottom:calc(10px + var(--safeBottom));
      height:64px;
      display:flex; align-items:center; gap:10px;
      padding:10px;
      border-radius:18px;
      border:1px solid rgba(255,255,255,0.10);
      background:rgba(10,10,12,0.78);
      backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      box-shadow:0 18px 60px rgba(0,0,0,0.55);
      z-index:1200;
    }
    .bn-btn{
      width:44px; height:44px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.92);
      font-weight:950;
      display:flex; align-items:center; justify-content:center;
      transition:transform .2s,opacity .2s;
      flex-shrink:0;
    }
    .bn-btn:active{ transform:scale(0.96); }
    .bn-btn:disabled{ opacity:0.35; pointer-events:none; }
    .bn-dots{ flex:1; display:flex; gap:8px; align-items:center; justify-content:center; min-width:0; overflow:hidden; }
    .bn-dot{
      width:8px; height:8px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.18);
      background:rgba(255,255,255,0.10);
      transition:background .2s,border-color .2s,width .2s;
      flex-shrink:0;
    }
    .bn-dot.active{ width:22px; background:var(--accent); border-color:rgba(255,42,42,0.7); }
    .bn-cta{
      height:44px; padding:0 16px;
      border-radius:14px;
      border:none;
      background:linear-gradient(135deg,#ff4444,#b80000);
      color:#fff; font-weight:950;
      letter-spacing:-0.01em;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 10px 26px rgba(255,42,42,0.35);
      transition:transform .2s,filter .2s;
      white-space:nowrap;
      flex-shrink:0;
    }
    .bn-cta:active{ transform:scale(0.97); filter:brightness(1.06); }
    .bn-cta .bn-tag{ font-size:12px; padding:4px 10px; border-radius:999px; background:rgba(255,255,255,0.18); }

    .hint{
      position:absolute; bottom:calc(16px + var(--safeBottom)); left:50%;
      transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:6px;
      color:rgba(255,255,255,0.4);
      font-size:11px; text-transform:uppercase; letter-spacing:0.1em;
      pointer-events:none;
      animation:pulse 2s infinite;
      z-index:100;
    }
    .hint svg{ width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2.5; }
    @keyframes pulse{ 0%,100%{transform:translateX(-50%) translateY(0);opacity:0.6} 50%{transform:translateX(-50%) translateY(5px);opacity:1} }
    .section-wrapper:last-child .hint{ display:none; }

    @media (max-width: 600px) {
      .site-header nav { display: none; }
      .nav-container { justify-content: flex-end; width: 100%; }
    }
  </style>
</head>

<body>
  <div id="appWrapper">
    <div class="bg-glow"></div>

    <header class="site-header">
      <a href="/printbydd-store" class="logo" data-vd-route>PrintByDD</a>
      <div class="nav-container">
        <nav>
          <a href="/printbydd-store" data-vd-route>Home</a>
          <a href="/numberplate" class="active" data-vd-route>Products</a>
          <a href="/gifts-that-mean-more" data-vd-route>Blog</a>
        </nav>
      </div>
    </header>

    <div class="top">
      <a class="back" href="/printbydd-store" id="backBtn" data-vd-route>← Back</a>
      <div class="top-actions">
        <button id="btnTheme" class="btn-icon" aria-label="Toggle theme" title="Toggle theme">☾</button>
        <button id="btnTranslate" class="btn-icon" aria-label="Translate">A/अ</button>
        <div class="pill"><b id="secLabel">SEC 1/6</b> • <span id="secName">INTRO</span></div>
      </div>
    </div>

    <main class="scroll-container" id="scrollContainer"></main>

    <div class="bottom-nav" id="bottomNav">
      <button class="bn-btn" id="bnPrev" type="button" aria-label="Previous">←</button>
      <div class="bn-dots" id="bnDots"></div>
      <button class="bn-btn" id="bnNext" type="button" aria-label="Next">→</button>
      <button class="bn-cta" id="bnCta" type="button">
        <span id="bnCtaText">Customize</span>
        <span class="bn-tag" id="bnCtaTag">Now</span>
      </button>
    </div>
  </div>

  <div id="translationToast" class="translate-toast">
    <span id="toastMsg">Translated to Hindi</span>
    <button id="btnUndoTranslate" class="btn-undo">Undo</button>
  </div>
  <div id="rotatePopup" class="rotate-popup"></div>

  <script>
  (function(){
    "use strict";

    // ======= CONFIG =======
    // Put your uploaded STL next to this HTML and keep the name here.
    // (You uploaded: ImageToStl.com_Numberplate.stl)
    const STL_URL = "./ImageToStl.com_Numberplate.stl";

    const WA_NUMBER = "916351537770";

    // ======= THEME (invert method) =======
    const THEME_KEY = "VD_INVERT_THEME";
    const btnTheme = document.getElementById("btnTheme");
    function setInvert(on){
      document.body.classList.toggle("invert-mode", !!on);
      btnTheme.textContent = on ? "☀" : "☾";
      try{ localStorage.setItem(THEME_KEY, on ? "1" : "0"); }catch(e){}
    }
    (function initTheme(){
      let s="0"; try{ s = localStorage.getItem(THEME_KEY) || "0"; }catch(e){}
      setInvert(s==="1");
    })();
    btnTheme.addEventListener("click", () => setInvert(!document.body.classList.contains("invert-mode")));

    // ======= STL VIEWER + 3-MATERIAL SPLIT (base / characters / boundary-height) =======
    let scene=null, renderer=null, camera=null, group=null;
    let meshBase=null, meshChar=null, meshBoundary=null;

    let pointerDown=false, lastX=0, lastY=0, inited=false, autoRotate=true;

    const COLOR_STORAGE_KEY = "PBD_NUMBERPLATE_COLORS_V1";

    // Base is optional. You asked only: number-character + boundary-height changeable.
    // We still include Base for completeness (you can hide it easily).
    const BASE_COLORS = {
      black: 0x101010,
      white: 0xf3f3f3,
      gray:  0x2a2a2a,
      blue:  0x1a6bd1
    };
    const CHAR_COLORS = {
      red:   0xff2a2a,
      black: 0x101010,
      white: 0xf3f3f3,
      gold:  0xd4af37,
      neon:  0x22c55e
    };
    const BOUNDARY_COLORS = {
      black: 0x101010,
      white: 0xf3f3f3,
      red:   0xff2a2a,
      blue:  0x1a6bd1,
      steel: 0x9aa4b2
    };

    let currentBaseKey="black";
    let currentCharKey="white";
    let currentBoundaryKey="red";

    (function restoreColors(){
      try{
        const s = JSON.parse(localStorage.getItem(COLOR_STORAGE_KEY)||"{}");
        if(s.base && BASE_COLORS[s.base]) currentBaseKey = s.base;
        if(s.char && CHAR_COLORS[s.char]) currentCharKey = s.char;
        if(s.boundary && BOUNDARY_COLORS[s.boundary]) currentBoundaryKey = s.boundary;
      }catch(e){}
    })();

    function persistColors(){
      try{
        localStorage.setItem(COLOR_STORAGE_KEY, JSON.stringify({
          base: currentBaseKey,
          char: currentCharKey,
          boundary: currentBoundaryKey
        }));
      }catch(e){}
    }

    function buildGeo(ps, ns){
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.Float32BufferAttribute(ps, 3));
      g.setAttribute('normal',   new THREE.Float32BufferAttribute(ns, 3));
      return g;
    }

    function parseBinarySTL(buf){
      const v=new DataView(buf), n=v.getUint32(80,true), pos=[], nor=[];
      let o=84;
      for(let i=0;i<n;i++){
        const nx=v.getFloat32(o,true),ny=v.getFloat32(o+4,true),nz=v.getFloat32(o+8,true); o+=12;
        for(let j=0;j<3;j++){
          pos.push(v.getFloat32(o,true),v.getFloat32(o+4,true),v.getFloat32(o+8,true));
          nor.push(nx,ny,nz);
          o+=12;
        }
        o+=2;
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
      g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
      return g;
    }

    function parseAsciiSTL(txt){
      const pos=[],nor=[],lines=txt.split(/\r?\n/); let cn=[0,0,1],v=[];
      for(const lr of lines){
        const l=lr.trim(); if(!l) continue;
        if(l.startsWith("facet normal")){
          const p=l.split(/\s+/); cn=[parseFloat(p[2]),parseFloat(p[3]),parseFloat(p[4])];
        } else if(l.startsWith("vertex")){
          const p=l.split(/\s+/);
          v.push([parseFloat(p[1]),parseFloat(p[2]),parseFloat(p[3])]);
          if(v.length===3){
            for(const vv of v){ pos.push(vv[0],vv[1],vv[2]); nor.push(...cn); }
            v=[];
          }
        }
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
      g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
      return g;
    }

    function percentile(sorted, p){
      if(sorted.length===0) return 0;
      const idx = (sorted.length - 1) * p;
      const lo = Math.floor(idx), hi = Math.ceil(idx);
      if(lo===hi) return sorted[lo];
      const t = idx - lo;
      return sorted[lo] * (1 - t) + sorted[hi] * t;
    }

    async function loadSTLGeometry(){
      const res = await fetch(STL_URL, { cache:"no-store" });
      if(!res.ok) throw new Error("Couldn't load STL ("+res.status+"). Put the STL next to this HTML.");
      const buf = await res.arrayBuffer();
      const headerText = new TextDecoder('utf-8',{fatal:false}).decode(new Uint8Array(buf.slice(0,256)));
      const isAscii = headerText.trimStart().toLowerCase().startsWith("solid") && headerText.toLowerCase().includes("facet");
      return isAscii ? parseAsciiSTL(new TextDecoder().decode(new Uint8Array(buf))) : parseBinarySTL(buf);
    }

    window.initSTLViewer = async function(){
      if(inited) return;
      const wrap    = document.getElementById('stl-viewer-wrap');
      const canvas  = document.getElementById('stl-canvas');
      const loading = document.getElementById('stl-loading');
      if(!wrap || !canvas) return;
      inited = true;

      const W = wrap.clientWidth || 320;
      const H = 280;

      renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
      renderer.setSize(W, H, false);

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
      camera.position.set(0, 0, 4.2);

      scene.add(new THREE.AmbientLight(0xffffff, 0.75));
      const d1 = new THREE.DirectionalLight(0xffffff, 0.95); d1.position.set(2.5, 3, 2); scene.add(d1);
      const d2 = new THREE.DirectionalLight(0xffffff, 0.35); d2.position.set(-2, -1, -2); scene.add(d2);

      group = new THREE.Group();
      scene.add(group);

      try{
        const geo = await loadSTLGeometry();

        // For robust splitting, we do:
        // 1) Center geometry
        // 2) Find Z distribution (percentiles) to detect base vs raised
        // 3) For raised: split by normals -> top faces vs side faces ("boundary-height")
        geo.computeBoundingBox();
        geo.center();

        const pa = geo.getAttribute('position');
        const na = geo.getAttribute('normal');

        // Build a Z distribution
        const zVals = [];
        for(let i=0;i<pa.count;i++){
          zVals.push(pa.array[i*3+2]);
        }
        zVals.sort((a,b)=>a-b);

        // zCut separates base vs raised (characters + border)
        // We use a higher percentile to avoid accidentally coloring the plate.
        // If your STL has very tall plate, adjust p=0.70 to 0.60.
        const zCut = percentile(zVals, 0.72);

        const baseP=[], baseN=[];
        const charP=[], charN=[];
        const sideP=[], sideN=[];

        for(let i=0;i<pa.count;i+=3){
          const i0=i, i1=i+1, i2=i+2;

          const z0 = pa.array[i0*3+2], z1 = pa.array[i1*3+2], z2 = pa.array[i2*3+2];
          const avgZ = (z0+z1+z2)/3;

          const nz0 = na.array[i0*3+2], nz1 = na.array[i1*3+2], nz2 = na.array[i2*3+2];
          const avgNZ = (nz0+nz1+nz2)/3;

          const tp = [
            pa.array[i0*3], pa.array[i0*3+1], pa.array[i0*3+2],
            pa.array[i1*3], pa.array[i1*3+1], pa.array[i1*3+2],
            pa.array[i2*3], pa.array[i2*3+1], pa.array[i2*3+2]
          ];
          const tn = [
            na.array[i0*3], na.array[i0*3+1], na.array[i0*3+2],
            na.array[i1*3], na.array[i1*3+1], na.array[i1*3+2],
            na.array[i2*3], na.array[i2*3+1], na.array[i2*3+2]
          ];

          if(avgZ < zCut){
            baseP.push(...tp); baseN.push(...tn);
          } else {
            // Raised region: if normal faces upward => top surface (numbers/characters).
            // Else => vertical/angled faces => boundary-height surfaces.
            if(avgNZ > 0.55){
              charP.push(...tp); charN.push(...tn);
            } else {
              sideP.push(...tp); sideN.push(...tn);
            }
          }
        }

        // Fallback safety: ensure meshes exist even if a bucket is empty.
        // If char bucket is empty, treat upward faces within raised as side, etc.
        if(charP.length === 0 && sideP.length > 0){
          // Try a second pass with a looser threshold
          charP.push(...sideP.splice(0, Math.min(sideP.length, 0)));
        }

        // Materials
        const matBase = new THREE.MeshStandardMaterial({ color: BASE_COLORS[currentBaseKey], roughness:0.62, metalness:0.06 });
        const matChar = new THREE.MeshStandardMaterial({ color: CHAR_COLORS[currentCharKey], roughness:0.55, metalness:0.06 });
        const matSide = new THREE.MeshStandardMaterial({ color: BOUNDARY_COLORS[currentBoundaryKey], roughness:0.58, metalness:0.06 });

        // Meshes
        meshBase = new THREE.Mesh(buildGeo(baseP, baseN), matBase);
        group.add(meshBase);

        if(charP.length > 0){
          meshChar = new THREE.Mesh(buildGeo(charP, charN), matChar);
          group.add(meshChar);
        }
        if(sideP.length > 0){
          meshBoundary = new THREE.Mesh(buildGeo(sideP, sideN), matSide);
          group.add(meshBoundary);
        }

        // Fit
        group.rotation.x = -0.35;
        group.rotation.y =  0.85;

        const box = new THREE.Box3().setFromObject(group);
        const sz  = new THREE.Vector3(); box.getSize(sz);
        const maxDim = Math.max(sz.x, sz.y, sz.z) || 1;
        group.scale.setScalar(2.45 / maxDim);

        if(loading) loading.classList.add('hidden');

        // Interactions
        function onDown(e){
          pointerDown=true; autoRotate=false;
          const t = e.touches ? e.touches[0] : e;
          lastX=t.clientX; lastY=t.clientY;
        }
        function onMove(e){
          if(!pointerDown) return;
          const t = e.touches ? e.touches[0] : e;
          group.rotation.y += (t.clientX-lastX) * 0.01;
          group.rotation.x += (t.clientY-lastY) * 0.01;
          lastX=t.clientX; lastY=t.clientY;
        }
        function onUp(){ pointerDown=false; }

        wrap.addEventListener('pointerdown', onDown);
        wrap.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        wrap.addEventListener('touchstart', onDown, {passive:true});
        wrap.addEventListener('touchmove',  onMove, {passive:true});
        wrap.addEventListener('touchend',   onUp,   {passive:true});

        window.addEventListener('resize', ()=>{
          if(!wrap || !renderer || !camera) return;
          const w = wrap.clientWidth || 320, h = 280;
          renderer.setSize(w, h, false);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        });

        // Render loop
        (function animate(){
          requestAnimationFrame(animate);
          if(autoRotate && group) group.rotation.y += 0.004;
          if(renderer && scene && camera) renderer.render(scene, camera);
        })();

        applyColors();

      } catch(err){
        if(loading){
          loading.textContent = "3D preview unavailable.\n" + (err && err.message ? err.message : "");
        }
        console.error("Numberplate STL viewer error:", err);
      }
    };

            <p class="lead">
              Two-tone decoration नहीं है। ये readability system है:
              base quiet, characters dominant, boundary-height digits को “cut” look देती है।
              Brain clear edges को fast process करता है।
            </p>

            <ul class="ul">
              <li><b>Hierarchy:</b> signal separation instant.</li>
              <li><b>Contrast:</b> cognitive load कम.</li>
              <li><b>Consistency:</b> हर angle से same rule.</li>
            </ul>

            <p class="lead">
              Boundary-height का color इसलिए important है क्योंकि real world में plate अक्सर angle से दिखती है।
              Side outline maintain रहे, तो piece “engineered” लगता है।
            </p>

            <div class="qt">Good design loud नहीं — clear होता है।</div>
          `
        }
      },
      {
        name:"ORDER", kicker:"READY?",
        title:{ en:"Lock the look. <span class='r'>Order</span> it.", hi:"Look fix करें. <span class='r'>Order</span> करें." },
        html:{
          en:()=>`
            <p class="big">Make it <span class="r">yours</span>.</p>
            <p class="lead">If you want a clean, engineered finish — keep characters high-contrast and boundary-height darker.</p>
            <button class="cp" onclick="scrollToSectionByName('CUSTOMIZE')">
              <span class="cpulse"></span><div class="ci">🎛 Go to Customizer <div class="ca">→</div></div>
            </button>
            <button class="cp" style="margin-top:10px; background:linear-gradient(135deg,#111,#000);" onclick="orderOnWhatsApp()">
              <span class="cpulse" style="opacity:.2"></span><div class="ci">💬 WhatsApp Order <div class="ca">→</div></div>
            </button>
            <p style="margin-top:14px;font-size:11px;color:rgba(255,255,255,0.30);line-height:1.6;">
              Your selected colors are saved on this device (localStorage), so you can come back later.
            </p>
          `,
          hi:()=>`
            <p class="big"><span class="r">Order</span> ready.</p>
            <p class="lead">Customizer पर colors चुनें और WhatsApp से order करें।</p>
            <button class="cp" onclick="scrollToSectionByName('CUSTOMIZE')">
              <span class="cpulse"></span><div class="ci">🎛 Customizer पर जाएँ <div class="ca">→</div></div>
            </button>
            <button class="cp" style="margin-top:10px; background:linear-gradient(135deg,#111,#000);" onclick="orderOnWhatsApp()">
              <span class="cpulse" style="opacity:.2"></span><div class="ci">💬 WhatsApp Order <div class="ca">→</div></div>
            </button>
          `
        }
      }
    ];

    // ======= ORDER ACTION =======
    window.orderOnWhatsApp = function(){
      const msg =
`Hi! I want to order the 3D Numberplate.

Selected Colors:
- Base: ${currentBaseKey.toUpperCase()}
- Characters: ${currentCharKey.toUpperCase()}
- Boundary-height: ${currentBoundaryKey.toUpperCase()}

(Please share next steps + pricing.)`;
      window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(msg)}`, "_blank");
    };

    // ======= NAV / RENDER =======
    const container=document.getElementById('scrollContainer');
    const secLabel=document.getElementById('secLabel');
    const secName=document.getElementById('secName');

    const bnPrev=document.getElementById('bnPrev');
    const bnNext=document.getElementById('bnNext');
    const bnDots=document.getElementById('bnDots');
    const bnCta=document.getElementById('bnCta');
    const bnCtaText=document.getElementById('bnCtaText');
    const bnCtaTag=document.getElementById('bnCtaTag');

    const CUSTOMIZE_IDX = SECTIONS.findIndex(s=>s.name==="CUSTOMIZE");
    let currentSecIndex=0;

    function buildBottomDots(){
      if(!bnDots) return;
      bnDots.innerHTML='';
      for(let i=0;i<SECTIONS.length;i++){
        const d=document.createElement('button');
        d.type='button';
        d.className='bn-dot';
        d.setAttribute('aria-label',`Section ${i+1}`);
        d.addEventListener('click',()=>scrollToIndex(i));
        bnDots.appendChild(d);
      }
    }

    function scrollToIndex(i){
      i=Math.max(0,Math.min(SECTIONS.length-1,i));
      const el=container.querySelector(`.section-wrapper[data-index="${i}"]`);
      if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
    }

    window.scrollToSectionByName = function(name){
      const idx = SECTIONS.findIndex(s=>s.name===name);
      if(idx<0) return;
      scrollToIndex(idx);
    };

    function updateBottomNav(){
      if(bnPrev) bnPrev.disabled=currentSecIndex<=0;
      if(bnNext) bnNext.disabled=currentSecIndex>=(SECTIONS.length-1);
      if(bnDots) bnDots.querySelectorAll('.bn-dot').forEach((d,i)=>d.classList.toggle('active',i===currentSecIndex));

      if(bnCtaText && bnCtaTag){
        if(currentSecIndex === CUSTOMIZE_IDX){
          bnCtaText.textContent="Order";
          bnCtaTag.textContent="Now";
        } else {
          bnCtaText.textContent="Customize";
          bnCtaTag.textContent="3D";
        }
      }
    }

    function initBottomNav(){
      buildBottomDots();
      updateBottomNav();
      if(bnPrev) bnPrev.addEventListener('click',()=>scrollToIndex(currentSecIndex-1));
      if(bnNext) bnNext.addEventListener('click',()=>scrollToIndex(currentSecIndex+1));
      if(bnCta) bnCta.addEventListener('click',()=>{
        if(currentSecIndex !== CUSTOMIZE_IDX && CUSTOMIZE_IDX>=0){
          scrollToIndex(CUSTOMIZE_IDX);
        } else {
          // Already on customizer: focus order button
          orderOnWhatsApp();
        }
      });
    }

    const observer=new IntersectionObserver(entries=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          entry.target.classList.add('is-active');
          const idx=parseInt(entry.target.getAttribute('data-index'),10);
          currentSecIndex=isNaN(idx)?0:idx;

          secLabel.textContent=`SEC ${currentSecIndex+1}/${SECTIONS.length}`;
          secName.textContent=entry.target.getAttribute('data-name');

          updateBottomNav();

          // Init STL when entering CUSTOMIZE section (only once)
          if(entry.target.getAttribute('data-name')==='CUSTOMIZE'){
            setTimeout(()=>{ window.initSTLViewer(); syncColorUI(); }, 120);
          }
        } else {
          entry.target.classList.remove('is-active');
        }
      });
    },{root:container,threshold:0.6});

    let currentLang='en';
    function renderSections(){
      container.innerHTML='';
      SECTIONS.forEach((sec,index)=>{
        const w=document.createElement('div');
        w.className='section-wrapper';
        w.setAttribute('data-index',index);
        w.setAttribute('data-name',sec.name);

        w.innerHTML = `
          <article class="card">
            <header class="cardHeader">
              <div class="kicker">${sec.kicker}</div>
              <h1 class="h1">${sec.title[currentLang]}</h1>
            </header>
            <div class="cardBody">
              ${sec.html[currentLang]()}
              <div style="height:85px;"></div>
            </div>
          </article>
          <div class="hint">
            <span>Scroll for more</span>
            <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        `;
        container.appendChild(w);
        observer.observe(w);
      });

      // ensure dots built
      setTimeout(()=>{ if(bnDots && bnDots.children.length!==SECTIONS.length) buildBottomDots(); updateBottomNav(); syncColorUI(); }, 60);
    }

    // ======= TRANSLATION TOGGLE (kept simple) =======
    const btnTranslate=document.getElementById('btnTranslate');
    const toast=document.getElementById('translationToast');
    const btnUndo=document.getElementById('btnUndoTranslate');
    const toastMsg=document.getElementById('toastMsg');
    let toastTimer;

    function triggerTranslation(lang){
      currentLang=lang;
      renderSections();
      toast.classList.add('is-visible');
      toastMsg.textContent = (lang==='hi') ? "Translated to Hindi" : "Back to English";
      btnUndo.style.display = (lang==='hi') ? 'block' : 'none';
      clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>toast.classList.remove('is-visible'), 2200);
    }
    btnTranslate.addEventListener('click',()=>triggerTranslation(currentLang==='en'?'hi':'en'));
    btnUndo.addEventListener('click',()=>{ triggerTranslation('en'); toast.classList.remove('is-visible'); });

    // ======= ROTATION POPUP (same behavior) =======
    const popup=document.getElementById('rotatePopup');
    const appWrapper=document.getElementById('appWrapper');
    let isForcedLandscape=false, targetRotationAngle=0;

    window.addEventListener('deviceorientation',e=>{
      const g=e.gamma;
      if(g===null||typeof g==='undefined') return;
      if(!isForcedLandscape){
        if(g>45) showRotatePopup(90);
        else if(g<-45) showRotatePopup(-90);
        else hideRotatePopup();
      } else {
        if(Math.abs(g)<25) showRotatePopup(0);
        else hideRotatePopup();
      }
    });
    function showRotatePopup(a){
      targetRotationAngle=a;
      popup.classList.add('is-visible');
      popup.textContent = (a===0) ? "Tap for Portrait" : "Tap for Landscape";
    }
    function hideRotatePopup(){ popup.classList.remove('is-visible'); }
    popup.addEventListener('click',()=>{
      if(targetRotationAngle!==0){
        appWrapper.classList.add('forced-landscape');
        appWrapper.style.transform=`rotate(${targetRotationAngle}deg)`;
        isForcedLandscape=true;
      } else {
        appWrapper.classList.remove('forced-landscape');
        appWrapper.style.transform='none';
        isForcedLandscape=false;
      }
      hideRotatePopup();
    });

    // Back button behavior (router-safe)
    document.getElementById("backBtn").addEventListener("click", function(e) {
      if(!this.hasAttribute('data-vd-route')) {
        e.preventDefault();
        window.location.href = this.href;
      }
    });

    // Init
    renderSections();
    initBottomNav();
    syncColorUI();

  })();
  </script>
</body>
</html>
