<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Gifts That Mean More • ViaDecide</title>

  <style>
    :root{
      --bg:#050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text:#fdfdfd;
      --text-muted: rgba(242, 242, 242, 0.65);
      --accent:#ff671f;
      --accent-glow: rgba(255, 103, 31, 0.15);
      --accent2:#22c55e;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      --radius: 24px;

      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);

      --maxw: 860px;
      --header-height: 60px;
    }

    /* ===== Base Reset ===== */
    html, body{
      height:100%;
      height:100dvh;
      margin:0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden;
      overscroll-behavior-y:none;
      -webkit-font-smoothing: antialiased;
    }
    *{ box-sizing:border-box; }

    /* ===== Prevent text selection ===== */
    html, body, #appWrapper, .card, .cardHeader, .cardBody, .pill, .back, .site-header { -webkit-user-select: none; user-select: none; }
    input, textarea, select { -webkit-user-select: text; user-select: text; }
    button, a { -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color: transparent; }
    ::selection{ background: transparent; }
    ::-moz-selection{ background: transparent; }

    button{ background:none; border:none; padding:0; font:inherit; color:inherit; cursor:pointer; }

    /* ===== Invert Color Light Mode ===== */
    body.invert-mode #appWrapper,
    body.invert-mode #translationToast,
    body.invert-mode #rotatePopup,
    body.invert-mode .site-header{
      filter: invert(1) hue-rotate(180deg);
    }
    body.invert-mode img,
    body.invert-mode video,
    body.invert-mode canvas{
      filter: invert(1) hue-rotate(180deg);
    }

    /* ===== Global Site Header ===== */
    .site-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 max(20px, env(safe-area-inset-right)) 0 max(20px, env(safe-area-inset-left));
      z-index: 1000;
    }
    .site-header .logo{
      color: var(--accent);
      font-size: 18px;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .site-header nav{
      display: flex;
      gap: 24px;
    }
    .site-header nav a{
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: color 0.2s;
    }
    .site-header nav a:hover,
    .site-header nav a.active{
      color: var(--text);
    }

    /* App Wrapper */
    #appWrapper{
      position:relative;
      width:100vw;
      height:100dvh;
      transform-origin:center center;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      overflow:hidden;
    }
    #appWrapper.forced-landscape{
      width:100dvh;
      height:100vw;
      position:absolute;
      top:50%;
      left:50%;
      margin-top:-50vw;
      margin-left:-50dvh;
    }

    /* Ambient Glow */
    .bg-glow{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%),
        radial-gradient(circle at 85% 100%, rgba(255,255,255,0.03), transparent 60%);
      z-index:0;
    }

    /* Top Navigation (Tool Controls) */
    .top{
      position:absolute;
      top: var(--header-height);
      left:0; right:0;
      padding: calc(16px + var(--safeTop)) calc(16px + var(--safeRight)) 16px calc(16px + var(--safeLeft));
      z-index:50;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      pointer-events:none;
      background: linear-gradient(180deg, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0) 100%);
    }
    .top > *{ pointer-events:auto; }
    .top-actions{ display:flex; align-items:center; gap:8px; }

    .back, .pill, .btn-icon{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding: 10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.08);
      background: rgba(15,15,15,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s ease;
    }
    .btn-icon{
      padding:10px;
      font-weight:900;
      color: var(--accent);
      width:38px;
      height:38px;
    }
    .btn-icon:active, .back:active{ transform: scale(0.96); }
    .back{
      color: rgba(255,255,255,0.92);
      font-weight:700;
      font-size:14px;
      text-decoration:none;
    }
    .pill{
      font-size:11px;
      letter-spacing:0.12em;
      text-transform:uppercase;
      color: var(--text-muted);
      white-space:nowrap;
    }
    .pill b{ color:#fff; letter-spacing:0.1em; font-weight:900; }

    /* Scroll Container */
    .scroll-container{
      position:absolute;
      top: var(--header-height);
      bottom: 0;
      left: 0;
      right: 0;
      overflow-y:auto;
      overflow-x:hidden;
      scroll-snap-type:y mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling: touch;
      z-index:10;
    }
    .scroll-container::-webkit-scrollbar{ display:none; }

    /* Card Layout */
    .section-wrapper{
      height:100%;
      width:100%;
      scroll-snap-align:start;
      scroll-snap-stop:always;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding: calc(90px + var(--safeTop)) calc(16px + var(--safeRight)) calc(60px + var(--safeBottom)) calc(16px + var(--safeLeft));
      position:relative;
    }
    .card{
      width:100%;
      max-width: var(--maxw);
      flex:1;
      min-height:0;
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      opacity:0.3;
      transform: scale(0.92) translateY(30px);
      transition:
        opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .section-wrapper.is-active .card{ opacity:1; transform: scale(1) translateY(0); }

    .cardHeader{
      padding:24px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.3);
      flex-shrink:0;
    }
    .kicker{
      font-size:11px;
      letter-spacing:0.15em;
      text-transform:uppercase;
      color: var(--accent);
      margin-bottom:8px;
      font-weight:900;
    }
    .h1{
      margin:0;
      font-size: clamp(22px, 5vw, 28px);
      line-height:1.3;
      letter-spacing:-0.01em;
      font-weight:900;
    }

    .cardBody{
      padding:24px;
      overflow-y:auto;
      -webkit-overflow-scrolling: touch;
      flex:1;
    }

    /* Typography */
    .big{
      font-size: clamp(28px, 6vw, 46px);
      line-height:1.12;
      font-weight:950;
      letter-spacing:-0.03em;
      margin:0 0 18px;
    }
    .big .accent{
      background: linear-gradient(135deg, #ff8a4c, #ff4c00);
      -webkit-background-clip:text;
      -webkit-text-fill-color: transparent;
      color: var(--accent);
    }
    .lead{
      font-size:17px;
      line-height:1.65;
      color: rgba(255,255,255,0.85);
      margin:0 0 16px;
    }
    .list{
      margin: 18px 0;
      padding:0;
      list-style:none;
      color: rgba(255,255,255,0.75);
      font-size:16px;
      line-height:1.65;
    }
    .list li{
      position:relative;
      padding-left:24px;
      margin: 12px 0;
    }
    .list li::before{
      content:'→';
      position:absolute;
      left:0;
      color: var(--accent);
      font-weight:900;
    }
    .quote{
      margin: 22px 0 16px;
      padding: 14px 18px;
      border-left:3px solid var(--accent);
      background: linear-gradient(90deg, var(--accent-glow), transparent);
      border-radius: 0 12px 12px 0;
      color: rgba(255,255,255,0.95);
      line-height:1.65;
      font-size:15px;
      font-style: italic;
    }

    /* Chips + Buttons */
    .chip-row{ display:flex; flex-wrap:wrap; gap:8px; margin: 12px 0 2px; }
    .chip{
      display:inline-flex;
      align-items:center;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.30);
      color: rgba(255,255,255,0.70);
      font-size: 12px;
      font-weight: 700;
    }

    .cta-row{ display:flex; flex-wrap:wrap; gap:10px; margin-top: 14px; }
    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(0,0,0,0.45);
      color:#fff;
      font-weight:900;
      font-size:14px;
      transition: transform .2s, filter .2s, background .2s, border-color .2s;
      text-decoration:none;
    }
    .btn:hover{ border-color: rgba(255,103,31,0.35); }
    .btn:active{ transform: scale(0.98); filter: brightness(1.05); }
    .btn.primary{
      background: var(--accent);
      border-color: rgba(255,103,31,0.55);
      color:#fff;
    }

    /* Blogger CTA card */
    .ctaCard{
      margin-top: 18px;
      border: 1px solid rgba(255,103,31,0.30);
      background: rgba(255,103,31,0.06);
      border-radius: 16px;
      padding: 16px;
    }
    .ctaCard h3{
      margin:0 0 6px;
      font-size: 16px;
      font-weight: 900;
      color:#fff;
    }
    .ctaCard p{
      margin:0;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
    }

    /* --- Forms & Onboarding UI (from your auth flow) --- */
    .auth-protocol{
      background: rgba(255,103,31,0.06);
      border: 1px dashed rgba(255,103,31,0.3);
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text-muted);
    }
    .auth-protocol b{ color: var(--text); }
    .auth-protocol .step{ color: var(--accent); font-weight: 900; margin-right: 4px; }

    .onboard-form{ display:flex; flex-direction:column; gap:14px; }
    .row{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
    @media (max-width: 520px){ .row{ grid-template-columns: 1fr; } }

    .input-group{ display:flex; flex-direction:column; gap:8px; }
    .input-group label{
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      font-weight: 800;
    }
    .input-group input, .input-group textarea, .input-group select{
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: all 0.2s;
      appearance: none;
    }
    .input-group textarea{ resize: vertical; min-height: 90px; }
    .input-group input::placeholder, .input-group textarea::placeholder{ color: rgba(255,255,255,0.30); }
    .input-group input:focus, .input-group textarea:focus, .input-group select:focus{
      border-color: var(--accent);
      background: rgba(0,0,0,0.62);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .select-wrapper{ position:relative; }
    .select-wrapper::after{
      content:"▼";
      position:absolute;
      right:16px;
      top:50%;
      transform: translateY(-50%);
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      pointer-events:none;
    }

    .pill-group{ display:flex; flex-wrap:wrap; gap:10px; margin-top: 2px; }
    .check-pill input{ display:none; }
    .check-pill span{
      display:inline-flex;
      padding:10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.3);
      font-size: 14px;
      color: var(--text-muted);
      cursor:pointer;
      transition: all 0.2s;
      user-select:none;
    }
    .check-pill input:checked + span{
      background: var(--accent-glow);
      border-color: var(--accent);
      color: #fff;
      font-weight: 800;
    }

    .btn-submit, .btn-secondary, .btn-success{
      border:none;
      padding: 16px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 15px;
      cursor:pointer;
      transition: transform .2s, filter .2s;
      display:flex;
      justify-content:center;
      align-items:center;
      gap: 8px;
      width:100%;
    }
    .btn-submit{ background: var(--accent); color:#fff; }
    .btn-secondary{
      background: rgba(255,255,255,0.06);
      color:#fff;
      border: 1px solid rgba(255,255,255,0.16);
    }
    .btn-success{ background: var(--accent2); color:#000; }
    .btn-submit:active, .btn-secondary:active, .btn-success:active{
      transform: scale(0.98);
      filter: brightness(1.08);
    }

    .verify-box{
      background: rgba(0,0,0,0.65);
      border: 1px solid var(--accent);
      padding: 18px;
      border-radius: 12px;
      margin-top: 16px;
      text-align:center;
    }
    .verify-box p{
      font-size:14px;
      color: var(--text-muted);
      margin:0 0 14px;
      line-height:1.55;
    }

    .mono-preview{
      background: rgba(5,5,5,0.8);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      font-size: 13px;
      color: #cbd5e1;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
      display: none;
    }

    .success-state{ text-align:center; padding: 36px 18px; }
    .success-icon{ font-size: 46px; margin-bottom: 14px; display:block; }
    .success-state h2{ margin:0 0 10px; font-size: 24px; color:#fff; }
    .success-state p{ color: var(--text-muted); line-height: 1.6; font-size: 15px; margin:0; }

    /* Hint */
    .hint{
      position:absolute;
      bottom: calc(16px + var(--safeBottom));
      left:50%;
      transform: translateX(-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      color: rgba(255,255,255,0.4);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      pointer-events:none;
      animation: pulse 2s infinite;
      z-index:100;
    }
    .hint svg{ width:14px; height:14px; stroke: currentColor; fill:none; stroke-width: 2.5; }
    @keyframes pulse{
      0%,100%{ transform: translateX(-50%) translateY(0); opacity: 0.6; }
      50%{ transform: translateX(-50%) translateY(5px); opacity: 1; }
    }
    .section-wrapper:last-child .hint{ display:none; }

    /* Overlays */
    .rotate-popup{
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: var(--accent);
      color:#fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 900;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow: 0 12px 30px rgba(255,103,31,0.4);
      opacity:0;
      pointer-events:none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index:9999;
      cursor:pointer;
    }
    .rotate-popup.is-visible{
      opacity:1;
      pointer-events:auto;
      transform: translateX(-50%) scale(1);
    }
    .rotate-popup:active{ transform: translateX(-50%) scale(0.95); }

    .translate-toast{
      position: fixed;
      top: calc(100px + var(--safeTop));
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(20,20,22,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color:#fff;
      padding: 10px 16px 10px 20px;
      border-radius: 999px;
      font-size: 14px;
      display:flex;
      align-items:center;
      gap: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      opacity:0;
      pointer-events:none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index:9999;
    }
    .translate-toast.is-visible{
      opacity:1;
      pointer-events:auto;
      transform: translateX(-50%) translateY(0);
    }
    .btn-undo{
      color: var(--accent);
      font-weight: 900;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 0.05em;
      padding: 6px 12px;
      background: rgba(255,103,31,0.15);
      border-radius: 999px;
    }
    .btn-undo:active{ background: rgba(255,103,31,0.25); }
  </style>
</head>

<body>
  <div id="appWrapper">
    <div class="bg-glow"></div>

    <header class="site-header">
      <a href="/index.html" class="logo">ViaDecide</a>
      <nav>
        <a href="/index.html">Home</a>
        <a href="/products.html">Products</a>
        <a href="#" class="active">Blog</a>
      </nav>
    </header>

    <div class="top">
      <a class="back" href="/index.html" id="backBtn">← Home</a>
      <div class="top-actions">
        <button id="btnTheme" class="btn-icon" aria-label="Toggle theme" title="Toggle theme">☾</button>
        <button id="btnTranslate" class="btn-icon" aria-label="Translate" title="Translate to Hindi">A/अ</button>
        <div class="pill"><b id="secLabel">SEC 1/9</b> • <span id="secName">INTRO</span></div>
      </div>
    </div>

    <main class="scroll-container" id="scrollContainer"></main>
  </div>

  <div id="translationToast" class="translate-toast">
    <span id="toastMsg">Translated to Hindi</span>
    <button id="btnUndoTranslate" class="btn-undo">Undo</button>
  </div>
  <div id="rotatePopup" class="rotate-popup"></div>

  <script>
    (function(){
      "use strict";

      // ===== Back Logic (universal, robust) =====
      const backBtn = document.getElementById("backBtn");
      backBtn.addEventListener("click", (e) => {
        e.preventDefault();
        window.location.href = "/index.html";
      });

      // ===== Invert Theme Toggle =====
      const THEME_KEY = "VD_INVERT_THEME";
      const btnTheme = document.getElementById("btnTheme");

      function setInvert(on){
        document.body.classList.toggle("invert-mode", !!on);
        btnTheme.textContent = on ? "☀" : "☾";
        try{ localStorage.setItem(THEME_KEY, on ? "1" : "0"); }catch(e){}
      }
      (function initTheme(){
        let saved = "0";
        try{ saved = localStorage.getItem(THEME_KEY) || "0"; }catch(e){}
        setInvert(saved === "1");
      })();
      btnTheme.addEventListener("click", () => {
        const on = !document.body.classList.contains("invert-mode");
        setInvert(on);
      });

      // ===== SESSION STATE (Reader/Creator) =====
      let authState = {
        role: localStorage.getItem('VIA_ROLE') || null,   // 'reader' or 'creator'
        email: localStorage.getItem('VIA_USER') || null,
        pendingVerification: false,
        pendingRole: null,
        pendingEmail: null
      };

      // Configuration
      const WA_NUMBER = "916351537770";

      function generateExpectedCode(email) {
        const raw = email.trim().toLowerCase() + "_VIACO2026";
        const b64 = btoa(raw).replace(/[^a-zA-Z0-9]/g, '').substring(0, 5).toUpperCase();
        return "VIA-" + b64;
      }

      // ===== CONTENT (Blog + CTA + Join as Blogger + Workspace) =====
      const SECTIONS = [
        {
          name: "INTRO", kicker: "GIFTING PSYCHOLOGY",
          title: {
            en: "Gifts That Mean More: Why Personalization Wins",
            hi: "ऐसे गिफ्ट जो ज़्यादा मायने रखते हैं"
          },
          html: {
            en: () => `
              <div class="big">Most people think expensive = <span class="accent">meaningful.</span></div>
              <p class="lead">
                But the gifts people remember aren’t always the costly ones. They’re the ones that feel <b>specific</b>.
                The ones that say: <i>“I see you.”</i>
              </p>
              <div class="quote">Personalization doesn’t add “luxury.” It adds identity — and identity is what bonds to memory.</div>

              <div class="chip-row">
                <span class="chip">Psychology</span>
                <span class="chip">Memory</span>
                <span class="chip">Everyday meaning</span>
                <span class="chip">3D printing gifts</span>
              </div>

              <div class="cta-row">
                <a class="btn" href="keychain">View Product (3D Preview) →</a>
                <a class="btn primary" href="guides">All Blogs / Guides →</a>
                <button class="btn" type="button" onclick="scrollToSectionByName('CREATOR')">Join as Blogger →</button>
              </div>

      // ===== Render/Observer =====
      const container = document.getElementById('scrollContainer');
      const secLabel = document.getElementById('secLabel');
      const secName = document.getElementById('secName');

      let currentLang = 'en';

      const observerOptions = { root: container, threshold: 0.6 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting){
            entry.target.classList.add('is-active');
            const index = parseInt(entry.target.getAttribute('data-index'), 10);
            secLabel.textContent = `SEC ${index + 1}/${SECTIONS.length}`;
            secName.textContent = entry.target.getAttribute('data-name');
          } else {
            entry.target.classList.remove('is-active');
          }
        });
      }, observerOptions);

      window.scrollToSectionByName = function(name){
        const idx = SECTIONS.findIndex(s => s.name === name);
        if(idx < 0) return;
        const el = container.querySelector(`.section-wrapper[data-index="${idx}"]`);
        if(el) el.scrollIntoView({ behavior:"smooth", block:"start" });
      };

      function renderSections(){
        container.innerHTML = '';
        SECTIONS.forEach((sec, index) => {
          const wrapper = document.createElement('div');
          wrapper.className = 'section-wrapper';
          wrapper.setAttribute('data-index', index);
          wrapper.setAttribute('data-name', sec.name);

          const htmlContent = sec.html[currentLang]();

          wrapper.innerHTML = `
            <article class="card">
              <header class="cardHeader">
                <div class="kicker">${sec.kicker}</div>
                <h1 class="h1">${sec.title[currentLang]}</h1>
              </header>
              <div class="cardBody">
                ${htmlContent}
                <div style="height: 85px;"></div>
              </div>
            </article>
            <div class="hint">
              <span>Scroll for more</span>
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          `;
          container.appendChild(wrapper);
          observer.observe(wrapper);
        });
      }

      // ===== Translation Toast =====
      const btnTranslate = document.getElementById('btnTranslate');
      const toast = document.getElementById('translationToast');
      const btnUndo = document.getElementById('btnUndoTranslate');
      const toastMsg = document.getElementById('toastMsg');
      let toastTimer;

      function triggerTranslation(lang){
        currentLang = lang;
        renderSections();

        toast.classList.add('is-visible');
        if(lang === 'hi'){
          toastMsg.textContent = "Translated to Hindi";
          btnUndo.style.display = 'block';
        } else {
          toastMsg.textContent = "Reverted to English";
          btnUndo.style.display = 'none';
        }
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('is-visible'), 3500);
      }

      btnTranslate.addEventListener('click', () => { if(currentLang === 'en') triggerTranslation('hi'); });
      btnUndo.addEventListener('click', () => { triggerTranslation('en'); });

      // ===== Auth: WhatsApp Request + Verification =====
      window.requestWAAccess = function(role){
        let name = "", email = "", extras = "";
        if(role === 'reader'){

          email = document.getElementById('r-email').value;
          const checks = Array.from(document.querySelectorAll('.r-int:checked')).map(e => e.value).join(', ');
          extras = `*Focus:* ${checks || 'General'}`;
        } else {
          name = document.getElementById('c-pub').value;
          email = document.getElementById('c-email').value;
          extras = `*Publication:* ${name}`;
        }
        if(!email) return;

        authState.pendingVerification = true;
        authState.pendingRole = role;
        authState.pendingEmail = email.trim();
        renderSections();

        const text = `✦ *VIADECIDE ACCESS REQUEST* ✦\n\n*Role:* ${role.toUpperCase()}\n*Name:* ${name}\n*Email:* ${authState.pendingEmail}\n${extras}\n\n_Please generate my secure access code._`;
        const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(text)}`;
        window.open(url, '_blank');
      };

      window.verifyAccessCode = function(role){
        const inputId = role === 'reader' ? 'verify-code-reader' : 'verify-code-creator';
        const inputEl = document.getElementById(inputId);
        const inputVal = (inputEl ? (inputEl.value || '') : '').trim().toUpperCase();

        const expected = generateExpectedCode(authState.pendingEmail || '');
        if(inputVal === expected){
          localStorage.setItem('VIA_USER', authState.pendingEmail);
          localStorage.setItem('VIA_ROLE', role);

          authState.email = authState.pendingEmail;
          authState.role = role;
          authState.pendingVerification = false;

          renderSections();
        } else {
          alert(currentLang === 'hi' ? "अमान्य कोड। कृपया पुनः प्रयास करें।" : "Invalid code. Please verify and try again.");
        }
      };

      window.cancelVerification = function(){
        authState.pendingVerification = false;
        authState.pendingEmail = null;
        authState.pendingRole = null;
        renderSections();
      };

      window.logoutSession = function(){
        if(confirm(currentLang === 'hi' ? "क्या आप लॉग आउट करना चाहते हैं?" : "End your session?")){
          localStorage.removeItem('VIA_USER');
          localStorage.removeItem('VIA_ROLE');
          location.reload();
        }
      };

      // ===== Workspace Prompt Engine =====
      window.generateBlogPrompt = function(){
        const nicheEl = document.getElementById('ws-niche');
        const goalEl = document.getElementById('ws-goal');
        const ideaEl = document.getElementById('ws-idea');
        const previewBox = document.getElementById('ws-preview');
        const btnSubmit = document.getElementById('btnSubmitReview');

        if(!ideaEl) return;
        const niche = (nicheEl && nicheEl.value) ? nicheEl.value : 'General';
        const goal = (goalEl && goalEl.value) ? goalEl.value : 'authority';
        const idea = ideaEl.value || '';

        if(!idea.trim()) return alert(currentLang === 'hi' ? "कृपया मुख्य विचार लिखें!" : "Please enter a Core Idea!");

        const promptText = `SYSTEM: You are an expert copywriter compiling a blog brief.\nTARGET:\n- Niche: ${String(niche).toUpperCase()}\n- Primary Goal: ${String(goal).toUpperCase()}\n\nCORE IDEA / BRIEF:\n${idea}\n\nOUTPUT REQUIREMENTS:\n1) High-converting Hook\n2) 3 core structural points\n3) Strong CTA`;

        if(previewBox){
          previewBox.textContent = promptText;
          previewBox.style.display = 'block';
        }
        if(btnSubmit){
          btnSubmit.style.display = 'flex';
        }
      };

      window.submitForReview = function(){
        alert(currentLang === 'hi' ? "ड्राफ्ट सबमिट हो गया!" : "Draft submitted!");
        renderSections();
      };

      // ===== Rotation Popup =====
      const popup = document.getElementById('rotatePopup');
      const appWrapper = document.getElementById('appWrapper');
      let isForcedLandscape = false;
      let targetRotationAngle = 0;

      window.addEventListener('deviceorientation', (e) => {
        const gamma = e.gamma;
        if(gamma === null || typeof gamma === 'undefined') return;
        const rotationThreshold = 45;
        const deadband = 25;

        if(!isForcedLandscape){
          if(gamma > rotationThreshold) showRotatePopup(90);
          else if(gamma < -rotationThreshold) showRotatePopup(-90);
          else hideRotatePopup();
        } else {
          if(Math.abs(gamma) < deadband) showRotatePopup(0);
          else hideRotatePopup();
        }
      });

      function showRotatePopup(angle){
        targetRotationAngle = angle;
        popup.classList.add('is-visible');
        popup.textContent = (angle === 0) ? "Tap for Portrait" : "Tap for Landscape";
      }
      function hideRotatePopup(){ popup.classList.remove('is-visible'); }

      popup.addEventListener('click', () => {
        if(targetRotationAngle !== 0){
          appWrapper.classList.add('forced-landscape');
          appWrapper.style.transform = `rotate(${targetRotationAngle}deg)`;
          isForcedLandscape = true;
        } else {
          appWrapper.classList.remove('forced-landscape');
          appWrapper.style.transform = `none`;
          isForcedLandscape = false;
        }
        hideRotatePopup();
      });

      // ===== Start =====
      renderSections();

    })();
  </script>
</body>
</html>
