
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#070508"/>
  <meta name="description" content="Why personalized gifts create stronger emotional bonds — psychology, memory and everyday meaning."/>
  <title>Personalized Gifts & Emotional Bonds • The Gift Lab</title>

  <script src="../router.js"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,700;0,900;1,700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet"/>

  <style>
    /* ══════════════ GLOBAL UX PATCH ══════════════ */
    /* 1. Remove iOS/Android blue tap highlight on all interactive elements */
    *,
    *::before,
    *::after {
      -webkit-tap-highlight-color: transparent;
    }

    /* 2. Remove focus outline for pointer/mouse users only; keep for keyboard (accessibility) */
    *:focus:not(:focus-visible) {
      outline: none !important;
    }
    /* Optional: style keyboard focus for visibility */
    *:focus-visible {
      outline: 2px solid rgba(167, 139, 250, 0.6);
      outline-offset: 2px;
    }

    /* 3. Suppress blue selection highlight across the page */
    ::selection {
      background: rgba(167, 139, 250, 0.22);
      color: inherit;
    }
    ::-moz-selection {
      background: rgba(167, 139, 250, 0.22);
      color: inherit;
    }

    /* 4. Disable text selection globally */
    body {
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
      user-select: none;
    }

    /* 5. Re-enable selection for editable and code elements */
    input,
    textarea,
    [contenteditable="true"],
    [contenteditable],
    .allow-select,
    pre,
    code {
      -webkit-user-select: text;
      -moz-user-select: text;
      -ms-user-select: text;
      user-select: text;
    }
    /* ══════════════ END GLOBAL UX PATCH ══════════════ */

    /* ══════════════ TOKENS ══════════════ */
    :root {
      --bg:        #070508;
      --surface:   rgba(14,11,18,0.82);
      --border:    rgba(255,255,255,0.07);
      --text:      #f0eaf8;
      --muted:     rgba(235,220,255,0.50);
      --rose:      #fb7185;
      --gold:      #fbbf24;
      --violet:    #a78bfa;
      --teal:      #2dd4bf;
      --glow-r:    rgba(251,113,133,0.14);
      --glow-v:    rgba(167,139,250,0.14);
      --glow-g:    rgba(45,212,191,0.12);
      --shadow:    0 32px 100px rgba(0,0,0,0.70);
      --r:         22px;
      --safe-t:    env(safe-area-inset-top,0px);
      --safe-b:    env(safe-area-inset-bottom,0px);
      --safe-l:    env(safe-area-inset-left,0px);
      --safe-r:    env(safe-area-inset-right,0px);
      --maxw:      740px;
      --display:   'Cormorant Garamond', Georgia, serif;
      --body:      'Outfit', system-ui, sans-serif;
    }

    /* ══════════════ RESET / BASE ══════════════ */
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;height:100dvh;background:var(--bg);color:var(--text);
      font-family:var(--body);overflow:hidden;overscroll-behavior-y:none;
      -webkit-font-smoothing:antialiased}
    button{background:none;border:none;font:inherit;color:inherit;cursor:pointer}
    a{color:inherit;text-decoration:none}

    /* ══════════════ AMBIENT BG ══════════════ */
    #appWrapper{position:relative;width:100vw;height:100dvh;overflow:hidden}

    .aurora{position:absolute;inset:0;pointer-events:none;z-index:0;
      background:
        radial-gradient(ellipse 60% 50% at 15% 5%, rgba(251,113,133,0.10), transparent 60%),
        radial-gradient(ellipse 55% 45% at 88% 90%, rgba(167,139,250,0.10), transparent 60%),
        radial-gradient(ellipse 40% 60% at 50% 50%, rgba(45,212,191,0.05), transparent 70%)}

    .grain{position:absolute;inset:0;pointer-events:none;z-index:1;opacity:0.028;
      background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 300 300' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    /* ══════════════ TOP BAR ══════════════ */
    .top{position:absolute;top:0;left:0;right:0;z-index:50;pointer-events:none;
      padding:calc(13px + var(--safe-t)) calc(14px + var(--safe-r)) 13px calc(14px + var(--safe-l));
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      background:linear-gradient(180deg,rgba(7,5,8,0.95) 0%,transparent 100%)}
    .top>*{pointer-events:auto}

    .back-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;
      border-radius:999px;border:1px solid rgba(255,255,255,0.09);
      background:rgba(10,8,13,0.75);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);
      transition:transform .18s,background .18s}
    .back-btn:active{transform:scale(.96)}
    .back-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5}

    .top-right{display:flex;align-items:center;gap:8px}

    .pill-tag{display:inline-flex;align-items:center;gap:5px;padding:8px 13px;
      border-radius:999px;border:1px solid rgba(255,255,255,0.08);
      background:rgba(10,8,13,0.65);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
      font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
    .pill-tag b{color:var(--rose);font-weight:700;letter-spacing:.05em}

    /* Progress bar */
    #prog{position:absolute;bottom:0;left:0;height:2px;border-radius:0 2px 2px 0;
      background:linear-gradient(90deg,var(--rose),var(--gold),var(--violet));
      transition:width .5s cubic-bezier(.16,1,.3,1);z-index:51}

    /* ══════════════ SCROLL CONTAINER ══════════════ */
    .scroller{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
      scroll-snap-type:y mandatory;scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;z-index:10}
    .scroller::-webkit-scrollbar{display:none}

    /* ══════════════ SECTION WRAPPER ══════════════ */
    .sw{height:100%;width:100%;scroll-snap-align:start;scroll-snap-stop:always;
      display:flex;flex-direction:column;justify-content:center;align-items:center;
      padding:calc(82px + var(--safe-t)) calc(14px + var(--safe-r)) calc(56px + var(--safe-b)) calc(14px + var(--safe-l));
      position:relative}

    /* ══════════════ CARD ══════════════ */
    .card{width:100%;max-width:var(--maxw);flex:1;min-height:0;
      border-radius:var(--r);border:1px solid var(--border);
      background:var(--surface);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
      box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;
      opacity:0;transform:scale(.90) translateY(32px);
      transition:opacity .65s cubic-bezier(.16,1,.3,1),transform .65s cubic-bezier(.16,1,.3,1)}
    .sw.active .card{opacity:1;transform:scale(1) translateY(0)}

    /* ══════════════ VISUAL BANNER ══════════════ */
    .vis{width:100%;height:170px;flex-shrink:0;position:relative;overflow:hidden;
      background:rgba(0,0,0,0.30);border-bottom:1px solid rgba(255,255,255,0.05)}
    .vis svg{width:100%;height:100%}

    /* ══════════════ CARD HEADER ══════════════ */
    .ch{padding:18px 22px 14px;border-bottom:1px solid rgba(255,255,255,0.05);
      background:rgba(0,0,0,0.18);flex-shrink:0}
    .kicker{font-size:10px;letter-spacing:.18em;text-transform:uppercase;
      color:var(--rose);margin-bottom:5px;font-weight:700}
    .h1{font-family:var(--display);font-size:clamp(17px,4.2vw,22px);
      line-height:1.28;font-weight:700;color:var(--text)}

    /* ══════════════ CARD BODY ══════════════ */
    .cb{padding:18px 22px 22px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1}
    .cb::-webkit-scrollbar{width:3px}
    .cb::-webkit-scrollbar-thumb{background:rgba(167,139,250,.25);border-radius:6px}

    /* ══════════════ TYPOGRAPHY ══════════════ */
    .big{font-family:var(--display);font-size:clamp(24px,5.5vw,36px);
      line-height:1.18;font-weight:900;letter-spacing:-.02em;margin-bottom:16px}
    .acc-rose{background:linear-gradient(135deg,var(--rose),var(--gold));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .acc-violet{background:linear-gradient(135deg,var(--violet),var(--teal));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

    .lead{font-size:15px;line-height:1.72;color:rgba(240,234,248,.80);margin-bottom:12px}
    .lead b{color:var(--text);font-weight:600}

    .qt{margin:18px 0;padding:14px 18px;
      border-left:3px solid var(--rose);
      background:linear-gradient(90deg,rgba(251,113,133,.09),transparent);
      border-radius:0 12px 12px 0;
      font-family:var(--display);font-size:15px;font-style:italic;
      line-height:1.65;color:rgba(240,234,248,.92)}

    /* chips */
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
    .chip{padding:8px 14px;border-radius:999px;font-size:12.5px;font-weight:600;
      border:1px solid rgba(255,255,255,0.10);background:rgba(0,0,0,0.30);
      color:var(--text);display:flex;align-items:center;gap:6px}
    .chip.rose{border-color:rgba(251,113,133,.3);background:rgba(251,113,133,.08);color:var(--rose)}
    .chip.violet{border-color:rgba(167,139,250,.3);background:rgba(167,139,250,.08);color:var(--violet)}
    .chip.gold{border-color:rgba(251,191,36,.3);background:rgba(251,191,36,.08);color:var(--gold)}
    .chip.teal{border-color:rgba(45,212,191,.3);background:rgba(45,212,191,.08);color:var(--teal)}

    /* grid */
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0}
    @media(max-width:440px){.fg{grid-template-columns:1fr}}
    .fi{padding:13px 14px;border-radius:13px;background:rgba(0,0,0,.28);
      border:1px solid rgba(255,255,255,.06)}
    .fi-ic{font-size:17px;margin-bottom:5px;display:block}
    .fi-t{font-size:12.5px;font-weight:600;color:var(--text);margin-bottom:3px}
    .fi-d{font-size:11.5px;color:var(--muted);line-height:1.4}

    /* stat row */
    .sr{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
    .sc{flex:1;min-width:80px;padding:12px 14px;border-radius:13px;
      background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.06);
      display:flex;flex-direction:column;align-items:center;gap:3px}
    .sc-n{font-family:var(--display);font-size:clamp(20px,4vw,26px);font-weight:900;
      line-height:1;background:linear-gradient(135deg,var(--rose),var(--gold));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sc-l{font-size:10.5px;color:var(--muted);text-align:center;line-height:1.3}

    /* takeaway list */
    .tl{list-style:none;margin:12px 0}
    .tl li{display:flex;align-items:flex-start;gap:11px;padding:10px 0;
      border-bottom:1px solid rgba(255,255,255,.04);font-size:14.5px;
      line-height:1.6;color:rgba(240,234,248,.78)}
    .tl li:last-child{border-bottom:none}
    .tl .ico{flex-shrink:0;font-size:15px;margin-top:2px}

    /* buttons */
    .btn,.btn-s{display:flex;justify-content:center;align-items:center;gap:8px;
      width:100%;padding:14px;border-radius:12px;font-weight:700;font-size:14.5px;
      cursor:pointer;border:none;font-family:var(--body);text-decoration:none;
      transition:transform .18s,filter .18s,box-shadow .18s;
      -webkit-tap-highlight-color:transparent}
    .btn{background:linear-gradient(135deg,var(--rose),#e11d48);color:#fff;
      box-shadow:0 8px 28px rgba(251,113,133,.28)}
    .btn-s{background:rgba(255,255,255,.05);color:var(--text);
      border:1px solid rgba(255,255,255,.12)}
    .btn:active,.btn-s:active{transform:scale(.98);filter:brightness(1.08)}
    .btn:hover{box-shadow:0 12px 36px rgba(251,113,133,.40)}

    .btn-amz{background:linear-gradient(135deg,#ff9900,#e67e00);color:#111;
      box-shadow:0 8px 28px rgba(255,153,0,.30)}
    .btn-amz:hover{box-shadow:0 12px 36px rgba(255,153,0,.45)}

    .cta-g{display:flex;flex-direction:column;gap:9px;margin-top:18px}

    /* author bar */
    .ab{display:flex;align-items:center;gap:11px;margin-bottom:16px;padding:11px 13px;
      border-radius:12px;background:rgba(0,0,0,.20);border:1px solid rgba(255,255,255,.06)}
    .av{width:36px;height:36px;border-radius:50%;flex-shrink:0;
      background:linear-gradient(135deg,var(--rose),var(--violet));
      display:flex;align-items:center;justify-content:font-size:15px}
    .an{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
    .am{font-size:11px;color:var(--muted)}

    /* badge */
    .badge{display:inline-block;margin-bottom:13px;padding:5px 13px;border-radius:999px;
      font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:700}
    .badge-r{background:rgba(251,113,133,.10);border:1px solid rgba(251,113,133,.2);color:var(--rose)}
    .badge-v{background:rgba(167,139,250,.10);border:1px solid rgba(167,139,250,.2);color:var(--violet)}
    .badge-g{background:rgba(45,212,191,.10);border:1px solid rgba(45,212,191,.2);color:var(--teal)}

    /* scroll hint */
    .hint{position:absolute;bottom:calc(13px + var(--safe-b));left:50%;
      transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:4px;
      color:rgba(255,255,255,.28);font-size:9.5px;text-transform:uppercase;letter-spacing:.1em;
      pointer-events:none;animation:floathint 2.5s ease-in-out infinite}
    .hint svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5}
    @keyframes floathint{0%,100%{transform:translateX(-50%) translateY(0);opacity:.5}
      50%{transform:translateX(-50%) translateY(5px);opacity:.95}}
    .sw:last-child .hint{display:none}

    /* toast */
    #toast{position:fixed;bottom:calc(22px + var(--safe-b));left:50%;
      transform:translateX(-50%) translateY(18px);
      background:rgba(251,113,133,.15);border:1px solid rgba(251,113,133,.3);
      backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
      color:var(--text);padding:9px 20px;border-radius:999px;font-size:13px;font-weight:600;
      opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.16,1,.3,1);z-index:9999}
    #toast.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}

    /* ══════════════ SVG ANIMATION KEYFRAMES ══════════════ */
    @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
    @keyframes lid-pop{0%,70%{transform:translateY(0) rotate(0deg)}80%{transform:translateY(-16px) rotate(-8deg)}100%{transform:translateY(-14px) rotate(-6deg)}}
    @keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
    @keyframes ribbon-wave{0%,100%{transform:scaleX(1)}50%{transform:scaleX(1.04)}}
    @keyframes heartbeat{0%,100%{transform:scale(1)}14%{transform:scale(1.13)}28%{transform:scale(1)}42%{transform:scale(1.08)}70%{transform:scale(1)}}
    @keyframes ripple{0%{r:20;opacity:.6}100%{r:60;opacity:0}}
    @keyframes glow-pulse{0%,100%{filter:blur(18px);opacity:.5}50%{filter:blur(24px);opacity:.8}}
    @keyframes blink{0%,94%,100%{transform:scaleY(1)}96%,98%{transform:scaleY(.08)}}
    @keyframes iris-glow{0%,100%{opacity:.7}50%{opacity:1}}
    @keyframes scan-line{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
    @keyframes bar-grow{0%{transform:scaleY(0)}100%{transform:scaleY(1)}}
    @keyframes arrow-up{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes node-pulse{0%,100%{r:5;opacity:.8}50%{r:7;opacity:1}}
    @keyframes edge-dash{0%{stroke-dashoffset:100}100%{stroke-dashoffset:0}}
    @keyframes brain-glow{0%,100%{opacity:.4}50%{opacity:.8}}
    @keyframes swing{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}
    @keyframes ring-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes tilt-heart{0%,100%{transform:rotate(-6deg)}50%{transform:rotate(-3deg)}}
    @keyframes tilt-price{0%,100%{transform:rotate(6deg)}50%{transform:rotate(3deg)}}
    @keyframes orbit-a{0%{transform:rotate(0deg) translateX(42px) rotate(0deg)}100%{transform:rotate(360deg) translateX(42px) rotate(-360deg)}}
    @keyframes orbit-b{0%{transform:rotate(180deg) translateX(42px) rotate(-180deg)}100%{transform:rotate(540deg) translateX(42px) rotate(-540deg)}}
    @keyframes merge-glow{0%,100%{opacity:.3}50%{opacity:.7}}
    @keyframes dollar-fade{0%,40%{opacity:1}70%,100%{opacity:.1}}
    @keyframes heart-emerge{0%,30%{transform:scale(0);opacity:0}60%,100%{transform:scale(1);opacity:1}}
    @keyframes spin-slow{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes smile-draw{0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}
    @keyframes bow-bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    @keyframes confetti-fall{0%{transform:translateY(-30px) rotate(0deg);opacity:1}100%{transform:translateY(90px) rotate(720deg);opacity:0}}
  </style>
</head>

<body>
<div id="appWrapper">
  <div class="aurora"></div>
  <div class="grain"></div>

  <!-- ── TOP BAR ── -->
  <header class="top">
    <a class="back-btn back" href="#" data-back>
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
    <div class="top-right">
      <div class="pill-tag"><b id="sl">1/11</b>&nbsp;•&nbsp;<span id="sn">INTRO</span></div>
    </div>
    <div id="prog" style="width:0%"></div>
  </header>

  <main class="scroller" id="sc"></main>
</div>

<div id="toast">✦ Article complete — explore gifts below</div>

<script>
(function(){
"use strict";

/* ══ iOS Safari tap highlight & focus safety patch ══ */
(function(){
  // Prevent any focus-triggered outline flash on touchstart
  // WITHOUT blocking scroll or click behaviour
  var touchStarted = false;
  document.addEventListener('touchstart', function(){
    touchStarted = true;
  }, {passive: true});

  document.addEventListener('focusin', function(e){
    if(touchStarted){
      // Only suppress outline — don't prevent default or stop propagation
      var el = e.target;
      if(el && el.style !== undefined){
        // Temporarily suppress, restore after paint so keyboard nav still works
        el.style.outline = 'none';
        requestAnimationFrame(function(){
          el.style.outline = '';
        });
      }
      touchStarted = false;
    }
  }, {passive: true});

  // Re-enable keyboard focus styling when Tab key is used
  document.addEventListener('keydown', function(e){
    if(e.key === 'Tab'){
      touchStarted = false;
    }
  }, {passive: true});
})();

/* ══ Keyboard support for any div[role="button"] or div[role="link"] ══ */
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter' || e.key === ' '){
    var el = document.activeElement;
    if(el && (el.getAttribute('role') === 'button' || el.getAttribute('role') === 'link')){
      e.preventDefault();
      el.click();
    }
  }
}, {passive: false});

/* ══ Amazon Affiliate Base ══ */
const AMZ_TAG = "decideengine-21";
function amzLink(query){ return `https://www.amazon.in/s?k=${encodeURIComponent(query)}&tag=${AMZ_TAG}`; }

/* ══ SVG VISUALS ══ */
const visuals = {

  intro: `<svg viewBox="0 0 400 170" preserveAspectRatio="xMidYMid meet">
    <defs>
      <radialGradient id="bgr0" cx="50%" cy="60%" r="55%">
        <stop offset="0%" stop-color="#3b0a1e" stop-opacity="0.6"/>
        <stop offset="100%" stop-color="#070508" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="boxg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fb7185"/><stop offset="100%" stop-color="#e11d48"/>
      </linearGradient>
      <linearGradient id="lidg" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" stop-color="#fda4af"/><stop offset="100%" stop-color="#fb7185"/>
      </linearGradient>
    </defs>
    <rect width="400" height="170" fill="url(#bgr0)"/>
    <ellipse cx="200" cy="120" rx="70" ry="25" fill="rgba(251,113,133,0.18)" style="animation:glow-pulse 2.5s ease-in-out infinite"/>
    <g style="animation:float 3s ease-in-out infinite;transform-origin:200px 100px">
      <rect x="150" y="88" width="100" height="70" rx="4" fill="url(#boxg)"/>
      <rect x="194" y="88" width="12" height="70" fill="rgba(255,255,255,0.22)"/>
      <g style="animation:lid-pop 3s ease-in-out infinite;transform-origin:200px 88px">

/* ══ RENDER ══ */
const scr = document.getElementById('sc');
const sl  = document.getElementById('sl');
const sn  = document.getElementById('sn');
const pr  = document.getElementById('prog');
const toast = document.getElementById('toast');
let lastComplete = false;

function render(){
  scr.innerHTML = '';
  SECTIONS.forEach((sec, i) => {
    const w = document.createElement('div');
    w.className = 'sw';
    w.dataset.index = i;
    w.dataset.name  = sec.name;
    w.innerHTML = `
      <article class="card">
        <div class="vis">${visuals[sec.vis] || ''}</div>
        <header class="ch">
          <div class="kicker">${sec.kicker}</div>
          <h1 class="h1">${sec.title}</h1>
        </header>
        <div class="cb">${sec.html()}</div>
      </article>
      <div class="hint"><span>Scroll</span><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>`;
    scr.appendChild(w);
  });

  /* Upgrade any div[onclick] to accessible clickable elements */
  scr.querySelectorAll('div[onclick]').forEach(function(el){
    if(!el.getAttribute('role')) el.setAttribute('role', 'button');
    if(!el.getAttribute('tabindex')) el.setAttribute('tabindex', '0');
  });

  document.querySelectorAll('.sw').forEach(el => obs.observe(el));
}

/* ══ INTERSECTION OBSERVER ══ */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if(e.isIntersecting){
      e.target.classList.add('active');
      const i = +e.target.dataset.index;
      const T = SECTIONS.length;
      sl.textContent = `${i+1}/${T}`;
      sn.textContent = e.target.dataset.name;
      pr.style.width = `${((i+1)/T)*100}%`;
      if(i === T-1 && !lastComplete){
        lastComplete = true;
        setTimeout(()=>{ toast.classList.add('show'); setTimeout(()=>toast.classList.remove('show'),4000); },600);
      }
    } else {
      e.target.classList.remove('active');
    }
  });
},{root:scr, threshold:0.55});

render();
