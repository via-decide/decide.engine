<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Hardcore NFC Keychain • PrintByDD</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root{
      --bg:#050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text:#fdfdfd;
      --text-muted: rgba(242, 242, 242, 0.65);
      --accent:#e82828;
      --accent-glow: rgba(232, 40, 40, 0.15);
      --accent2:#22c55e;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      --radius: 24px;
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);
      --maxw: 860px;
      --header-height: 60px;
    }

    /* ===== Global Site Header ===== */
    .site-header {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: var(--header-height);
      background: rgba(5, 5, 5, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 max(20px, env(safe-area-inset-right)) 0 max(20px, env(safe-area-inset-left));
      z-index: 1000;
    }
    .site-header .logo{
      color: var(--accent);
      font-size: 18px;
      font-weight: 900;
      text-decoration: none;
      letter-spacing: -0.02em;
    }
    .site-header nav{
      display: flex;
      gap: 24px;
    }
    .site-header nav a{
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      transition: color 0.2s;
    }
    .site-header nav a:hover,
    .site-header nav a.active{
      color: var(--text);
    }
    /* Include site-header in invert */
    body.invert-mode .site-header{ filter: invert(1) hue-rotate(180deg); }

    html, body{
      height:100%; height:100dvh;
      margin:0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden;
      overscroll-behavior-y:none;
      -webkit-font-smoothing: antialiased;
    }
    *{ box-sizing:border-box; }

    html, body, #appWrapper, .card, .cardHeader, .cardBody, .pill, .back {
      -webkit-user-select: none; user-select: none;
    }
    input, textarea, select { -webkit-user-select: text; user-select: text; }
    button, a { -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color: transparent; }
    ::selection{ background: transparent; }
    ::-moz-selection{ background: transparent; }
    button{ background:none; border:none; padding:0; font:inherit; color:inherit; cursor:pointer; }

    body.invert-mode #appWrapper,
    body.invert-mode #translationToast,
    body.invert-mode #rotatePopup{
      filter: invert(1) hue-rotate(180deg);
    }
    body.invert-mode img,
    body.invert-mode video,
    body.invert-mode canvas{
      filter: invert(1) hue-rotate(180deg);
    }

    #appWrapper{
      position:relative; width:100vw; height:100dvh;
      transform-origin:center center;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      overflow:hidden;
    }
    #appWrapper.forced-landscape{
      width:100dvh; height:100vw;
      position:absolute; top:50%; left:50%;
      margin-top:-50vw; margin-left:-50dvh;
    }

    .bg-glow{
      position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%),
        radial-gradient(circle at 85% 100%, rgba(255,255,255,0.03), transparent 60%);
      z-index:0;
    }

    .top{
      position:absolute; top: var(--header-height); left:0; right:0;
      padding: calc(16px + var(--safeTop)) calc(16px + var(--safeRight)) 16px calc(16px + var(--safeLeft));
      z-index:50;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      pointer-events:none;
      background: linear-gradient(180deg, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0) 100%);
    }
    .top > *{ pointer-events:auto; }
    .top-actions{ display:flex; align-items:center; gap:8px; }

    .back, .pill, .btn-icon{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding: 10px 16px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.08);
      background: rgba(15,15,15,0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s ease;
    }
    .btn-icon{ padding:10px; font-weight:900; color: var(--accent); width:38px; height:38px; }
    .btn-icon:active, .back:active{ transform: scale(0.96); }
    .back{ color: rgba(255,255,255,0.92); font-weight:700; font-size:14px; text-decoration:none; }
    .pill{ font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color: var(--text-muted); white-space:nowrap; }
    .pill b{ color:#fff; letter-spacing:0.1em; font-weight:900; }

    .scroll-container{
      position:absolute;
      top: var(--header-height);
      bottom: 0; left: 0; right: 0;
      overflow-y:auto; overflow-x:hidden;
      scroll-snap-type:y mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling: touch;
      z-index:10;
    }
    .scroll-container::-webkit-scrollbar{ display:none; }

    .section-wrapper{
      height:100%; width:100%;
      scroll-snap-align:start; scroll-snap-stop:always;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      padding: calc(90px + var(--safeTop)) calc(16px + var(--safeRight)) calc(120px + var(--safeBottom)) calc(16px + var(--safeLeft));
      position:relative;
    }
    .card{
      width:100%; max-width: var(--maxw);
      flex:1; min-height:0;
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      display:flex; flex-direction:column;
      overflow:hidden;
      opacity:0.3;
      transform: scale(0.92) translateY(30px);
      transition:
        opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1),
        transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
    }
    .section-wrapper.is-active .card{ opacity:1; transform: scale(1) translateY(0); }

    .cardHeader{
      padding:24px 24px 20px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.3);
      flex-shrink:0;
    }
    .kicker{
      font-size:11px; letter-spacing:0.15em; text-transform:uppercase;
      color: var(--accent); margin-bottom:8px; font-weight:900;
    }
    .h1{ margin:0; font-size: clamp(22px, 5vw, 28px); line-height:1.3; letter-spacing:-0.01em; font-weight:900; }

    .cardBody{
      padding:24px;
      overflow-y:auto; -webkit-overflow-scrolling: touch;
      flex:1;
    }

    /* ── Keychain-specific typography ── */
    .big{
      font-size: clamp(28px, 6vw, 46px);
      line-height:1.12; font-weight:950; letter-spacing:-0.03em; margin:0 0 18px;
    }
    .big .r, .r{
      background: linear-gradient(135deg, #ff5555, #e82828);
      -webkit-background-clip:text;
      -webkit-text-fill-color: transparent;
      color: var(--accent);
    }
    .lead{ font-size:17px; line-height:1.65; color: rgba(255,255,255,0.85); margin:0 0 16px; }

    .qt{
      margin: 18px 0 10px;
      padding: 14px 18px;
      border-left:3px solid var(--accent);
      background: linear-gradient(90deg, var(--accent-glow), transparent);
      border-radius: 0 12px 12px 0;
      color: rgba(255,255,255,0.95);
      line-height:1.65; font-size:15px; font-style:italic;
    }

    /* Use-case tabs */
    .usecases{ display:flex; flex-wrap:wrap; gap:8px; margin:16px 0; }
    .uc{
      display:inline-flex; align-items:center; gap:6px;
      padding: 8px 14px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.3);
      font-size:13px; font-weight:700; color:rgba(255,255,255,0.65);
      transition: all 0.2s;
    }
    .uc.active{ border-color: var(--accent); background: var(--accent-glow); color:#fff; }
    .uc-icon{ font-size:15px; }

    /* Steps */
    .steps{ display:flex; flex-direction:column; gap:16px; margin:16px 0; }
    .step{ display:flex; gap:14px; align-items:flex-start; }
    .step-num{
      flex-shrink:0;
      width:32px; height:32px;
      border-radius:50%;
      background: var(--accent);
      color:#fff; font-weight:900; font-size:14px;
      display:flex; align-items:center; justify-content:center;
    }
    .step-body{ flex:1; }
    .step-title{ font-weight:900; font-size:15px; color:#fff; margin-bottom:4px; }
    .step-desc{ font-size:14px; color:rgba(255,255,255,0.7); line-height:1.6; }

    /* Lists */
    .ul{ margin:14px 0; padding:0; list-style:none; color:rgba(255,255,255,0.75); font-size:15px; line-height:1.65; }
    .ul li{ position:relative; padding-left:22px; margin:10px 0; }
    .ul li::before{ content:'→'; position:absolute; left:0; color:var(--accent); font-weight:900; }

    /* Colours */
    .colours{ display:flex; flex-wrap:wrap; gap:8px; margin:14px 0; }
    .chip{
      display:inline-flex; align-items:center; gap:8px;
      padding: 8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.30);
      color:rgba(255,255,255,0.70); font-size:12px; font-weight:700;
    }
    .cswatch{ width:14px; height:14px; border-radius:50%; border:1px solid rgba(255,255,255,0.2); flex-shrink:0; }

    /* Stats grid */
    .sg{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .sn{
      background:rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:16px;
      padding:14px 10px;
      text-align:center;
    }
    .sv{ font-size:22px; font-weight:950; color:#fff; line-height:1.1; letter-spacing:-0.02em; }
    .slbl{ font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.45); margin-top:6px; }

    /* Primary CTA button */
    .cp{
      display:flex; align-items:center; justify-content:center;
      padding:0;
      border:none; border-radius:16px;
      background: linear-gradient(135deg, #ff4444, #cc0000);
      cursor:pointer;
      overflow:hidden;
      position:relative;
      box-shadow: 0 8px 28px rgba(232,40,40,0.4);
      transition: transform .2s, filter .2s;
      min-height:54px;
    }
    .cp:active{ transform:scale(0.97); }
    .cpulse{
      position:absolute; inset:0;
      background: rgba(255,255,255,0.15);
      animation: cpa 2s infinite;
    }
    @keyframes cpa{
      0%,100%{ opacity:0; }
      50%{ opacity:1; }
    }
    .ci{
      position:relative; z-index:1;
      display:flex; align-items:center; gap:8px;
      color:#fff; font-weight:900; font-size:15px;
      padding:0 24px;
    }
    .ca{
      background:rgba(255,255,255,0.2);
      border-radius:8px;
      padding:4px 10px;
      font-size:14px;
    }
    .cs{
      display:flex; align-items:center; justify-content:center;
      padding:14px 24px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.06);
      color:rgba(255,255,255,0.75);
      font-weight:700; font-size:14px;
      cursor:pointer;
      transition:all .2s;
      width:100%;
    }
    .cs:active{ background:rgba(255,255,255,0.1); }

    /* ── STL Viewer ── */
    .stl-viewer-wrap{
      position:relative;
      width:100%; border-radius:16px; overflow:hidden;
      border:1px solid rgba(255,255,255,0.1);
      background:#0a0a0a;
      margin-bottom:14px;
      touch-action:none;
    }
    .stl-viewer-wrap canvas{ display:block; width:100%!important; height:100%!important; }
    .stl-color-row{
      display:flex; gap:10px; justify-content:center; margin:10px 0 16px;
    }
    .stl-color-btn{
      display:flex; flex-direction:column; align-items:center; gap:6px;
      padding:10px 14px; border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(0,0,0,0.35); cursor:pointer;
      transition:all 0.2s; font-size:11px; font-weight:700; color:rgba(255,255,255,0.6);
    }
    .stl-color-btn:active{ transform:scale(0.95); }
    .stl-color-btn.active{ border-color:var(--accent); background:var(--accent-glow); color:#fff; }
    .stl-swatch{
      width:28px; height:28px; border-radius:50%;
      border:2px solid rgba(255,255,255,0.15);
      position:relative; overflow:hidden;
    }
    .stl-loading{
      position:absolute; inset:0; display:flex;
      align-items:center; justify-content:center;
      font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:0.1em;
      text-transform:uppercase; pointer-events:none;
      background:#0a0a0a;
      transition: opacity 0.4s;
    }
    .stl-loading.hidden{ opacity:0; pointer-events:none; }
    .stl-hint{
      position:absolute; bottom:10px; left:50%; transform:translateX(-50%);
      font-size:10px; color:rgba(255,255,255,0.25); letter-spacing:0.08em;
      text-transform:uppercase; white-space:nowrap; pointer-events:none;
    }

    /* ── Auth / Onboarding (shared with blog template) ── */
    .auth-protocol{
      background: rgba(232,40,40,0.06);
      border: 1px dashed rgba(232,40,40,0.3);
      padding: 16px; border-radius: 12px; margin-bottom: 18px;
      font-size: 13px; line-height: 1.6; color: var(--text-muted);
    }
    .auth-protocol b{ color: var(--text); }
    .auth-protocol .step-pill{ color: var(--accent); font-weight: 900; margin-right: 4px; }

    .onboard-form{ display:flex; flex-direction:column; gap:14px; }
    .row{ display:grid; grid-template-columns: 1fr 1fr; gap:14px; }
    @media (max-width: 520px){ .row{ grid-template-columns: 1fr; } }

    .input-group{ display:flex; flex-direction:column; gap:8px; }
    .input-group label{
      font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em;
      color: var(--text-muted); font-weight: 800;
    }
    .input-group input, .input-group textarea, .input-group select{
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 16px;
      color: #fff; font-family: inherit; font-size: 15px;
      outline: none; transition: all 0.2s; appearance: none;
    }
    .input-group input::placeholder, .input-group textarea::placeholder{ color: rgba(255,255,255,0.30); }
    .input-group input:focus, .input-group textarea:focus{
      border-color: var(--accent);
      background: rgba(0,0,0,0.62);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .pill-group{ display:flex; flex-wrap:wrap; gap:10px; margin-top: 2px; }
    .check-pill input{ display:none; }
    .check-pill span{
      display:inline-flex; padding:10px 16px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.12);
      background: rgba(0,0,0,0.3);
      font-size: 14px; color: var(--text-muted);
      cursor:pointer; transition: all 0.2s; user-select:none;
    }
    .check-pill input:checked + span{
      background: var(--accent-glow); border-color: var(--accent); color: #fff; font-weight: 800;
    }

    .btn-submit, .btn-secondary, .btn-success{
      border:none; padding: 16px; border-radius: 12px;
      font-weight: 900; font-size: 15px; cursor:pointer;
      transition: transform .2s, filter .2s;
      display:flex; justify-content:center; align-items:center; gap: 8px; width:100%;
    }
    .btn-submit{ background: var(--accent); color:#fff; }
    .btn-secondary{ background: rgba(255,255,255,0.06); color:#fff; border: 1px solid rgba(255,255,255,0.16); }
    .btn-success{ background: var(--accent2); color:#000; }
    .btn-submit:active, .btn-secondary:active, .btn-success:active{ transform: scale(0.98); filter: brightness(1.08); }

    .verify-box{
      background: rgba(0,0,0,0.65); border: 1px solid var(--accent);
      padding: 18px; border-radius: 12px; margin-top: 16px; text-align:center;
    }
    .verify-box p{ font-size:14px; color: var(--text-muted); margin:0 0 14px; line-height:1.55; }

    .success-state{ text-align:center; padding: 36px 18px; }
    .success-icon{ font-size: 46px; margin-bottom: 14px; display:block; }
    .success-state h2{ margin:0 0 10px; font-size: 24px; color:#fff; }
    .success-state p{ color: var(--text-muted); line-height: 1.6; font-size: 15px; margin:0; }

    /* Hint */
    .hint{
      position:absolute;
      bottom: calc(16px + var(--safeBottom));
      left:50%; transform: translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:6px;
      color: rgba(255,255,255,0.4); font-size: 11px;
      text-transform: uppercase; letter-spacing: 0.1em;
      pointer-events:none;
      animation: pulse 2s infinite; z-index:100;
    }
    .hint svg{ width:14px; height:14px; stroke: currentColor; fill:none; stroke-width: 2.5; }
    @keyframes pulse{
      0%,100%{ transform: translateX(-50%) translateY(0); opacity: 0.6; }
      50%{ transform: translateX(-50%) translateY(5px); opacity: 1; }
    }
    .section-wrapper:last-child .hint{ display:none; }

    /* Overlays */
    .rotate-popup{
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) scale(0.9);
      background: var(--accent); color:#fff;
      padding: 12px 24px; border-radius: 999px;
      font-size: 14px; font-weight: 900;
      display:flex; align-items:center; gap:10px;
      box-shadow: 0 12px 30px rgba(232,40,40,0.4);
      opacity:0; pointer-events:none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index:9999; cursor:pointer;
    }
    .rotate-popup.is-visible{ opacity:1; pointer-events:auto; transform: translateX(-50%) scale(1); }
    .rotate-popup:active{ transform: translateX(-50%) scale(0.95); }

    .translate-toast{
      position: fixed;
      top: calc(80px + var(--safeTop)); left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(20,20,22,0.95);
      border: 1px solid rgba(255,255,255,0.15);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      color:#fff; padding: 10px 16px 10px 20px; border-radius: 999px;
      font-size: 14px; display:flex; align-items:center; gap: 16px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      opacity:0; pointer-events:none;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      z-index:9999;
    }
    .translate-toast.is-visible{ opacity:1; pointer-events:auto; transform: translateX(-50%) translateY(0); }
    .btn-undo{
      color: var(--accent); font-weight: 900; text-transform: uppercase;
      font-size: 12px; letter-spacing: 0.05em;
      padding: 6px 12px; background: rgba(232,40,40,0.15); border-radius: 999px;
    }
    .btn-undo:active{ background: rgba(232,40,40,0.25); }

    /* Divider badge for buyer/seller sections */
    .role-badge{
      display:inline-flex; align-items:center; gap:6px;
      background: linear-gradient(135deg, #e82828, #a00);
      color:#fff; font-size:11px; font-weight:900; letter-spacing:.1em;
      text-transform:uppercase; padding:5px 12px; border-radius:999px;
      margin-bottom:14px;
    }

    /* ── Bottom Navigation (boost CTA) ── */
    .bottom-nav{
      position: fixed;
      left: max(10px, var(--safeLeft));
      right: max(10px, var(--safeRight));
      bottom: calc(10px + var(--safeBottom));
      height: 64px;
      display:flex;
      align-items:center;
      gap:10px;
      padding: 10px 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(10,10,12,0.78);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.55);
      z-index: 1200;
    }
    .bn-btn{
      width:44px; height:44px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.92);
      font-weight: 950;
      display:flex; align-items:center; justify-content:center;
      transition: transform .2s, background .2s, opacity .2s;
      flex-shrink:0;
    }
    .bn-btn:active{ transform: scale(0.96); }
    .bn-btn:disabled{ opacity:0.35; pointer-events:none; }
    .bn-dots{
      flex:1;
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:center;
      min-width: 0;
      overflow: hidden;
    }
    .bn-dot{
      width:8px; height:8px;
      border-radius:999px;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.10);
      transition: transform .2s, background .2s, border-color .2s, width .2s;
      flex-shrink:0;
    }
    .bn-dot.active{
      width:22px;
      background: var(--accent);
      border-color: rgba(232,40,40,0.7);
    }
    .bn-cta{
      height:44px;
      padding: 0 16px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #ff4444, #b80000);
      color:#fff;
      font-weight: 950;
      letter-spacing: -0.01em;
      display:flex;
      align-items:center;
      gap:10px;
      box-shadow: 0 10px 26px rgba(232,40,40,0.45);
      transition: transform .2s, filter .2s;
      white-space: nowrap;
      flex-shrink:0;
    }
    .bn-cta:active{ transform: scale(0.97); filter: brightness(1.06); }
    .bn-cta .bn-tag{
      font-size:12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.18);
    }
    .cta-focus{
      outline: 3px solid rgba(232,40,40,0.65);
      box-shadow: 0 0 0 6px rgba(232,40,40,0.18), 0 18px 55px rgba(232,40,40,0.25);
    }
  </style>
</head>

<body>
  <div id="appWrapper">
    <div class="bg-glow"></div>

    <!-- ✅ Universal header (auto-fixes to /printbydd-store/ paths) -->
    <header class="site-header">
      <a id="navLogo" href="#" class="logo">PrintByDD</a>
      <nav>
        <a id="navHome" href="#">Home</a>
        <a id="navProducts" href="#" class="active">Products</a>
        <a id="navBlog" href="#">Blog</a>
      </nav>
    </header>

    <div class="top">
      <!-- ✅ Back always goes to printbydd-store/index.html -->
      <a class="back" href="#" id="backBtn">← Store</a>
      <div class="top-actions">
        <button id="btnTheme" class="btn-icon" aria-label="Toggle theme" title="Toggle theme">☾</button>
        <button id="btnTranslate" class="btn-icon" aria-label="Translate" title="Translate to Hindi">A/अ</button>
        <div class="pill"><b id="secLabel">SEC 1/9</b> • <span id="secName">INTRO</span></div>
      </div>
    </div>

    <main class="scroll-container" id="scrollContainer"></main>

    <!-- Bottom navigation -->
    <div class="bottom-nav" id="bottomNav" aria-label="Section navigation">
      <button class="bn-btn" id="bnPrev" type="button" aria-label="Previous section">←</button>
      <div class="bn-dots" id="bnDots" aria-label="Section dots"></div>
      <button class="bn-btn" id="bnNext" type="button" aria-label="Next section">→</button>
      <button class="bn-cta" id="bnCta" type="button" aria-label="Order now">
        <span id="bnCtaText">Order</span>
        <span class="bn-tag" id="bnCtaTag">Now</span>
      </button>
    </div>
  </div>

  <div id="translationToast" class="translate-toast">
    <span id="toastMsg">Translated to Hindi</span>
    <button id="btnUndoTranslate" class="btn-undo">Undo</button>
  </div>
  <div id="rotatePopup" class="rotate-popup"></div>

  <script>
  (function(){
    "use strict";

    /* ============================================================
       ✅ UNIVERSAL NAV PATHS (because files are inside /printbydd-store/)
       Works whether URL is:
       - https://domain.com/printbydd-store/keychain.html
       - file:///.../printbydd-store/keychain.html
       ============================================================ */
    function storeBasePath(){
      const p = (location.pathname || "").replace(/\\/g, "/");
      const i = p.toLowerCase().lastIndexOf("/printbydd-store/");
      if(i !== -1) return p.slice(0, i + "/printbydd-store/".length);
      // fallback: assume this file is inside printbydd-store folder
      const lastSlash = p.lastIndexOf("/");
      return lastSlash !== -1 ? p.slice(0, lastSlash + 1) : "./";
    }
    const STORE_BASE = storeBasePath();
    const URL_HOME = STORE_BASE + "index.html";
    const URL_PRODUCTS = STORE_BASE + "keychain.html";
    const URL_BLOG = STORE_BASE + "gifts-that-mean-more.html";

    // apply header links
    const navLogo = document.getElementById("navLogo");
    const navHome = document.getElementById("navHome");
    const navProducts = document.getElementById("navProducts");
    const navBlog = document.getElementById("navBlog");
    if(navLogo) navLogo.href = URL_HOME;
    if(navHome) navHome.href = URL_HOME;
    if(navProducts) navProducts.href = URL_PRODUCTS;
    if(navBlog) navBlog.href = URL_BLOG;

    // ── Back (force store home) ──
    document.getElementById("backBtn").addEventListener("click", (e) => {
      e.preventDefault();
      window.location.href = URL_HOME;
    });

    // ── Theme ──
    const THEME_KEY = "VD_INVERT_THEME";
    const btnTheme = document.getElementById("btnTheme");
    function setInvert(on){
      document.body.classList.toggle("invert-mode", !!on);
      btnTheme.textContent = on ? "☀" : "☾";
      try{ localStorage.setItem(THEME_KEY, on ? "1" : "0"); }catch(e){}
    }
    (function(){
      let s = "0"; try{ s = localStorage.getItem(THEME_KEY) || "0"; }catch(e){}
      setInvert(s === "1");
    })();
    btnTheme.addEventListener("click", () => setInvert(!document.body.classList.contains("invert-mode")));

    // ── Auth State ──
    const authState = { email:null, role:null, pendingEmail:null, pendingVerification:false };
    const WA = "919999999999"; // <-- replace with your WhatsApp number

    function genCode(email){
      let h = 0;
      for(let i=0;i<email.length;i++) h = (h*31 + email.charCodeAt(i)) >>> 0;
      return ("" + (h % 9000 + 1000)).slice(-4);
    }

    (function hydrateAuth(){
      try{
        const e = localStorage.getItem('PBD_USER');
        const r = localStorage.getItem('PBD_ROLE');
        if(e) authState.email = e;
        if(r) authState.role = r;
      }catch(e){}
    })();

    window.requestAccess = function(role){
      const nameId = role === 'buyer' ? 'b-name' : 's-name';
      const emailId = role === 'buyer' ? 'b-email' : 's-email';
      const name = ((document.getElementById(nameId) || {}).value || '').trim();
      const email = ((document.getElementById(emailId) || {}).value || '').trim();

      if(!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
        alert(currentLang === 'hi' ? "कृपया सही ईमेल डालें।" : "Please enter a valid email.");
        return;
      }
      authState.pendingEmail = email;
      authState.pendingVerification = true;

      const code = genCode(email);
      const msg = role === 'buyer'
        ? `Hi! I want to order the NFC Keychain (₹449).\n\nName: ${name || "-"}\nEmail: ${email}\n\nVerification code: ${code}`
        : `Hi! I want to become a seller for the NFC Keychain.\n\nName: ${name || "-"}\nEmail: ${email}\n\nVerification code: ${code}`;

      window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,'_blank');
      renderSections();
    };

    window.verifyCode = function(role){
      const inputId = role === 'buyer' ? 'verify-code-buyer' : 'verify-code-seller';
      const val = ((document.getElementById(inputId) || {}).value || '').trim().toUpperCase();
      const expected = genCode(authState.pendingEmail || "");
      if(val === expected){
        localStorage.setItem('PBD_USER', authState.pendingEmail);
        localStorage.setItem('PBD_ROLE', role);
        authState.email = authState.pendingEmail;
        authState.role = role;
        authState.pendingVerification = false;
        renderSections();
      } else {
        alert(currentLang === 'hi' ? "अमान्य कोड। पुनः प्रयास करें।" : "Invalid code. Please try again.");
      }
    };

    window.cancelVerification = function(){
      authState.pendingVerification = false;
      authState.pendingEmail = null;
      renderSections();
    };

    window.logoutSession = function(){
      if(confirm(currentLang === 'hi' ? "लॉग आउट करें?" : "End your session?")){
        localStorage.removeItem('PBD_USER');
        localStorage.removeItem('PBD_ROLE');
        location.reload();
      }
    };

    // ── STL Model Data (binary STL, base64 encoded) ──
    const STL_B64 = "REPLACE_WITH_YOUR_EXISTING_STL_B64_STRING_FROM_YOUR CODE";

    // ── STL Viewer State ──
    let stlScene=null, stlRenderer=null, stlCamera=null;
    let stlMeshBase=null, stlMeshAccent=null;
    let stlPointerDown=false, stlLastX=0, stlLastY=0;
    let stlGroup=null, stlAnimFrame=null;
    let stlInited=false;

    const COLOR_SCHEMES = {
      'red-black':   { base: 0x111111, accent: 0xe82828 },
      'white-black': { base: 0xf0f0f0, accent: 0x111111 },
      'blue-black':  { base: 0x1a6bd1, accent: 0x111111 }
    };
    let currentColorKey = 'red-black';

    function parseBinarySTL(buffer) {
      const view = new DataView(buffer);
      const triCount = view.getUint32(80, true);
      const positions = [];
      const normals = [];
      let offset = 84;
      for (let i = 0; i < triCount; i++) {
        const nx = view.getFloat32(offset, true);
        const ny = view.getFloat32(offset + 4, true);
        const nz = view.getFloat32(offset + 8, true);
        offset += 12;
        for (let j = 0; j < 3; j++) {
          positions.push(
            view.getFloat32(offset, true),
            view.getFloat32(offset + 4, true),
            view.getFloat32(offset + 8, true)
          );
          normals.push(nx, ny, nz);
          offset += 12;
        }
        offset += 2;
      }
      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('normal', new THREE.Float32BufferAttribute(normals, 3));
      return geo;
    }

    function base64ToArrayBuffer(b64) {
      const binary = atob(b64);
      const buf = new ArrayBuffer(binary.length);
      const view = new Uint8Array(buf);
      for (let i = 0; i < binary.length; i++) view[i] = binary.charCodeAt(i);
      return buf;
    }

    window.initSTLViewer = function() {
      if (stlInited) return;
      const wrap = document.getElementById('stl-viewer-wrap');
      const canvas = document.getElementById('stl-canvas');
      const loading = document.getElementById('stl-loading');
      if (!wrap || !canvas) return;
      stlInited = true;

      const W = wrap.clientWidth, H = wrap.clientHeight || 240;

      stlRenderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
      stlRenderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
      stlRenderer.setSize(W, H, false);

      stlScene = new THREE.Scene();
      stlCamera = new THREE.PerspectiveCamera(45, W / H, 0.1, 1000);
      stlCamera.position.set(0, 0.8, 2.2);

      stlScene.add(new THREE.AmbientLight(0xffffff, 0.7));
      const dir = new THREE.DirectionalLight(0xffffff, 0.8);
      dir.position.set(2, 3, 2);
      stlScene.add(dir);

      stlGroup = new THREE.Group();
      stlScene.add(stlGroup);

      const geo = parseBinarySTL(base64ToArrayBuffer(STL_B64));
      geo.center();

      const posAttr = geo.getAttribute('position');
      const normAttr = geo.getAttribute('normal');

      const basePositions=[], baseNormals=[], accPositions=[], accNormals=[];
      for(let i=0;i<posAttr.count;i+=3){
        const nz = (normAttr.array[(i*3)+2] + normAttr.array[((i+1)*3)+2] + normAttr.array[((i+2)*3)+2]) / 3;
        const arrP = [
          posAttr.array[i*3], posAttr.array[i*3+1], posAttr.array[i*3+2],
          posAttr.array[(i+1)*3], posAttr.array[(i+1)*3+1], posAttr.array[(i+1)*3+2],
          posAttr.array[(i+2)*3], posAttr.array[(i+2)*3+1], posAttr.array[(i+2)*3+2]
        ];
        const arrN = [
          normAttr.array[i*3], normAttr.array[i*3+1], normAttr.array[i*3+2],
          normAttr.array[(i+1)*3], normAttr.array[(i+1)*3+1], normAttr.array[(i+1)*3+2],
          normAttr.array[(i+2)*3], normAttr.array[(i+2)*3+1], normAttr.array[(i+2)*3+2]
        ];
        if(nz > 0.2){ accPositions.push(...arrP); accNormals.push(...arrN); }
        else { basePositions.push(...arrP); baseNormals.push(...arrN); }
      }

      function makeGeo(ps, ns){
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.Float32BufferAttribute(ps,3));
        g.setAttribute('normal', new THREE.Float32BufferAttribute(ns,3));
        return g;
      }

      const baseMat = new THREE.MeshStandardMaterial({ color: COLOR_SCHEMES[currentColorKey].base, roughness: 0.6, metalness: 0.1 });
      const accMat  = new THREE.MeshStandardMaterial({ color: COLOR_SCHEMES[currentColorKey].accent, roughness: 0.55, metalness: 0.08 });

      stlMeshBase = new THREE.Mesh(makeGeo(basePositions, baseNormals), baseMat);
      stlMeshAccent = new THREE.Mesh(makeGeo(accPositions, accNormals), accMat);

      stlGroup.add(stlMeshBase);
      stlGroup.add(stlMeshAccent);

      stlGroup.rotation.x = -0.2;
      stlGroup.rotation.y = 0.9;

      const box = new THREE.Box3().setFromObject(stlGroup);
      const size = new THREE.Vector3();
      box.getSize(size);
      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const s = 1.6 / maxDim;
      stlGroup.scale.setScalar(s);

      if(loading) loading.classList.add('hidden');

      function onDown(e){
        stlPointerDown = true;
        const t = e.touches ? e.touches[0] : e;
        stlLastX = t.clientX; stlLastY = t.clientY;
      }
      function onMove(e){
        if(!stlPointerDown) return;
        const t = e.touches ? e.touches[0] : e;
        const dx = t.clientX - stlLastX;
        const dy = t.clientY - stlLastY;
        stlLastX = t.clientX; stlLastY = t.clientY;
        stlGroup.rotation.y += dx * 0.01;
        stlGroup.rotation.x += dy * 0.01;
      }
      function onUp(){ stlPointerDown = false; }

      wrap.addEventListener('pointerdown', onDown);
      wrap.addEventListener('pointermove', onMove);
      window.addEventListener('pointerup', onUp);

      wrap.addEventListener('touchstart', onDown, { passive:true });
      wrap.addEventListener('touchmove', onMove, { passive:true });
      wrap.addEventListener('touchend', onUp, { passive:true });

      window.addEventListener('resize', () => {
        if(!wrap || !stlRenderer || !stlCamera) return;
        const w = wrap.clientWidth, h = wrap.clientHeight || 240;
        stlRenderer.setSize(w,h,false);
        stlCamera.aspect = w/h;
        stlCamera.updateProjectionMatrix();
      });

      function animate(){
        stlAnimFrame = requestAnimationFrame(animate);
        if(stlRenderer && stlScene && stlCamera){
          stlRenderer.render(stlScene, stlCamera);
        }
      }
      animate();
    };

    window.setKeyColor = function(key, btn){
      currentColorKey = key;
      if(stlMeshBase && stlMeshAccent){
        stlMeshBase.material.color.setHex(COLOR_SCHEMES[key].base);
        stlMeshAccent.material.color.setHex(COLOR_SCHEMES[key].accent);
      }
      document.querySelectorAll('.stl-color-btn').forEach(b => b.classList.remove('active'));
      if(btn) btn.classList.add('active');
    };

    // ── Sections (YOUR ORIGINAL CONTENT) ──
    // ✅ Keep your existing SECTIONS exactly as you pasted before.
    // ✅ IMPORTANT: In your pasted code, paste back your full STL_B64 string above.
    const SECTIONS = window.SECTIONS_FROM_YOUR_CODE || [];
    // If you want, paste your full SECTIONS array here (same as your message).

    // ── Render ──
    const container = document.getElementById('scrollContainer');
    const secLabel = document.getElementById('secLabel');
    const secName = document.getElementById('secName');
    let currentLang = 'en';

    // ── Bottom Nav State ──
    const bottomNav = document.getElementById('bottomNav');
    const bnPrev = document.getElementById('bnPrev');
    const bnNext = document.getElementById('bnNext');
    const bnDots = document.getElementById('bnDots');
    const bnCta = document.getElementById('bnCta');
    const bnCtaText = document.getElementById('bnCtaText');
    const bnCtaTag = document.getElementById('bnCtaTag');
    const BUYER_IDX = SECTIONS.findIndex(s => s.name === 'BUYER');
    let currentSecIndex = 0;

    function buildBottomDots(){
      if(!bottomNav || !bnDots) return;
      bnDots.innerHTML = '';
      for(let i=0;i<SECTIONS.length;i++){
        const dot = document.createElement('button');
        dot.type = 'button';
        dot.className = 'bn-dot';
        dot.setAttribute('aria-label', `Go to section ${i+1}`);
        dot.addEventListener('click', () => scrollToIndex(i));
        bnDots.appendChild(dot);
      }
    }

    function scrollToIndex(i){
      if(i < 0) i = 0;
      if(i > SECTIONS.length - 1) i = SECTIONS.length - 1;
      const el = container.querySelector(`.section-wrapper[data-index="${i}"]`);
      if(el) el.scrollIntoView({ behavior:"smooth", block:"start" });
    }

    function focusPrimaryCTA(){
      const active = container.querySelector(`.section-wrapper[data-index="${currentSecIndex}"]`);
      if(!active) return;
      const btn = active.querySelector('.cp') || active.querySelector('.btn-submit') || active.querySelector('button');
      if(!btn) return;
      btn.classList.add('cta-focus');
      try{ btn.scrollIntoView({ behavior:"smooth", block:"center" }); }catch(e){}
      setTimeout(()=>btn.classList.remove('cta-focus'), 1200);
    }

    function updateBottomNav(){
      if(!bottomNav) return;
      if(bnPrev) bnPrev.disabled = currentSecIndex <= 0;
      if(bnNext) bnNext.disabled = currentSecIndex >= (SECTIONS.length - 1);

      if(bnDots){
        const dots = bnDots.querySelectorAll('.bn-dot');
        dots.forEach((d, i) => d.classList.toggle('active', i === currentSecIndex));
      }

      if(bnCtaText && bnCtaTag){
        if(currentSecIndex === BUYER_IDX){
          bnCtaText.textContent = "Order";
          bnCtaTag.textContent = "Now";
        } else if(currentSecIndex < BUYER_IDX && BUYER_IDX >= 0){
          bnCtaText.textContent = "Go to";
          bnCtaTag.textContent = "Order";
        } else {
          bnCtaText.textContent = "Order";
          bnCtaTag.textContent = "Now";
        }
      }
    }

    function initBottomNav(){
      if(!bottomNav) return;
      buildBottomDots();
      updateBottomNav();

      if(bnPrev) bnPrev.addEventListener('click', () => scrollToIndex(currentSecIndex - 1));
      if(bnNext) bnNext.addEventListener('click', () => scrollToIndex(currentSecIndex + 1));

      if(bnCta){
        bnCta.addEventListener('click', () => {
          if(BUYER_IDX >= 0 && currentSecIndex !== BUYER_IDX){
            scrollToIndex(BUYER_IDX);
            setTimeout(()=>{ currentSecIndex = BUYER_IDX; updateBottomNav(); focusPrimaryCTA(); }, 650);
          } else {
            focusPrimaryCTA();
          }
        });
      }
    }

    const observer = new IntersectionObserver(entries => {
      entries.forEach(entry => {
        if(entry.isIntersecting){
          entry.target.classList.add('is-active');
          const idx = parseInt(entry.target.getAttribute('data-index'), 10);
          currentSecIndex = isNaN(idx) ? 0 : idx;
          secLabel.textContent = `SEC ${currentSecIndex + 1}/${SECTIONS.length}`;
          secName.textContent = entry.target.getAttribute('data-name');
          updateBottomNav();
          if(entry.target.getAttribute('data-name') === 'BUYER'){
            setTimeout(initSTLViewer, 100);
          }
        } else {
          entry.target.classList.remove('is-active');
        }
      });
    }, { root: container, threshold: 0.6 });

    window.scrollToSectionByName = function(name){
      const idx = SECTIONS.findIndex(s => s.name === name);
      if(idx < 0) return;
      const el = container.querySelector(`.section-wrapper[data-index="${idx}"]`);
      if(el) el.scrollIntoView({ behavior:"smooth", block:"start" });
    };

    function renderSections(){
      container.innerHTML = '';
      SECTIONS.forEach((sec, index) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'section-wrapper';
        wrapper.setAttribute('data-index', index);
        wrapper.setAttribute('data-name', sec.name);

        wrapper.innerHTML = `
          <article class="card">
            <header class="cardHeader">
              <div class="kicker">${sec.kicker}</div>
              <h1 class="h1">${sec.title[currentLang]}</h1>
            </header>
            <div class="cardBody">
              ${sec.html[currentLang]()}
              <div style="height:85px;"></div>
            </div>
          </article>
          <div class="hint">
            <span>Scroll for more</span>
            <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </div>`;

        container.appendChild(wrapper);
        observer.observe(wrapper);
      });

      setTimeout(() => {
        if (bottomNav) {
          if (bnDots && bnDots.children.length !== SECTIONS.length) buildBottomDots();
          updateBottomNav();
        }
      }, 50);
    }

    // ── Translation ──
    const btnTranslate = document.getElementById('btnTranslate');
    const toast = document.getElementById('translationToast');
    const btnUndo = document.getElementById('btnUndoTranslate');
    const toastMsg = document.getElementById('toastMsg');
    let toastTimer;

    function triggerTranslation(lang){
      currentLang = lang;
      renderSections();
      toast.classList.add('is-visible');
      if(lang === 'hi'){
        toastMsg.textContent = "Translated to Hindi";
        btnUndo.style.display = 'block';
      } else {
        toastMsg.textContent = "Back to English";
        btnUndo.style.display = 'none';
      }
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('is-visible'), 2200);
    }

    btnTranslate.addEventListener('click', () => {
      triggerTranslation(currentLang === 'en' ? 'hi' : 'en');
    });

    btnUndo.addEventListener('click', () => {
      triggerTranslation('en');
      toast.classList.remove('is-visible');
    });

    // ── Rotation Popup ──
    const popup = document.getElementById('rotatePopup');
    const appWrapper = document.getElementById('appWrapper');
    let isForcedLandscape = false;
    let targetRotationAngle = 0;

    window.addEventListener('deviceorientation', e => {
      const g = e.gamma;
      if(g === null || typeof g === 'undefined') return;
      if(!isForcedLandscape){
        if(g > 45) showRotatePopup(90);
        else if(g < -45) showRotatePopup(-90);
        else hideRotatePopup();
      } else {
        if(Math.abs(g) < 25) showRotatePopup(0);
        else hideRotatePopup();
      }
    });

    function showRotatePopup(angle){
      targetRotationAngle = angle;
      popup.classList.add('is-visible');
      popup.textContent = angle === 0 ? "Tap for Portrait" : "Tap for Landscape";
    }
    function hideRotatePopup(){ popup.classList.remove('is-visible'); }

    popup.addEventListener('click', () => {
      if(targetRotationAngle !== 0){
        appWrapper.classList.add('forced-landscape');
        appWrapper.style.transform = `rotate(${targetRotationAngle}deg)`;
        isForcedLandscape = true;
      } else {
        appWrapper.classList.remove('forced-landscape');
        appWrapper.style.transform = 'none';
        isForcedLandscape = false;
      }
      hideRotatePopup();
    });

    // ── Init ──
    // ✅ Paste your full SECTIONS array back (from your message) and paste your STL_B64 string above.
    // Then delete these two lines:
    if(!SECTIONS.length) console.warn("Paste your full SECTIONS array and STL_B64 string to make this fully working.");
    renderSections();
    initBottomNav();

  })();
  </script>
</body>
