<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Hardcore NFC Keychain • PrintByDD</title>

  <!-- Three.js (non-module, stable) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root{
      --bg:#050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text:#fdfdfd;
      --text-muted: rgba(242, 242, 242, 0.65);
      --accent:#e82828;
      --accent-glow: rgba(232, 40, 40, 0.15);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      --radius: 24px;
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);
      --maxw: 860px;
      --header-height: 60px;
    }

    *{ box-sizing:border-box; }
    html, body{
      height:100%; height:100dvh; margin:0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden; overscroll-behavior-y:none;
      -webkit-font-smoothing: antialiased;
    }

    /* ✅ disable selection like your screenshot */
    body, .card, .top, .site-header, .bottom-nav, .pill, .back {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    a{ color:inherit; text-decoration:none; }
    button{ background:none; border:none; color:inherit; font:inherit; cursor:pointer; -webkit-tap-highlight-color: transparent; }

    /* ===== Site Header ===== */
    .site-header{
      position:absolute; top:0; left:0; right:0;
      height: var(--header-height);
      background: rgba(5,5,5,0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center; justify-content:space-between;
      padding: 0 max(20px, env(safe-area-inset-right)) 0 max(20px, env(safe-area-inset-left));
      z-index:1000;
    }
    .site-header .logo{ color:var(--accent); font-size:18px; font-weight:900; letter-spacing:-0.02em; }

    .nav-container { display: flex; align-items: center; gap: 20px; }
    .site-header nav{ display:flex; gap:20px; align-items:center; }
    .site-header nav a{ color:var(--text-muted); font-weight:600; font-size:14px; transition:color 0.2s; }
    .site-header nav a:hover, .site-header nav a.active{ color:var(--text); }

    .nav-insta{
      display:inline-flex; align-items:center; gap:5px;
      padding: 5px 11px; border-radius:999px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size:12px !important; font-weight:800 !important;
      background: linear-gradient(135deg,rgba(240,148,51,0.12),rgba(188,24,136,0.12));
      transition: all 0.2s;
      white-space:nowrap;
    }
    .nav-insta:hover{ border-color: rgba(220,39,67,0.5); background: linear-gradient(135deg,rgba(240,148,51,0.2),rgba(188,24,136,0.2)); }
    .nav-insta span{
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    /* Invert theme (keeps your method) */
    body.invert-mode .site-header{ filter:invert(1) hue-rotate(180deg); }
    body.invert-mode #appWrapper, body.invert-mode #translationToast, body.invert-mode #rotatePopup{ filter:invert(1) hue-rotate(180deg); }
    body.invert-mode img, body.invert-mode video, body.invert-mode canvas{ filter:invert(1) hue-rotate(180deg); }

    #appWrapper{ position:relative; width:100vw; height:100dvh; transform-origin:center center; transition:transform 0.4s cubic-bezier(0.25,1,0.5,1); overflow:hidden; }
    #appWrapper.forced-landscape{ width:100dvh; height:100vw; position:absolute; top:50%; left:50%; margin-top:-50vw; margin-left:-50dvh; }

    .bg-glow{ position:absolute; inset:0; pointer-events:none; background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%), radial-gradient(circle at 85% 100%, rgba(255,255,255,0.03), transparent 60%); z-index:0; }

    .top{ position:absolute; top:var(--header-height); left:0; right:0; padding:calc(16px + var(--safeTop)) calc(16px + var(--safeRight)) 16px calc(16px + var(--safeLeft)); z-index:50; display:flex; align-items:center; justify-content:space-between; gap:12px; pointer-events:none; background:linear-gradient(180deg,rgba(5,5,5,0.95) 0%,rgba(5,5,5,0) 100%); }
    .top > *{ pointer-events:auto; }
    .top-actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

    .back, .pill, .btn-icon{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 16px; border-radius:999px; border:1px solid rgba(255,255,255,0.08); background:rgba(15,15,15,0.65); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); transition:all 0.2s ease; }
    .btn-icon{ padding:10px; font-weight:900; color:var(--accent); width:38px; height:38px; }
    .btn-icon:active, .back:active{ transform:scale(0.96); }
    .back{ color:rgba(255,255,255,0.92); font-weight:700; font-size:14px; cursor: pointer;}
    .pill{ font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); white-space:nowrap; }
    .pill b{ color:#fff; letter-spacing:0.1em; font-weight:900; }

    .scroll-container{ position:absolute; top:var(--header-height); bottom:0; left:0; right:0; overflow-y:auto; overflow-x:hidden; scroll-snap-type:y mandatory; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; z-index:10; }
    .scroll-container::-webkit-scrollbar{ display:none; }

    .section-wrapper{ height:100%; width:100%; scroll-snap-align:start; scroll-snap-stop:always; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:calc(90px + var(--safeTop)) calc(16px + var(--safeRight)) calc(120px + var(--safeBottom)) calc(16px + var(--safeLeft)); position:relative; }

    .card{ width:100%; max-width:var(--maxw); flex:1; min-height:0; border-radius:var(--radius); border:1px solid var(--card-border); background:var(--card-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); box-shadow:var(--shadow); display:flex; flex-direction:column; overflow:hidden; opacity:0.3; transform:scale(0.92) translateY(30px); transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1); }
    .section-wrapper.is-active .card{ opacity:1; transform:scale(1) translateY(0); }

    .cardHeader{ padding:24px 24px 20px; border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(0,0,0,0.3); flex-shrink:0; }
    .kicker{ font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; font-weight:900; }
    .h1{ margin:0; font-size:clamp(22px,5vw,28px); line-height:1.3; letter-spacing:-0.01em; font-weight:900; }
    .cardBody{ padding:24px; overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; }

    .big{ font-size:clamp(28px,6vw,46px); line-height:1.12; font-weight:950; letter-spacing:-0.03em; margin:0 0 18px; }
    .big .r, .r{ background:linear-gradient(135deg,#ff5555,#e82828); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .lead{ font-size:17px; line-height:1.65; color:rgba(255,255,255,0.85); margin:0 0 16px; }
    .qt{ margin:18px 0 10px; padding:14px 18px; border-left:3px solid var(--accent); background:linear-gradient(90deg,var(--accent-glow),transparent); border-radius:0 12px 12px 0; color:rgba(255,255,255,0.95); line-height:1.65; font-size:15px; font-style:italic; }

    .ul{ margin:14px 0; padding:0; list-style:none; color:rgba(255,255,255,0.75); font-size:15px; line-height:1.65; }
    .ul li{ position:relative; padding-left:22px; margin:10px 0; }
    .ul li::before{ content:'→'; position:absolute; left:0; color:var(--accent); font-weight:900; }

    /* STL viewer */
    .stl-viewer-wrap{
      position:relative;
      width:100%;
      height: 260px;
      min-height: 260px;
      max-height: 260px;
      border-radius:16px; overflow:hidden;
      border:1px solid rgba(255,255,255,0.1);
      background:#0a0a0a; margin-bottom:14px;
      touch-action:none;
    }
    .stl-viewer-wrap canvas{ display:block; width:100%!important; height:100%!important; }

    .stl-loading{
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:0.1em; text-transform:uppercase;
      pointer-events:none; background:#0a0a0a; transition:opacity 0.4s; padding:16px; text-align:center; z-index: 5;
      white-space: pre-line;
    }
    .stl-loading.hidden{ opacity:0; pointer-events:none; }
    .stl-hint{ position:absolute; bottom:10px; left:50%; transform:translateX(-50%); font-size:10px; color:rgba(255,255,255,0.25); letter-spacing:0.08em; text-transform:uppercase; white-space:nowrap; pointer-events:none; z-index: 5; }

    /* Color pickers */
    .stl-color-panel{ margin-top:8px; padding:12px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.22); }
    .stl-color-title{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.45); font-weight:900; margin:0 0 8px; }
    .stl-color-row{ display:flex; gap:10px; justify-content:flex-start; flex-wrap:wrap; margin:8px 0 0; }
    .stl-color-btn{ display:flex; flex-direction:row; align-items:center; gap:10px; padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.35); transition:all 0.2s; font-size:12px; font-weight:800; color:rgba(255,255,255,0.7); min-width:108px; }
    .stl-color-btn:active{ transform:scale(0.97); }
    .stl-color-btn.active{ border-color:var(--accent); background:var(--accent-glow); color:#fff; }
    .stl-swatch{ width:22px; height:22px; border-radius:50%; border:2px solid rgba(255,255,255,0.15); flex-shrink:0; }

    .btn-submit, .btn-secondary{
      border:none; padding:16px; border-radius:12px; font-weight:900; font-size:15px;
      transition:transform .2s,filter .2s; display:flex; justify-content:center; align-items:center; gap:8px; width:100%;
    }
    .btn-submit{ background:var(--accent); color:#fff; }
    .btn-secondary{ background:rgba(255,255,255,0.06); color:#fff; border:1px solid rgba(255,255,255,0.16); }
    .btn-submit:active, .btn-secondary:active{ transform:scale(0.98); filter:brightness(1.08); }

    /* Hint */
    .hint{ position:absolute; bottom:calc(16px + var(--safeBottom)); left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:6px; color:rgba(255,255,255,0.4); font-size:11px; text-transform:uppercase; letter-spacing:0.1em; pointer-events:none; animation:pulse 2s infinite; z-index:100; }
    .hint svg{ width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2.5; }
    @keyframes pulse{ 0%,100%{transform:translateX(-50%) translateY(0);opacity:0.6} 50%{transform:translateX(-50%) translateY(5px);opacity:1} }
    .section-wrapper:last-child .hint{ display:none; }

    /* Overlays */
    .rotate-popup{ position:fixed; bottom:80px; left:50%; transform:translateX(-50%) scale(0.9); background:var(--accent); color:#fff; padding:12px 24px; border-radius:999px; font-size:14px; font-weight:900; display:flex; align-items:center; gap:10px; box-shadow:0 12px 30px rgba(232,40,40,0.4); opacity:0; pointer-events:none; transition:all 0.3s cubic-bezier(0.16,1,0.3,1); z-index:9999; }
    .rotate-popup.is-visible{ opacity:1; pointer-events:auto; transform:translateX(-50%) scale(1); }
    .translate-toast{ position:fixed; top:calc(80px + var(--safeTop)); left:50%; transform:translateX(-50%) translateY(-20px); background:rgba(20,20,22,0.95); border:1px solid rgba(255,255,255,0.15); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); color:#fff; padding:10px 16px 10px 20px; border-radius:999px; font-size:14px; display:flex; align-items:center; gap:16px; box-shadow:0 16px 40px rgba(0,0,0,0.5); opacity:0; pointer-events:none; transition:all 0.3s cubic-bezier(0.16,1,0.3,1); z-index:9999; }
    .translate-toast.is-visible{ opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
    .btn-undo{ color:var(--accent); font-weight:900; text-transform:uppercase; font-size:12px; letter-spacing:0.05em; padding:6px 12px; background:rgba(232,40,40,0.15); border-radius:999px; }

    /* Bottom Nav */
    .bottom-nav{ position:fixed; left:max(10px,var(--safeLeft)); right:max(10px,var(--safeRight)); bottom:calc(10px + var(--safeBottom)); height:64px; display:flex; align-items:center; gap:10px; padding:10px; border-radius:18px; border:1px solid rgba(255,255,255,0.10); background:rgba(10,10,12,0.78); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); box-shadow:0 18px 60px rgba(0,0,0,0.55); z-index:1200; }
    .bn-btn{ width:44px; height:44px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.92); font-weight:950; display:flex; align-items:center; justify-content:center; transition:transform .2s,opacity .2s; flex-shrink:0; }
    .bn-btn:active{ transform:scale(0.96); }
    .bn-btn:disabled{ opacity:0.35; pointer-events:none; }
    .bn-dots{ flex:1; display:flex; gap:8px; align-items:center; justify-content:center; min-width:0; overflow:hidden; }
    .bn-dot{ width:8px; height:8px; border-radius:999px; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.10); transition:background .2s,border-color .2s,width .2s; flex-shrink:0; }
    .bn-dot.active{ width:22px; background:var(--accent); border-color:rgba(232,40,40,0.7); }
    .bn-cta{ height:44px; padding:0 16px; border-radius:14px; border:none; background:linear-gradient(135deg,#ff4444,#b80000); color:#fff; font-weight:950; letter-spacing:-0.01em; display:flex; align-items:center; gap:10px; box-shadow:0 10px 26px rgba(232,40,40,0.45); transition:transform .2s,filter .2s; white-space:nowrap; flex-shrink:0; }
    .bn-cta:active{ transform:scale(0.97); filter:brightness(1.06); }
    .bn-cta .bn-tag{ font-size:12px; padding:4px 10px; border-radius:999px; background:rgba(255,255,255,0.18); }

    @media (max-width: 600px) {
      .site-header nav { display: none; }
      .nav-container { justify-content: flex-end; width: 100%; }
    }
  </style>
</head>

<body>
  <div id="appWrapper">
    <div class="bg-glow"></div>

    <header class="site-header">
      <a href="/printbydd-store" class="logo">PrintByDD</a>
      <div class="nav-container">
        <nav>
          <a href="/printbydd-store">Home</a>
          <a href="#" class="active">Products</a>
          <a href="/gifts-that-mean-more">Blog</a>
        </nav>
        <a href="https://www.instagram.com/printbydd?igsh=a2Z3cDFwNG1wYm5n" target="_blank" rel="noopener" class="nav-insta">
          <span>@printbydd</span>
        </a>
      </div>
    </header>

    <div class="top">
      <a class="back" href="/printbydd-store" id="backBtn">← Back</a>
      <div class="top-actions">
        <button id="btnTheme" class="btn-icon" aria-label="Toggle theme" title="Toggle theme">☾</button>
        <button id="btnTranslate" class="btn-icon" aria-label="Translate">A/अ</button>
        <div class="pill"><b id="secLabel">SEC 1/4</b> • <span id="secName">INTRO</span></div>
      </div>
    </div>

    <main class="scroll-container" id="scrollContainer"></main>

    <div class="bottom-nav" id="bottomNav">
      <button class="bn-btn" id="bnPrev" type="button" aria-label="Previous">←</button>
      <div class="bn-dots" id="bnDots"></div>
      <button class="bn-btn" id="bnNext" type="button" aria-label="Next">→</button>
      <button class="bn-cta" id="bnCta" type="button">
        <span id="bnCtaText">Order</span>
        <span class="bn-tag" id="bnCtaTag">Now</span>
      </button>
    </div>
  </div>

  <div id="translationToast" class="translate-toast">
    <span id="toastMsg">Translated to Hindi</span>
    <button id="btnUndoTranslate" class="btn-undo">Undo</button>
  </div>
  <div id="rotatePopup" class="rotate-popup"></div>

  <script>
  (function(){
    "use strict";

    // ====== CONFIG ======
    const WA_NUMBER = "916351537770"; // ✅ your number (no + in wa.me)
    const STL_URL = "./keychain.stl"; // ✅ same folder

    // Theme (invert)
    const THEME_KEY = "PBD_INVERT_THEME";
    const btnTheme = document.getElementById("btnTheme");
    function setInvert(on){
      document.body.classList.toggle("invert-mode", !!on);
      btnTheme.textContent = on ? "☀" : "☾";
      try{ localStorage.setItem(THEME_KEY, on ? "1" : "0"); }catch(e){}
    }
    (function(){ let s="0"; try{ s=localStorage.getItem(THEME_KEY)||"0"; }catch(e){} setInvert(s==="1"); })();
    btnTheme.addEventListener("click", () => setInvert(!document.body.classList.contains("invert-mode")));

    // ====== STL Parsing ======
    function parseBinarySTL(buf){
      const v = new DataView(buf);
      const n = v.getUint32(80,true);
      const pos = [], nor = [];
      let o = 84;
      for(let i=0;i<n;i++){
        const nx=v.getFloat32(o,true), ny=v.getFloat32(o+4,true), nz=v.getFloat32(o+8,true); o+=12;
        for(let j=0;j<3;j++){
          pos.push(v.getFloat32(o,true),v.getFloat32(o+4,true),v.getFloat32(o+8,true));
          nor.push(nx,ny,nz);
          o+=12;
        }
        o+=2;
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
      g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
      return g;
    }

    function parseAsciiSTL(txt){
      const pos=[], nor=[];
      let cn=[0,0,1], tri=[];
      for(const raw of txt.split(/\r?\n/)){
        const l=raw.trim();
        if(!l) continue;
        if(l.startsWith("facet normal")){
          const p=l.split(/\s+/);
          cn=[parseFloat(p[2]),parseFloat(p[3]),parseFloat(p[4])];
        } else if(l.startsWith("vertex")){
          const p=l.split(/\s+/);
          tri.push([parseFloat(p[1]),parseFloat(p[2]),parseFloat(p[3])]);
          if(tri.length===3){
            for(const vv of tri){
              pos.push(vv[0],vv[1],vv[2]);
              nor.push(cn[0],cn[1],cn[2]);
            }
            tri=[];
          }
        }
      }
      const g=new THREE.BufferGeometry();
      g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
      g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
      return g;
    }

    async function loadSTLGeometry(){
      const res = await fetch(STL_URL, { cache:"no-store" });
      if(!res.ok) throw new Error("STL not reachable ("+res.status+")");
      const buf = await res.arrayBuffer();
      const head = new TextDecoder('utf-8',{fatal:false}).decode(new Uint8Array(buf.slice(0,256)));
      const isAscii = head.trimStart().toLowerCase().startsWith("solid") && head.toLowerCase().includes("facet");
      return isAscii ? parseAsciiSTL(new TextDecoder().decode(new Uint8Array(buf))) : parseBinarySTL(buf);
    }

    function buildGeo(ps, ns){
      const g=new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.Float32BufferAttribute(ps, 3));
      g.setAttribute('normal',   new THREE.Float32BufferAttribute(ns, 3));
      return g;
    }

    // ====== Color State ======
    const BODY_COLORS = { black:0x111111, white:0xf0f0f0, blue:0x1a6bd1, sand:0xd8c7a6 };
    const ACC_COLORS  = { red:0xe82828, black:0x111111, white:0xf0f0f0, green:0x22c55e };
    const COLOR_STORAGE_KEY = "PBD_KEYCHAIN_COLORS_V2";

    let currentBodyKey="black", currentAccKey="red";
    try{
      const s = JSON.parse(localStorage.getItem(COLOR_STORAGE_KEY)||"{}");
      if(s.body && BODY_COLORS[s.body]) currentBodyKey=s.body;
      if(s.acc  && ACC_COLORS[s.acc])  currentAccKey=s.acc;
    }catch(e){}

    function persistColors(){
      try{ localStorage.setItem(COLOR_STORAGE_KEY, JSON.stringify({ body: currentBodyKey, acc: currentAccKey })); }catch(e){}
    }

    function syncColorUI(){
      document.querySelectorAll('[data-body-btn]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-body-btn')===currentBodyKey));
      document.querySelectorAll('[data-acc-btn]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-acc-btn')===currentAccKey));
      const bl=document.getElementById("bodyLbl"), al=document.getElementById("accLbl");
      if(bl) bl.textContent=currentBodyKey.toUpperCase();
      if(al) al.textContent=currentAccKey.toUpperCase();
    }

    // ====== 3D Viewer ======
    let renderer=null, scene=null, camera=null;
    let meshBody=null, meshAcc=null, group=null;
    let inited=false, pointerDown=false, lastX=0, lastY=0;
    let autoRotate=true;

    function applyColors(){
      if(meshBody && meshBody.material) meshBody.material.color.setHex(BODY_COLORS[currentBodyKey]);
      if(meshAcc  && meshAcc.material)  meshAcc.material.color.setHex(ACC_COLORS[currentAccKey]);
      persistColors();
      syncColorUI();
    }

    window.setBodyColor = function(key, btn){
      if(!BODY_COLORS[key]) return;
      currentBodyKey = key;
      applyColors();
      if(btn){ document.querySelectorAll('[data-body-btn]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
    };

    window.setAccColor = function(key, btn){
      if(!ACC_COLORS[key]) return;
      currentAccKey = key;
      applyColors();
      if(btn){ document.querySelectorAll('[data-acc-btn]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
    };

    // ✅ THIS is the fix:
    // Accent = (top Z band) OR (outer radial band) => captures ARM + RING.
    function splitBodyVsAccent(geo){
      geo.computeBoundingBox();
      const bbox = geo.boundingBox;

      // Keep copy of extents BEFORE centering for consistent thresholds
      const zRange = bbox.max.z - bbox.min.z;
      const xRange = bbox.max.x - bbox.min.x;
      const yRange = bbox.max.y - bbox.min.y;

      // Center now (so it rotates nicely)
      geo.center();

      // radial max (approx)
      const maxRadius = Math.max(xRange, yRange) * 0.5;

      // Thresholds
      const zThreshold = (zRange * 0.5) * 0.35;   // top Z band (arm zone)
      const rThreshold = maxRadius * 0.82;        // outer ring zone

      const pa = geo.getAttribute('position');
      const na = geo.getAttribute('normal');

      const bp=[], bn=[], ap=[], an=[];

      for(let i=0; i<pa.count; i+=3){
        // triangle vertices
        const x0=pa.array[i*3],   y0=pa.array[i*3+1],   z0=pa.array[i*3+2];
        const x1=pa.array[(i+1)*3], y1=pa.array[(i+1)*3+1], z1=pa.array[(i+1)*3+2];
        const x2=pa.array[(i+2)*3], y2=pa.array[(i+2)*3+1], z2=pa.array[(i+2)*3+2];

        const avgZ = (z0+z1+z2)/3;
        const r0=Math.hypot(x0,y0), r1=Math.hypot(x1,y1), r2=Math.hypot(x2,y2);
        const avgR = (r0+r1+r2)/3;

        const tp = [x0,y0,z0, x1,y1,z1, x2,y2,z2];
        const tn = [
          na.array[i*3],na.array[i*3+1],na.array[i*3+2],
          na.array[(i+1)*3],na.array[(i+1)*3+1],na.array[(i+1)*3+2],
          na.array[(i+2)*3],na.array[(i+2)*3+1],na.array[(i+2)*3+2]
        ];

        // Accent rule (Arm OR Ring)
        const isAccent = (avgZ > zThreshold) || (avgR > rThreshold);

        if(isAccent){ ap.push(...tp); an.push(...tn); }
        else        { bp.push(...tp); bn.push(...tn); }
      }

      // fallback safety
      if(ap.length === 0){
        // if thresholds too strict, just make everything body and avoid empty mesh
        return { body: geo, accent: null };
      }

      return {
        body: buildGeo(bp,bn),
        accent: buildGeo(ap,an)
      };
    }

    window.initSTLViewer = async function(){
      if(inited) return;
      inited = true;

      const wrap    = document.getElementById('stl-viewer-wrap');
      const canvas  = document.getElementById('stl-canvas');
      const loading = document.getElementById('stl-loading');
      if(!wrap || !canvas) return;

      const W = wrap.clientWidth || 320;
      const H = 260;

      renderer = new THREE.WebGLRenderer({canvas, antialias:true, alpha:true});
      renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 2));
      renderer.setSize(W, H, false);

      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 1000);
      camera.position.set(0, 0, 4);

      scene.add(new THREE.AmbientLight(0xffffff, 0.75));
      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(2, 3, 2);
      scene.add(dir);
      const dir2 = new THREE.DirectionalLight(0xffffff, 0.4);
      dir2.position.set(-2, -1, -2);
      scene.add(dir2);

      group = new THREE.Group();
      scene.add(group);

      try{
        const geo = await loadSTLGeometry();
        const parts = splitBodyVsAccent(geo);

        // Materials
        const bodyMat = new THREE.MeshStandardMaterial({ color: BODY_COLORS[currentBodyKey], roughness:0.62, metalness:0.08 });
        const accMat  = new THREE.MeshStandardMaterial({ color: ACC_COLORS[currentAccKey],  roughness:0.56, metalness:0.08 });

        meshBody = new THREE.Mesh(parts.body, bodyMat);
        group.add(meshBody);

        if(parts.accent){
          meshAcc = new THREE.Mesh(parts.accent, accMat);
          group.add(meshAcc);
        } else {
          meshAcc = null;
        }

        // Orientation
        group.rotation.x = -0.2;
        group.rotation.y =  0.9;

        // Fit scale
        const box = new THREE.Box3().setFromObject(group);
        const sz = new THREE.Vector3();
        box.getSize(sz);
        const maxDim = Math.max(sz.x, sz.y, sz.z) || 1;
        group.scale.setScalar(2.2 / maxDim);

        if(loading) loading.classList.add('hidden');

        // Input
        function onDown(e){
          pointerDown = true; autoRotate = false;
          const t = e.touches ? e.touches[0] : e;
          lastX = t.clientX; lastY = t.clientY;
        }
        function onMove(e){
          if(!pointerDown) return;
          const t = e.touches ? e.touches[0] : e;
          group.rotation.y += (t.clientX - lastX) * 0.01;
          group.rotation.x += (t.clientY - lastY) * 0.01;
          lastX = t.clientX; lastY = t.clientY;
        }
        function onUp(){ pointerDown = false; }

        wrap.addEventListener('pointerdown', onDown);
        wrap.addEventListener('pointermove', onMove);
        window.addEventListener('pointerup', onUp);
        wrap.addEventListener('touchstart', onDown, {passive:true});
        wrap.addEventListener('touchmove',  onMove, {passive:true});
        wrap.addEventListener('touchend',   onUp,   {passive:true});

        window.addEventListener('resize', ()=>{
          const w = wrap.clientWidth || 320, h = 260;
          renderer.setSize(w, h, false);
          camera.aspect = w / h;
          camera.updateProjectionMatrix();
        });

        // Render loop
        (function animate(){
          requestAnimationFrame(animate);
          if(autoRotate) group.rotation.y += 0.004;
          renderer.render(scene, camera);
        })();

        applyColors();

      } catch(err){
        if(loading){
          loading.style.fontSize = "12px";
          loading.textContent =
            "3D preview unavailable.\n" +
            "Tip: open via a local server (not file://).\n\n" +
            (err && err.message ? err.message : "Unknown error");
        }
        console.error("STL viewer error:", err);
      }
    };

    // ====== Page Sections ======
    const SECTIONS = [
      {
        name:"INTRO", kicker:"HARDCORE NFC KEYCHAIN",
        title:{ en:"Not a Keychain. A One-Tap Identity.", hi:"सिर्फ Keychain नहीं। One-Tap पहचान।" },
        html:{
          en:()=>`
            <p class="big">Your <span class="r">digital card</span> — on your keys.</p>
            <p class="lead">Tap it on any phone. Your links, portfolio, socials, UPI, menu, Wi-Fi — whatever you want. No app. No friction.</p>
            <div class="qt">One tap. One impression. <b>Forever.</b></div>
            <ul class="ul">
              <li>Works with Android + iPhone (NFC enabled)</li>
              <li>Rewritable. Update anytime.</li>
              <li>Built for daily carry.</li>
            </ul>
          `,
          hi:()=>`
            <p class="big">आपकी <span class="r">digital card</span> — keys पर।</p>
            <p class="lead">किसी भी phone पर tap करें। Links, portfolio, socials, UPI, menu, Wi-Fi — जो चाहो। No app.</p>
            <div class="qt">एक tap. एक impression. <b>हमेशा।</b></div>
          `
        }
      },
      {
        name:"PREVIEW", kicker:"PICK COLORS",
        title:{ en:"Arm + Ring Color (Fixed)", hi:"Arm + Ring Color (Fixed)" },
        html:{
          en:()=>`
            <div id="stl-viewer-wrap" class="stl-viewer-wrap">
              <canvas id="stl-canvas"></canvas>
              <div class="stl-loading" id="stl-loading">Loading 3D Model…</div>
              <div class="stl-hint">Drag to rotate</div>
            </div>

            <div class="qt" style="margin-top:6px;">
              Body: <b id="bodyLbl">${currentBodyKey.toUpperCase()}</b> • Accent (Arm + Ring): <b id="accLbl">${currentAccKey.toUpperCase()}</b>
            </div>

            <div class="stl-color-panel">
              <div class="stl-color-title">Body</div>
              <div class="stl-color-row">
                <button class="stl-color-btn" data-body-btn="black" onclick="setBodyColor('black',this)"><span class="stl-swatch" style="background:#111;"></span> Black</button>
                <button class="stl-color-btn" data-body-btn="white" onclick="setBodyColor('white',this)"><span class="stl-swatch" style="background:#f0f0f0;"></span> White</button>
                <button class="stl-color-btn" data-body-btn="blue"  onclick="setBodyColor('blue',this)"><span class="stl-swatch" style="background:#1a6bd1;"></span> Blue</button>
                <button class="stl-color-btn" data-body-btn="sand"  onclick="setBodyColor('sand',this)"><span class="stl-swatch" style="background:#d8c7a6;"></span> Sand</button>
              </div>

              <div class="stl-color-title" style="margin-top:12px;">Accent (Arm + Ring)</div>
              <div class="stl-color-row">
                <button class="stl-color-btn" data-acc-btn="red"   onclick="setAccColor('red',this)"><span class="stl-swatch" style="background:#e82828;"></span> Red</button>
                <button class="stl-color-btn" data-acc-btn="black" onclick="setAccColor('black',this)"><span class="stl-swatch" style="background:#111;"></span> Black</button>
                <button class="stl-color-btn" data-acc-btn="white" onclick="setAccColor('white',this)"><span class="stl-swatch" style="background:#f0f0f0;"></span> White</button>
                <button class="stl-color-btn" data-acc-btn="green" onclick="setAccColor('green',this)"><span class="stl-swatch" style="background:#22c55e;"></span> Green</button>
              </div>
            </div>
          `,
          hi:()=>`
            <p class="lead">3D model देखें, rotate करें, और colors चुनें।</p>
          `
        }
      },
      {
        name:"ORDER", kicker:"ORDER",
        title:{ en:"Order on WhatsApp", hi:"WhatsApp पर ऑर्डर करें" },
        html:{
          en:()=>`
            <p class="lead">Tap to order. We’ll confirm details on WhatsApp.</p>
            <button class="btn-submit" onclick="orderOnWA()">Order via WhatsApp →</button>
            <p style="margin-top:12px;font-size:12px;color:rgba(255,255,255,0.35);line-height:1.6;">
              If WhatsApp doesn’t open: save this number <b>+91 63515 37770</b>
            </p>
          `,
          hi:()=>`
            <p class="lead">ऑर्डर करने के लिए WhatsApp खोलें।</p>
            <button class="btn-submit" onclick="orderOnWA()">WhatsApp पर ऑर्डर करें →</button>
          `
        }
      },
      {
        name:"CLOSE", kicker:"DONE",
        title:{ en:"One Tap. One Identity.", hi:"One Tap. One Identity." },
        html:{
          en:()=>`
            <p class="big">Make people <span class="r">remember</span> you.</p>
            <p class="lead">This is the cleanest way to share who you are — instantly.</p>
            <button class="btn-secondary" onclick="scrollToSectionByName('PREVIEW')">Back to 3D Preview</button>
          `,
          hi:()=>`
            <p class="big">लोग आपको <span class="r">याद</span> रखें।</p>
            <button class="btn-secondary" onclick="scrollToSectionByName('PREVIEW')">3D Preview</button>
          `
        }
      }
    ];

    function orderOnWA(){
      const text = `Hi! I want to order the NFC Keychain.\n\nBody: ${currentBodyKey}\nAccent (Arm+Ring): ${currentAccKey}\n\nPlease share price + delivery.`;
      window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(text)}`, "_blank");
    }
    window.orderOnWA = orderOnWA;

    // ====== Scroll UI ======
    const container=document.getElementById('scrollContainer');
    const secLabel=document.getElementById('secLabel');
    const secName=document.getElementById('secName');
    const bnPrev=document.getElementById('bnPrev');
    const bnNext=document.getElementById('bnNext');
    const bnDots=document.getElementById('bnDots');
    const bnCta=document.getElementById('bnCta');
    const bnCtaText=document.getElementById('bnCtaText');
    const bnCtaTag=document.getElementById('bnCtaTag');

    let currentLang='en';
    let currentSecIndex=0;

    function scrollToIndex(i){
      i=Math.max(0,Math.min(SECTIONS.length-1,i));
      const el=container.querySelector(`.section-wrapper[data-index="${i}"]`);
      if(el) el.scrollIntoView({behavior:"smooth",block:"start"});
    }
    window.scrollToSectionByName = function(name){
      const idx=SECTIONS.findIndex(s=>s.name===name);
      if(idx>=0) scrollToIndex(idx);
    };

    function buildBottomDots(){
      bnDots.innerHTML='';
      for(let i=0;i<SECTIONS.length;i++){
        const d=document.createElement('button');
        d.type='button';
        d.className='bn-dot';
        d.addEventListener('click',()=>scrollToIndex(i));
        bnDots.appendChild(d);
      }
    }

    function updateBottomNav(){
      bnPrev.disabled = currentSecIndex<=0;
      bnNext.disabled = currentSecIndex>=SECTIONS.length-1;
      bnDots.querySelectorAll('.bn-dot').forEach((d,i)=>d.classList.toggle('active',i===currentSecIndex));

      // CTA logic
      const orderIdx = SECTIONS.findIndex(s=>s.name==="ORDER");
      if(currentSecIndex === orderIdx){
        bnCtaText.textContent="Order";
        bnCtaTag.textContent="Now";
      } else {
        bnCtaText.textContent="Go to";
        bnCtaTag.textContent="Order";
      }
    }

    const observer=new IntersectionObserver(entries=>{
      entries.forEach(entry=>{
        if(entry.isIntersecting){
          entry.target.classList.add('is-active');
          const idx=parseInt(entry.target.getAttribute('data-index'),10);
          currentSecIndex = isNaN(idx) ? 0 : idx;

          secLabel.textContent=`SEC ${currentSecIndex+1}/${SECTIONS.length}`;
          secName.textContent=entry.target.getAttribute('data-name');
          updateBottomNav();

          // init 3D when preview section appears
          if(entry.target.getAttribute('data-name') === "PREVIEW"){
            setTimeout(()=>{ window.initSTLViewer(); syncColorUI(); }, 120);
          }
        } else {
          entry.target.classList.remove('is-active');
        }
      });
    },{root:container,threshold:0.6});

    function renderSections(){
      container.innerHTML='';
      SECTIONS.forEach((sec,index)=>{
        const w=document.createElement('div');
        w.className='section-wrapper';
        w.setAttribute('data-index',index);
        w.setAttribute('data-name',sec.name);
        w.innerHTML=`
          <article class="card">
            <header class="cardHeader">
              <div class="kicker">${sec.kicker}</div>
              <h1 class="h1">${sec.title[currentLang]}</h1>
            </header>
            <div class="cardBody">
              ${sec.html[currentLang]()}
              <div style="height:85px;"></div>
            </div>
          </article>
          <div class="hint">
            <span>Scroll for more</span>
            <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
          </div>
        `;
        container.appendChild(w);
        observer.observe(w);
      });
      buildBottomDots();
      updateBottomNav();
      syncColorUI();
    }

    // Bottom nav events
    bnPrev.addEventListener('click',()=>scrollToIndex(currentSecIndex-1));
    bnNext.addEventListener('click',()=>scrollToIndex(currentSecIndex+1));
    bnCta.addEventListener('click',()=>{
      const orderIdx = SECTIONS.findIndex(s=>s.name==="ORDER");
      if(orderIdx >= 0) scrollToIndex(orderIdx);
    });

    // Translation toggle (kept minimal)
    const btnTranslate=document.getElementById('btnTranslate');
    const toast=document.getElementById('translationToast');
    const btnUndo=document.getElementById('btnUndoTranslate');
    const toastMsg=document.getElementById('toastMsg');
    let toastTimer;

    function triggerTranslation(lang){
      currentLang=lang;
      renderSections();
      toast.classList.add('is-visible');
      toastMsg.textContent = lang==='hi' ? "Translated to Hindi" : "Back to English";
      btnUndo.style.display = lang==='hi' ? 'block' : 'none';
      clearTimeout(toastTimer);
      toastTimer=setTimeout(()=>toast.classList.remove('is-visible'),2200);
    }

    btnTranslate.addEventListener('click',()=>triggerTranslation(currentLang==='en'?'hi':'en'));
    btnUndo.addEventListener('click',()=>triggerTranslation('en'));

    // rotate popup
    const popup=document.getElementById('rotatePopup');
    const appWrapper=document.getElementById('appWrapper');
    let isForcedLandscape=false, targetRotationAngle=0;
    window.addEventListener('deviceorientation',e=>{
      const g=e.gamma;
      if(g===null||typeof g==='undefined') return;
      if(!isForcedLandscape){
        if(g>45) showRotatePopup(90);
        else if(g<-45) showRotatePopup(-90);
        else hideRotatePopup();
      } else {
        if(Math.abs(g)<25) showRotatePopup(0);
        else hideRotatePopup();
      }
    });
    function showRotatePopup(a){
      targetRotationAngle=a;
      popup.classList.add('is-visible');
      popup.textContent = a===0 ? "Tap for Portrait" : "Tap for Landscape";
    }
    function hideRotatePopup(){ popup.classList.remove('is-visible'); }
    popup.addEventListener('click',()=>{
      if(targetRotationAngle!==0){
        appWrapper.classList.add('forced-landscape');
        appWrapper.style.transform=`rotate(${targetRotationAngle}deg)`;
        isForcedLandscape=true;
      } else {
        appWrapper.classList.remove('forced-landscape');
        appWrapper.style.transform='none';
        isForcedLandscape=false;
      }
      hideRotatePopup();
    });

    // initial render
    renderSections();

  })();
  </script>
</body>
</html>
