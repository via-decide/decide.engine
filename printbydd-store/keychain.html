<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Hardcore NFC Keychain • PrintByDD</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <style>
    :root{
      --bg:#050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text:#fdfdfd;
      --text-muted: rgba(242, 242, 242, 0.65);
      --accent:#e82828;
      --accent-glow: rgba(232, 40, 40, 0.15);
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      --radius: 24px;
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);
      --maxw: 860px;
      --header-height: 60px;
    }

    *{ box-sizing:border-box; }
    html, body{
      height:100%; height:100dvh; margin:0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden; overscroll-behavior-y:none;
      -webkit-font-smoothing: antialiased;
    }
    a{ color:inherit; text-decoration:none; }
    button{ background:none; border:none; color:inherit; font:inherit; cursor:pointer; -webkit-tap-highlight-color: transparent; }

    /* ===== Site Header ===== */
    .site-header{
      position:absolute; top:0; left:0; right:0;
      height: var(--header-height);
      background: rgba(5,5,5,0.85);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center; justify-content:space-between;
      padding: 0 max(20px, env(safe-area-inset-right)) 0 max(20px, env(safe-area-inset-left));
      z-index:1000;
    }
    .site-header .logo{ color:var(--accent); font-size:18px; font-weight:900; letter-spacing:-0.02em; }
    
    .nav-container { display: flex; align-items: center; gap: 20px; }
    .site-header nav{ display:flex; gap:20px; align-items:center; }
    .site-header nav a{ color:var(--text-muted); font-weight:600; font-size:14px; transition:color 0.2s; }
    .site-header nav a:hover, .site-header nav a.active{ color:var(--text); }

    /* Instagram nav pill - Fixed Glitch */
    .nav-insta{
      display:inline-flex; align-items:center; gap:5px;
      padding: 5px 11px; border-radius:999px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size:12px !important; font-weight:800 !important;
      background: linear-gradient(135deg,rgba(240,148,51,0.12),rgba(188,24,136,0.12));
      transition: all 0.2s;
      white-space:nowrap;
    }
    .nav-insta:hover{ border-color: rgba(220,39,67,0.5); background: linear-gradient(135deg,rgba(240,148,51,0.2),rgba(188,24,136,0.2)); }
    .nav-insta span{
      background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    body.invert-mode .site-header{ filter:invert(1) hue-rotate(180deg); }
    body.invert-mode #appWrapper, body.invert-mode #translationToast, body.invert-mode #rotatePopup{ filter:invert(1) hue-rotate(180deg); }
    body.invert-mode img, body.invert-mode video, body.invert-mode canvas{ filter:invert(1) hue-rotate(180deg); }

    #appWrapper{ position:relative; width:100vw; height:100dvh; transform-origin:center center; transition:transform 0.4s cubic-bezier(0.25,1,0.5,1); overflow:hidden; }
    #appWrapper.forced-landscape{ width:100dvh; height:100vw; position:absolute; top:50%; left:50%; margin-top:-50vw; margin-left:-50dvh; }

    .bg-glow{ position:absolute; inset:0; pointer-events:none; background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%), radial-gradient(circle at 85% 100%, rgba(255,255,255,0.03), transparent 60%); z-index:0; }

    .top{ position:absolute; top:var(--header-height); left:0; right:0; padding:calc(16px + var(--safeTop)) calc(16px + var(--safeRight)) 16px calc(16px + var(--safeLeft)); z-index:50; display:flex; align-items:center; justify-content:space-between; gap:12px; pointer-events:none; background:linear-gradient(180deg,rgba(5,5,5,0.95) 0%,rgba(5,5,5,0) 100%); }
    .top > *{ pointer-events:auto; }
    .top-actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

    .back, .pill, .btn-icon{ display:inline-flex; align-items:center; justify-content:center; gap:8px; padding:10px 16px; border-radius:999px; border:1px solid rgba(255,255,255,0.08); background:rgba(15,15,15,0.65); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); transition:all 0.2s ease; user-select:none; }
    .btn-icon{ padding:10px; font-weight:900; color:var(--accent); width:38px; height:38px; }
    .btn-icon:active, .back:active{ transform:scale(0.96); }
    .back{ color:rgba(255,255,255,0.92); font-weight:700; font-size:14px; }
    .pill{ font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-muted); white-space:nowrap; }
    .pill b{ color:#fff; letter-spacing:0.1em; font-weight:900; }

    .scroll-container{ position:absolute; top:var(--header-height); bottom:0; left:0; right:0; overflow-y:auto; overflow-x:hidden; scroll-snap-type:y mandatory; scroll-behavior:smooth; -webkit-overflow-scrolling:touch; z-index:10; }
    .scroll-container::-webkit-scrollbar{ display:none; }

    .section-wrapper{ height:100%; width:100%; scroll-snap-align:start; scroll-snap-stop:always; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:calc(90px + var(--safeTop)) calc(16px + var(--safeRight)) calc(120px + var(--safeBottom)) calc(16px + var(--safeLeft)); position:relative; }

    .card{ width:100%; max-width:var(--maxw); flex:1; min-height:0; border-radius:var(--radius); border:1px solid var(--card-border); background:var(--card-bg); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); box-shadow:var(--shadow); display:flex; flex-direction:column; overflow:hidden; opacity:0.3; transform:scale(0.92) translateY(30px); transition:opacity 0.7s cubic-bezier(0.16,1,0.3,1), transform 0.7s cubic-bezier(0.16,1,0.3,1); }
    .section-wrapper.is-active .card{ opacity:1; transform:scale(1) translateY(0); }

    .cardHeader{ padding:24px 24px 20px; border-bottom:1px solid rgba(255,255,255,0.06); background:rgba(0,0,0,0.3); flex-shrink:0; }
    .kicker{ font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--accent); margin-bottom:8px; font-weight:900; }
    .h1{ margin:0; font-size:clamp(22px,5vw,28px); line-height:1.3; letter-spacing:-0.01em; font-weight:900; }
    .cardBody{ padding:24px; overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; }

    .big{ font-size:clamp(28px,6vw,46px); line-height:1.12; font-weight:950; letter-spacing:-0.03em; margin:0 0 18px; }
    .big .r, .r{ background:linear-gradient(135deg,#ff5555,#e82828); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .lead{ font-size:17px; line-height:1.65; color:rgba(255,255,255,0.85); margin:0 0 16px; }
    .qt{ margin:18px 0 10px; padding:14px 18px; border-left:3px solid var(--accent); background:linear-gradient(90deg,var(--accent-glow),transparent); border-radius:0 12px 12px 0; color:rgba(255,255,255,0.95); line-height:1.65; font-size:15px; font-style:italic; }

    .usecases{ display:flex; flex-wrap:wrap; gap:8px; margin:16px 0; }
    .uc{ display:inline-flex; align-items:center; gap:6px; padding:8px 14px; border-radius:999px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.3); font-size:13px; font-weight:700; color:rgba(255,255,255,0.65); }
    .uc.active{ border-color:var(--accent); background:var(--accent-glow); color:#fff; }
    .uc-icon{ font-size:15px; }

    .steps{ display:flex; flex-direction:column; gap:16px; margin:16px 0; }
    .step{ display:flex; gap:14px; align-items:flex-start; }
    .step-num{ flex-shrink:0; width:32px; height:32px; border-radius:50%; background:var(--accent); color:#fff; font-weight:900; font-size:14px; display:flex; align-items:center; justify-content:center; }
    .step-title{ font-weight:900; font-size:15px; color:#fff; margin-bottom:4px; }
    .step-desc{ font-size:14px; color:rgba(255,255,255,0.7); line-height:1.6; }

    .ul{ margin:14px 0; padding:0; list-style:none; color:rgba(255,255,255,0.75); font-size:15px; line-height:1.65; }
    .ul li{ position:relative; padding-left:22px; margin:10px 0; }
    .ul li::before{ content:'→'; position:absolute; left:0; color:var(--accent); font-weight:900; }

    .sg{ display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
    .sn{ background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.08); border-radius:16px; padding:14px 10px; text-align:center; }
    .sv{ font-size:22px; font-weight:950; color:#fff; line-height:1.1; letter-spacing:-0.02em; }
    .slbl{ font-size:10px; text-transform:uppercase; letter-spacing:0.1em; color:rgba(255,255,255,0.45); margin-top:6px; }

    .cp{ display:flex; align-items:center; justify-content:center; border:none; border-radius:16px; background:linear-gradient(135deg,#ff4444,#cc0000); cursor:pointer; overflow:hidden; position:relative; box-shadow:0 8px 28px rgba(232,40,40,0.4); transition:transform .2s,filter .2s; min-height:54px; width:100%; padding:0; }
    .cp:active{ transform:scale(0.97); }
    .cpulse{ position:absolute; inset:0; background:rgba(255,255,255,0.15); animation:cpa 2s infinite; }
    @keyframes cpa{ 0%,100%{opacity:0} 50%{opacity:1} }
    .ci{ position:relative; z-index:1; display:flex; align-items:center; gap:8px; color:#fff; font-weight:900; font-size:15px; padding:0 24px; }
    .ca{ background:rgba(255,255,255,0.2); border-radius:8px; padding:4px 10px; font-size:14px; }

    .btn-submit, .btn-secondary{ border:none; padding:16px; border-radius:12px; font-weight:900; font-size:15px; transition:transform .2s,filter .2s; display:flex; justify-content:center; align-items:center; gap:8px; width:100%; }
    .btn-submit{ background:var(--accent); color:#fff; }
    .btn-secondary{ background:rgba(255,255,255,0.06); color:#fff; border:1px solid rgba(255,255,255,0.16); }
    .btn-submit:active, .btn-secondary:active{ transform:scale(0.98); filter:brightness(1.08); }

    /* Instagram CTA button */
    .btn-insta{
      border:none; padding:14px 16px; border-radius:12px;
      font-weight:900; font-size:14px;
      display:flex; justify-content:center; align-items:center; gap:10px; width:100%;
      background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color:#fff;
      box-shadow: 0 8px 24px rgba(220,39,67,0.35);
      transition:transform .2s,filter .2s;
      text-decoration:none;
      cursor:pointer;
    }
    .btn-insta:active{ transform:scale(0.98); filter:brightness(1.08); }

    .social-strip{
      display:flex; align-items:center; gap:8px;
      padding:10px 14px; border-radius:12px;
      border:1px solid rgba(255,255,255,0.07);
      background:rgba(255,255,255,0.03);
      margin-top:14px; font-size:13px; color:rgba(255,255,255,0.5);
    }
    .social-strip a{
      display:inline-flex; align-items:center; gap:5px; font-weight:800;
      background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      white-space:nowrap;
    }

    /* STL viewer - Fixed Placement */
    .stl-viewer-wrap{ 
      position:relative; 
      width:100%; 
      height: 260px; /* Force rigid height */
      min-height: 260px;
      max-height: 260px;
      border-radius:16px; overflow:hidden; 
      border:1px solid rgba(255,255,255,0.1); 
      background:#0a0a0a; margin-bottom:14px; 
      touch-action:none; 
    }
    .stl-viewer-wrap canvas{ display:block; width:100%!important; height:100%!important; object-fit: contain; }
    
    .stl-loading{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:13px; color:rgba(255,255,255,0.4); letter-spacing:0.1em; text-transform:uppercase; pointer-events:none; background:#0a0a0a; transition:opacity 0.4s; padding:16px; text-align:center; z-index: 5; }
    .stl-loading.hidden{ opacity:0; pointer-events:none; }
    .stl-hint{ position:absolute; bottom:10px; left:50%; transform:translateX(-50%); font-size:10px; color:rgba(255,255,255,0.25); letter-spacing:0.08em; text-transform:uppercase; white-space:nowrap; pointer-events:none; z-index: 5; }

    /* Color pickers */
    .stl-color-panel{ margin-top:8px; padding:12px; border-radius:16px; border:1px solid rgba(255,255,255,0.08); background:rgba(0,0,0,0.22); }
    .stl-color-title{ font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:rgba(255,255,255,0.45); font-weight:900; margin:0 0 8px; }
    .stl-color-row{ display:flex; gap:10px; justify-content:flex-start; flex-wrap:wrap; margin:8px 0 0; }
    .stl-color-btn{ display:flex; flex-direction:row; align-items:center; gap:10px; padding:10px 12px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:rgba(0,0,0,0.35); transition:all 0.2s; font-size:12px; font-weight:800; color:rgba(255,255,255,0.7); min-width:108px; }
    .stl-color-btn:active{ transform:scale(0.97); }
    .stl-color-btn.active{ border-color:var(--accent); background:var(--accent-glow); color:#fff; }
    .stl-swatch{ width:22px; height:22px; border-radius:50%; border:2px solid rgba(255,255,255,0.15); flex-shrink:0; }
    @media (max-width:420px){ .stl-color-btn{ min-width:46%; } }

    /* Auth */
    .auth-protocol{ background:rgba(232,40,40,0.06); border:1px dashed rgba(232,40,40,0.3); padding:16px; border-radius:12px; margin-bottom:18px; font-size:13px; line-height:1.6; color:var(--text-muted); }
    .auth-protocol b{ color:var(--text); }
    .auth-protocol .step-pill{ color:var(--accent); font-weight:900; margin-right:4px; }
    .onboard-form{ display:flex; flex-direction:column; gap:14px; }
    .row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    @media (max-width:520px){ .row{ grid-template-columns:1fr; } }
    .input-group{ display:flex; flex-direction:column; gap:8px; }
    .input-group label{ font-size:12px; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); font-weight:800; }
    .input-group input{ background:rgba(0,0,0,0.45); border:1px solid rgba(255,255,255,0.12); border-radius:12px; padding:14px 16px; color:#fff; font-family:inherit; font-size:15px; outline:none; transition:all 0.2s; appearance:none; }
    .input-group input::placeholder{ color:rgba(255,255,255,0.30); }
    .input-group input:focus{ border-color:var(--accent); background:rgba(0,0,0,0.62); box-shadow:0 0 0 3px var(--accent-glow); }

    /* Hint */
    .hint{ position:absolute; bottom:calc(16px + var(--safeBottom)); left:50%; transform:translateX(-50%); display:flex; flex-direction:column; align-items:center; gap:6px; color:rgba(255,255,255,0.4); font-size:11px; text-transform:uppercase; letter-spacing:0.1em; pointer-events:none; animation:pulse 2s infinite; z-index:100; }
    .hint svg{ width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2.5; }
    @keyframes pulse{ 0%,100%{transform:translateX(-50%) translateY(0);opacity:0.6} 50%{transform:translateX(-50%) translateY(5px);opacity:1} }
    .section-wrapper:last-child .hint{ display:none; }

    /* Overlays */
    .rotate-popup{ position:fixed; bottom:80px; left:50%; transform:translateX(-50%) scale(0.9); background:var(--accent); color:#fff; padding:12px 24px; border-radius:999px; font-size:14px; font-weight:900; display:flex; align-items:center; gap:10px; box-shadow:0 12px 30px rgba(232,40,40,0.4); opacity:0; pointer-events:none; transition:all 0.3s cubic-bezier(0.16,1,0.3,1); z-index:9999; }
    .rotate-popup.is-visible{ opacity:1; pointer-events:auto; transform:translateX(-50%) scale(1); }
    .translate-toast{ position:fixed; top:calc(80px + var(--safeTop)); left:50%; transform:translateX(-50%) translateY(-20px); background:rgba(20,20,22,0.95); border:1px solid rgba(255,255,255,0.15); backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); color:#fff; padding:10px 16px 10px 20px; border-radius:999px; font-size:14px; display:flex; align-items:center; gap:16px; box-shadow:0 16px 40px rgba(0,0,0,0.5); opacity:0; pointer-events:none; transition:all 0.3s cubic-bezier(0.16,1,0.3,1); z-index:9999; }
    .translate-toast.is-visible{ opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
    .btn-undo{ color:var(--accent); font-weight:900; text-transform:uppercase; font-size:12px; letter-spacing:0.05em; padding:6px 12px; background:rgba(232,40,40,0.15); border-radius:999px; }

    /* Bottom Nav */
    .bottom-nav{ position:fixed; left:max(10px,var(--safeLeft)); right:max(10px,var(--safeRight)); bottom:calc(10px + var(--safeBottom)); height:64px; display:flex; align-items:center; gap:10px; padding:10px; border-radius:18px; border:1px solid rgba(255,255,255,0.10); background:rgba(10,10,12,0.78); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); box-shadow:0 18px 60px rgba(0,0,0,0.55); z-index:1200; }
    .bn-btn{ width:44px; height:44px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.92); font-weight:950; display:flex; align-items:center; justify-content:center; transition:transform .2s,opacity .2s; flex-shrink:0; }
    .bn-btn:active{ transform:scale(0.96); }
    .bn-btn:disabled{ opacity:0.35; pointer-events:none; }
    .bn-dots{ flex:1; display:flex; gap:8px; align-items:center; justify-content:center; min-width:0; overflow:hidden; }
    .bn-dot{ width:8px; height:8px; border-radius:999px; border:1px solid rgba(255,255,255,0.18); background:rgba(255,255,255,0.10); transition:background .2s,border-color .2s,width .2s; flex-shrink:0; }
    .bn-dot.active{ width:22px; background:var(--accent); border-color:rgba(232,40,40,0.7); }
    .bn-cta{ height:44px; padding:0 16px; border-radius:14px; border:none; background:linear-gradient(135deg,#ff4444,#b80000); color:#fff; font-weight:950; letter-spacing:-0.01em; display:flex; align-items:center; gap:10px; box-shadow:0 10px 26px rgba(232,40,40,0.45); transition:transform .2s,filter .2s; white-space:nowrap; flex-shrink:0; }
    .bn-cta:active{ transform:scale(0.97); filter:brightness(1.06); }
    .bn-cta .bn-tag{ font-size:12px; padding:4px 10px; border-radius:999px; background:rgba(255,255,255,0.18); }
    .cta-focus{ outline:3px solid rgba(232,40,40,0.65); box-shadow:0 0 0 6px rgba(232,40,40,0.18),0 18px 55px rgba(232,40,40,0.25); }
    
    @media (max-width: 600px) {
      .site-header nav { display: none; } /* Hide standard nav on mobile if too crowded */
      .nav-container { justify-content: flex-end; width: 100%; }
    }
  </style>
</head>

<body>
  <div id="appWrapper">
    <div class="bg-glow"></div>

    <header class="site-header">
      <a href="/printbydd" class="logo" data-vd-route>PrintByDD</a>
      <div class="nav-container">
        <nav>
          <a href="/printbydd" data-vd-route>Home</a>
          <a href="/keychain" class="active" data-vd-route>Products</a>
          <a href="/gifts-that-mean-more" data-vd-route>Blog</a>
        </nav>
        <a href="https://www.instagram.com/printbydd?igsh=a2Z3cDFwNG1wYm5n"
           target="_blank" rel="noopener" class="nav-insta" aria-label="PrintByDD on Instagram">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <defs>
              <linearGradient id="ig-h" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#f09433"/>
                <stop offset="50%" stop-color="#dc2743"/>
                <stop offset="100%" stop-color="#bc1888"/>
              </linearGradient>
            </defs>
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5" stroke="url(#ig-h)"/>
            <circle cx="12" cy="12" r="4" stroke="url(#ig-h)"/>
            <circle cx="17.5" cy="6.5" r="1" fill="url(#ig-h)" stroke="none"/>
          </svg>
          <span>@printbydd</span>
        </a>
      </div>
    </header>

    <div class="top">
      <a class="back" href="/printbydd" id="backBtn" data-vd-route>← Back</a>
      <div class="top-actions">
        <button id="btnTheme" class="btn-icon" aria-label="Toggle theme">☾</button>
        <button id="btnTranslate" class="btn-icon" aria-label="Translate">A/अ</button>
        <div class="pill"><b id="secLabel">SEC 1/6</b> • <span id="secName">INTRO</span></div>
      </div>
    </div>

    <main class="scroll-container" id="scrollContainer"></main>

    <div class="bottom-nav" id="bottomNav">
      <button class="bn-btn" id="bnPrev" type="button" aria-label="Previous">←</button>
      <div class="bn-dots" id="bnDots"></div>
      <button class="bn-btn" id="bnNext" type="button" aria-label="Next">→</button>
      <button class="bn-cta" id="bnCta" type="button">

<script>
(function(){
  "use strict";

  const INSTA = "https://www.instagram.com/printbydd?igsh=a2Z3cDFwNG1wYm5n";

  function igIcon(size){
    return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1" fill="white" stroke="none"/></svg>`;
  }

  // Theme
  const THEME_KEY = "VD_INVERT_THEME";
  const btnTheme = document.getElementById("btnTheme");
  function setInvert(on){
    document.body.classList.toggle("invert-mode", !!on);
    btnTheme.textContent = on ? "☀" : "☾";
    try{ localStorage.setItem(THEME_KEY, on ? "1" : "0"); }catch(e){}
  }
  (function(){ let s="0"; try{ s=localStorage.getItem(THEME_KEY)||"0"; }catch(e){} setInvert(s==="1"); })();
  btnTheme.addEventListener("click", () => setInvert(!document.body.classList.contains("invert-mode")));

  // Auth
  const authState = { email:null, role:null };
  const WA = "919999999999"; 

  function genCode(email){
    let h=0; for(let i=0;i<email.length;i++) h=(h*31+email.charCodeAt(i))>>>0;
    return ("" + (h%9000+1000)).slice(-4);
  }
  (function(){ try{ const e=localStorage.getItem('PBD_USER'), r=localStorage.getItem('PBD_ROLE'); if(e) authState.email=e; if(r) authState.role=r; }catch(e){} })();

  window.requestAccess = function(role){
    const name  = ((document.getElementById(role==='buyer'?'b-name':'s-name')  ||{}).value||'').trim();
    const email = ((document.getElementById(role==='buyer'?'b-email':'s-email')||{}).value||'').trim();
    if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ alert(currentLang==='hi'?"कृपया सही ईमेल डालें।":"Please enter a valid email."); return; }
    const msg = `Hi! I want to order the NFC Keychain (₹449).\n\nName: ${name||"-"}\nEmail: ${email}\n\nCode: ${genCode(email)}`;
    window.open(`https://wa.me/${WA}?text=${encodeURIComponent(msg)}`,'_blank');
    renderSections();
  };

  window.logoutSession = function(){
    if(confirm(currentLang==='hi'?"लॉग आउट करें?":"End your session?")){
      localStorage.removeItem('PBD_USER'); localStorage.removeItem('PBD_ROLE'); location.reload();
    }
  };

  // ===== 3D Viewer — FIX Z-AXIS HEURISTIC =====
  const STL_URL = "/printbydd-store/keychain.stl";
  let stlScene=null, stlRenderer=null, stlCamera=null;
  let stlMeshBody=null, stlMeshArms=null, stlGroup=null;
  let stlPointerDown=false, stlLastX=0, stlLastY=0, stlInited=false;

  const BODY_COLORS = { black:0x111111, white:0xf0f0f0, blue:0x1a6bd1, sand:0xd8c7a6 };
  const ARM_COLORS  = { red:0xe82828, black:0x111111, white:0xf0f0f0, green:0x22c55e };
  const COLOR_STORAGE_KEY = "PBD_KEYCHAIN_COLORS_V1";
  let currentBodyKey="black", currentArmKey="red";

  (function(){ try{ const s=JSON.parse(localStorage.getItem(COLOR_STORAGE_KEY)||"{}"); if(s.body&&BODY_COLORS[s.body]) currentBodyKey=s.body; if(s.arm&&ARM_COLORS[s.arm]) currentArmKey=s.arm; }catch(e){} })();

  function persistColors(){ try{ localStorage.setItem(COLOR_STORAGE_KEY,JSON.stringify({body:currentBodyKey,arm:currentArmKey})); }catch(e){} }

  function syncColorUI(){
    document.querySelectorAll('[data-body-btn]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-body-btn')===currentBodyKey));
    document.querySelectorAll('[data-arm-btn]').forEach(b=>b.classList.toggle('active',b.getAttribute('data-arm-btn')===currentArmKey));
    const bl=document.getElementById("bodyLbl"), al=document.getElementById("armLbl");
    if(bl) bl.textContent=currentBodyKey.toUpperCase();
    if(al) al.textContent=currentArmKey.toUpperCase();
  }

  function applyKeyColors(){
    if(stlMeshBody) stlMeshBody.material.color.setHex(BODY_COLORS[currentBodyKey]);
    if(stlMeshArms) stlMeshArms.material.color.setHex(ARM_COLORS[currentArmKey]);
    persistColors(); syncColorUI();
  }

  window.setBodyColor = function(key,btn){
    if(!BODY_COLORS[key]) return; currentBodyKey=key; applyKeyColors();
    if(btn){ document.querySelectorAll('[data-body-btn]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  };

  window.setArmColor = function(key,btn){
    if(!ARM_COLORS[key]) return; currentArmKey=key; applyKeyColors();
    if(btn){ document.querySelectorAll('[data-arm-btn]').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); }
  };

  function parseBinarySTL(buf){
    const v=new DataView(buf), n=v.getUint32(80,true), pos=[], nor=[];
    let o=84;
    for(let i=0;i<n;i++){
      const nx=v.getFloat32(o,true),ny=v.getFloat32(o+4,true),nz=v.getFloat32(o+8,true); o+=12;
      for(let j=0;j<3;j++){ pos.push(v.getFloat32(o,true),v.getFloat32(o+4,true),v.getFloat32(o+8,true)); nor.push(nx,ny,nz); o+=12; }
      o+=2;
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
    return g;
  }

  function parseAsciiSTL(txt){
    const pos=[],nor=[],lines=txt.split(/\r?\n/); let cn=[0,0,1],v=[];
    for(const lr of lines){
      const l=lr.trim(); if(!l) continue;
      if(l.startsWith("facet normal")){ const p=l.split(/\s+/); cn=[parseFloat(p[2]),parseFloat(p[3]),parseFloat(p[4])]; }
      else if(l.startsWith("vertex")){ const p=l.split(/\s+/); v.push([parseFloat(p[1]),parseFloat(p[2]),parseFloat(p[3])]); if(v.length===3){ for(const vv of v){pos.push(vv[0],vv[1],vv[2]);nor.push(...cn);} v=[]; } }
    }
    const g=new THREE.BufferGeometry();
    g.setAttribute('position',new THREE.Float32BufferAttribute(pos,3));
    g.setAttribute('normal',new THREE.Float32BufferAttribute(nor,3));
    return g;
  }

  async function loadSTLGeometry(){
    const res=await fetch(STL_URL,{cache:"no-store"});
    if(!res.ok) throw new Error("Couldn't load keychain.stl ("+res.status+")");
    const buf=await res.arrayBuffer();
    const h=new TextDecoder().decode(new Uint8Array(buf.slice(0,80))).trim().toLowerCase();
    return (h.startsWith("solid")&&h.includes("openscad")) ? parseAsciiSTL(new TextDecoder().decode(new Uint8Array(buf))) : parseBinarySTL(buf);
  }

  window.initSTLViewer = async function(){
    if(stlInited) return;
    const wrap=document.getElementById('stl-viewer-wrap'), canvas=document.getElementById('stl-canvas'), loading=document.getElementById('stl-loading');
    if(!wrap||!canvas) return;
    stlInited=true;
    
    const W=wrap.clientWidth, H=260; // Rigid height
    stlRenderer=new THREE.WebGLRenderer({canvas,antialias:true,alpha:true});
    stlRenderer.setPixelRatio(Math.min(window.devicePixelRatio||1,2));
    stlRenderer.setSize(W,H,false);
    stlScene=new THREE.Scene();
    
    // Camera pulled back slightly to ensure fit
    stlCamera=new THREE.PerspectiveCamera(45,W/H,0.1,1000);
    stlCamera.position.set(0,0,3.5); 
    
    stlScene.add(new THREE.AmbientLight(0xffffff,0.75));
    const dir=new THREE.DirectionalLight(0xffffff,0.9); dir.position.set(2,3,2); stlScene.add(dir);
    stlGroup=new THREE.Group(); stlScene.add(stlGroup);
    
    try{
      const geo=await loadSTLGeometry(); geo.center();
      const pa=geo.getAttribute('position'), na=geo.getAttribute('normal');
      const bp=[],bn=[],ap=[],an=[];
      
      // Heuristic fix: Separate by absolute Z height instead of normal angle
      for(let i=0;i<pa.count;i+=3){
        const pz1=pa.array[(i*3)+2], pz2=pa.array[((i+1)*3)+2], pz3=pa.array[((i+2)*3)+2];
        const avgZ = (pz1 + pz2 + pz3) / 3;
        
        const tp=[pa.array[i*3],pa.array[i*3+1],pa.array[i*3+2],pa.array[(i+1)*3],pa.array[(i+1)*3+1],pa.array[(i+1)*3+2],pa.array[(i+2)*3],pa.array[(i+2)*3+1],pa.array[(i+2)*3+2]];
        const tn=[na.array[i*3],na.array[i*3+1],na.array[i*3+2],na.array[(i+1)*3],na.array[(i+1)*3+1],na.array[(i+1)*3+2],na.array[(i+2)*3],na.array[(i+2)*3+1],na.array[(i+2)*3+2]];
        
        // If height > 1.0 (relative to center), it's the raised muscle.
        if(avgZ > 1.0){ap.push(...tp);an.push(...tn);}else{bp.push(...tp);bn.push(...tn);}
      }
      
      function mg(ps,ns){ const g=new THREE.BufferGeometry(); g.setAttribute('position',new THREE.Float32BufferAttribute(ps,3)); g.setAttribute('normal',new THREE.Float32BufferAttribute(ns,3)); return g; }
      stlMeshBody=new THREE.Mesh(mg(bp,bn),new THREE.MeshStandardMaterial({color:BODY_COLORS[currentBodyKey],roughness:0.62,metalness:0.08}));
      stlMeshArms=new THREE.Mesh(mg(ap,an),new THREE.MeshStandardMaterial({color:ARM_COLORS[currentArmKey],roughness:0.56,metalness:0.08}));
      stlGroup.add(stlMeshBody); stlGroup.add(stlMeshArms);
      stlGroup.rotation.x=-0.2; stlGroup.rotation.y=0.9;
      
      const box=new THREE.Box3().setFromObject(stlGroup), sz=new THREE.Vector3(); box.getSize(sz);
      stlGroup.scale.setScalar(1.65/Math.max(sz.x,sz.y,sz.z)||1);
      
      if(loading) loading.classList.add('hidden');
      
      function onDown(e){ stlPointerDown=true; const t=e.touches?e.touches[0]:e; stlLastX=t.clientX; stlLastY=t.clientY; }
      function onMove(e){ if(!stlPointerDown) return; const t=e.touches?e.touches[0]:e; stlGroup.rotation.y+=(t.clientX-stlLastX)*0.01; stlGroup.rotation.x+=(t.clientY-stlLastY)*0.01; stlLastX=t.clientX; stlLastY=t.clientY; }
      function onUp(){ stlPointerDown=false; }
      
      wrap.addEventListener('pointerdown',onDown); wrap.addEventListener('pointermove',onMove); window.addEventListener('pointerup',onUp);
      wrap.addEventListener('touchstart',onDown,{passive:true}); wrap.addEventListener('touchmove',onMove,{passive:true}); wrap.addEventListener('touchend',onUp,{passive:true});
      
      window.addEventListener('resize',()=>{ if(!wrap||!stlRenderer||!stlCamera) return; const w=wrap.clientWidth,h=260; stlRenderer.setSize(w,h,false); stlCamera.aspect=w/h; stlCamera.updateProjectionMatrix(); });
      
      (function animate(){ requestAnimationFrame(animate); stlRenderer.render(stlScene,stlCamera); })();
      applyKeyColors();
    } catch(err){ if(loading) loading.textContent="STL load failed. Put keychain.stl next to this HTML.\n"+(err&&err.message?err.message:""); console.error(err); }
  };

  // ===== Sections =====

      name:"INTRO", kicker:"HARDCORE NFC KEYCHAIN",

            See it in action →

    },
    {
      name:"WHY", kicker:"WHY IT HITS",
      title:{ en:"Because You're Already Carrying Your Keys.", hi:"क्योंकि keys तो साथ रहती ही हैं।" },
      html:{
        en:()=>`

          <p class="lead">This is the highest-ROI thing you can carry. It turns every meeting into a follow-up.</p>
          <button class="cp" onclick="window.scrollToSectionByName('BUYER')">
            <span class="cpulse"></span><div class="ci">🔥 Go to Order <div class="ca">→</div></div>
          </button>
          <a href="${INSTA}" target="_blank" rel="noopener" class="btn-insta" style="margin-top:12px;">

          </a>`,
        hi:()=>`
          <p class="big">लोग आपको <span class="r">याद</span> रखें।</p>
          <p class="lead">यह हर meeting को follow-up में बदल देती है।</p>
          <button class="cp" onclick="window.scrollToSectionByName('BUYER')">
            <span class="cpulse"></span><div class="ci">🔥 Order पर जाएँ <div class="ca">→</div></div>
          </button>
          <a href="${INSTA}" target="_blank" rel="noopener" class="btn-insta" style="margin-top:12px;">
            ${igIcon(18)} @printbydd को Follow करें
          </a>`
      }
    }
  ];

  // ===== Nav =====
  const container=document.getElementById('scrollContainer'), secLabel=document.getElementById('secLabel'), secName=document.getElementById('secName');
  let currentLang='en';
  const bnPrev=document.getElementById('bnPrev'), bnNext=document.getElementById('bnNext'), bnDots=document.getElementById('bnDots'), bnCta=document.getElementById('bnCta'), bnCtaText=document.getElementById('bnCtaText'), bnCtaTag=document.getElementById('bnCtaTag');
  const BUYER_IDX=SECTIONS.findIndex(s=>s.name==='BUYER');
  let currentSecIndex=0;

  function buildBottomDots(){ if(!bnDots) return; bnDots.innerHTML=''; for(let i=0;i<SECTIONS.length;i++){ const d=document.createElement('button'); d.type='button'; d.className='bn-dot'; d.setAttribute('aria-label',`Section ${i+1}`); d.addEventListener('click',()=>scrollToIndex(i)); bnDots.appendChild(d); } }
  function scrollToIndex(i){ i=Math.max(0,Math.min(SECTIONS.length-1,i)); const el=container.querySelector(`.section-wrapper[data-index="${i}"]`); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); }
  function focusPrimaryCTA(){ const a=container.querySelector(`.section-wrapper[data-index="${currentSecIndex}"]`); if(!a) return; const b=a.querySelector('.cp')||a.querySelector('.btn-submit')||a.querySelector('button'); if(!b) return; b.classList.add('cta-focus'); try{b.scrollIntoView({behavior:"smooth",block:"center"});}catch(e){} setTimeout(()=>b.classList.remove('cta-focus'),1200); }
  function updateBottomNav(){
    if(bnPrev) bnPrev.disabled=currentSecIndex<=0;
    if(bnNext) bnNext.disabled=currentSecIndex>=(SECTIONS.length-1);
    if(bnDots) bnDots.querySelectorAll('.bn-dot').forEach((d,i)=>d.classList.toggle('active',i===currentSecIndex));
    if(bnCtaText&&bnCtaTag){ if(currentSecIndex===BUYER_IDX){bnCtaText.textContent="Order";bnCtaTag.textContent="Now";}else if(currentSecIndex<BUYER_IDX){bnCtaText.textContent="Go to";bnCtaTag.textContent="Order";}else{bnCtaText.textContent="Order";bnCtaTag.textContent="Now";} }
  }
  function initBottomNav(){
    buildBottomDots(); updateBottomNav();
    if(bnPrev) bnPrev.addEventListener('click',()=>scrollToIndex(currentSecIndex-1));
    if(bnNext) bnNext.addEventListener('click',()=>scrollToIndex(currentSecIndex+1));
    if(bnCta) bnCta.addEventListener('click',()=>{ if(BUYER_IDX>=0&&currentSecIndex!==BUYER_IDX){scrollToIndex(BUYER_IDX);setTimeout(()=>{currentSecIndex=BUYER_IDX;updateBottomNav();focusPrimaryCTA();},650);}else{focusPrimaryCTA();} });
  }

  const observer=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){ entry.target.classList.add('is-active'); const idx=parseInt(entry.target.getAttribute('data-index'),10); currentSecIndex=isNaN(idx)?0:idx; secLabel.textContent=`SEC ${currentSecIndex+1}/${SECTIONS.length}`; secName.textContent=entry.target.getAttribute('data-name'); updateBottomNav(); if(entry.target.getAttribute('data-name')==='BUYER') setTimeout(()=>{window.initSTLViewer();syncColorUI();},120); }
      else entry.target.classList.remove('is-active');
    });
  },{root:container,threshold:0.6});

  window.scrollToSectionByName=function(name){ const idx=SECTIONS.findIndex(s=>s.name===name); if(idx<0) return; const el=container.querySelector(`.section-wrapper[data-index="${idx}"]`); if(el) el.scrollIntoView({behavior:"smooth",block:"start"}); };

  function renderSections(){
    container.innerHTML='';
    SECTIONS.forEach((sec,index)=>{
      const w=document.createElement('div'); w.className='section-wrapper'; w.setAttribute('data-index',index); w.setAttribute('data-name',sec.name);
      w.innerHTML=`<article class="card"><header class="cardHeader"><div class="kicker">${sec.kicker}</div><h1 class="h1">${sec.title[currentLang]}</h1></header><div class="cardBody">${sec.html[currentLang]()}<div style="height:85px;"></div></div></article><div class="hint"><span>Scroll for more</span><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>`;
      container.appendChild(w); observer.observe(w);
    });
    setTimeout(()=>{ if(bnDots&&bnDots.children.length!==SECTIONS.length) buildBottomDots(); updateBottomNav(); syncColorUI(); },60);
  }

  // Translation
  const btnTranslate=document.getElementById('btnTranslate'), toast=document.getElementById('translationToast'), btnUndo=document.getElementById('btnUndoTranslate'), toastMsg=document.getElementById('toastMsg');
  let toastTimer;
  function triggerTranslation(lang){ currentLang=lang; renderSections(); toast.classList.add('is-visible'); toastMsg.textContent=lang==='hi'?"Translated to Hindi":"Back to English"; btnUndo.style.display=lang==='hi'?'block':'none'; clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('is-visible'),2200); }
  btnTranslate.addEventListener('click',()=>triggerTranslation(currentLang==='en'?'hi':'en'));
  btnUndo.addEventListener('click',()=>{ triggerTranslation('en'); toast.classList.remove('is-visible'); });

  // Rotation popup
  const popup=document.getElementById('rotatePopup'), appWrapper=document.getElementById('appWrapper');
  let isForcedLandscape=false, targetRotationAngle=0;
  window.addEventListener('deviceorientation',e=>{ const g=e.gamma; if(g===null||typeof g==='undefined') return; if(!isForcedLandscape){if(g>45)showRotatePopup(90);else if(g<-45)showRotatePopup(-90);else hideRotatePopup();}else{if(Math.abs(g)<25)showRotatePopup(0);else hideRotatePopup();} });
  function showRotatePopup(a){ targetRotationAngle=a; popup.classList.add('is-visible'); popup.textContent=a===0?"Tap for Portrait":"Tap for Landscape"; }
  function hideRotatePopup(){ popup.classList.remove('is-visible'); }
  popup.addEventListener('click',()=>{ if(targetRotationAngle!==0){appWrapper.classList.add('forced-landscape');appWrapper.style.transform=`rotate(${targetRotationAngle}deg)`;isForcedLandscape=true;}else{appWrapper.classList.remove('forced-landscape');appWrapper.style.transform='none';isForcedLandscape=false;} hideRotatePopup(); });

  renderSections(); initBottomNav(); syncColorUI();

})();
</script>
</body>
</html>
