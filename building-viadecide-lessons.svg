<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Building ViaDecide: What I’ve Learned So Far</title>
  <desc id="desc">A decision infrastructure flow with four stages: Customer Signals, Intent Mapping, State Awareness, and Structured Decisions, representing the ViaDecide decision system for Bharat commerce.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8faff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#173a7a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="12" refY="5" orient="auto">
      <path d="M0,0 L14,5 L0,10 z" fill="#2d5bba"/>
    </marker>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 58px; font-weight: 700; fill: #12244d; }
      .subtitle { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 28px; font-weight: 500; fill: #3e537f; }
      .stage-title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 36px; font-weight: 700; fill: #163b88; }
      .stage-text { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 24px; fill: #405577; }
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 22px; font-weight: 600; fill: #2d5bba; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="800" y="110" text-anchor="middle" class="title">Building ViaDecide: What I’ve Learned So Far</text>
  <text x="800" y="165" text-anchor="middle" class="subtitle">Decision Infrastructure for Bharat Commerce</text>

  <g transform="translate(90,250)" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="320" rx="26" fill="url(#card)" stroke="#c7d6f8" stroke-width="2"/>
    <circle cx="160" cy="90" r="40" fill="#e8f0ff"/>
    <path d="M145 90h30M160 75v30" stroke="#2d5bba" stroke-width="6" stroke-linecap="round"/>
    <text x="160" y="175" text-anchor="middle" class="stage-title">Customer</text>
    <text x="160" y="215" text-anchor="middle" class="stage-title">Signals</text>
    <text x="160" y="265" text-anchor="middle" class="stage-text">Events, context,</text>
    <text x="160" y="297" text-anchor="middle" class="stage-text">and user behavior</text>
  </g>

  <g transform="translate(470,250)" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="320" rx="26" fill="url(#card)" stroke="#c7d6f8" stroke-width="2"/>
    <circle cx="160" cy="90" r="40" fill="#e8f0ff"/>
    <path d="M140 84h40M140 98h28" stroke="#2d5bba" stroke-width="6" stroke-linecap="round"/>
    <text x="160" y="175" text-anchor="middle" class="stage-title">Intent</text>
    <text x="160" y="215" text-anchor="middle" class="stage-title">Mapping</text>
    <text x="160" y="265" text-anchor="middle" class="stage-text">Translate signals</text>
    <text x="160" y="297" text-anchor="middle" class="stage-text">into decision goals</text>
  </g>

  <g transform="translate(850,250)" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="320" rx="26" fill="url(#card)" stroke="#c7d6f8" stroke-width="2"/>
    <circle cx="160" cy="90" r="40" fill="#e8f0ff"/>
    <circle cx="160" cy="90" r="16" fill="none" stroke="#2d5bba" stroke-width="6"/>
    <text x="160" y="175" text-anchor="middle" class="stage-title">State</text>
    <text x="160" y="215" text-anchor="middle" class="stage-title">Awareness</text>
    <text x="160" y="265" text-anchor="middle" class="stage-text">Understand current</text>
    <text x="160" y="297" text-anchor="middle" class="stage-text">market + user state</text>
  </g>

  <g transform="translate(1230,250)" filter="url(#shadow)">
    <rect x="0" y="0" width="320" height="320" rx="26" fill="url(#card)" stroke="#c7d6f8" stroke-width="2"/>
    <circle cx="160" cy="90" r="40" fill="#e8f0ff"/>
    <path d="M145 100l14-14 10 10 18-18" fill="none" stroke="#2d5bba" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="160" y="175" text-anchor="middle" class="stage-title">Structured</text>
    <text x="160" y="215" text-anchor="middle" class="stage-title">Decisions</text>
    <text x="160" y="265" text-anchor="middle" class="stage-text">Consistent, auditable</text>
    <text x="160" y="297" text-anchor="middle" class="stage-text">decision outcomes</text>
  </g>

  <line x1="410" y1="410" x2="460" y2="410" stroke="#2d5bba" stroke-width="7" marker-end="url(#arrow)"/>
  <line x1="790" y1="410" x2="840" y2="410" stroke="#2d5bba" stroke-width="7" marker-end="url(#arrow)"/>
  <line x1="1170" y1="410" x2="1220" y2="410" stroke="#2d5bba" stroke-width="7" marker-end="url(#arrow)"/>

  <text x="800" y="700" text-anchor="middle" class="label">ViaDecide Decision System Flow</text>
  <text x="800" y="742" text-anchor="middle" class="stage-text">Customer Signals → Intent Mapping → State Awareness → Structured Decisions</text>
</svg>
