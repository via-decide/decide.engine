<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Discounts Are Not Strategy • The Margin Trap</title>

  <style>
    :root {
      --bg: #050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: rgba(255, 255, 255, 0.92);
      --muted: rgba(255, 255, 255, 0.62);
      --accent: #ff671f;
      --accent-glow: rgba(255, 103, 31, 0.14);
      --radius: 24px;
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.6);
    }

    html, body {
      height: 100%; height: 100dvh; margin: 0; background-color: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", system-ui, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      user-select: none;
      -webkit-user-select: none;
      touch-action: pan-y;
    }
    * { box-sizing: border-box; }
    button { background: none; border: none; padding: 0; font: inherit; color: inherit; cursor: pointer; }

    /* App Wrapper for Rotation */
    #appWrapper {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      transition: transform 0.6s ease, width 0.6s ease, height 0.6s ease;
      transform-origin: center center;
    }

    /* Background glow */
    .bg-glow { position: absolute; inset: 0; pointer-events: none; background: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%), radial-gradient(circle at 85% 100%, rgba(85,105,255,0.14), transparent 55%); filter: blur(2px); opacity: 1; }

    /* Top bar */
    .top {
      position: absolute; top: 0; left: 0; right: 0;
      padding: 18px 18px 12px;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      pointer-events: none; background: linear-gradient(180deg, rgba(5,5,5,0.95) 0%, rgba(5,5,5,0) 100%);
    }
    .top > * { pointer-events: auto; }
    .top-actions { display: flex; align-items: center; gap: 8px; }

    .back, .pill, .btn-icon {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 12px; border-radius: 999px; border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,15,15,0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: all 0.2s ease;
    }
    .btn-icon { padding: 10px; font-weight: 700; color: rgba(255,255,255,0.88); }
    .btn-icon:hover, .back:hover { border-color: rgba(255,255,255,0.14); transform: translateY(-1px); }
    .btn-icon.logout { border-color: rgba(255, 103, 31, 0.30); }
    .btn-icon.logout:hover { border-color: rgba(255, 103, 31, 0.55); }
    .btn-icon svg { display: block; }
    .btn-icon.is-on { border-color: rgba(255,103,31,0.40); box-shadow: 0 0 0 4px rgba(255, 103, 31, 0.10); }
    .btn-icon.is-on svg { color: var(--accent); }
    .btn-icon:active, .back:active { transform: scale(0.96); }
    .back { color: rgba(255,255,255,0.9); font-weight: 600; font-size: 14px; text-decoration: none;}
    .pill { font-size: 12px; color: rgba(255,255,255,0.70); padding: 10px 14px; white-space: nowrap; }
    .pill strong { color: rgba(255,255,255,0.92); font-weight: 700; }

    /* Slider container */
    .stage { position: absolute; inset: 0; padding: 74px 16px 16px; display: flex; align-items: stretch; justify-content: center; }
    .carousel {
      width: min(980px, 100%);
      position: relative;
      display: flex; align-items: stretch; justify-content: center;
      overflow: hidden;
    }
    .slide {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      will-change: transform;
      transition: transform 420ms cubic-bezier(.22,1,.36,1), opacity 360ms ease;
      opacity: 0;
      pointer-events: none;
    }
    .slide.is-active { opacity: 1; pointer-events: auto; }

    /* Card */
    .card {
      width: 100%;
      height: 100%;
      max-height: calc(100dvh - 100px);
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      background: var(--card-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .cardHeader {
      padding: 22px 22px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), transparent);
      flex-shrink: 0;
    }
    .kicker {
      color: var(--muted); font-size: 12px; letter-spacing: 1.2px; text-transform: uppercase;
      display: flex; align-items: center; gap: 10px;
    }
    .kicker:before { content: ""; width: 10px; height: 10px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 0 6px rgba(255,103,31,0.12); }
    .h1 { margin: 10px 0 0; font-size: clamp(22px, 3.2vw, 34px); line-height: 1.12; letter-spacing: -0.02em; }
    .h1 .accent { color: var(--accent); }

    .cardBody {
      padding: 18px 22px 20px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      scrollbar-width: none;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .cardBody::-webkit-scrollbar { display: none; }

    .lead {
      font-size: 16px;
      color: rgba(255,255,255,0.86);
      line-height: 1.55;
      margin: 0;
    }
    .p { margin: 0; color: rgba(255,255,255,0.78); line-height: 1.68; font-size: 15px; }
    .p strong { color: rgba(255,255,255,0.92); }
    .quote {
      margin: 6px 0 0; padding: 14px 16px;
      border-left: 3px solid rgba(255,103,31,0.9);
      background: rgba(255, 103, 31, 0.07);
      border-radius: 16px;
      color: rgba(255,255,255,0.88);
      line-height: 1.55;
      font-size: 15px;
    }
    .grid2 { display: grid; grid-template-columns: 1fr; gap: 12px; }
    @media (min-width: 840px) { .grid2 { grid-template-columns: 1fr 1fr; } }

    .chipRow { display: flex; flex-wrap: wrap; gap: 8px; }
    .chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10,10,10,0.35);
      color: rgba(255,255,255,0.74);
      font-size: 12px; white-space: nowrap;
    }
    .chip svg { opacity: 0.9; }

    .divider { height: 1px; background: rgba(255,255,255,0.07); margin: 4px 0; }
    .hint {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: 14px;
      font-size: 12px; color: rgba(255,255,255,0.58);
      display: inline-flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10,10,10,0.55);
      pointer-events: none;
      opacity: 0;
      transition: opacity 300ms ease;
    }
    .hint svg { width: 18px; height: 18px; opacity: 0.85; }
    .slide.is-active .hint { opacity: 1; }

    /* Progress dots */
    .dots {
      position: absolute; left: 50%; transform: translateX(-50%);
      bottom: 16px;
      display: flex; gap: 8px;
      pointer-events: auto;
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(255,255,255,0.20);
      border: 1px solid rgba(255,255,255,0.12);
      transition: transform 240ms ease, background 240ms ease;
    }
    .dot.is-on { background: rgba(255,103,31,0.85); transform: scale(1.35); }

    /* Controls */
    .controls {
      position: absolute;
      right: 18px;
      bottom: 16px;
      display: flex;
      gap: 10px;
      pointer-events: auto;
    }

    /* Portrait rotation prompt */
    .rotate-popup {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      max-width: min(560px, calc(100% - 24px));
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(12,12,12,0.78);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: rgba(255,255,255,0.88);
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.55);
      opacity: 0;
      pointer-events: none;
      transition: opacity 250ms ease, transform 250ms ease;
      z-index: 9999;
    }
    .rotate-popup.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(-2px);
    }
    .rotate-popup svg { flex-shrink: 0; opacity: 0.95; }

    /* Forced landscape on portrait */
    #appWrapper.forced-landscape {
      width: 100dvh;
      height: 100dvw;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      border-radius: 0;
    }

    /* Fine typography */
    .big { font-size: 18px; color: rgba(255,255,255,0.88); line-height: 1.6; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 13px; color: rgba(255,255,255,0.78); background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); padding: 10px 12px; border-radius: 16px; }
    .bullets { margin: 0; padding-left: 18px; color: rgba(255,255,255,0.78); }
    .bullets li { margin: 6px 0; line-height: 1.6; }

    a.internal-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(10,10,10,0.40);
      color: rgba(255,255,255,0.88);
      text-decoration: none;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
      font-size: 14px;
      width: fit-content;
    }
    a.internal-link:hover { transform: translateY(-1px); border-color: rgba(255,255,255,0.16); background: rgba(10,10,10,0.55); }
    a.internal-link span { color: var(--accent); font-weight: 700; }

    /* Meta chips */
    .meta { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px; }
    .meta .chip { font-size: 11px; }
    .meta .chip strong { color: rgba(255,255,255,0.92); }
    .meta .chip .k { color: rgba(255,255,255,0.60); font-weight: 600; }

    /* Accessibility */
    .sr { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

    /* Landscape support for small height */
    @media (max-height: 640px) {
      .cardHeader { padding: 18px 18px 12px; }
      .cardBody { padding: 14px 18px 18px; }
      .stage { padding-top: 66px; }
      .h1 { font-size: 22px; }
      .lead { font-size: 15px; }
    }

    /* Slightly bigger glow when landscape */
    @media (orientation: landscape) {
      .bg-glow { opacity: 1; filter: blur(1px); }
      .card { max-height: calc(100dvh - 92px); }
    }

    /* Page-specific */
    .accent { color: var(--accent); }
    .callout {
      border: 1px solid rgba(255,103,31,0.22);
      background: rgba(255,103,31,0.07);
      border-radius: 18px;
      padding: 14px 16px;
      color: rgba(255,255,255,0.86);
      line-height: 1.6;
    }
    .callout strong { color: rgba(255,255,255,0.92); }
    .callout .tag { display:inline-flex; align-items:center; gap:8px; font-size: 12px; color: rgba(255,255,255,0.78); margin-bottom: 6px; }
    .callout .tag:before { content:""; width:8px; height:8px; border-radius:50%; background: rgba(255,103,31,0.85); box-shadow: 0 0 0 6px rgba(255,103,31,0.16); }

    /* Extra polish for embedded image block */
    .imgblock {
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.10);
      overflow: hidden;
      background: rgba(10,10,10,0.30);
    }
    .imgblock img { display:block; width:100%; height:auto; }
    .imgcap { padding: 10px 12px; font-size: 12px; color: rgba(255,255,255,0.68); border-top: 1px solid rgba(255,255,255,0.08); }

    /* Small “simulate iPhone” glow */
    .card:before {
      content:"";
      position:absolute; inset:0;
      pointer-events:none;
      border-radius: var(--radius);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
    }
    /* subtle top highlight */
    .card:after{
      content:"";
      position:absolute; left:0; right:0; top:0; height:120px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,255,255,0.10), transparent 70%);
      pointer-events:none;
    }
    .card > * { position: relative; z-index: 1; }

    /* Ensure footer padding to keep hint visible */
    .cardBody > :last-child { margin-bottom: 34px; }

    /* For “tap targets” */
    a, button { -webkit-tap-highlight-color: transparent; }

    /* Avoid selection highlight */
    ::selection { background: rgba(255,103,31,0.25); }
  </style>
</head>

<body>

  <div id="appWrapper">
    <div class="bg-glow"></div>

    <div class="top">
      <a class="back" href="#">← Back</a>
      <div class="top-actions">
        <button id="btnLogout" class="btn-icon" aria-label="Logout" title="End Session" style="display:none;" onclick="logoutSession()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
        </button>
        <button id="btnRotate" class="btn-icon" aria-label="Rotate" title="Rotate / Landscape">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-7.5L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 7.5L3 16"></path></svg>
        </button>
        <div class="pill" id="pillLang" title="Language Toggle" style="cursor:pointer;"><strong>EN</strong></div>
      </div>
    </div>

    <div class="stage">
      <div class="carousel" id="carousel"></div>
      <div class="dots" id="dots" aria-label="Slide progress"></div>

      <div class="controls">
        <button class="btn-icon" id="prevBtn" aria-label="Previous" title="Previous">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <button class="btn-icon" id="nextBtn" aria-label="Next" title="Next">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div id="rotatePopup" class="rotate-popup"></div>

  <script>
    // ─────────────────────────────────────────────────────────────
    // ViaDecide: page-local nav + backend fix (non-visual)
    // - Fixes invalid nested script tag issue
    // - Makes Back button work consistently
    // - Fixes broken internal links across root vs /blogs/ deployments
    // - Provides safe logoutSession() implementation
    // ─────────────────────────────────────────────────────────────
    (function initViaDecideNavFix(){
      try {
        var path = (location.pathname || "").toLowerCase();
        var parts = path.split("/").filter(function (s) { return s; });
        // Count folders only (ignore the .html file)
        var depth = parts.length > 0 && parts[parts.length - 1].indexOf(".html") >= 0 ? parts.length - 1 : parts.length;
        var ROOT = depth > 0 ? "../".repeat(depth) : "./";

        function safeHref(file) {
          // encodeURI keeps slashes but may leave quotes; normalize
          return (ROOT + encodeURI(file)).replace(/"/g, "%22").replace(/'/g, "%27");
        }

        // Back button: history.back() when possible; otherwise send to blogs section
        var backEl = document.querySelector("a.back");
        if (backEl) {
          backEl.setAttribute("href", safeHref("index.html") + "#blogs");
          backEl.addEventListener("click", function (e) {
            // If there is meaningful history, prefer it.
            if (window.history && window.history.length > 1) {
              e.preventDefault();
              window.history.back();
            }
          }, { passive: false });
        }

        // Repair internal links in the "EXPLORE THE INFRASTRUCTURE" block
        var internalLinks = Array.prototype.slice.call(document.querySelectorAll("a.internal-link"));
        internalLinks.forEach(function (a) {
          var label = (a.textContent || "").replace(/\s+/g, " ").trim().toLowerCase();
          if (label.indexOf("pricing infrastructure") >= 0) a.setAttribute("href", safeHref("pricing.html"));
          else if (label.indexOf("inventory rules") >= 0) a.setAttribute("href", safeHref("cashback-rules.html"));
          else if (label.indexOf("decision memory") >= 0) a.setAttribute("href", safeHref("memory.html"));
          else if (label.indexOf("saas vs structure") >= 0) a.setAttribute("href", safeHref("“Why Most Small Businesses Don’t Need SaaS — They Need Structure\".html"));
        });

        // Expose ROOT for any other inline logic that may need it
        window.__VD_ROOT__ = ROOT;
      } catch (err) {
        // Silent fail to avoid disrupting page UX
      }
    })();

    // Provide logoutSession() used by the UI button (no visual changes)
    function logoutSession() {
      try {
        localStorage.removeItem("VIA_USER");
        localStorage.removeItem("VIA_ROLE");
      } catch (e) {}
      // Prefer returning to home
      try {
        var root = window.__VD_ROOT__ || "./";
        location.href = root + "index.html";
      } catch (e2) {
        location.href = "index.html";
      }
    }

    (function(){
      "use strict";

      // --- SESSION STATE ---
      let authState = {
        user: null,
        role: null,
        isAuthenticated: false
      };

      function readAuth() {
        try {
          const u = localStorage.getItem("VIA_USER");
          const r = localStorage.getItem("VIA_ROLE");
          if (u) authState.user = JSON.parse(u);
          if (r) authState.role = r;
          authState.isAuthenticated = !!authState.user;
        } catch (e) {
          authState.user = null;
          authState.role = null;
          authState.isAuthenticated = false;
        }
      }

      function applyAuthUI() {
        const btn = document.getElementById("btnLogout");
        if (!btn) return;
        if (authState.isAuthenticated) {
          btn.style.display = "inline-flex";
          btn.classList.add("logout");
        } else {
          btn.style.display = "none";
          btn.classList.remove("logout");
        }
      }

      // --- LANGUAGE / CONTENT ---
      const container = document.getElementById("carousel");
      const dots = document.getElementById("dots");
      const pillLang = document.getElementById("pillLang");

      let current = 0;
      let slides = [];
      let currentLang = "en";

      const sections = [
        {
          kicker: "Pricing • Strategy",
          title: { en: "Discounts are not strategy.", hi: "डिस्काउंट रणनीति नहीं हैं।" },
          content: {
            en: `
              <p class="lead">
                A discount can move inventory. It cannot build a business.
              </p>
              <div class="meta">
                <div class="chip"><span class="k">Theme</span> <strong>Margin Trap</strong></div>
                <div class="chip"><span class="k">Lens</span> <strong>Decision Infrastructure</strong></div>
                <div class="chip"><span class="k">Read</span> <strong>4–6 min</strong></div>
              </div>
              <div class="divider"></div>
              <p class="p">
                Indian commerce is learning the hard way: <strong>price is a lever</strong>, not a foundation.
                A business that survives on discounts is renting growth and paying in margin.
              </p>
              <p class="p">
                If your offer is the product, the moment the offer ends, so does demand.
              </p>
            `,
            hi: `
              <p class="lead">
                डिस्काउंट स्टॉक बेचवा सकता है। बिज़नेस नहीं बना सकता।
              </p>
              <div class="meta">
                <div class="chip"><span class="k">थीम</span> <strong>मार्जिन ट्रैप</strong></div>
                <div class="chip"><span class="k">लेंस</span> <strong>Decision Infrastructure</strong></div>
                <div class="chip"><span class="k">समय</span> <strong>4–6 मिनट</strong></div>
              </div>
              <div class="divider"></div>
              <p class="p">
                भारतीय कॉमर्स धीरे-धीरे सीख रहा है: <strong>कीमत एक लीवर है</strong>, आधार नहीं।
                जो बिज़नेस डिस्काउंट पर चलता है, वह ग्रोथ किराए पर लेता है — और कीमत मार्जिन से चुकाता है।
              </p>
              <p class="p">
                अगर ऑफ़र ही प्रोडक्ट है, तो ऑफ़र खत्म होते ही डिमांड भी खत्म।
              </p>
            `
          }
        },
        {
          kicker: "The Trap",
          title: { en: "The Margin Trap is silent.", hi: "मार्जिन ट्रैप चुपचाप होता है।" },
          content: {
            en: `
              <p class="p">
                Discounts do three things — and only one is visible.
              </p>
              <div class="grid2">
                <div class="callout">
                  <div class="tag">1) Visible</div>
                  <strong>Revenue spikes.</strong> Sales charts go up. Celebrations happen.
                </div>
                <div class="callout">
                  <div class="tag">2) Invisible</div>
                  <strong>Unit economics collapse.</strong> Your real margin is now a rumor.
                </div>
                <div class="callout">
                  <div class="tag">3) Invisible</div>
                  <strong>Customer memory changes.</strong> Buyers learn your “real” price is lower.
                </div>
                <div class="callout">
                  <div class="tag">Outcome</div>
                  <strong>You get addicted</strong> to temporary demand.
                </div>
              </div>

              <div class="quote">
                “If your customer only comes when you’re cheaper, you’re not building loyalty —

      function render() {
        container.innerHTML = "";
        dots.innerHTML = "";
        slides = [];

        sections.forEach((sec, idx) => {
          const wrapper = document.createElement("div");
          wrapper.className = "slide" + (idx === 0 ? " is-active" : "");
          wrapper.setAttribute("data-index", String(idx));

          // Allow content to be function for language
          const htmlContent = typeof sec.content[currentLang] === "function" ? sec.content[currentLang]() : sec.content[currentLang];

          wrapper.innerHTML = `
            <article class="card">
              <header class="cardHeader">
                <div class="kicker">${sec.kicker}</div>
                <h1 class="h1 target-title">${sec.title[currentLang]}</h1>
              </header>
              <div class="cardBody target-body">
                ${htmlContent}
                <div style="height: 85px; flex-shrink: 0;"></div> </div>
            </article>
            <div class="hint">
              <span>Scroll for more</span>
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          `;
          container.appendChild(wrapper);
          slides.push(wrapper);

          const dot = document.createElement("div");
          dot.className = "dot" + (idx === 0 ? " is-on" : "");
          dot.setAttribute("aria-label", `Go to slide ${idx+1}`);
          dot.addEventListener("click", () => go(idx));
          dots.appendChild(dot);
        });

        // Re-attach Intersection Observer
        document.querySelectorAll(".cardBody").forEach(el => {
          el.addEventListener("scroll", handleBodyScroll, { passive: true });
        });
      }

      function updateDots() {
        const ds = dots.querySelectorAll(".dot");
        ds.forEach((d, i) => d.classList.toggle("is-on", i === current));
      }

      function go(index) {
        if (index < 0 || index >= slides.length || index === current) return;

        const dir = index > current ? 1 : -1;

        slides.forEach((s, i) => {
          const offset = i - index;
          s.classList.remove("is-active");
          s.style.transform = `translateX(${offset * 110}%)`;
          s.style.opacity = i === index ? "1" : "0";
        });

        const next = slides[index];
        next.classList.add("is-active");
        next.style.transform = "translateX(0%)";
        next.style.opacity = "1";

        current = index;
        updateDots();
      }

      function next() { go(current + 1); }
      function prev() { go(current - 1); }

      // Handle drag/swipe
      let startX = 0, currentX = 0, isDragging = false;
      let startTime = 0;

      function onDown(e) {
        isDragging = true;
        startTime = Date.now();
        startX = (e.touches ? e.touches[0].clientX : e.clientX);
        currentX = startX;
      }
      function onMove(e) {
        if (!isDragging) return;
        currentX = (e.touches ? e.touches[0].clientX : e.clientX);
      }
      function onUp() {
        if (!isDragging) return;
        isDragging = false;
        const dx = currentX - startX;
        const dt = Date.now() - startTime;
        const velocity = Math.abs(dx) / Math.max(dt, 1);
        if (Math.abs(dx) > 55 || velocity > 0.55) {
          if (dx < 0) next(); else prev();
        }
      }

      // Body scroll hint hide
      function handleBodyScroll(e) {
        const slide = e.target.closest(".slide");
        if (!slide) return;
        const hint = slide.querySelector(".hint");
        if (!hint) return;
        if (e.target.scrollTop > 22) hint.style.opacity = "0";
        else hint.style.opacity = "";
      }

      // Language toggle
      function setLang(lang) {
        currentLang = lang;
        pillLang.innerHTML = `<strong>${lang.toUpperCase()}</strong>`;
        render();
        // Keep current slide
        go(Math.min(current, sections.length - 1));
      }

      pillLang.addEventListener("click", () => {
        setLang(currentLang === "en" ? "hi" : "en");
      });

      // Buttons
      document.getElementById("nextBtn").addEventListener("click", next);
      document.getElementById("prevBtn").addEventListener("click", prev);

      // Add swipe listeners
      container.addEventListener("mousedown", onDown);
      container.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
      container.addEventListener("touchstart", onDown, { passive: true });
      container.addEventListener("touchmove", onMove, { passive: true });
      container.addEventListener("touchend", onUp);

      // Keyboard support
      window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowRight") next();
        if (e.key === "ArrowLeft") prev();
      });

      // Init content transform states
      function initTransforms() {
        slides.forEach((s, i) => {
          const offset = i - current;
          s.style.transform = `translateX(${offset * 110}%)`;
          s.style.opacity = i === current ? "1" : "0";
        });
      }

      // Rotation logic
      const btnRotate = document.getElementById("btnRotate");
      const popup = document.getElementById("rotatePopup");
      const appWrapper = document.getElementById("appWrapper");
      let targetRotationAngle = 0; // 0 means normal, 90 means rotate
      let isForcedLandscape = false;

      function computeTargetRotation() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        if (w < h) {
          // portrait → suggest rotate to landscape
          targetRotationAngle = 90;
        } else {
          targetRotationAngle = 0;
        }
      }

      btnRotate.addEventListener("click", () => {
        computeTargetRotation();
        showRotatePopup();
      });

      function showRotatePopup() {
        // Message varies depending on state
        if (targetRotationAngle !== 0) {
          popup.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-7.5L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 7.5L3 16"/></svg> Tap to rotate to Landscape`;
        } else {
          popup.innerHTML = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2"><rect x="2" y="6" width="20" height="12" rx="2" ry="2"/><path d="M12 12h.01"/></svg> Tap for Landscape`;
        }
        popup.classList.add("is-visible");
        // auto-hide after 4.5s
        clearTimeout(showRotatePopup._t);
        showRotatePopup._t = setTimeout(hideRotatePopup, 4500);
      }

      function hideRotatePopup() { popup.classList.remove('is-visible'); }

      popup.addEventListener('click', () => {
        if (targetRotationAngle !== 0) {
          appWrapper.classList.add('forced-landscape');
          appWrapper.style.transform = `rotate(${targetRotationAngle}deg)`;
          isForcedLandscape = true;
        } else {
          appWrapper.classList.remove('forced-landscape');
          appWrapper.style.transform = `none`;
          isForcedLandscape = false;
        }
        hideRotatePopup();
      });

      // Startup
      readAuth();
      applyAuthUI();
      setLang("en");
      initTransforms();

      // Recompute on resize (for rotation prompt)
      window.addEventListener("resize", () => {
        computeTargetRotation();
      });

    })();
  </script>
