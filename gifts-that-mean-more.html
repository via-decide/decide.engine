<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Gifts That Mean More • ViaDecide</title>
  <meta name="description" content="Why a ₹200 personalized keychain can feel more meaningful than a ₹5,000 generic gift — psychology, memory, and everyday meaning." />

  <!-- Router (your universal router.js) -->
  <script>window.__MAIN_WEBSITE__ = "https://viadecide.com/";</script>
  <script src="./router.js"></script>

  <style>
    /* =========================
       Anti-select (like image-1 feel)
       ========================= */
    html, body { -webkit-user-select: none; user-select: none; }
    * { -webkit-user-select: none; user-select: none; }
    input, textarea, select, button { -webkit-user-select: auto; user-select: auto; }
    input, textarea { -webkit-user-select: text; user-select: text; }
    a, button { -webkit-tap-highlight-color: transparent; }
    ::selection { background: transparent; }
    ::-moz-selection { background: transparent; }

    :root{
      /* Dark defaults */
      --bg:#050505;
      --bg2:#070707;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --card-divider: rgba(255, 255, 255, 0.06);

      --text:#fdfdfd;
      --text-muted: rgba(242,242,242,0.65);
      --text-dim: rgba(242,242,242,0.45);

      --accent:#ff671f;
      --accent2:#ff8a4c;
      --accent-glow: rgba(255,103,31,0.15);

      --shadow: 0 24px 80px rgba(0,0,0,0.6);
      --radius: 24px;

      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);
    }

    /* =========================
       Light mode (improved palette)
       ========================= */
    html[data-theme="light"]{
      --bg: #f6f7fb;
      --bg2:#ffffff;

      --card-bg: rgba(255,255,255,0.92);
      --card-border: rgba(15, 23, 42, 0.10);
      --card-divider: rgba(15, 23, 42, 0.08);

      --text: #0b1220;
      --text-muted: rgba(15, 23, 42, 0.68);
      --text-dim: rgba(15, 23, 42, 0.52);

      --accent-glow: rgba(255,103,31,0.12);
      --shadow: 0 16px 50px rgba(2, 6, 23, 0.10);
    }

    html, body{
      height:100%;
      height:100dvh;
      margin:0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow:hidden;
      overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
    }

    *{ box-sizing:border-box; }
    a{ color:inherit; text-decoration:none; }
    button, input{ font:inherit; color:inherit; }
    button{ background:none; border:none; padding:0; cursor:pointer; }

    #appWrapper{ position: relative; width: 100vw; height: 100dvh; overflow:hidden; }

    .bg-glow{
      position:absolute; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%),
        radial-gradient(circle at 85% 100%, rgba(255,255,255,0.04), transparent 60%);
    }
    html[data-theme="light"] .bg-glow{
      background:
        radial-gradient(circle at 50% 0%, rgba(255,103,31,0.14), transparent 62%),
        radial-gradient(circle at 15% 35%, rgba(2,6,23,0.06), transparent 55%),
        radial-gradient(circle at 85% 100%, rgba(2,6,23,0.05), transparent 62%);
    }

    /* Top Nav */
    .top{
      position:absolute; top:0; left:0; right:0; z-index:50;
      padding: calc(14px + var(--safeTop)) calc(14px + var(--safeRight)) 12px calc(14px + var(--safeLeft));
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      pointer-events:none;
      background: linear-gradient(180deg, rgba(5,5,5,0.92) 0%, rgba(5,5,5,0) 100%);
    }
    html[data-theme="light"] .top{
      background: linear-gradient(180deg, rgba(246,247,251,0.92) 0%, rgba(246,247,251,0) 100%);
    }
    .top > *{ pointer-events:auto; }

    .top-actions{ display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:flex-end; }

    .back, .pill, .btn-icon{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid var(--card-border);
      background: rgba(15,15,15,0.55);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: transform 0.2s ease, background .2s ease;
      user-select:none;
    }
    html[data-theme="light"] .back,
    html[data-theme="light"] .pill,
    html[data-theme="light"] .btn-icon{
      background: rgba(255,255,255,0.78);
    }

    .btn-icon{ width:38px; height:38px; padding:0; font-weight:800; color: var(--accent); }
    .back{ font-weight:800; font-size:14px; color: var(--text); }
    .back:active, .btn-icon:active{ transform: scale(0.96); }

    .pill{
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text-muted);
      white-space: nowrap;
    }
    .pill b{ color: var(--text); letter-spacing: 0.1em; font-weight:900; }

    /* Scroll */
    .scroll-container{
      position:absolute; inset:0;
      overflow-y:auto; overflow-x:hidden;
      scroll-snap-type: y mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling: touch;
      z-index:10;
    }
    .scroll-container::-webkit-scrollbar{ display:none; }

    /* Section/Card */
    .section-wrapper{
      height:100%;
      width:100%;
      scroll-snap-align:start;
      scroll-snap-stop:always;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding: calc(92px + var(--safeTop)) calc(16px + var(--safeRight)) calc(60px + var(--safeBottom)) calc(16px + var(--safeLeft));
      position:relative;
    }
    .card{
      width:100%;
      max-width: 860px;
      flex:1;
      min-height:0;
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      display:flex;
      flex-direction:column;
      overflow:hidden;
      opacity:0.22;
      transform: scale(0.935) translateY(26px);
      transition: opacity .7s cubic-bezier(0.16,1,0.3,1), transform .7s cubic-bezier(0.16,1,0.3,1);
    }
    .section-wrapper.is-active .card{ opacity:1; transform: scale(1) translateY(0); }

    .cardHeader{
      padding: 22px 22px 18px;
      border-bottom: 1px solid var(--card-divider);
      background: rgba(0,0,0,0.10);
      flex-shrink:0;
    }
    html[data-theme="light"] .cardHeader{
      background: rgba(2,6,23,0.02);
    }
    .kicker{
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight: 900;
    }
    .h1{
      margin:0;
      font-size: clamp(22px, 5vw, 28px);
      line-height: 1.3;
      letter-spacing: -0.01em;
      font-weight: 900;
    }

    .cardBody{
      padding: 22px;
      overflow-y:auto;
      -webkit-overflow-scrolling: touch;
      flex:1;
    }

    /* Typography */
    .big{
      font-size: clamp(30px, 6.2vw, 46px);
      line-height: 1.08;
      font-weight: 950;
      letter-spacing: -0.03em;
      margin: 0 0 18px;
    }
    .big .accent{
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      -webkit-background-clip:text;
      -webkit-text-fill-color: transparent;
      color: var(--accent);
    }
    .lead{
      font-size: 17px;
      line-height: 1.7;
      color: var(--text-muted);
      margin: 0 0 14px;
    }
    .list{
      margin: 18px 0;
      padding: 0;
      list-style:none;
      color: var(--text-muted);
      font-size: 16px;
      line-height: 1.7;
    }
    .list li{
      position:relative;
      padding-left: 24px;
      margin: 12px 0;
    }
    .list li::before{
      content:'→';
      position:absolute; left:0;
      color: var(--accent);
      font-weight: 950;
    }
    .quote{
      margin: 20px 0 14px;
      padding: 14px 16px;
      border-left: 3px solid var(--accent);
      background: linear-gradient(90deg, var(--accent-glow), transparent);
      border-radius: 0 12px 12px 0;
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
      font-style: italic;
    }
    html[data-theme="light"] .quote{
      background: linear-gradient(90deg, rgba(255,103,31,0.12), rgba(255,255,255,0));
    }

    /* Buttons */
    .ctaRow{ display:flex; gap:10px; flex-wrap:wrap; margin-top: 14px; }
    .btn{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px;
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(0,0,0,0.16);
      color: var(--text);
      font-weight: 900;
      font-size: 14px;
      user-select:none;
      transition: transform .15s ease, filter .15s ease, background .2s ease;
    }
    html[data-theme="light"] .btn{
      background: rgba(255,255,255,0.72);
    }
    .btn:active{ transform: scale(0.98); }
    .btn.primary{
      background: var(--accent);
      border-color: rgba(255,103,31,0.55);
      color:#fff;
    }
    .btn.primary:hover{ filter: brightness(1.06); }

    .chipRow{ display:flex; flex-wrap:wrap; gap:8px; margin-top: 10px; }
    .chip{
      font-size: 12px;
      border: 1px solid var(--card-border);
      border-radius: 999px;
      padding: 7px 10px;
      color: var(--text-muted);
      background: rgba(0,0,0,0.14);
    }
    html[data-theme="light"] .chip{
      background: rgba(2,6,23,0.04);
      color: rgba(15,23,42,0.70);
    }

    /* Subscribe UI (mailto) */
    .formBox{
      border: 1px solid var(--card-border);
      background: rgba(0,0,0,.14);
      border-radius: 18px;
      padding: 14px;
      margin-top: 14px;
    }
    html[data-theme="light"] .formBox{
      background: rgba(255,255,255,0.72);
    }

    .fieldRow{
      display:grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items:center;
      margin-top: 10px;
    }
    @media (max-width: 520px){
      .fieldRow{ grid-template-columns: 1fr; }
      .btn{ width:100%; }
    }

    .input{
      width: 100%;
      border-radius: 12px;
      border: 1px solid var(--card-border);
      background: rgba(0,0,0,.22);
      color: var(--text);
      padding: 12px 12px;
      font-size: 14px;
      outline: none;
    }
    html[data-theme="light"] .input{
      background: rgba(2,6,23,0.04);
    }

    .input:focus{
      border-color: rgba(255,103,31,.45);
      box-shadow: 0 0 0 3px rgba(255,103,31,.14);
    }

    .fineprint{
      margin-top: 10px;
      font-size: 12.5px;
      color: var(--text-dim);
      line-height: 1.5;
    }
    .statusLine{
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
      user-select: none;
    }
    .statusLine.ok{ color: rgba(34,197,94,.95); }
    .statusLine.bad{ color: rgba(239,68,68,.95); }

    /* Scroll hint */
    .hint{
      position:absolute;
      bottom: calc(16px + var(--safeBottom));
      left:50%;
      transform: translateX(-50%);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:6px;
      color: rgba(255,255,255,0.35);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      pointer-events:none;
      animation: pulse 2s infinite;
    }
    html[data-theme="light"] .hint{ color: rgba(2,6,23,0.35); }
    .hint svg{ width: 14px; height: 14px; stroke: currentColor; fill:none; stroke-width: 2.5; }
    @keyframes pulse{
      0%,100%{ transform: translateX(-50%) translateY(0); opacity: 0.6; }
      50%{ transform: translateX(-50%) translateY(5px); opacity: 1; }
    }
    .section-wrapper:last-child .hint{ display:none; }
  </style>
</head>

<body>
  <div id="appWrapper">
    <div class="bg-glow"></div>

    <div class="top">
      <a class="back" href="#" data-back>← Back</a>

      <div class="top-actions">
        <button class="btn-icon" id="themeBtn" aria-label="Toggle theme" title="Toggle theme">☾</button>
        <button class="btn-icon" id="langBtn" aria-label="Translate" title="Translate">A/अ</button>
        <div class="pill"><b id="secLabel">SEC 1/8</b> • <span id="secName">INTRO</span></div>
      </div>
    </div>

    <main class="scroll-container" id="scrollContainer"></main>
  </div>

  <script>
    (function(){
      "use strict";

      // ======= CONFIG =======
      const SUBSCRIBE_TO_EMAIL = "dharam@viadecide.com";

      // ======= THEME =======
      const THEME_KEY = "vdTheme";
      const themeBtn = document.getElementById("themeBtn");

      function applyTheme(t){
        const theme = (t === "light") ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", theme);
        try { localStorage.setItem(THEME_KEY, theme); } catch(e){}
        if(themeBtn) themeBtn.textContent = (theme === "light") ? "☀" : "☾";
      }
      (function initTheme(){
        let saved = "dark";
        try { saved = localStorage.getItem(THEME_KEY) || "dark"; } catch(e){}
        applyTheme(saved);
      })();

      if(themeBtn){
        themeBtn.addEventListener("click", () => {
          const cur = document.documentElement.getAttribute("data-theme") || "dark";
          applyTheme(cur === "dark" ? "light" : "dark");
        });
      }

      // ======= AFFILIATE TAG (optional, preserved) =======
      function getParam(key){
        try{
          const u = new URL(location.href);
          const v = u.searchParams.get(key);
          return v ? v.trim() : null;
        }catch(e){ return null; }
      }
      function normalizeTag(t){
        t = (t || "").trim().replace(/[^\w.-]/g,"").slice(0,64);
        return t || "viadecide";
      }
      function getAffiliateTag(){
        let t = normalizeTag(getParam("tag") || getParam("aff"));
        try{
          const stored = localStorage.getItem("affiliateTag");
          if(stored) t = normalizeTag(stored);
          if(getParam("tag") || getParam("aff")) localStorage.setItem("affiliateTag", t);
        }catch(e){}
        return t;
      }

      function safeNowIST(){
        try {
          return new Intl.DateTimeFormat("en-GB", {
            timeZone:"Asia/Kolkata", year:"numeric", month:"2-digit", day:"2-digit",
            hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false
          }).format(new Date()).replace(",","");
        } catch(e){ return new Date().toISOString(); }
      }

      // ======= LANGUAGE =======
      let currentLang = "en";
      const langBtn = document.getElementById("langBtn");
      if(langBtn){
        langBtn.addEventListener("click", () => {
          currentLang = (currentLang === "en") ? "hi" : "en";
          renderSections();
        });
      }

      // ======= CONTENT =======
      const SECTIONS = [
        {
          name:"INTRO",
          kicker:"Gifting Psychology",
          title:{ en:"Gifts That Mean More: Why Personalization Wins", hi:"ऐसे गिफ्ट जो ज़्यादा मायने रखते हैं" },
          html:{
            en:()=>`
              <div class="big">Most people think expensive = <span class="accent">meaningful.</span></div>
              <p class="lead">
                But the gifts people remember aren’t always the costly ones. They’re the ones that feel <b>specific</b>.
                The ones that say: <i>“I see you.”</i>
              </p>
              <div class="quote">
                Personalization doesn’t add “luxury.” It adds identity — and identity is what bonds to memory.
              </div>

              <div class="ctaRow" style="margin-top:16px;">
                <a class="btn primary" href="guides">All Blogs / Guides →</a>
                <a class="btn" href="keychain">View Product (3D Preview) →</a>
              </div>
            `,
            hi:()=>`
              <div class="big">अक्सर लोग सोचते हैं: महँगा = <span class="accent">meaningful</span></div>
              <p class="lead">
                लेकिन सबसे यादगार गिफ्ट अक्सर सबसे महँगे नहीं होते। सबसे यादगार वो होते हैं जो <b>स्पेसिफिक</b> लगते हैं।
                जो कहते हैं: <i>“मैंने तुम्हें समझा।”</i>
              </p>
              <div class="quote">
                Personalization “luxury” नहीं जोड़ता — यह identity जोड़ता है। और identity memory से जुड़ती है।
              </div>
              <div class="ctaRow" style="margin-top:16px;">
                <a class="btn primary" href="guides">All Blogs / Guides →</a>

          }
        },
        {
          name:"1/6 • SYMBOL",
          kicker:"Principle 1",
          title:{ en:"Personalized gifts become emotional symbols", hi:"Personalized गिफ्ट भावनात्मक प्रतीक बनते हैं" },
          html:{
            en:()=>`
              <p class="lead">

              <p class="lead">

              </p>

          }
        },
        {

          kicker:"Principle 3",
          title:{ en:"Everyday objects become memory triggers", hi:"रोज़मर्रा की चीज़ें memory trigger बनती हैं" },
          html:{
            en:()=>`

            hi:()=>`

              <ul class="list">
                <li>Keychain रोज़ हाथ में आता है।</li>
                <li>रोज़ = recall।</li>
                <li>recall = bond मजबूत।</li>
              </ul>
            `
          }
        },
        {
          name:"SELLER NOTE",
          kicker:"For Sellers",
          title:{ en:"Why this matters for 3D printing sellers", hi:"3D printing sellers के लिए क्यों ज़रूरी" },
          html:{
            en:()=>`
              <div class="big">For 3D printed products, <span class="accent">trust</span> is the bottleneck.</div>
              <p class="lead">
                Online, meaning travels best as: <b>story + proof</b>. And proof is where <b>3D preview</b> wins.
              </p>
              <ul class="list">
                <li>Story explains the “why”.</li>
                <li>Specs reduce doubt.</li>
                <li><b>3D preview builds trust</b>.</li>
              </ul>
              <div class="ctaRow">
                <a class="btn primary" href="keychain">See the Keychain demo (3D) →</a>
                <a class="btn" href="guides">Browse all blogs →</a>
              </div>
            `,
            hi:()=>`
              <div class="big">3D printed products में bottleneck <span class="accent">trust</span> है।</div>
              <p class="lead">Story + proof से trust तेज़ बनता है। 3D preview buyers को “see for yourself” देता है।</p>
              <div class="ctaRow">
                <a class="btn primary" href="keychain">Keychain demo (3D) →</a>
                <a class="btn" href="guides">All blogs →</a>
              </div>
            `
          }
        },

        // ======= SUBSCRIBE (MAILTO REDIRECT) =======
        {
          name:"SUBSCRIBE",
          kicker:"Daily Updates",
          title:{ en:"Get one decision insight daily", hi:"हर दिन 1 decision insight" },
          html:{
            en:()=>`
              <div class="big">A calm daily <span class="accent">signal.</span></div>
              <p class="lead">
                One short update: what changed, what matters, what to ignore — so you decide with less noise.
              </p>

              <div class="formBox" id="subBox">
                <div id="subBefore">
                  <div class="chipRow">
                    <span class="chip">No spam</span>
                    <span class="chip">1 email/day</span>
                    <span class="chip">Unsubscribe anytime</span>
                  </div>

                  <div class="fieldRow">
                    <input class="input" id="subEmail" type="email" inputmode="email" autocomplete="email"
                      placeholder="you@example.com" aria-label="Email address" />
                    <button class="btn primary" id="subBtn" type="button">Subscribe →</button>
                  </div>

                  <div class="statusLine" id="subStatus"></div>

                  <div class="fineprint">
                    This opens your email app with a pre-filled message. Hit “Send” to subscribe.
                  </div>
                </div>

                <div id="subAfter" style="display:none;">
                  <div class="quote" style="margin-top:0;">✅ Draft email opened. Press “Send” to confirm subscription.</div>
                  <p class="lead" style="margin-bottom:0;">Explore more:</p>
                  <div class="ctaRow">
                    <a class="btn primary" href="guides">All Blogs / Guides →</a>
                    <a class="btn" href="keychain">Product demo (3D) →</a>
                  </div>
                </div>
              </div>
            `,
            hi:()=>`
              <div class="big">हर दिन एक <span class="accent">शांत</span> अपडेट।</div>
              <p class="lead">
                1 छोटा email: क्या बदला, क्या मायने रखता है, क्या ignore करें — ताकि निर्णय आसान हो।
              </p>

              <div class="formBox" id="subBox">
                <div id="subBefore">
                  <div class="chipRow">
                    <span class="chip">Spam नहीं</span>
                    <span class="chip">1 email/day</span>
                    <span class="chip">कभी भी unsubscribe</span>
                  </div>

                  <div class="fieldRow">
                    <input class="input" id="subEmail" type="email" inputmode="email" autocomplete="email"
                      placeholder="you@example.com" aria-label="Email address" />
                    <button class="btn primary" id="subBtn" type="button">Subscribe →</button>
                  </div>

                  <div class="statusLine" id="subStatus"></div>

                  <div class="fineprint">
                    आपका email app खुलेगा। बस “Send” दबाकर subscribe करें।
                  </div>
                </div>

                <div id="subAfter" style="display:none;">
                  <div class="quote" style="margin-top:0;">✅ Draft email खुल गया। Confirm करने के लिए “Send” दबाएँ।</div>
                  <div class="ctaRow">
                    <a class="btn primary" href="guides">All Blogs / Guides →</a>
                    <a class="btn" href="keychain">Product demo (3D) →</a>
                  </div>
                </div>
              </div>
            `
          }
        }
      ];

      // ======= RENDER =======
      const container = document.getElementById("scrollContainer");
      const secLabelEl = document.getElementById("secLabel");
      const secNameEl  = document.getElementById("secName");

      const observerOptions = { root: container, threshold: 0.62 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting){
            entry.target.classList.add("is-active");
            const idx = parseInt(entry.target.getAttribute("data-index") || "0", 10);
            secLabelEl.textContent = `SEC ${idx + 1}/${SECTIONS.length}`;
            secNameEl.textContent  = entry.target.getAttribute("data-name") || "";
          } else {
            entry.target.classList.remove("is-active");
          }
        });
      }, observerOptions);

      function renderSections(){
        container.innerHTML = "";
        SECTIONS.forEach((sec, idx) => {
          const wrap = document.createElement("div");
          wrap.className = "section-wrapper";
          wrap.setAttribute("data-index", String(idx));
          wrap.setAttribute("data-name", sec.name);

          wrap.innerHTML = `
            <article class="card">
              <header class="cardHeader">
                <div class="kicker">${sec.kicker}</div>
                <h1 class="h1">${sec.title[currentLang]}</h1>
              </header>
              <div class="cardBody">
                ${sec.html[currentLang]()}
                <div style="height:80px;"></div>
              </div>
            </article>
            <div class="hint">
              <span>Scroll for more</span>
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          `;
          container.appendChild(wrap);
          observer.observe(wrap);
        });

        setTimeout(wireSubscribeUI, 0);
      }

      // ======= SUBSCRIBE (MAILTO REDIRECT) =======
      function wireSubscribeUI(){
        const before = document.getElementById("subBefore");
        const after  = document.getElementById("subAfter");
        if(!before || !after) return;

        const emailEl  = document.getElementById("subEmail");
        const btnEl    = document.getElementById("subBtn");
        const statusEl = document.getElementById("subStatus");

        function setStatus(msg, cls){
          if(!statusEl) return;
          statusEl.className = "statusLine" + (cls ? " " + cls : "");
          statusEl.textContent = msg || "";
        }

        function validEmail(v){
          v = String(v || "").trim();
          return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
        }

        // restore email
        try{
          const saved = localStorage.getItem("vdSubEmail") || "";
          if(saved && emailEl) emailEl.value = saved;
        }catch(e){}

        if(!btnEl) return;

        btnEl.onclick = () => {
          const fromEmail = (emailEl ? emailEl.value : "").trim();
          if(!validEmail(fromEmail)){
            setStatus(currentLang === "hi" ? "कृपया सही email डालें।" : "Please enter a valid email.", "bad");
            return;
          }

          try { localStorage.setItem("vdSubEmail", fromEmail); } catch(e){}

          const tag = getAffiliateTag();
          const page = location.href;
          const ts = safeNowIST();

          const subject = `Subscribe: ViaDecide daily updates (${fromEmail})`;
          const body = [
            "Hi ViaDecide,",
            "",
            "Please add me to the daily decision insight updates.",
            "",
            `Email: ${fromEmail}`,
            `Source page: ${page}`,
            `Timestamp (IST): ${ts}`,
            `Affiliate tag (if any): ${tag}`,
            "",
            "Thanks!"
          ].join("\n");

          const mailto = `mailto:${encodeURIComponent(SUBSCRIBE_TO_EMAIL)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;

          setStatus(currentLang === "hi" ? "Email app खुल रहा है…" : "Opening your email app…", "ok");
          before.style.display = "none";
          after.style.display = "block";

          window.location.href = mailto;
        };
      }

      // Boot
      renderSections();

    })();
  </script>
</body>
</html>
