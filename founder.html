<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Founder • Weekly Decision Reviews</title>

  <style>
    :root {
      --bg: #050505;
      --card-bg: rgba(18, 18, 20, 0.75);
      --card-border: rgba(255, 255, 255, 0.08);
      --text: #fdfdfd;
      --text-muted: rgba(242, 242, 242, 0.65);
      --accent: #ff671f;
      --accent-glow: rgba(255, 103, 31, 0.16);
      --accent2: #22c55e;
      --shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
      --radius: 24px;

      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);

      --maxw: 860px;
    }

    html, body {
      height: 100%; height: 100dvh; margin: 0;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden; overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    a { color: inherit; text-decoration: none; }
    button { background: none; border: none; padding: 0; font: inherit; color: inherit; cursor: pointer; }

    /* Ambient glow */
    .bg-glow {
      position:absolute; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%),
        radial-gradient(circle at 90% 100%, rgba(255,255,255,0.04), transparent 60%);
    }

    /* Top */
    .top {
      position:absolute; top:0; left:0; right:0; z-index:50;
      padding: calc(14px + var(--safeTop)) calc(14px + var(--safeRight)) 12px calc(14px + var(--safeLeft));
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      pointer-events:none;
      background: linear-gradient(180deg, rgba(5,5,5,0.96) 0%, rgba(5,5,5,0) 100%);
    }
    .top > * { pointer-events:auto; }

    .back, .pill, .btn-icon {
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding: 10px 14px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(15,15,15,0.66);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      transition: transform .18s ease, border-color .18s ease, background .18s ease;
      user-select:none;
    }
    .back { font-weight:700; font-size:13px; color:rgba(255,255,255,0.92); }
    .back:active { transform: scale(0.97); }
    .btn-icon { width:40px; height:40px; padding:10px; color:var(--accent); font-weight:900; }
    .btn-icon:active { transform: scale(0.97); }
    .pill { font-size:11px; letter-spacing: .12em; text-transform: uppercase; color: var(--text-muted); white-space: nowrap; }
    .pill b { color:#fff; font-weight:900; letter-spacing: .1em; }

    /* Scroll */
    .scroll-container{
      position:absolute; inset:0;
      overflow-y:auto; overflow-x:hidden;
      scroll-snap-type:y mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      z-index:10;
    }
    .scroll-container::-webkit-scrollbar{ display:none; }

    /* Section / Card */
    .section-wrapper{
      height:100%; width:100%;
      scroll-snap-align:start;
      scroll-snap-stop: always;
      display:flex; align-items:center; justify-content:center;
      padding: calc(88px + var(--safeTop)) calc(14px + var(--safeRight)) calc(96px + var(--safeBottom)) calc(14px + var(--safeLeft));
      position:relative;
    }
    .card{
      width:100%; max-width: var(--maxw);
      height:100%;
      border-radius: var(--radius);
      border:1px solid var(--card-border);
      background: var(--card-bg);
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow);
      display:flex; flex-direction:column;
      overflow:hidden;
      opacity:.35; transform: scale(.94) translateY(26px);
      transition: opacity .7s cubic-bezier(0.16,1,0.3,1), transform .7s cubic-bezier(0.16,1,0.3,1);
      min-height:0;
    }
    .section-wrapper.is-active .card{ opacity:1; transform: scale(1) translateY(0); }

    .cardHeader{
      padding: 22px 22px 18px;
      border-bottom:1px solid rgba(255,255,255,0.06);
      background: rgba(0,0,0,0.28);
      flex-shrink:0;
    }
    .kicker{
      font-size:11px; letter-spacing:.15em; text-transform:uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      font-weight:900;
    }
    .h1{
      margin:0;
      font-size: clamp(22px, 4.8vw, 30px);
      line-height:1.25;
      letter-spacing:-0.01em;
      font-weight:900;
    }

    .cardBody{
      padding: 22px;
      overflow:auto;
      -webkit-overflow-scrolling:touch;
      flex:1; min-height:0;
    }
    .cardBody::-webkit-scrollbar { width: 5px; }
    .cardBody::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    /* Typography */
    .big{
      font-size: clamp(28px, 6vw, 46px);
      line-height: 1.08;
      font-weight: 950;
      letter-spacing:-0.03em;
      margin: 0 0 18px;
    }
    .accentText{
      background: linear-gradient(135deg, #ff8a4c, #ff4c00);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      color: var(--accent);
    }
    .lead{ font-size:17px; line-height:1.65; color: rgba(255,255,255,0.86); margin: 0 0 14px; }
    .muted{ color: var(--text-muted); }
    .list{ margin:18px 0; padding:0; list-style:none; color: rgba(255,255,255,0.78); font-size:16px; line-height:1.6; }
    .list li{ position:relative; padding-left:24px; margin: 12px 0; }
    .list li::before{ content:"→"; position:absolute; left:0; color: var(--accent); font-weight:900; }
    .quote{
      margin: 22px 0 16px;
      padding: 14px 18px;
      border-left: 3px solid var(--accent);
      background: linear-gradient(90deg, var(--accent-glow), transparent);
      border-radius: 0 12px 12px 0;
      color: rgba(255,255,255,0.95);
      line-height:1.6;
      font-size:15px;
      font-style: italic;
    }

    /* Strong CTA blocks */
    .ctaBox{
      margin: 18px 0;
      border-radius: 18px;
      border: 1px solid rgba(255,103,31,0.24);
      background: linear-gradient(180deg, rgba(255,103,31,0.10), rgba(0,0,0,0.10));
      padding: 16px;
    }
    .ctaHead{
      display:flex; align-items:flex-start; justify-content:space-between; gap:12px;
    }
    .ctaHead strong{
      display:block;
      font-size: 15px;
      letter-spacing: .02em;
    }
    .ctaHead span{
      display:block;
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .ctaRow{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:10px;
      margin-top: 14px;
    }
    @media (max-width:520px){ .ctaRow{ grid-template-columns: 1fr; } }

    .btn{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      width:100%;
      padding: 14px 14px;
      border-radius: 12px;
      font-weight: 900;
      font-size: 14px;
      letter-spacing: .02em;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(0,0,0,0.28);
      transition: transform .18s ease, filter .18s ease, border-color .18s ease;
      user-select:none;
    }
    .btn:active{ transform: scale(0.985); filter: brightness(1.08); }
    .btnPrimary{
      background: linear-gradient(135deg, rgba(255,103,31,0.98), rgba(255,103,31,0.60));
      border-color: rgba(255,103,31,0.34);
      color:#0b0b0b;
    }
    .btnGhost{
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.14);
      color:#fff;
    }
    .btnOk{
      background: rgba(34,197,94,0.92);
      border-color: rgba(34,197,94,0.35);
      color:#08130c;
      font-weight:950;
    }

    .field{
      display:flex; flex-direction:column; gap:8px; margin-top: 12px;
    }
    .field label{
      font-size: 12px; text-transform: uppercase; letter-spacing: .12em;
      color: var(--text-muted); font-weight: 800;
    }
    .field input{
      background: rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 14px 14px;
      color:#fff;
      font-size: 15px;
      outline:none;
    }
    .field input:focus{
      border-color: rgba(255,103,31,0.55);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* Sticky bottom mega CTA */
    .stickyCTA{
      position: fixed;
      left: calc(12px + var(--safeLeft));
      right: calc(12px + var(--safeRight));
      bottom: calc(12px + var(--safeBottom));
      z-index: 60;
      max-width: var(--maxw);
      margin: 0 auto;
      display:flex;
      gap:10px;
      padding: 10px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(10,10,10,0.72);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      box-shadow: 0 18px 60px rgba(0,0,0,0.55);
    }
    .stickyCTA .left{
      flex:1;
      min-width:0;
      display:flex; flex-direction:column; gap:2px;
      padding: 4px 6px 4px 8px;
    }
    .stickyCTA .left b{
      font-size: 13px; letter-spacing: .01em;
    }
    .stickyCTA .left span{
      font-size: 12px; color: var(--text-muted); white-space: nowrap; overflow:hidden; text-overflow: ellipsis;
    }
    .stickyCTA .right{ width: 220px; }
    @media (max-width:520px){
      .stickyCTA{ flex-direction:column; }
      .stickyCTA .right{ width:100%; }
      .stickyCTA .left span{ white-space:normal; }
    }

    /* Small hint */
    .hint{
      position:absolute;
      bottom: calc(14px + var(--safeBottom));
      left: 50%;
      transform: translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:6px;
      color: rgba(255,255,255,0.35);
      font-size: 11px; letter-spacing: .12em; text-transform: uppercase;
      pointer-events:none;
      animation: pulse 2s infinite;
      z-index: 100;
    }
    .hint svg{ width:14px; height:14px; stroke: currentColor; fill:none; stroke-width: 2.5; }
    @keyframes pulse{
      0%,100%{ transform: translateX(-50%) translateY(0); opacity:.55; }
      50%{ transform: translateX(-50%) translateY(6px); opacity:1; }
    }
    .section-wrapper:last-child .hint{ display:none; }
  </style>
</head>

<body>
  <div class="bg-glow"></div>

  <div class="top">
    <a class="back" href="index.html" id="btnBack">← Back</a>
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="btn-icon" id="btnTranslate" title="Translate">A/अ</button>
      <div class="pill"><b id="secLabel">SEC 1/7</b> • <span id="secName">INTRO</span></div>
    </div>
  </div>

  <main class="scroll-container" id="scrollContainer"></main>

  <!-- Sticky mega CTA -->
  <div class="stickyCTA" role="region" aria-label="Primary call to action">
    <div class="left">
      <b>Run your first Weekly Decision Review this Friday.</b>
      <span>30 minutes → better judgment → compounding advantage.</span>
    </div>
    <div class="right">
      <button class="btn btnPrimary" id="ctaStart">Start the 30-Minute Review →</button>
    </div>
  </div>

  <script>
    (function(){
      "use strict";

      // Back button: prefer history.back, fallback to index.html
      document.getElementById("btnBack").addEventListener("click", function(e){
        e.preventDefault();
        if (history.length > 1) history.back();
        else location.href = "index.html";
      });

      const WA_NUMBER = "916351537770";
      const container = document.getElementById("scrollContainer");
      const secLabel = document.getElementById("secLabel");
      const secName = document.getElementById("secName");
      const btnTranslate = document.getElementById("btnTranslate");
      const ctaStart = document.getElementById("ctaStart");

      let lang = "en";

      const BLOG = {
        title: {
          en: "How To Run Weekly Decision Reviews (Like a Founder)",
          hi: "साप्ताहिक निर्णय समीक्षा कैसे करें (संस्थापक की तरह)"
        },
        sections: [
          {
            name:"INTRO",
            kicker:{en:"Founder Ritual", hi:"संस्थापक रिवाज"},
            title:{en:"A 30-minute ritual that upgrades judgment", hi:"30 मिनट का रिवाज जो निर्णय क्षमता बढ़ाता है"},
            html:{
              en: () => `
                <div class="big">Most teams review <span class="accentText">results.</span><br>Founders review <span class="accentText">decisions.</span></div>
                <p class="lead">Outcomes fluctuate. Decision quality compounds. This weekly ritual makes your business <b>learn faster than competitors</b>.</p>
                <div class="ctaBox">
                  <div class="ctaHead">
                    <div>
                      <strong>⚡ Your mission:</strong>
                      <span>Pick 3–5 decisions from last week and audit the reasoning—before the next week starts.</span>
                    </div>
                  </div>
                  <div class="ctaRow">
                    <button class="btn btnPrimary" onclick="jumpTo('FORMAT')">See the 30-minute format →</button>
                    <button class="btn btnGhost" onclick="openTemplate()">Download template</button>
                  </div>
                </div>
                <div class="quote">If you only review what happened, your judgment never improves. Review why you chose it.</div>
              `,
              hi: () => `
                <div class="big">अधिकांश टीमें <span class="accentText">परिणाम</span> देखती हैं।<br>संस्थापक <span class="accentText">निर्णय</span> देखते हैं।</div>
                <p class="lead">परिणाम बदलते रहते हैं। निर्णय गुणवत्ता बढ़ती रहती है। यह साप्ताहिक रिवाज आपके व्यवसाय को <b>तेज़ सीखने</b> वाला बनाता है।</p>
                <div class="ctaBox">
                  <div class="ctaHead">
                    <div>
                      <strong>⚡ आपका मिशन:</strong>
                      <span>पिछले सप्ताह के 3–5 निर्णय चुनें और तर्क की समीक्षा करें—अगला सप्ताह शुरू होने से पहले।</span>
                    </div>
                  </div>
                  <div class="ctaRow">
                    <button class="btn btnPrimary" onclick="jumpTo('FORMAT')">30-मिनट फॉर्मेट देखें →</button>
                    <button class="btn btnGhost" onclick="openTemplate()">टेम्पलेट डाउनलोड करें</button>
                  </div>
                </div>
                <div class="quote">अगर आप सिर्फ “क्या हुआ” देखते हैं, तो निर्णय क्षमता नहीं बढ़ती। “क्यों चुना” देखें।</div>
              `
            }
          },
          {
            name:"WHY",
            kicker:{en:"The Problem", hi:"समस्या"},
            title:{en:"Why most reviews don’t improve judgment", hi:"अधिकांश रिव्यू निर्णय क्षमता क्यों नहीं बढ़ाते"},
            html:{
              en: () => `
                <div class="big">Outcome reviews create <span class="accentText">reaction</span>, not learning.</div>
                <p class="lead">Most weekly meetings are dashboards + updates. Then someone says: “Let’s try this.”</p>
                <ul class="list">
                  <li><b>No reasoning audit</b> → same mistakes repeat.</li>
                  <li><b>No assumptions named</b> → emotions drive choices.</li>
                  <li><b>No decision log</b> → the team forgets what it learned.</li>
                </ul>
                <div class="quote">A decision can be good even if the outcome is bad. Without reviewing reasoning, you can’t tell the difference.</div>
              `,
              hi: () => `
                <div class="big">परिणाम-रिव्यू <span class="accentText">सीख</span> नहीं, प्रतिक्रिया बनाते हैं।</div>
                <p class="lead">अधिकांश मीटिंग्स डैशबोर्ड + अपडेट होती हैं। फिर कोई कहता है: “चलो ये ट्राई करें।”</p>
                <ul class="list">
                  <li><b>तर्क की समीक्षा नहीं</b> → वही गलतियाँ दोहरती हैं।</li>
                  <li><b>अनुमान स्पष्ट नहीं</b> → भावनाएँ निर्णय चलाती हैं।</li>
                  <li><b>लॉग नहीं</b> → टीम सीख भूल जाती है।</li>
                </ul>
                <div class="quote">कभी-कभी अच्छा निर्णय भी खराब परिणाम दे सकता है। तर्क देखे बिना फर्क नहीं समझ आएगा।</div>
              `
            }
          },
          {
            name:"MINDSET",
            kicker:{en:"Founder Shift", hi:"संस्थापक बदलाव"},
            title:{en:"Operators manage tasks. Founders design decisions.", hi:"ऑपरेटर कार्य संभालते हैं। संस्थापक निर्णय डिज़ाइन करते हैं।"},
            html:{
              en: () => `
                <div class="big">Change the weekly question:</div>
                <ul class="list">
                  <li><b>Operator:</b> “What should we do now?”</li>
                  <li><b>Founder:</b> “How do we improve how we decide?”</li>
                </ul>
                <p class="lead">This ritual upgrades clarity, reduces ego, and speeds decisions—because the team knows decisions will be reviewed.</p>
                <div class="ctaBox">
                  <strong>✅ Rule:</strong>
                  <span>We review the <b>decision</b>, not the person. No blame. Only learning.</span>
                </div>
              `,
              hi: () => `
                <div class="big">साप्ताहिक सवाल बदलिए:</div>
                <ul class="list">
                  <li><b>ऑपरेटर:</b> “अब क्या करें?”</li>
                  <li><b>संस्थापक:</b> “निर्णय कैसे बेहतर करें?”</li>
                </ul>
                <p class="lead">यह रिवाज स्पष्टता बढ़ाता है, अहं कम करता है, और निर्णय गति बढ़ाता है—क्योंकि टीम जानती है कि निर्णय रिव्यू होंगे।</p>
                <div class="ctaBox">
                  <strong>✅ नियम:</strong>
                  <span>हम <b>निर्णय</b> की समीक्षा करते हैं, व्यक्ति की नहीं। दोष नहीं—सिर्फ सीख।</span>
                </div>
              `
            }
          },
          {
            name:"FORMAT",
            kicker:{en:"30 Minutes", hi:"30 मिनट"},
            title:{en:"The exact 4-step structure", hi:"सटीक 4-स्टेप संरचना"},
            html:{
              en: () => `
                <div class="big">Keep it tight. <span class="accentText">No noise.</span></div>
                <ul class="list">
                  <li><b>Step 1 (10m):</b> Identify 3–5 key decisions (not tasks).</li>
                  <li><b>Step 2 (10m):</b> Revisit reasoning: why, expected outcome, assumptions.</li>
                  <li><b>Step 3 (5m):</b> Compare early signals vs expectation (direction, not verdict).</li>
                  <li><b>Step 4 (5m):</b> Extract 1 lesson and update your rulebook.</li>
                </ul>
                <div class="ctaBox">
                  <strong>🎯 Founder standard:</strong>
                  <span>If a decision is <b>irreversible</b> (hire, contract, pricing structure), it gets deeper scrutiny.</span>
                  <div class="ctaRow">
                    <button class="btn btnPrimary" onclick="openTemplate()">Open the Decision Log template →</button>
                    <button class="btn btnGhost" onclick="sendWA('I want the weekly decision review template.')">Get it on WhatsApp</button>
                  </div>
                </div>
              `,
              hi: () => `
                <div class="big">सख्त रखें। <span class="accentText">कोई शोर नहीं।</span></div>
                <ul class="list">
                  <li><b>स्टेप 1 (10m):</b> 3–5 प्रमुख निर्णय चुनें (टास्क नहीं)।</li>
                  <li><b>स्टेप 2 (10m):</b> तर्क: क्यों, अपेक्षित परिणाम, कौन से अनुमान।</li>
                  <li><b>स्टेप 3 (5m):</b> शुरुआती संकेत देखें (दिशा, अंतिम निर्णय नहीं)।</li>
                  <li><b>स्टेप 4 (5m):</b> 1 सीख निकालें और नियम अपडेट करें।</li>
                </ul>
                <div class="ctaBox">
                  <strong>🎯 मानक:</strong>
                  <span>अगर निर्णय <b>अपरिवर्तनीय</b> है (हायरिंग, कॉन्ट्रैक्ट, प्राइसिंग स्ट्रक्चर) तो अधिक गहराई से देखें।</span>
                  <div class="ctaRow">
                    <button class="btn btnPrimary" onclick="openTemplate()">निर्णय लॉग टेम्पलेट खोलें →</button>

      function render(){
        container.innerHTML = "";
        BLOG.sections.forEach((s, i) => {
          const wrap = document.createElement("div");
          wrap.className = "section-wrapper";
          wrap.dataset.index = i;
          wrap.dataset.name = s.name;

          wrap.innerHTML = `
            <article class="card">
              <header class="cardHeader">
                <div class="kicker">${s.kicker[lang]}</div>
                <h1 class="h1">${s.title[lang]}</h1>
              </header>
              <div class="cardBody">
                ${s.html[lang]()}
                <div style="height:80px;"></div>
              </div>
            </article>
            <div class="hint">
              <span>Scroll</span>
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          `;
          container.appendChild(wrap);
        });

        document.querySelectorAll(".section-wrapper").forEach(el => observer.observe(el));
      }

      // Intersection observer for pill
      const observer = new IntersectionObserver((entries)=>{
        entries.forEach(e=>{
          if(e.isIntersecting){
            e.target.classList.add("is-active");
            const idx = parseInt(e.target.dataset.index, 10) || 0;
            secLabel.textContent = `SEC ${idx+1}/${BLOG.sections.length}`;
            secName.textContent = e.target.dataset.name || "—";
          } else {
            e.target.classList.remove("is-active");
          }
        });
      }, { root: container, threshold: 0.62 });

      // Translate toggle
      btnTranslate.addEventListener("click", ()=>{
        lang = (lang === "en") ? "hi" : "en";
        render();
      });

      // Strong CTA actions
      window.jumpTo = function(sectionName){
        const el = Array.from(document.querySelectorAll(".section-wrapper"))
          .find(x => x.dataset.name === sectionName);
        if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
      };

      window.openTemplate = function(){
        // Option A: open a real file if you add one:
        // location.href = "assets/decision-log-template.txt";
        // Option B: just copy template right now:
        copyTemplate();
        alert(lang === "hi" ? "टेम्पलेट कॉपी हो गया।" : "Template copied.");
      };

      window.copyTemplate = async function(){
        const txt =
`Decision:
Reason:
Expected outcome:
Actual (so far):
Lesson / rule update:`;
        try {
          await navigator.clipboard.writeText(txt);
        } catch(e){
          // fallback
          const ta = document.createElement("textarea");
          ta.value = txt; document.body.appendChild(ta);
          ta.select(); document.execCommand("copy");
          document.body.removeChild(ta);
        }
      };

      window.sendWA = function(message){
        const text = message || "I want the Weekly Decision Review template.";
        const url = `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(text)}`;
        window.open(url, "_blank");
      };

      window.joinFounder = function(){
        const email = (document.getElementById("email")?.value || "").trim();
        const msg = email
          ? `Founder Kit request.\nEmail: ${email}\nPlease send templates + next modules.`
          : `Founder Kit request.\nPlease send templates + next modules.`;
        sendWA(msg);
      };

      // Sticky CTA goes to FORMAT section
      ctaStart.addEventListener("click", ()=> jumpTo("FORMAT"));

      render();
    })();
  </script>
