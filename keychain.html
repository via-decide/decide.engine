html,body{height:100%;height:100dvh;margin:0;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;}

button{background:none;border:none;padding:0;font:inherit;color:inherit;cursor:pointer;}
.glow{position:absolute;inset:0;pointer-events:none;z-index:0;

.back{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:999px;

.tr{display:flex;align-items:center;gap:8px;}
.btnt{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;

.cs{width:100%;padding:14px 18px;border-radius:13px;border:1px solid rgba(255,255,255,0.11);background:rgba(255,255,255,0.04);

.ub{color:var(--accent);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.06em;padding:5px 10px;background:rgba(255,92,26,0.13);border-radius:999px;cursor:pointer;}

</head>

        <button class="cs" id="bondc">🛒 &nbsp;ONDC से ऑर्डर</button>
        <p class="mt">WhatsApp tap → confirm → delivery पर pay।<br><b>कोई advance नहीं। कोई risk नहीं।</b></p>`
    }
  }
];

const sc = document.getElementById('sc');
const sl = document.getElementById('sl');
const sn = document.getElementById('sn');
let lang = 'en';

document.getElementById('bk').addEventListener('click', e=>{
  e.preventDefault();
  if(window.history.length>1) window.history.back();
  else location.href='https://viadecide.com';
});

const obs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    const nm = e.target.dataset.name;
    if(e.isIntersecting){
      e.target.classList.add('active');
      const i = +e.target.dataset.i;
      sl.textContent = (i+1)+'/'+SECS.length;
      sn.textContent = nm;
      if(nm==='3D PREVIEW') mount3D();
    } else e.target.classList.remove('active');
  });
},{root:sc, threshold:0.5});

function render(){
  sc.innerHTML='';
  SECS.forEach((s,i)=>{
    const w=document.createElement('div');
    w.className='sw'; w.dataset.i=i; w.dataset.name=s.name;
    w.innerHTML=`<article class="card">
      <header class="ch"><div class="kk">${s.kicker}</div><h1 class="h1">${s.title[lang]}</h1></header>
      <div class="cb">${s.html[lang]()}<div style="height:75px"></div></div>
    </article>
    <div class="hint"><span>Scroll</span><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>`;
    sc.appendChild(w); obs.observe(w);
  });
  const bwa=document.getElementById('bwa');
  const bondc=document.getElementById('bondc');
  if(bwa) bwa.onclick=()=>window.open(WHATSAPP,'_blank');
  if(bondc) bondc.onclick=()=>window.open(ONDC==='#'?WHATSAPP:ONDC,'_blank');
}

const tt=document.getElementById('tt'), tm=document.getElementById('tm'), bu=document.getElementById('bu');
let ttimer;
function setLang(l){
  lang=l; render();
  tt.classList.add('on');
  tm.textContent=l==='hi'?'Translated to Hindi':'Reverted to English';
  bu.style.display=l==='hi'?'inline-block':'none';
  clearTimeout(ttimer); ttimer=setTimeout(()=>tt.classList.remove('on'),3500);
}
document.getElementById('btl').onclick=()=>{if(lang==='en')setLang('hi');};
bu.onclick=()=>setLang('en');

render();

/* =========================
   3D VIEWER + COLOR SWAP
========================= */
let THREE_APP = null;

const COLOR_SCHEMES = {
  blackred:  { base:"#0f0f12", accent:"#e11d2e" },
  blackwhite:{ base:"#0f0f12", accent:"#f2f2f2" },
  blackgold: { base:"#0f0f12", accent:"#d4af37" },
  navycyan:  { base:"#0b1b35", accent:"#22d3ee" },
};

function mount3D(){
  const canvas = document.getElementById('cv');
  const vh = document.getElementById('vh');
  if(!canvas || canvas.dataset.mounted) return;
  canvas.dataset.mounted = "1";

  // If THREE didn’t load (CSP), show error but keep page visible.
  if(!window.THREE || !THREE.GLTFLoader || !THREE.OrbitControls){
    if(vh) vh.textContent = "3D blocked (CSP). Host three.js locally.";
    return;
  }

  const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:false, powerPreference:"high-performance" });
  // Good color consistency
  if (renderer.outputColorSpace !== undefined) renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.setClearColor(0x0a0a0c, 1);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
  camera.position.set(0, 0.75, 2.2);

  scene.add(new THREE.AmbientLight(0xffffff, 0.35));

  const key = new THREE.DirectionalLight(0xffffff, 1.25);
  key.position.set(2.5, 4.0, 3.0);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xffffff, 0.55);
  fill.position.set(-3.0, 1.0, -2.0);
  scene.add(fill);

  const controls = new THREE.OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.enablePan = false;
  controls.minDistance = 0.9;
  controls.maxDistance = 6.0;
  controls.target.set(0,0,0);

  // Load model
  const loader = new THREE.GLTFLoader();
  loader.load(
    MODEL_URL,
    (gltf) => {
      const root = gltf.scene;

      // Center + scale to fit
      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      root.position.sub(center);

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      root.scale.setScalar(1.0 / maxDim);

      root.rotation.x = -0.35;
      root.rotation.y = 0.55;

      scene.add(root);

      // Split meshes: biggest = base, rest = accent
      const meshes = [];
      root.traverse(o => { if(o.isMesh) meshes.push(o); });

      meshes.forEach(m=>{
        if(m.material && m.material.isMeshStandardMaterial){
          m.material.metalness = Math.min(m.material.metalness ?? 0, 0.15);
          m.material.roughness = Math.max(m.material.roughness ?? 0.6, 0.55);
        }
      });

      const volumes = meshes.map(m=>{
        const b = new THREE.Box3().setFromObject(m);
        const s = b.getSize(new THREE.Vector3());
        return s.x*s.y*s.z;
      });
      const baseIdx = volumes.indexOf(Math.max(...volumes));

      THREE_APP = { renderer, scene, camera, controls, root, meshes, baseIdx };

      applyScheme("blackred"); // default
      bindColorButtons();

      if(vh) vh.style.display = "none";
    },
    undefined,
    (err) => {
      console.error(err);
      if(vh) vh.textContent = "3D failed to load (check MODEL_URL / MIME type)";
    }
  );

  // Resize
  const ro = new ResizeObserver(() => {
    const w = canvas.clientWidth, h = canvas.clientHeight;
    if(!w || !h) return;
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });
  ro.observe(canvas);

  // Double-tap reset
  let lastTap = 0;
  canvas.addEventListener("touchend", () => {
    const now = Date.now();
    if (now - lastTap < 280) {
      controls.reset();
      camera.position.set(0, 0.75, 2.2);
      controls.target.set(0, 0, 0);
      controls.update();
    }
    lastTap = now;
  }, { passive:true });

  // Render loop
  function tick(){
    requestAnimationFrame(tick);
    controls.update();
    renderer.render(scene, camera);
  }
  tick();
}

function bindColorButtons(){
  const bar = document.getElementById("colorbar");
  if(!bar) return;
  bar.querySelectorAll("button[data-scheme]").forEach(btn=>{
    btn.onclick = () => applyScheme(btn.dataset.scheme);
  });
}

function applyScheme(key){
  if(!THREE_APP) return;
  const scheme = COLOR_SCHEMES[key];
  if(!scheme) return;

  const base = new THREE.Color(scheme.base);
  const accent = new THREE.Color(scheme.accent);

  // Base mesh = biggest. Others = accent.
  THREE_APP.meshes.forEach((m, idx)=>{
    const targetColor = (idx === THREE_APP.baseIdx) ? base : accent;
    const mat = new THREE.MeshStandardMaterial({
      color: targetColor,
      roughness: 0.65,
      metalness: 0.05
    });
    m.material = mat;
  });
}
</script>
