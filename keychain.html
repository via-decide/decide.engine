<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Custom 3D Keychain — ₹349 | ViaDecide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#060608;--card-bg:rgba(14,14,18,0.85);--card-border:rgba(255,255,255,0.07);
      --text:#f8f8fa;--text-muted:rgba(235,235,245,0.55);
      --accent:#ff5c1a;--accent2:#ffb347;--accent-glow:rgba(255,92,26,0.18);
      --green:#22c55e;--shadow:0 32px 80px rgba(0,0,0,0.7);--radius:22px;
      --font-head:'Syne',sans-serif;--font-body:'DM Sans',sans-serif;
      --safeTop:env(safe-area-inset-top,0px);--safeBottom:env(safe-area-inset-bottom,0px);
      --safeLeft:env(safe-area-inset-left,0px);--safeRight:env(safe-area-inset-right,0px);
      --maxw:720px;
    }
    html,body{height:100%;height:100dvh;margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);overflow:hidden;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;}
    *{box-sizing:border-box;}
    button{background:none;border:none;padding:0;font:inherit;color:inherit;cursor:pointer;}
    .bg-glow{position:absolute;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,92,26,0.14),transparent),radial-gradient(ellipse 60% 40% at 90% 110%,rgba(255,179,71,0.06),transparent);}
    .top{position:absolute;top:0;left:0;right:0;z-index:50;padding:calc(14px + var(--safeTop)) calc(14px + var(--safeRight)) 14px calc(14px + var(--safeLeft));display:flex;align-items:center;justify-content:space-between;gap:10px;pointer-events:none;background:linear-gradient(180deg,rgba(6,6,8,0.96) 0%,transparent 100%);}
    .top>*{pointer-events:auto;}
    .back{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:999px;border:1px solid rgba(255,255,255,0.09);background:rgba(12,12,16,0.7);backdrop-filter:blur(14px);color:rgba(255,255,255,0.88);font-weight:600;font-size:13px;text-decoration:none;transition:all .2s;}
    .back:active{transform:scale(.96);}
    .top-right{display:flex;align-items:center;gap:8px;}
    .btn-translate{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;border:1px solid rgba(255,255,255,0.09);background:rgba(12,12,16,0.7);backdrop-filter:blur(14px);font-size:13px;font-weight:700;color:var(--accent);}
    .pill{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,0.08);background:rgba(12,12,16,0.7);backdrop-filter:blur(14px);font-size:11px;letter-spacing:.11em;text-transform:uppercase;color:var(--text-muted);white-space:nowrap;}
    .pill b{color:#fff;font-weight:700;}
    .scroll-container{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;scroll-snap-type:y mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;z-index:10;}
    .scroll-container::-webkit-scrollbar{display:none;}
    .section-wrapper{height:100%;width:100%;scroll-snap-align:start;scroll-snap-stop:always;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:calc(80px + var(--safeTop)) calc(14px + var(--safeRight)) calc(56px + var(--safeBottom)) calc(14px + var(--safeLeft));position:relative;}
    .card{width:100%;max-width:var(--maxw);flex:1;min-height:0;border-radius:var(--radius);border:1px solid var(--card-border);background:var(--card-bg);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);box-shadow:var(--shadow);display:flex;flex-direction:column;overflow:hidden;opacity:.25;transform:scale(.93) translateY(32px);transition:opacity .65s cubic-bezier(.16,1,.3,1),transform .65s cubic-bezier(.16,1,.3,1);}
    .section-wrapper.is-active .card{opacity:1;transform:scale(1) translateY(0);}
    .cardHeader{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,0.055);background:rgba(0,0,0,0.35);flex-shrink:0;}
    .kicker{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
    .kicker::before{content:'';display:block;width:18px;height:2px;background:var(--accent);border-radius:2px;}
    .h1{margin:0;font-family:var(--font-head);font-size:clamp(20px,4.8vw,26px);line-height:1.25;font-weight:800;letter-spacing:-.01em;}
    .cardBody{padding:22px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
    .cardBody::-webkit-scrollbar{width:4px;}
    .cardBody::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:10px;}
    .big{font-family:var(--font-head);font-size:clamp(26px,5.5vw,40px);line-height:1.12;font-weight:800;letter-spacing:-.03em;margin:0 0 20px;}
    .big .acc{background:linear-gradient(120deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
    .lead{font-size:16px;line-height:1.65;color:rgba(255,255,255,0.82);margin:0 0 14px;}
    .list{margin:16px 0;padding:0;list-style:none;font-size:15px;line-height:1.65;}
    .list li{position:relative;padding-left:22px;margin:13px 0;color:rgba(255,255,255,0.75);}
    .list li::before{content:'→';position:absolute;left:0;color:var(--accent);font-weight:800;}
    .list b{color:#fff;}
    .quote{margin:22px 0 18px;padding:14px 18px;border-left:3px solid var(--accent);background:linear-gradient(90deg,var(--accent-glow),transparent);border-radius:0 12px 12px 0;color:rgba(255,255,255,0.92);line-height:1.6;font-size:14px;font-style:italic;}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:20px 0;}
    .stat{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:14px 10px;text-align:center;}
    .stat-num{font-family:var(--font-head);font-size:22px;font-weight:800;color:#fff;}
    .stat-lbl{font-size:11px;color:var(--text-muted);margin-top:3px;letter-spacing:.05em;text-transform:uppercase;}
    .viewerShell{border:1px solid rgba(255,255,255,0.10);border-radius:16px;overflow:hidden;background:rgba(0,0,0,0.6);box-shadow:0 12px 40px rgba(0,0,0,0.5);}
    #stlViewer{width:100%;height:min(54vh,420px);position:relative;}
    .viewerHUD{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,rgba(255,92,26,0.13),rgba(0,0,0,0.65));color:rgba(255,255,255,0.85);font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-size:12px;pointer-events:none;}
    .viewerHint{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.11);padding:7px 10px;border-radius:10px;font-size:11px;color:rgba(255,255,255,0.7);pointer-events:none;backdrop-filter:blur(8px);}
    .viewerErr{position:absolute;inset:0;display:flex;flex-direction:column;gap:10px;align-items:center;justify-content:center;padding:18px;text-align:center;background:rgba(0,0,0,0.75);color:rgba(255,255,255,0.9);}
    .price-block{display:flex;align-items:baseline;gap:10px;margin:0 0 18px;flex-wrap:wrap;}
    .price-main{font-family:var(--font-head);font-size:clamp(38px,8vw,54px);font-weight:800;color:#fff;letter-spacing:-.03em;}
    .price-main span{font-size:.55em;font-weight:600;opacity:.7;}
    .price-orig{font-size:18px;color:var(--text-muted);text-decoration:line-through;}
    .badge-save{display:inline-block;padding:3px 10px;background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:var(--green);border-radius:999px;font-size:12px;font-weight:700;}
    .trust-row{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 20px;}
    .trust-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:999px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);font-size:12px;color:rgba(255,255,255,0.75);font-weight:500;}
    .trust-chip .dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0;}
    .cta-primary{width:100%;padding:0;border-radius:16px;overflow:hidden;position:relative;margin-bottom:10px;}
    .cta-primary-inner{display:flex;align-items:center;justify-content:center;gap:10px;padding:18px 20px;background:linear-gradient(110deg,#ff6b2b 0%,#ff4500 55%,#e63a00 100%);font-family:var(--font-head);font-size:18px;font-weight:800;color:#fff;letter-spacing:-.01em;box-shadow:0 0 0 1px rgba(255,255,255,0.12) inset,0 20px 50px rgba(255,69,0,0.35);transition:filter .15s,transform .15s;}
    .cta-primary:active .cta-primary-inner{transform:scale(.985);filter:brightness(1.08);}
    .cta-arrow{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.2);font-size:14px;}
    .cta-pulse{position:absolute;inset:0;border-radius:16px;animation:ctaPulse 2.4s ease-in-out infinite;pointer-events:none;}
    @keyframes ctaPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,92,26,0);}50%{box-shadow:0 0 0 8px rgba(255,92,26,0.18);}}
    .cta-secondary{width:100%;padding:15px 20px;border-radius:14px;border:1px solid rgba(255,255,255,0.12);background:rgba(255,255,255,0.04);font-size:15px;font-weight:600;color:rgba(255,255,255,0.85);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .2s;}
    .cta-secondary:active{background:rgba(255,255,255,0.08);}
    .micro-trust{text-align:center;font-size:12px;color:var(--text-muted);margin-top:12px;line-height:1.5;}
    .micro-trust b{color:var(--text);}
    .hint{position:absolute;bottom:calc(14px + var(--safeBottom));left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:5px;color:rgba(255,255,255,0.35);font-size:10px;text-transform:uppercase;letter-spacing:.12em;pointer-events:none;animation:hintBounce 2s ease-in-out infinite;z-index:100;}
    .hint svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;}
    @keyframes hintBounce{0%,100%{transform:translate(-50%,0);opacity:.55;}50%{transform:translate(-50%,5px);opacity:.9;}}
    .section-wrapper:last-child .hint{display:none;}
    .translate-toast{position:fixed;top:calc(76px + var(--safeTop));left:50%;transform:translateX(-50%) translateY(-18px);background:rgba(16,16,20,0.96);border:1px solid rgba(255,255,255,0.13);backdrop-filter:blur(14px);color:#fff;padding:9px 14px 9px 18px;border-radius:999px;font-size:13px;display:flex;align-items:center;gap:14px;box-shadow:0 14px 38px rgba(0,0,0,0.55);opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.16,1,.3,1);z-index:9999;}
    .translate-toast.is-visible{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
    .btn-undo{color:var(--accent);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.06em;padding:5px 11px;background:rgba(255,92,26,0.14);border-radius:999px;}
  </style>
</head>

    <button id="btnUndoTranslate" class="btn-undo">Undo</button>

      setTimeout(()=>waitForLibs(cb,tries+1),100);
    }

    function mount3D(){
      const host = document.getElementById("stlViewer");
      if(!host) return;
      if(__viewerMountedFor===host) return;
      disposeViewer(); __viewerMountedFor=host;

      waitForLibs(()=>{
        const {THREE,OrbitControls,STLLoader} = window.__THREE__;
        const hud = document.getElementById("viewerHUD");
        host.querySelectorAll("canvas,.viewerErr").forEach(n=>n.remove());

        const renderer = new THREE.WebGLRenderer({antialias:true,alpha:true,powerPreference:"high-performance"});
        renderer.setPixelRatio(Math.min(window.devicePixelRatio||1,1.5));
        renderer.setSize(host.clientWidth,host.clientHeight,false);
        renderer.setClearColor(0x000000,0);
        renderer.domElement.style.touchAction="none";
        host.appendChild(renderer.domElement);

        const scene=new THREE.Scene();
        const camera=new THREE.PerspectiveCamera(50,host.clientWidth/host.clientHeight,0.1,5000);

        scene.add(new THREE.HemisphereLight(0xffffff,0x111111,1.2));
        const d=new THREE.DirectionalLight(0xfff0e0,1.1); d.position.set(3,5,4); scene.add(d);
        const r=new THREE.DirectionalLight(0xff6622,0.4); r.position.set(-4,-2,-3); scene.add(r);

        const controls=new OrbitControls(camera,renderer.domElement);
        controls.enableDamping=true; controls.dampingFactor=0.07;
        controls.enablePan=false; controls.autoRotate=true; controls.autoRotateSpeed=1.4;
        controls.minDistance=5; controls.maxDistance=600;

        renderer.domElement.addEventListener('pointerdown',()=>{controls.autoRotate=false},{passive:true});
        let lastTap=0;
        host.addEventListener("touchend",()=>{
          const n=Date.now(); if(n-lastTap<280){controls.reset();controls.autoRotate=true;} lastTap=n;
        },{passive:true});

        const ro=new ResizeObserver(()=>{
          const w=host.clientWidth||1,h=host.clientHeight||1;
          camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h,false);
        }); ro.observe(host);

        // ── Load from embedded base64 ──
        const bin = atob(STL_B64);
        const bytes = new Uint8Array(bin.length);
        for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
        const ab = bytes.buffer;

        const loader=new STLLoader();
        const geometry=loader.parse(ab);
        if(hud) hud.style.display="none";

        geometry.computeVertexNormals();
        geometry.center();
        const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(0xff5c1a),roughness:.5,metalness:.15});
        const mesh=new THREE.Mesh(geometry,mat);
        scene.add(mesh);

        const box=new THREE.Box3().setFromObject(mesh);
        const sz=new THREE.Vector3(); box.getSize(sz);
        const maxDim=Math.max(sz.x,sz.y,sz.z)||1;
        camera.position.set(0,maxDim*.3,maxDim*1.8);
        controls.minDistance=maxDim*.4; controls.maxDistance=maxDim*8;
        controls.update();

        let raf=0;
        function animate(){raf=requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
        animate();

        __viewerCleanup=()=>{
          cancelAnimationFrame(raf); ro.disconnect(); controls.dispose(); renderer.dispose();
          mesh.geometry.dispose(); mesh.material.dispose();
          host.querySelectorAll("canvas").forEach(n=>n.remove());
        };
      });
    }

    const observer=new IntersectionObserver(entries=>{
      entries.forEach(e=>{
        const name=e.target.getAttribute('data-name');
        if(e.isIntersecting){
          e.target.classList.add('is-active');
          const i=parseInt(e.target.getAttribute('data-index'),10);
          secLabel.textContent=i+1+"/"+SECTIONS.length;
          secName.textContent=name;
          if(name==="3D PREVIEW") mount3D();
        } else {
          e.target.classList.remove('is-active');
          if(name==="3D PREVIEW") disposeViewer();
        }
      });
    },{root:container,threshold:0.55});

    function renderSections(){
      disposeViewer(); container.innerHTML='';
      SECTIONS.forEach((sec,idx)=>{
        const w=document.createElement('div');
        w.className='section-wrapper';
        w.setAttribute('data-index',String(idx));
        w.setAttribute('data-name',sec.name);
        w.innerHTML=`<article class="card">
          <header class="cardHeader"><div class="kicker">${sec.kicker}</div><h1 class="h1">${sec.title[currentLang]}</h1></header>
          <div class="cardBody">${sec.html[currentLang]()}<div style="height:80px;"></div></div>
        </article>
        <div class="hint"><span>Scroll</span><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>`;
        container.appendChild(w);
        observer.observe(w);
      });
      const wa=document.getElementById("btnOrderWA");
      if(wa) wa.addEventListener("click",()=>window.open(WHATSAPP_URL,"_blank"));
      const ondc=document.getElementById("btnOrderONDC");
      if(ondc) ondc.addEventListener("click",()=>window.open(ONDC_URL==="# " ? WHATSAPP_URL : ONDC_URL,"_blank"));
    }

    const toast=document.getElementById('translationToast');
    const btnUndo=document.getElementById('btnUndoTranslate');
    const toastMsg=document.getElementById('toastMsg');
    let toastTimer;
    function triggerTranslation(lang){
      currentLang=lang; renderSections();
      toast.classList.add('is-visible');
      toastMsg.textContent=lang==='hi'?"Translated to Hindi":"Reverted to English";
      btnUndo.style.display=lang==='hi'?'block':'none';
      clearTimeout(toastTimer); toastTimer=setTimeout(()=>toast.classList.remove('is-visible'),3500);
    }
    document.getElementById('btnTranslate').addEventListener('click',()=>{if(currentLang==='en')triggerTranslation('hi');});
    btnUndo.addEventListener('click',()=>triggerTranslation('en'));

    renderSections();
  })();
  </script>
</body>
</html>
