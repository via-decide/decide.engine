<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Custom 3D Keychain — ₹349 | ViaDecide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #060608;
      --card-bg: rgba(14,14,18,0.82);
      --card-border: rgba(255,255,255,0.07);
      --text: #f8f8fa;
      --text-muted: rgba(235,235,245,0.55);
      --accent: #ff5c1a;
      --accent2: #ffb347;
      --accent-glow: rgba(255,92,26,0.18);
      --green: #22c55e;
      --shadow: 0 32px 80px rgba(0,0,0,0.7);
      --radius: 22px;
      --font-head: 'Syne', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --safeTop: env(safe-area-inset-top, 0px);
      --safeBottom: env(safe-area-inset-bottom, 0px);
      --safeLeft: env(safe-area-inset-left, 0px);
      --safeRight: env(safe-area-inset-right, 0px);
      --maxw: 720px;
    }

    html, body {
      height: 100%; height: 100dvh;
      margin: 0; background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      overflow: hidden;
      overscroll-behavior-y: none;
      -webkit-font-smoothing: antialiased;
    }
    * { box-sizing: border-box; }
    button { background: none; border: none; padding: 0; font: inherit; color: inherit; cursor: pointer; }

    /* ── Noise grain overlay ── */
    body::before {
      content:''; position:fixed; inset:0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events:none; z-index:1; opacity:.55;
    }

    .bg-glow {
      position:absolute; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,92,26,0.14), transparent),
        radial-gradient(ellipse 60% 40% at 90% 110%, rgba(255,179,71,0.06), transparent);
    }

    /* ── TOP BAR ── */
    .top {
      position:absolute; top:0; left:0; right:0; z-index:50;
      padding: calc(14px + var(--safeTop)) calc(14px + var(--safeRight)) 14px calc(14px + var(--safeLeft));
      display:flex; align-items:center; justify-content:space-between; gap:10px;
      pointer-events:none;
      background: linear-gradient(180deg, rgba(6,6,8,0.96) 0%, transparent 100%);
    }
    .top > * { pointer-events:auto; }

    .back {
      display:inline-flex; align-items:center; gap:7px;
      padding:9px 15px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.09);
      background:rgba(12,12,16,0.7); backdrop-filter:blur(14px);
      color:rgba(255,255,255,0.88); font-weight:600; font-size:13px;
      text-decoration:none; transition:all .2s;
    }
    .back:active { transform:scale(.96); }

    .top-right { display:flex; align-items:center; gap:8px; }

    .btn-translate {
      display:inline-flex; align-items:center; justify-content:center;
      width:36px; height:36px; border-radius:50%;
      border:1px solid rgba(255,255,255,0.09);
      background:rgba(12,12,16,0.7); backdrop-filter:blur(14px);
      font-size:13px; font-weight:700; color:var(--accent);
      transition:all .2s;
    }
    .btn-translate:active { transform:scale(.94); }

    .pill {
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 13px; border-radius:999px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(12,12,16,0.7); backdrop-filter:blur(14px);
      font-size:11px; letter-spacing:.11em; text-transform:uppercase;
      color:var(--text-muted); white-space:nowrap;
    }
    .pill b { color:#fff; letter-spacing:.09em; font-weight:700; }

    /* ── SCROLL ── */
    .scroll-container {
      position:absolute; inset:0;
      overflow-y:auto; overflow-x:hidden;
      scroll-snap-type:y mandatory; scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch; z-index:10;
    }
    .scroll-container::-webkit-scrollbar { display:none; }

    .section-wrapper {
      height:100%; width:100%;
      scroll-snap-align:start; scroll-snap-stop:always;
      display:flex; flex-direction:column;
      justify-content:center; align-items:center;
      padding: calc(80px + var(--safeTop)) calc(14px + var(--safeRight)) calc(56px + var(--safeBottom)) calc(14px + var(--safeLeft));
      position:relative;
    }

    /* ── CARD ── */
    .card {
      width:100%; max-width:var(--maxw);
      flex:1; min-height:0;
      border-radius:var(--radius);
      border:1px solid var(--card-border);
      background:var(--card-bg);
      backdrop-filter:blur(22px); -webkit-backdrop-filter:blur(22px);
      box-shadow:var(--shadow);
      display:flex; flex-direction:column; overflow:hidden;
      opacity:.25; transform:scale(.93) translateY(32px);
      transition: opacity .65s cubic-bezier(.16,1,.3,1), transform .65s cubic-bezier(.16,1,.3,1);
    }
    .section-wrapper.is-active .card { opacity:1; transform:scale(1) translateY(0); }

    .cardHeader {
      padding:22px 22px 18px;
      border-bottom:1px solid rgba(255,255,255,0.055);
      background:rgba(0,0,0,0.35);
      flex-shrink:0;
    }
    .kicker {
      font-size:10px; letter-spacing:.18em; text-transform:uppercase;
      color:var(--accent); font-weight:700; margin-bottom:7px;
      display:flex; align-items:center; gap:8px;
    }
    .kicker::before { content:''; display:block; width:18px; height:2px; background:var(--accent); border-radius:2px; }
    .h1 { margin:0; font-family:var(--font-head); font-size:clamp(20px,4.8vw,26px); line-height:1.25; font-weight:800; letter-spacing:-.01em; }

    .cardBody { padding:22px; overflow-y:auto; -webkit-overflow-scrolling:touch; flex:1; }
    .cardBody::-webkit-scrollbar { width:4px; }
    .cardBody::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.18); border-radius:10px; }

    .big {
      font-family:var(--font-head);
      font-size:clamp(26px,5.5vw,40px); line-height:1.12;
      font-weight:800; letter-spacing:-.03em; margin:0 0 20px;
    }
    .big .acc {
      background:linear-gradient(120deg, var(--accent2), var(--accent));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    }
    .lead { font-size:16px; line-height:1.65; color:rgba(255,255,255,0.82); margin:0 0 14px; }
    .list { margin:16px 0; padding:0; list-style:none; font-size:15px; line-height:1.65; }
    .list li { position:relative; padding-left:22px; margin:13px 0; color:rgba(255,255,255,0.75); }
    .list li::before { content:'→'; position:absolute; left:0; color:var(--accent); font-weight:800; }
    .list b { color:#fff; }

    .quote {
      margin:22px 0 18px;
      padding:14px 18px;
      border-left:3px solid var(--accent);
      background:linear-gradient(90deg,var(--accent-glow),transparent);
      border-radius:0 12px 12px 0;
      color:rgba(255,255,255,0.92); line-height:1.6;
      font-size:14px; font-style:italic;
    }

    /* ── STATS ROW ── */
    .stats {
      display:grid; grid-template-columns:repeat(3,1fr);
      gap:10px; margin:20px 0;
    }
    .stat {
      background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.07);
      border-radius:14px; padding:14px 10px; text-align:center;
    }
    .stat-num { font-family:var(--font-head); font-size:22px; font-weight:800; color:#fff; }
    .stat-lbl { font-size:11px; color:var(--text-muted); margin-top:3px; letter-spacing:.05em; text-transform:uppercase; }

    /* ── 3D VIEWER ── */
    .viewerShell {
      border:1px solid rgba(255,255,255,0.10);
      border-radius:16px; overflow:hidden;
      background:rgba(0,0,0,0.6);
      box-shadow:0 12px 40px rgba(0,0,0,0.5);
    }
    #stlViewer {
      width:100%; height:min(54vh,420px);
      position:relative; touch-action:none;
    }
    .viewerHUD {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:radial-gradient(circle at 50% 30%,rgba(255,92,26,0.13),rgba(0,0,0,0.65));
      color:rgba(255,255,255,0.85); font-weight:700;
      letter-spacing:.07em; text-transform:uppercase; font-size:12px;
      pointer-events:none;
    }
    .viewerHint {
      position:absolute; left:10px; bottom:10px;
      background:rgba(0,0,0,0.6); border:1px solid rgba(255,255,255,0.11);
      padding:7px 10px; border-radius:10px; font-size:11px;
      color:rgba(255,255,255,0.7); pointer-events:none; backdrop-filter:blur(8px);
    }
    .viewerErr {
      position:absolute; inset:0;
      display:flex; flex-direction:column; gap:10px;
      align-items:center; justify-content:center;
      padding:18px; text-align:center; background:rgba(0,0,0,0.75);
      color:rgba(255,255,255,0.9);
    }
    .viewerErr code {
      font-family:ui-monospace,monospace; font-size:11px; color:#94a3b8;
      background:rgba(255,255,255,0.06); padding:7px 10px;
      border-radius:9px; border:1px solid rgba(255,255,255,0.09); word-break:break-word;
    }

    /* ── CTA SECTION ── */
    .price-block {
      display:flex; align-items:baseline; gap:10px; margin:0 0 18px;
    }
    .price-main {
      font-family:var(--font-head); font-size:clamp(38px,8vw,54px);
      font-weight:800; color:#fff; letter-spacing:-.03em;
    }
    .price-main span { font-size:.55em; font-weight:600; opacity:.7; }
    .price-orig {
      font-size:18px; color:var(--text-muted);
      text-decoration:line-through;
    }
    .badge-save {
      display:inline-block; padding:3px 10px;
      background:rgba(34,197,94,.15); border:1px solid rgba(34,197,94,.3);
      color:var(--green); border-radius:999px; font-size:12px; font-weight:700;
    }

    .trust-row {
      display:flex; gap:8px; flex-wrap:wrap; margin:0 0 20px;
    }
    .trust-chip {
      display:inline-flex; align-items:center; gap:5px;
      padding:6px 12px; border-radius:999px;
      background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08);
      font-size:12px; color:rgba(255,255,255,0.75); font-weight:500;
    }
    .trust-chip .dot { width:6px; height:6px; border-radius:50%; background:var(--green); flex-shrink:0; }

    /* ── PRIMARY CTA ── */
    .cta-primary {
      width:100%; padding:0; border-radius:16px; overflow:hidden;
      position:relative; margin-bottom:10px;
    }
    .cta-primary-inner {
      display:flex; align-items:center; justify-content:center; gap:10px;
      padding:18px 20px;
      background:linear-gradient(110deg, #ff6b2b 0%, #ff4500 55%, #e63a00 100%);
      font-family:var(--font-head); font-size:18px; font-weight:800; color:#fff;
      letter-spacing:-.01em;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.12) inset,
                  0 20px 50px rgba(255,69,0,0.35);
      transition:filter .15s, transform .15s;
    }
    .cta-primary:active .cta-primary-inner { transform:scale(.985); filter:brightness(1.08); }
    .cta-arrow {
      display:inline-flex; align-items:center; justify-content:center;
      width:28px; height:28px; border-radius:50%;
      background:rgba(255,255,255,0.2); font-size:14px;
      transition:transform .2s;
    }
    .cta-primary:hover .cta-arrow { transform:translateX(3px); }
    .cta-pulse {
      position:absolute; inset:0; border-radius:16px;
      animation:ctaPulse 2.4s ease-in-out infinite;
      pointer-events:none;
    }
    @keyframes ctaPulse {
      0%,100%{ box-shadow:0 0 0 0 rgba(255,92,26,0); }
      50%{ box-shadow:0 0 0 8px rgba(255,92,26,0.18); }
    }

    .cta-secondary {
      width:100%; padding:15px 20px; border-radius:14px;
      border:1px solid rgba(255,255,255,0.12);
      background:rgba(255,255,255,0.04);
      font-size:15px; font-weight:600; color:rgba(255,255,255,0.85);
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:background .2s, border-color .2s;
    }
    .cta-secondary:active { background:rgba(255,255,255,0.08); }

    .micro-trust {
      text-align:center; font-size:12px;
      color:var(--text-muted); margin-top:12px; line-height:1.5;
    }
    .micro-trust b { color:var(--text); }

    /* ── SCROLL HINT ── */
    .hint {
      position:absolute; bottom:calc(14px + var(--safeBottom)); left:50%;
      transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:5px;
      color:rgba(255,255,255,0.35); font-size:10px; text-transform:uppercase;
      letter-spacing:.12em; pointer-events:none;
      animation:hintBounce 2s ease-in-out infinite; z-index:100;
    }
    .hint svg { width:13px; height:13px; stroke:currentColor; fill:none; stroke-width:2.5; }
    @keyframes hintBounce {
      0%,100%{ transform:translate(-50%,0); opacity:.55; }
      50%{ transform:translate(-50%,5px); opacity:.9; }
    }
    .section-wrapper:last-child .hint { display:none; }

    /* ── TOAST ── */
    .translate-toast {
      position:fixed; top:calc(76px + var(--safeTop)); left:50%;
      transform:translateX(-50%) translateY(-18px);
      background:rgba(16,16,20,0.96); border:1px solid rgba(255,255,255,0.13);
      backdrop-filter:blur(14px); color:#fff;
      padding:9px 14px 9px 18px; border-radius:999px; font-size:13px;
      display:flex; align-items:center; gap:14px;
      box-shadow:0 14px 38px rgba(0,0,0,0.55);
      opacity:0; pointer-events:none;
      transition:all .3s cubic-bezier(.16,1,.3,1); z-index:9999;
    }
    .translate-toast.is-visible { opacity:1; pointer-events:auto; transform:translateX(-50%) translateY(0); }
    .btn-undo {
      color:var(--accent); font-weight:700; text-transform:uppercase;
      font-size:11px; letter-spacing:.06em; padding:5px 11px;
      background:rgba(255,92,26,0.14); border-radius:999px;
    }
    .btn-undo:active { background:rgba(255,92,26,0.25); }
  </style>
</head>

          en: () => `
            <div class="big">Maker-direct.<br><span class="acc">Zero middlemen.</span></div>
            <ul class="list">
              <li><b>Printed fresh per order</b> — no dead stock, no compromise</li>
              <li><b>WhatsApp support</b> — real human, not a bot ticket queue</li>
              <li><b>Free reprint policy</b> — if yours arrives damaged, we fix it</li>
              <li><b>ONDC-listed seller</b> — verified identity, accountable supply chain</li>
              <li><b>Custom options</b> — name, logo, colour on bulk orders</li>
            </ul>
            <div class="quote">"Ordered on Tuesday, received Friday. Fit perfectly on my keyring. Exactly as shown." — Priya, Ahmedabad</div>
          `,
          hi: () => `
            <div class="big">मेकर डायरेक्ट।<br><span class="acc">बीच में कोई नहीं।</span></div>
            <ul class="list">
              <li><b>हर ऑर्डर पर ताज़ी प्रिंट</b> — कोई पुराना स्टॉक नहीं</li>
              <li><b>WhatsApp सपोर्ट</b> — इंसान से बात, bot नहीं</li>
              <li><b>फ्री रिप्रिंट पॉलिसी</b> — डैमेज मिले तो हम ठीक करते हैं</li>
              <li><b>ONDC-listed seller</b> — verified, accountable</li>
              <li><b>कस्टम ऑप्शन</b> — नाम, लोगो, रंग bulk orders पर</li>
            </ul>
            <div class="quote">"मंगलवार को ऑर्डर किया, शुक्रवार को मिला। एकदम सही फिट।" — प्रिया, अहमदाबाद</div>
          `
        }
      },

      {
        name: "ORDER", kicker: "Get Yours",
        title: { en: "Grab Yours for ₹349", hi: "अपना लें — सिर्फ ₹349" },
        html: {
          en: () => `
            <div class="price-block">
              <div class="price-main"><span>₹</span>349</div>
              <div class="price-orig">₹499</div>
              <div class="badge-save">30% OFF</div>
            </div>
            <div class="trust-row">
              <div class="trust-chip"><div class="dot"></div>Ships in 48h</div>
              <div class="trust-chip"><div class="dot"></div>Free reprint</div>
              <div class="trust-chip"><div class="dot"></div>Cash on delivery</div>
            </div>
            <button class="cta-primary" id="btnOrderWA">
              <span class="cta-pulse"></span>
              <div class="cta-primary-inner">
                Order on WhatsApp <div class="cta-arrow">→</div>
              </div>
            </button>
            <button class="cta-secondary" id="btnOrderONDC">
              🛒 &nbsp;Order via ONDC
            </button>
            <p class="micro-trust">
              Tap WhatsApp → confirm details → pay on delivery.<br>
              <b>No advance. No risk. Delivered to your door.</b>
            </p>
          `,
          hi: () => `
            <div class="price-block">
              <div class="price-main"><span>₹</span>349</div>
              <div class="price-orig">₹499</div>
              <div class="badge-save">30% छूट</div>
            </div>
            <div class="trust-row">
              <div class="trust-chip"><div class="dot"></div>48h शिपिंग</div>
              <div class="trust-chip"><div class="dot"></div>फ्री रिप्रिंट</div>
              <div class="trust-chip"><div class="dot"></div>COD उपलब्ध</div>
            </div>
            <button class="cta-primary" id="btnOrderWA">
              <span class="cta-pulse"></span>
              <div class="cta-primary-inner">
                WhatsApp पर ऑर्डर करें <div class="cta-arrow">→</div>
              </div>
            </button>
            <button class="cta-secondary" id="btnOrderONDC">
              🛒 &nbsp;ONDC से ऑर्डर करें
            </button>
            <p class="micro-trust">
              WhatsApp tap करें → details confirm करें → delivery पर pay करें।<br>
              <b>कोई advance नहीं। कोई risk नहीं।</b>
            </p>
          `
        }
      }
    ];

    const container = document.getElementById('scrollContainer');
    const secLabel  = document.getElementById('secLabel');
    const secName   = document.getElementById('secName');
    let currentLang = 'en';

    // ── 3D VIEWER ──
    let __viewerCleanup = null;
    let __viewerMountedFor = null;

    function disposeViewer(){
      if(typeof __viewerCleanup === "function"){ try { __viewerCleanup(); } catch(_){} }
      __viewerCleanup = null; __viewerMountedFor = null;
    }

    function waitForLibs(cb, tries = 0) {
      if (window.__THREE__) return cb();
      if (tries > 35) return;
      setTimeout(() => waitForLibs(cb, tries + 1), 100);
    }

    function mount3DIfPresent(){
      const host = document.getElementById("stlViewer");
      if(!host) return;
      if(__viewerMountedFor === host) return;
      disposeViewer();
      __viewerMountedFor = host;

      waitForLibs(() => {
        const { THREE, OrbitControls, STLLoader } = window.__THREE__;
        const hud = document.getElementById("viewerHUD");

        host.querySelectorAll("canvas,.viewerErr").forEach(n => n.remove());

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, powerPreference:"high-performance" });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio||1, 1.5));
        renderer.setSize(host.clientWidth, host.clientHeight, false);
        renderer.setClearColor(0x000000, 0);
        renderer.domElement.style.touchAction = "none";
        host.appendChild(renderer.domElement);

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, host.clientWidth/host.clientHeight, 0.1, 5000);
        camera.position.set(0, 0, 120);

        scene.add(new THREE.HemisphereLight(0xffffff, 0x111111, 1.2));
        const dir = new THREE.DirectionalLight(0xfff0e0, 1.1);
        dir.position.set(3, 5, 4); scene.add(dir);
        const rim = new THREE.DirectionalLight(0xff6622, 0.4);
        rim.position.set(-4,-2,-3); scene.add(rim);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.07;
        controls.enablePan = false; controls.enableZoom = true;
        controls.minDistance = 20; controls.maxDistance = 600;
        controls.autoRotate = true; controls.autoRotateSpeed = 1.2;
        controls.target.set(0, 0, 0);

        // stop auto-rotate on user interaction
        renderer.domElement.addEventListener('pointerdown', () => { controls.autoRotate = false; }, { passive:true });

        // double-tap reset
        let lastTap = 0;
        host.addEventListener("touchend", () => {
          const now = Date.now();
          if(now - lastTap < 280){ controls.reset(); controls.autoRotate = true; }
          lastTap = now;
        }, { passive:true });

        const ro = new ResizeObserver(() => {
          const w = host.clientWidth||1, h = host.clientHeight||1;
          camera.aspect = w/h; camera.updateProjectionMatrix();
          renderer.setSize(w, h, false);
        });
        ro.observe(host);

        const loader = new STLLoader();
        const mat = new THREE.MeshStandardMaterial({ color: new THREE.Color(0xff5c1a), roughness:.5, metalness:.15 });
        let mesh = null;

        function showErr(msg){
          const err = document.createElement("div");
          err.className = "viewerErr";
          err.innerHTML = `<div style="font-weight:800;font-size:14px;">3D Preview Failed</div>
            <div style="color:rgba(255,255,255,0.7);font-size:13px;line-height:1.5;">${msg}</div>
            <code>${STL_URL}</code>`;
          host.appendChild(err);
        }

        loader.load(STL_URL,
          (geometry) => {
            if(hud) hud.style.display = "none";
            geometry.computeVertexNormals();
            geometry.center();
            mesh = new THREE.Mesh(geometry, mat);
            scene.add(mesh);

            const box = new THREE.Box3().setFromObject(mesh);
            const sz = new THREE.Vector3();
            box.getSize(sz);
            const maxDim = Math.max(sz.x, sz.y, sz.z) || 1;
            camera.position.set(0, maxDim*.3, maxDim*1.8);
            controls.minDistance = maxDim*.5;
            controls.maxDistance = maxDim*7;
            controls.update();
          },
          (xhr) => {
            if(hud){
              const pct = xhr.total ? Math.round(xhr.loaded/xhr.total*100) : null;
              hud.textContent = pct ? `Loading… ${pct}%` : "Loading 3D Model…";
            }
          },
          (err) => {
            if(hud) hud.style.display = "none";
            showErr("STL file not found. Check that <b>keychain.stl</b> is in the same folder.");
            console.error("STL error:", err);
          }
        );

        let raf = 0;
        function animate(){ raf = requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        animate();

        __viewerCleanup = () => {
          cancelAnimationFrame(raf); ro.disconnect(); controls.dispose(); renderer.dispose();
          if(mesh){ if(mesh.geometry) mesh.geometry.dispose(); if(mesh.material) mesh.material.dispose(); }
          host.querySelectorAll("canvas,.viewerErr").forEach(n=>n.remove());
        };
      });
    }

    // ── INTERSECTION OBSERVER ──
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const name = entry.target.getAttribute('data-name');
        if (entry.isIntersecting) {
          entry.target.classList.add('is-active');
          const idx = parseInt(entry.target.getAttribute('data-index'), 10);
          secLabel.textContent = `${idx+1}/${SECTIONS.length}`;
          secName.textContent = name;
          if(name === "3D PREVIEW") mount3DIfPresent();
        } else {
          entry.target.classList.remove('is-active');
          if(name === "3D PREVIEW") disposeViewer();
        }
      });
    }, { root: container, threshold: 0.55 });

    // ── RENDER ──
    function renderSections(){
      disposeViewer();
      container.innerHTML = '';
      SECTIONS.forEach((sec, idx) => {
        const w = document.createElement('div');
        w.className = 'section-wrapper';
        w.setAttribute('data-index', String(idx));
        w.setAttribute('data-name', sec.name);
        w.innerHTML = `
          <article class="card">
            <header class="cardHeader">
              <div class="kicker">${sec.kicker}</div>
              <h1 class="h1">${sec.title[currentLang]}</h1>
            </header>
            <div class="cardBody">
              ${sec.html[currentLang]()}
              <div style="height:80px;"></div>
            </div>
          </article>
          <div class="hint"><span>Scroll</span><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>
        `;
        container.appendChild(w);
        observer.observe(w);
      });

      // Wire order buttons
      const wa = document.getElementById("btnOrderWA");
      if(wa) wa.addEventListener("click", () => window.open(WHATSAPP_ORDER_URL, "_blank"));
      const ondc = document.getElementById("btnOrderONDC");
      if(ondc) ondc.addEventListener("click", () => {
        const url = (ONDC_ORDER_URL && ONDC_ORDER_URL !== "#") ? ONDC_ORDER_URL : WHATSAPP_ORDER_URL;
        window.open(url, "_blank");
      });
    }

    // ── TRANSLATION ──
    const toast    = document.getElementById('translationToast');
    const btnUndo  = document.getElementById('btnUndoTranslate');
    const toastMsg = document.getElementById('toastMsg');
    let toastTimer;

    function triggerTranslation(lang){
      currentLang = lang;
      renderSections();
      toast.classList.add('is-visible');
      toastMsg.textContent = lang === 'hi' ? "Translated to Hindi" : "Reverted to English";
      btnUndo.style.display = lang === 'hi' ? 'block' : 'none';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.remove('is-visible'), 3500);
    }

    document.getElementById('btnTranslate').addEventListener('click', () => {
      if(currentLang === 'en') triggerTranslation('hi');
    });
    btnUndo.addEventListener('click', () => triggerTranslation('en'));

    renderSections();
  })();
  </script>
</body>
</html>
