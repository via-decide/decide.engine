<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#0d0d0d"/>
<title>NFC Smart Keychain — ₹449 | ViaDecide</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d0f;--card-bg:rgba(15,15,19,0.9);--border:rgba(255,255,255,0.07);
  --text:#f4f4f6;--muted:rgba(228,228,240,0.5);
  --red:#e82828;--red2:#ff4d4d;--rglow:rgba(232,40,40,0.14);
  --black:#111;--green:#22c55e;
  --sh:0 28px 72px rgba(0,0,0,0.65);--r:20px;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
  --mw:700px;
}
html,body{height:100%;height:100dvh;margin:0;background:var(--bg);color:var(--text);
  font-family:var(--fb);overflow:hidden;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;}
*{box-sizing:border-box;}
button{background:none;border:none;padding:0;font:inherit;color:inherit;cursor:pointer;}

.glow{position:absolute;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 45% at 50% -5%,rgba(232,40,40,0.13),transparent),
    radial-gradient(ellipse 50% 35% at 95% 100%,rgba(232,40,40,0.07),transparent);}

/* TOP BAR */
.top{position:absolute;top:0;left:0;right:0;z-index:50;
  padding:calc(13px + var(--st)) calc(13px + var(--sr)) 13px calc(13px + var(--sl));
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  pointer-events:none;background:linear-gradient(180deg,rgba(13,13,15,0.97),transparent);}
.top>*{pointer-events:auto;}
.back{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;
  border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,13,0.8);backdrop-filter:blur(16px);
  color:rgba(255,255,255,0.85);font-weight:600;font-size:13px;text-decoration:none;}
.topright{display:flex;align-items:center;gap:8px;}
.btnt{display:inline-flex;align-items:center;justify-content:center;width:35px;height:35px;
  border-radius:50%;border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,13,0.8);
  backdrop-filter:blur(16px);font-size:11px;font-weight:700;color:var(--red);}
.pill{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:999px;
  border:1px solid rgba(255,255,255,0.07);background:rgba(10,10,13,0.8);backdrop-filter:blur(16px);
  font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.pill b{color:#fff;}

/* SCROLL + SECTIONS */
.sc{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  scroll-snap-type:y mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;z-index:10;}
.sc::-webkit-scrollbar{display:none;}
.sw{height:100%;width:100%;scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:calc(76px + var(--st)) calc(13px + var(--sr)) calc(52px + var(--sb)) calc(13px + var(--sl));
  position:relative;}
.card{width:100%;max-width:var(--mw);flex:1;min-height:0;border-radius:var(--r);
  border:1px solid var(--border);background:var(--card-bg);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);box-shadow:var(--sh);
  display:flex;flex-direction:column;overflow:hidden;
  opacity:.18;transform:scale(.93) translateY(28px);
  transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1);}
.sw.active .card{opacity:1;transform:none;}
.ch{padding:20px 20px 16px;border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.38);flex-shrink:0;}
.kk{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--red);font-weight:700;
  margin-bottom:6px;display:flex;align-items:center;gap:7px;}
.kk::before{content:'';display:block;width:16px;height:2px;background:var(--red);border-radius:2px;}
.h1{margin:0;font-family:var(--fh);font-size:clamp(19px,4.5vw,25px);line-height:1.25;font-weight:800;}
.cb{padding:20px;overflow-y:auto;flex:1;}
.cb::-webkit-scrollbar{width:3px;}
.cb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:10px;}

/* CONTENT ELEMENTS */
.big{font-family:var(--fh);font-size:clamp(24px,5vw,36px);line-height:1.12;font-weight:800;letter-spacing:-.03em;margin:0 0 16px;}
.big .r{background:linear-gradient(120deg,#ff6b6b,var(--red));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.lead{font-size:15px;line-height:1.65;color:rgba(255,255,255,0.8);margin:0 0 13px;}
.lead i{color:rgba(255,255,255,0.55);font-style:italic;}
.ul{margin:13px 0;padding:0;list-style:none;font-size:14px;line-height:1.65;}
.ul li{position:relative;padding-left:20px;margin:10px 0;color:rgba(255,255,255,0.72);}
.ul li::before{content:'→';position:absolute;left:0;color:var(--red);font-weight:800;}
.ul b{color:#fff;}
.qt{margin:18px 0 14px;padding:13px 16px;border-left:3px solid var(--red);
  background:linear-gradient(90deg,var(--rglow),transparent);border-radius:0 11px 11px 0;
  color:rgba(255,255,255,0.88);line-height:1.6;font-size:13px;font-style:italic;}

/* USE-CASE PILLS */
.usecases{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0;}
.uc{display:inline-flex;align-items:center;gap:6px;padding:8px 14px;border-radius:999px;
  font-size:13px;font-weight:600;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8);}
.uc.active{background:rgba(232,40,40,0.15);border-color:rgba(232,40,40,0.35);color:#fff;}
.uc-icon{font-size:15px;}

/* HOW IT WORKS */
.steps{margin:14px 0;}
.step{display:flex;gap:13px;align-items:flex-start;margin:14px 0;}
.step-num{flex-shrink:0;width:28px;height:28px;border-radius:50%;
  background:rgba(232,40,40,0.15);border:1px solid rgba(232,40,40,0.3);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--fh);font-size:12px;font-weight:800;color:var(--red);}
.step-body{flex:1;padding-top:3px;}
.step-title{font-weight:600;color:#fff;font-size:14px;margin-bottom:3px;}
.step-desc{font-size:13px;color:var(--muted);line-height:1.5;}

/* COLOUR CHIPS */
.colours{display:flex;gap:10px;margin:16px 0;}
.chip{display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:12px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);font-size:13px;}
.cswatch{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);}

/* STATS */
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:16px 0;}
.sn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
  border-radius:13px;padding:12px 8px;text-align:center;}
.sv{font-family:var(--fh);font-size:20px;font-weight:800;color:#fff;}
.sl{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.05em;text-transform:uppercase;}

/* 3D VIEWER */
.vs{border:1px solid rgba(255,255,255,0.09);border-radius:14px;overflow:hidden;
  background:#0a0a0c;box-shadow:0 10px 36px rgba(0,0,0,0.5);position:relative;}
#cv{display:block;width:100%;height:min(50vh,390px);cursor:grab;touch-action:none;}
#cv:active{cursor:grabbing;}
.vh{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 35%,rgba(232,40,40,0.1),rgba(0,0,0,0.6));
  color:rgba(255,255,255,0.75);font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  font-size:12px;pointer-events:none;}
.vi{position:absolute;left:9px;bottom:9px;background:rgba(0,0,0,0.65);
  border:1px solid rgba(255,255,255,0.1);padding:6px 10px;border-radius:9px;
  font-size:11px;color:rgba(255,255,255,0.6);pointer-events:none;}
/* Colour toggle */
.colour-toggle{position:absolute;right:9px;bottom:9px;display:flex;gap:6px;}
.ct-btn{width:22px;height:22px;border-radius:50%;border:2px solid rgba(255,255,255,0.3);cursor:pointer;transition:transform .15s;}
.ct-btn:active{transform:scale(.9);}
.ct-btn.selected{border-color:#fff;}

/* CTA */
.pb{display:flex;align-items:baseline;gap:10px;margin:0 0 15px;flex-wrap:wrap;}
.pm{font-family:var(--fh);font-size:clamp(34px,8vw,50px);font-weight:800;color:#fff;letter-spacing:-.03em;}
.pm span{font-size:.55em;opacity:.7;}
.po{font-size:17px;color:var(--muted);text-decoration:line-through;}
.bs{display:inline-block;padding:3px 10px;background:rgba(34,197,94,.13);
  border:1px solid rgba(34,197,94,.28);color:var(--green);border-radius:999px;font-size:11px;font-weight:700;}
.tr2{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 17px;}
.tc{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;
  background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
  font-size:11px;color:rgba(255,255,255,0.7);font-weight:500;}
.tc .dot{width:5px;height:5px;border-radius:50%;background:var(--green);}
.cp{width:100%;padding:0;border-radius:14px;overflow:hidden;position:relative;margin-bottom:9px;display:block;cursor:pointer;}
.ci{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px 20px;
  background:linear-gradient(110deg,#e82828 0%,#c41f1f 100%);
  font-family:var(--fh);font-size:17px;font-weight:800;color:#fff;
  box-shadow:0 0 0 1px rgba(255,255,255,0.1) inset,0 16px 40px rgba(232,40,40,0.28);}
.cp:active .ci{filter:brightness(1.1);}
.ca{width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.18);
  display:inline-flex;align-items:center;justify-content:center;font-size:13px;}
.cpulse{position:absolute;inset:0;border-radius:14px;animation:pp 2.5s ease-in-out infinite;pointer-events:none;}
@keyframes pp{0%,100%{box-shadow:0 0 0 0 rgba(232,40,40,0);}50%{box-shadow:0 0 0 9px rgba(232,40,40,0.15);}}
.cs{width:100%;padding:13px 18px;border-radius:13px;border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.04);font-size:14px;font-weight:600;
  color:rgba(255,255,255,0.8);display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;}
.cs:active{background:rgba(255,255,255,0.08);}
.mt{text-align:center;font-size:12px;color:var(--muted);margin-top:10px;line-height:1.55;}
.mt b{color:var(--text);}

/* SCROLL HINT */
.hint{position:absolute;bottom:calc(13px + var(--sb));left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  color:rgba(255,255,255,0.28);font-size:10px;text-transform:uppercase;letter-spacing:.12em;
  pointer-events:none;animation:hb 2s ease-in-out infinite;z-index:100;}
.hint svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;}
@keyframes hb{0%,100%{transform:translate(-50%,0);opacity:.45;}50%{transform:translate(-50%,5px);opacity:.8;}}
.sw:last-child .hint{display:none;}

/* TOAST */
.tt{position:fixed;top:calc(72px + var(--st));left:50%;transform:translateX(-50%) translateY(-16px);
  background:rgba(14,14,18,0.97);border:1px solid rgba(255,255,255,0.11);backdrop-filter:blur(14px);
  color:#fff;padding:8px 12px 8px 16px;border-radius:999px;font-size:13px;
  display:flex;align-items:center;gap:12px;
  opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.16,1,.3,1);z-index:9999;}
.tt.on{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
.ub{color:var(--red);font-weight:700;text-transform:uppercase;font-size:11px;
  letter-spacing:.06em;padding:4px 10px;background:rgba(232,40,40,0.12);border-radius:999px;cursor:pointer;}
</style>
</head>

  <div class="glow"></div>
  <div class="top">
    <a class="back" id="bk" href="#">← Back</a>
    <div class="topright">
      <button class="btnt" id="btl">A/अ</button>
      <div class="pill"><b id="sl">1/6</b> • <span id="sn">INTRO</span></div>
    </div>
  </div>
  <main class="sc" id="sc"></main>
</div>
<div id="tt" class="tt"><span id="tm">Translated to Hindi</span><button id="bu" class="ub">Undo</button></div>

// ── BINARY STL PARSER ──
function parseSTLBinary(b64) {
  const bin = atob(b64);
  const buf = new ArrayBuffer(bin.length);
  const u8 = new Uint8Array(buf);
  for (let i = 0; i < bin.length; i++) u8[i] = bin.charCodeAt(i);
  const view = new DataView(buf);
  const count = view.getUint32(80, true);
  const verts = new Float32Array(count * 9);
  const norms = new Float32Array(count * 9);
  let vi = 0, ni = 0;
  for (let i = 0; i < count; i++) {
    const base = 84 + i * 50;
    const nx = view.getFloat32(base, true);
    const ny = view.getFloat32(base+4, true);
    const nz = view.getFloat32(base+8, true);
    // Compute proper normal from vertices
    const ax = view.getFloat32(base+12,true), ay = view.getFloat32(base+16,true), az = view.getFloat32(base+20,true);
    const bx = view.getFloat32(base+24,true), by = view.getFloat32(base+28,true), bz = view.getFloat32(base+32,true);
    const cx2= view.getFloat32(base+36,true), cy2= view.getFloat32(base+40,true), cz2= view.getFloat32(base+44,true);
    // Compute face normal
    const ex=bx-ax,ey=by-ay,ez=bz-az, fx=cx2-ax,fy=cy2-ay,fz=cz2-az;
    let cnx=ey*fz-ez*fy, cny=ez*fx-ex*fz, cnz=ex*fy-ey*fx;
    const cl=Math.sqrt(cnx*cnx+cny*cny+cnz*cnz)||1;
    cnx/=cl; cny/=cl; cnz/=cl;
    // Use stored normal if computed is zero (degenerate tri)
    const fn = (cnx===0&&cny===0&&cnz===0) ? [nx,ny,nz] : [cnx,cny,cnz];
    for (let j=0;j<3;j++) { norms[ni++]=fn[0]; norms[ni++]=fn[1]; norms[ni++]=fn[2]; }
    verts[vi++]=ax;verts[vi++]=ay;verts[vi++]=az;
    verts[vi++]=bx;verts[vi++]=by;verts[vi++]=bz;
    verts[vi++]=cx2;verts[vi++]=cy2;verts[vi++]=cz2;
  }
  return { verts, norms, count: count*3 };
}

// ── WEBGL RENDERER ──
let currentColor = [0.08, 0.08, 0.09]; // default: near-black body
let glState = null;

function initWebGL(canvas, geo) {
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) return null;

  const VS = `
    attribute vec3 aPos; attribute vec3 aNorm;
    uniform mat4 uMVP; uniform mat3 uNM;
    varying vec3 vN; varying vec3 vP;
    void main(){
      vN = normalize(uNM * aNorm);
      vP = aPos;
      gl_Position = uMVP * vec4(aPos, 1.0);
    }`;
  const FS = `
    precision mediump float;
    varying vec3 vN; varying vec3 vP;
    uniform vec3 uColor; uniform vec3 uAccent;
    void main(){
      vec3 n = normalize(vN);
      if(!gl_FrontFacing) n = -n;
      // Key light
      float d1 = max(dot(n, normalize(vec3(1.5,3.0,2.0))), 0.0);
      // Fill light
      float d2 = max(dot(n, normalize(vec3(-2.0,-1.0,1.5))), 0.0);
      // Rim light
      float rim = pow(1.0 - abs(dot(n, vec3(0,0,1))), 3.0) * 0.35;
      float amb = 0.28;
      float light = amb + d1*0.55 + d2*0.18 + rim;
      // Colour: accent (red) for raised ring features, body color elsewhere
      float isTop = step(5.5, vP.z);
      vec3 col = mix(uColor, uAccent, isTop * 0.0); // ring via z threshold
      gl_FragColor = vec4(col * light, 1.0);
    }`;

  function mkS(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, mkS(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, mkS(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog); gl.useProgram(prog);

  const vbuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vbuf);
  gl.bufferData(gl.ARRAY_BUFFER, geo.verts, gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog,'aPos');
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);

  const nbuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, nbuf);
  gl.bufferData(gl.ARRAY_BUFFER, geo.norms, gl.STATIC_DRAW);
  const aNorm = gl.getAttribLocation(prog,'aNorm');
  gl.enableVertexAttribArray(aNorm);
  gl.vertexAttribPointer(aNorm,3,gl.FLOAT,false,0,0);

  const uMVP  = gl.getUniformLocation(prog,'uMVP');
  const uNM   = gl.getUniformLocation(prog,'uNM');
  const uCol  = gl.getUniformLocation(prog,'uColor');
  const uAcc  = gl.getUniformLocation(prog,'uAccent');

  gl.uniform3f(uAcc, 0.91, 0.16, 0.16); // red accent
  gl.enable(gl.DEPTH_TEST);
  gl.clearColor(0.039, 0.039, 0.047, 0.0);

  // ── Matrix helpers (FIXED col-major) ──
  function mul(a,b){
    const c=new Float32Array(16);
    for(let i=0;i<4;i++)for(let j=0;j<4;j++){let s=0;for(let k=0;k<4;k++)s+=a[k*4+j]*b[i*4+k];c[i*4+j]=s;}
    return c;
  }
  function ident(){const m=new Float32Array(16);m[0]=m[5]=m[10]=m[15]=1;return m;}
  function persp(fov,asp,near,far){
    const f=1/Math.tan(fov/2),nd=near-far;
    return new Float32Array([f/asp,0,0,0, 0,f,0,0, 0,0,(near+far)/nd,-1, 0,0,2*near*far/nd,0]);
  }
  function transl(x,y,z){const m=ident();m[12]=x;m[13]=y;m[14]=z;return m;}
  function rotX(a){const m=ident(),c=Math.cos(a),s=Math.sin(a);m[5]=c;m[6]=s;m[9]=-s;m[10]=c;return m;}
  function rotY(a){const m=ident(),c=Math.cos(a),s=Math.sin(a);m[0]=c;m[2]=-s;m[8]=s;m[10]=c;return m;}
  function nm3(m){return new Float32Array([m[0],m[1],m[2],m[4],m[5],m[6],m[8],m[9],m[10]]);}

  // Bounding sphere
  const vd = geo.verts;
  let cx=0,cy=0,cz=0;
  const n = vd.length/3;
  for(let i=0;i<vd.length;i+=3){cx+=vd[i];cy+=vd[i+1];cz+=vd[i+2];}
  cx/=n;cy/=n;cz/=n;
  let rad=0;
  for(let i=0;i<vd.length;i+=3){const dx=vd[i]-cx,dy=vd[i+1]-cy,dz=vd[i+2]-cz;rad=Math.max(rad,Math.sqrt(dx*dx+dy*dy+dz*dz));}
  const dist=rad*3.0;

  let rotx=-0.3, roty=0.4, autoRot=true, lastT=0, dragging=false, px=0, py=0, zoom=dist;

  function resize(){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=canvas.clientWidth*dpr;canvas.height=canvas.clientHeight*dpr;
    gl.viewport(0,0,canvas.width,canvas.height);
  }
  new ResizeObserver(resize).observe(canvas); resize();

  canvas.addEventListener('pointerdown',e=>{px=e.clientX;py=e.clientY;dragging=true;autoRot=false;});
  window.addEventListener('pointermove',e=>{if(!dragging)return;roty+=(e.clientX-px)*.013;rotx+=(e.clientY-py)*.013;px=e.clientX;py=e.clientY;});
  window.addEventListener('pointerup',()=>{dragging=false;});
  canvas.addEventListener('wheel',e=>{zoom=Math.max(rad*1.2,Math.min(rad*9,zoom+e.deltaY*.4));e.preventDefault();},{passive:false});
  let pd=0;
  canvas.addEventListener('touchstart',e=>{autoRot=false;if(e.touches.length===2)pd=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);},{passive:true});
  canvas.addEventListener('touchmove',e=>{if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);zoom=Math.max(rad*1.2,Math.min(rad*9,zoom*(pd/d)));pd=d;e.preventDefault();}},{passive:false});
  let lt2=0;
  canvas.addEventListener('touchend',()=>{const n=Date.now();if(n-lt2<280){rotx=-0.3;roty=0.4;zoom=dist;autoRot=true;}lt2=n;},{passive:true});

  const proj=persp(0.85,1,0.1,2000);

  function setColor(rgb){ gl.uniform3f(uCol,...rgb); }
  setColor(currentColor);

  function frame(ts){
    requestAnimationFrame(frame);
    if(autoRot) roty+=(ts-lastT)*0.0007;
    lastT=ts;
    const asp=canvas.width/canvas.clientHeight||1;
    const p=persp(0.85,asp,0.1,2000);
    const model=mul(mul(rotX(rotx),rotY(roty)),transl(-cx,-cy,-cz));
    const view=transl(0,0,-zoom);
    const mvp=mul(p,mul(view,model));
    gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    gl.uniformMatrix4fv(uMVP,false,mvp);
    gl.uniformMatrix3fv(uNM,false,nm3(model));
    setColor(currentColor);
    gl.drawArrays(gl.TRIANGLES,0,geo.count);
  }
  requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(frame);});
  return { setColor };
}

const sc = document.getElementById('sc');
const slEl = document.getElementById('sl');
const snEl = document.getElementById('sn');
let lang = 'en', geo = null, glInst = null, viewerMounted = false;

document.getElementById('bk').addEventListener('click', e => {
  e.preventDefault();
  if(window.history.length > 1) window.history.back();
  else location.href = 'https://viadecide.com';
});

function mount3D() {
  const cv = document.getElementById('cv');
  const vh = document.getElementById('vh');
  if (!cv || viewerMounted) return;
  viewerMounted = true;
  if (!geo) {
    if (vh) vh.textContent = 'Parsing 3D…';
    setTimeout(() => {
      geo = parseSTLBinary(STL_B64);
      if (vh) vh.style.display = 'none';
      glInst = initWebGL(cv, geo);
      if (!glInst && vh) { vh.style.display='flex'; vh.textContent='WebGL unavailable'; }
      bindColourToggles();
    }, 30);
  } else {
    if (vh) vh.style.display = 'none';
    glInst = initWebGL(cv, geo);
    bindColourToggles();
  }
}

function bindColourToggles() {
  document.querySelectorAll('.ct-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.ct-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      const r = parseFloat(btn.dataset.r), g = parseFloat(btn.dataset.g), b2 = parseFloat(btn.dataset.b);
      currentColor = [r, g, b2];
      // color updates happen in render loop via setColor
    });
  });
}

const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    const nm = e.target.dataset.name;
    if (e.isIntersecting) {
      e.target.classList.add('active');
      const i = +e.target.dataset.i;
      slEl.textContent = (i+1)+'/'+SECS.length;
      snEl.textContent = nm;
      if (nm === '3D PREVIEW') mount3D();
    } else {
      e.target.classList.remove('active');
      if (nm === '3D PREVIEW') viewerMounted = false;
    }
  });
}, { root: sc, threshold: 0.5 });

function render() {
  sc.innerHTML = '';
  viewerMounted = false;
  SECS.forEach((s, i) => {
    const w = document.createElement('div');
    w.className = 'sw'; w.dataset.i = i; w.dataset.name = s.name;
    w.innerHTML = `<article class="card">
      <header class="ch"><div class="kk">${s.kicker}</div><h1 class="h1">${s.title[lang]}</h1></header>
      <div class="cb">${s.html[lang]()}<div style="height:72px"></div></div>
    </article>
    <div class="hint"><span>Scroll</span><svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg></div>`;
    sc.appendChild(w); obs.observe(w);
  });
  const bwa = document.getElementById('bwa');
  const bondc = document.getElementById('bondc');
  if (bwa) bwa.onclick = () => window.open(WA, '_blank');
  if (bondc) bondc.onclick = () => window.open(ONDC==='#'?WA:ONDC, '_blank');
}
