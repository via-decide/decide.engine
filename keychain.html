<title>Custom 3D Keychain — ₹349 | ViaDecide</title>

<style>
:root{
  --bg:#080809;--card-bg:rgba(14,14,18,0.88);--card-border:rgba(255,255,255,0.07);
  --text:#f8f8fa;--muted:rgba(235,235,245,0.55);
  --accent:#ff5c1a;--accent2:#ffb347;--aglow:rgba(255,92,26,0.18);
  --green:#22c55e;--sh:0 32px 80px rgba(0,0,0,0.7);--r:22px;
  --fh:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --sl:env(safe-area-inset-left,0px);--sr:env(safe-area-inset-right,0px);
  --mw:720px;
}
html,body{height:100%;height:100dvh;margin:0;background:var(--bg);color:var(--text);font-family:var(--fb);overflow:hidden;overscroll-behavior-y:none;-webkit-font-smoothing:antialiased;}
*{box-sizing:border-box;}
button{background:none;border:none;padding:0;font:inherit;color:inherit;cursor:pointer;}
.glow{position:absolute;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(255,92,26,0.13),transparent),
             radial-gradient(ellipse 60% 40% at 90% 110%,rgba(255,179,71,0.05),transparent);}
.top{position:absolute;top:0;left:0;right:0;z-index:50;
  padding:calc(14px + var(--st)) calc(14px + var(--sr)) 14px calc(14px + var(--sl));
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  pointer-events:none;background:linear-gradient(180deg,rgba(8,8,9,0.97) 0%,transparent 100%);}
.top>*{pointer-events:auto;}
.back{display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:999px;
  border:1px solid rgba(255,255,255,0.09);background:rgba(10,10,13,0.75);backdrop-filter:blur(16px);
  color:rgba(255,255,255,0.88);font-weight:600;font-size:13px;text-decoration:none;}
.tr{display:flex;align-items:center;gap:8px;}
.btnt{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;
  border-radius:50%;border:1px solid rgba(255,255,255,0.09);background:rgba(10,10,13,0.75);
  backdrop-filter:blur(16px);font-size:12px;font-weight:700;color:var(--accent);}
.pill{display:inline-flex;align-items:center;gap:6px;padding:8px 13px;border-radius:999px;
  border:1px solid rgba(255,255,255,0.08);background:rgba(10,10,13,0.75);backdrop-filter:blur(16px);
  font-size:11px;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.pill b{color:#fff;font-weight:700;}
.sc{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  scroll-snap-type:y mandatory;scroll-behavior:smooth;-webkit-overflow-scrolling:touch;z-index:10;}
.sc::-webkit-scrollbar{display:none;}
.sw{height:100%;width:100%;scroll-snap-align:start;scroll-snap-stop:always;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:calc(80px + var(--st)) calc(14px + var(--sr)) calc(56px + var(--sb)) calc(14px + var(--sl));
  position:relative;}
.card{width:100%;max-width:var(--mw);flex:1;min-height:0;border-radius:var(--r);
  border:1px solid var(--card-border);background:var(--card-bg);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);box-shadow:var(--sh);
  display:flex;flex-direction:column;overflow:hidden;
  opacity:.2;transform:scale(.93) translateY(30px);
  transition:opacity .6s cubic-bezier(.16,1,.3,1),transform .6s cubic-bezier(.16,1,.3,1);}
.sw.active .card{opacity:1;transform:scale(1) translateY(0);}
.ch{padding:22px 22px 18px;border-bottom:1px solid rgba(255,255,255,0.05);background:rgba(0,0,0,0.35);flex-shrink:0;}
.kk{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:8px;}
.kk::before{content:'';display:block;width:18px;height:2px;background:var(--accent);border-radius:2px;}
.h1{margin:0;font-family:var(--fh);font-size:clamp(20px,4.8vw,26px);line-height:1.25;font-weight:800;}
.cb{padding:22px;overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;}
.cb::-webkit-scrollbar{width:4px;}
.cb::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.18);border-radius:10px;}
.big{font-family:var(--fh);font-size:clamp(24px,5vw,38px);line-height:1.12;font-weight:800;letter-spacing:-.03em;margin:0 0 18px;}
.big .a{background:linear-gradient(120deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.lead{font-size:15px;line-height:1.65;color:rgba(255,255,255,0.82);margin:0 0 14px;}
.ul{margin:14px 0;padding:0;list-style:none;font-size:14px;line-height:1.65;}
.ul li{position:relative;padding-left:20px;margin:11px 0;color:rgba(255,255,255,0.75);}
.ul li::before{content:'→';position:absolute;left:0;color:var(--accent);font-weight:800;}
.ul b{color:#fff;}
.qt{margin:18px 0 14px;padding:13px 17px;border-left:3px solid var(--accent);
  background:linear-gradient(90deg,var(--aglow),transparent);border-radius:0 12px 12px 0;
  color:rgba(255,255,255,0.9);line-height:1.6;font-size:13px;font-style:italic;}
.sg{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:18px 0;}
.sn{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:14px;padding:13px 9px;text-align:center;}
.sv{font-family:var(--fh);font-size:22px;font-weight:800;color:#fff;}
.sl{font-size:10px;color:var(--muted);margin-top:3px;letter-spacing:.05em;text-transform:uppercase;}
/* VIEWER */
.vs{border:1px solid rgba(255,255,255,0.10);border-radius:14px;overflow:hidden;background:#0a0a0c;box-shadow:0 12px 40px rgba(0,0,0,0.5);position:relative;}
#cv{display:block;width:100%;height:min(52vh,400px);cursor:grab;touch-action:none;}
#cv:active{cursor:grabbing;}
.vh{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 50% 35%,rgba(255,92,26,0.11),rgba(0,0,0,0.6));
  color:rgba(255,255,255,0.8);font-weight:700;letter-spacing:.07em;text-transform:uppercase;font-size:12px;pointer-events:none;}
.vi{position:absolute;left:10px;bottom:10px;background:rgba(0,0,0,0.65);
  border:1px solid rgba(255,255,255,0.1);padding:6px 10px;border-radius:9px;
  font-size:11px;color:rgba(255,255,255,0.65);pointer-events:none;}
/* CTA */
.pb{display:flex;align-items:baseline;gap:10px;margin:0 0 16px;flex-wrap:wrap;}
.pm{font-family:var(--fh);font-size:clamp(36px,8vw,52px);font-weight:800;color:#fff;letter-spacing:-.03em;}
.pm span{font-size:.55em;opacity:.7;}
.po{font-size:17px;color:var(--muted);text-decoration:line-through;}
.bs{display:inline-block;padding:3px 10px;background:rgba(34,197,94,.14);border:1px solid rgba(34,197,94,.28);color:var(--green);border-radius:999px;font-size:11px;font-weight:700;}
.tr2{display:flex;gap:7px;flex-wrap:wrap;margin:0 0 18px;}
.tc{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:999px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);font-size:11px;color:rgba(255,255,255,0.72);font-weight:500;}
.tc .dot{width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0;}
.cp{width:100%;padding:0;border-radius:14px;overflow:hidden;position:relative;margin-bottom:9px;display:block;border:none;cursor:pointer;}
.ci{display:flex;align-items:center;justify-content:center;gap:10px;padding:17px 20px;
  background:linear-gradient(110deg,#ff6b2b 0%,#ff4500 55%,#e63a00 100%);
  font-family:var(--fh);font-size:17px;font-weight:800;color:#fff;
  box-shadow:0 0 0 1px rgba(255,255,255,0.11) inset,0 18px 45px rgba(255,69,0,0.3);}
.cp:active .ci{filter:brightness(1.1);}
.ca{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:rgba(255,255,255,0.18);font-size:13px;}
.cpulse{position:absolute;inset:0;border-radius:14px;animation:pp 2.5s ease-in-out infinite;pointer-events:none;}
@keyframes pp{0%,100%{box-shadow:0 0 0 0 rgba(255,92,26,0);}50%{box-shadow:0 0 0 9px rgba(255,92,26,0.16);}}
.cs{width:100%;padding:14px 18px;border-radius:13px;border:1px solid rgba(255,255,255,0.11);background:rgba(255,255,255,0.04);font-size:14px;font-weight:600;color:rgba(255,255,255,0.82);display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;}
.cs:active{background:rgba(255,255,255,0.08);}
.mt{text-align:center;font-size:12px;color:var(--muted);margin-top:11px;line-height:1.5;}
.mt b{color:var(--text);}
.hint{position:absolute;bottom:calc(13px + var(--sb));left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;
  color:rgba(255,255,255,0.3);font-size:10px;text-transform:uppercase;letter-spacing:.12em;
  pointer-events:none;animation:hb 2s ease-in-out infinite;z-index:100;}
.hint svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;}
@keyframes hb{0%,100%{transform:translate(-50%,0);opacity:.5;}50%{transform:translate(-50%,5px);opacity:.85;}}
.sw:last-child .hint{display:none;}
.tt{position:fixed;top:calc(74px + var(--st));left:50%;
  transform:translateX(-50%) translateY(-16px);
  background:rgba(14,14,18,0.97);border:1px solid rgba(255,255,255,0.12);backdrop-filter:blur(14px);
  color:#fff;padding:8px 13px 8px 17px;border-radius:999px;font-size:13px;
  display:flex;align-items:center;gap:13px;
  opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.16,1,.3,1);z-index:9999;}
.tt.on{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
.ub{color:var(--accent);font-weight:700;text-transform:uppercase;font-size:11px;letter-spacing:.06em;padding:5px 10px;background:rgba(255,92,26,0.13);border-radius:999px;cursor:pointer;}

</div>

// ═══════════════════════════════════════
// STL PARSER → Float32Arrays
// ═══════════════════════════════════════
function parseSTL(txt) {
  const vArr = [], nArr = [];
  const lines = txt.split('\n');
  for (let i = 0; i < lines.length; i++) {
    const l = lines[i].trim();
    if (l.startsWith('facet normal')) {
      // Collect 3 vertices
      const v = [];
      for (let j = i+1; j < lines.length && v.length < 3; j++) {
        const vl = lines[j].trim();
        if (vl.startsWith('vertex')) {
          const p = vl.split(/\s+/);
          v.push([+p[1], +p[2], +p[3]]);
        }
      }
      if (v.length === 3) {
        // Compute face normal from vertices
        const ax=v[1][0]-v[0][0], ay=v[1][1]-v[0][1], az=v[1][2]-v[0][2];
        const bx=v[2][0]-v[0][0], by=v[2][1]-v[0][1], bz=v[2][2]-v[0][2];
        let nx=ay*bz-az*by, ny=az*bx-ax*bz, nz=ax*by-ay*bx;
        const l=Math.sqrt(nx*nx+ny*ny+nz*nz)||1; nx/=l; ny/=l; nz/=l;
        for (let k=0;k<3;k++) { vArr.push(...v[k]); nArr.push(nx,ny,nz); }
      }
    }
  }
  return { verts: new Float32Array(vArr), norms: new Float32Array(nArr), count: vArr.length/3 };
}

// ═══════════════════════════════════════
// WEBGL RENDERER (no dependencies)
// ═══════════════════════════════════════
function initWebGL(canvas, geo) {
  const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
  if (!gl) { canvas.insertAdjacentHTML('afterend','<div style="color:#ff5c1a;padding:20px;text-align:center">WebGL not supported on this device</div>'); return null; }

  const VS = `
    attribute vec3 aPos;
    attribute vec3 aNorm;
    uniform mat4 uMVP;
    uniform mat3 uNM;
    varying vec3 vNorm;
    void main(){
      vNorm = normalize(uNM * aNorm);
      gl_Position = uMVP * vec4(aPos,1.0);
    }`;
  const FS = `
    precision mediump float;
    varying vec3 vNorm;
    uniform vec3 uLight1;
    uniform vec3 uLight2;
    uniform vec3 uColor;
    void main(){
      vec3 n = normalize(vNorm);
      if (!gl_FrontFacing) n = -n;
      float d1 = max(dot(n, normalize(uLight1)), 0.0);
      float d2 = max(dot(n, normalize(uLight2)), 0.0);
      float rim = pow(1.0 - abs(dot(n, vec3(0,0,1))), 2.5) * 0.28;
      float amb = 0.25;
      float light = amb + d1*0.62 + d2*0.22 + rim;
      gl_FragColor = vec4(uColor * light, 1.0);
    }`;

  function mkShader(type, src) {
    const s = gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
  gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
  gl.linkProgram(prog); gl.useProgram(prog);

  const vBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, vBuf);
  gl.bufferData(gl.ARRAY_BUFFER, geo.verts, gl.STATIC_DRAW);
  const aPos = gl.getAttribLocation(prog,'aPos');
  gl.enableVertexAttribArray(aPos); gl.vertexAttribPointer(aPos,3,gl.FLOAT,false,0,0);

  const nBuf = gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER, nBuf);
  gl.bufferData(gl.ARRAY_BUFFER, geo.norms, gl.STATIC_DRAW);
  const aNorm = gl.getAttribLocation(prog,'aNorm');
  gl.enableVertexAttribArray(aNorm); gl.vertexAttribPointer(aNorm,3,gl.FLOAT,false,0,0);

  const uMVP  = gl.getUniformLocation(prog,'uMVP');
  const uNM   = gl.getUniformLocation(prog,'uNM');
  const uL1   = gl.getUniformLocation(prog,'uLight1');
  const uL2   = gl.getUniformLocation(prog,'uLight2');
  const uCol  = gl.getUniformLocation(prog,'uColor');

  gl.uniform3f(uL1, 2,4,3);
  gl.uniform3f(uL2, -3,-1,-2);
  gl.uniform3f(uCol, 1.0, 0.36, 0.10);
  gl.enable(gl.DEPTH_TEST);
  gl.clearColor(0.047,0.047,0.058,0.0);

  // Matrix helpers
  function mat4(){return new Float32Array(16);}
  function identity(m){m[0]=m[5]=m[10]=m[15]=1;m[1]=m[2]=m[3]=m[4]=m[6]=m[7]=m[8]=m[9]=m[11]=m[12]=m[13]=m[14]=0;return m;}
  function perspective(m,fov,asp,near,far){
    const f=1/Math.tan(fov/2),nd=near-far;
    m[0]=f/asp;m[1]=0;m[2]=0;m[3]=0;
    m[4]=0;m[5]=f;m[6]=0;m[7]=0;
    m[8]=0;m[9]=0;m[10]=(near+far)/nd;m[11]=-1;
    m[12]=0;m[13]=0;m[14]=2*near*far/nd;m[15]=0;
    return m;
  }
  function mul(a,b){
    const c=mat4();
    for(let i=0;i<4;i++)for(let j=0;j<4;j++){let s=0;for(let k=0;k<4;k++)s+=a[k*4+j]*b[i*4+k];c[i*4+j]=s;}
    return c;
  }
  function rotX(a){const m=identity(mat4()),c=Math.cos(a),s=Math.sin(a);m[5]=c;m[6]=s;m[9]=-s;m[10]=c;return m;}
  function rotY(a){const m=identity(mat4()),c=Math.cos(a),s=Math.sin(a);m[0]=c;m[2]=-s;m[8]=s;m[10]=c;return m;}
  function trans(x,y,z){const m=identity(mat4());m[12]=x;m[13]=y;m[14]=z;return m;}
  function nm3(m){// normal matrix from model matrix (upper-left 3x3 transposed inverse)
    return new Float32Array([m[0],m[1],m[2],m[4],m[5],m[6],m[8],m[9],m[10]]);
  }

  // Compute bounding sphere
  const vd=geo.verts; let cx=0,cy=0,cz=0;
  for(let i=0;i<vd.length;i+=3){cx+=vd[i];cy+=vd[i+1];cz+=vd[i+2];}
  const n=vd.length/3; cx/=n;cy/=n;cz/=n;
  let rad=0;
  for(let i=0;i<vd.length;i+=3){const dx=vd[i]-cx,dy=vd[i+1]-cy,dz=vd[i+2]-cz;rad=Math.max(rad,Math.sqrt(dx*dx+dy*dy+dz*dz));}
  const dist = rad * 3.2;

  let rotx = 0.3, roty = 0, autoRot = true, lastT = 0;
  let px=0,py=0,dragging=false,pinchD=0,zoom=dist;

  function resize(){
    const dpr=Math.min(window.devicePixelRatio||1,2);
    canvas.width=canvas.clientWidth*dpr; canvas.height=canvas.clientHeight*dpr;
    gl.viewport(0,0,canvas.width,canvas.height);
  }
  new ResizeObserver(resize).observe(canvas); resize();

  canvas.addEventListener('pointerdown',e=>{px=e.clientX;py=e.clientY;dragging=true;autoRot=false;});
  window.addEventListener('pointermove',e=>{
    if(!dragging)return;
    roty+=(e.clientX-px)*0.012; rotx+=(e.clientY-py)*0.012;
    px=e.clientX;py=e.clientY;
  });
  window.addEventListener('pointerup',()=>{dragging=false;});
  canvas.addEventListener('wheel',e=>{zoom=Math.max(rad*1.2,Math.min(rad*10,zoom+e.deltaY*0.5));e.preventDefault();},{passive:false});

  // Pinch zoom
  let t0=null,t1=null;
  canvas.addEventListener('touchstart',e=>{
    autoRot=false;
    if(e.touches.length===2){t0=e.touches[0];t1=e.touches[1];pinchD=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);}
  },{passive:true});
  canvas.addEventListener('touchmove',e=>{
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      zoom=Math.max(rad*1.2,Math.min(rad*10,zoom*(pinchD/d))); pinchD=d; e.preventDefault();
    }
  },{passive:false});

  // Double tap reset
  let lastTap2=0;
  canvas.addEventListener('touchend',()=>{const n=Date.now();if(n-lastTap2<280){rotx=0.3;roty=0;zoom=dist;autoRot=true;}lastTap2=n;},{passive:true});

  const proj=mat4(); perspective(proj, 0.9, 1, 0.1, 5000);

  function frame(ts){
    requestAnimationFrame(frame);
    if(autoRot) roty+=(ts-lastT)*0.0008;
    lastT=ts;
    const asp=canvas.width/canvas.height;
    perspective(proj,0.9,asp,0.1,5000);
    const model=mul(mul(rotX(rotx),rotY(roty)),trans(-cx,-cy,-cz));
    const view=trans(0,0,-zoom);
    const mvp=mul(proj,mul(view,model));
    gl.clear(gl.COLOR_BUFFER_BIT|gl.DEPTH_BUFFER_BIT);
    gl.uniformMatrix4fv(uMVP,false,mvp);
    gl.uniformMatrix3fv(uNM,false,nm3(model));
    gl.drawArrays(gl.TRIANGLES,0,geo.count);
  }
  requestAnimationFrame(ts=>{lastT=ts;requestAnimationFrame(frame);});
  return gl;
}
