<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a0a" />
  <title>Why a Keychain Works • Everyday Object, Real Meaning</title>

  <!-- Router config (so Back + internal routes work everywhere) -->
  <script>window.__MAIN_WEBSITE__ = "https://viadecide.com/";</script>
  <script src="./router.js"></script>

  <style>
    :root{
      --bg:#050505;
      --card-bg:rgba(18,18,20,.75);
      --card-border:rgba(255,255,255,.08);
      --text:#fdfdfd;
      --text-muted:rgba(242,242,242,.65);
      --accent:#ff671f;
      --accent-glow:rgba(255,103,31,.15);
      --accent2:#22c55e;
      --shadow:0 24px 80px rgba(0,0,0,.6);
      --radius:24px;

      --safeTop:env(safe-area-inset-top,0px);
      --safeBottom:env(safe-area-inset-bottom,0px);
      --safeLeft:env(safe-area-inset-left,0px);
      --safeRight:env(safe-area-inset-right,0px);

      --maxw:760px;
    }

    /* Base reset */
    html,body{
      height:100%; height:100dvh; margin:0;
      background-color:var(--bg); color:var(--text);
      font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      overflow:hidden; overscroll-behavior-y:none;
      -webkit-font-smoothing:antialiased;
      user-select:none; -webkit-user-select:none;
    }
    *{ box-sizing:border-box; }
    button{ background:none; border:none; padding:0; font:inherit; color:inherit; cursor:pointer; }
    input,textarea,select{ user-select:text; -webkit-user-select:text; }

    /* Invert-color Light Mode (matches your “invert method”) */
    body.light #appWrapper{
      filter: invert(1) hue-rotate(180deg);
    }
    /* Re-invert media so they stay “normal” even in inverted wrapper */
    body.light img,
    body.light video,
    body.light canvas,
    body.light svg{
      filter: invert(1) hue-rotate(180deg);
    }

    /* App wrapper */
    #appWrapper{
      position:relative; width:100vw; height:100dvh;
      transform-origin:center center;
      transition:transform .4s cubic-bezier(.25,1,.5,1);
      overflow:hidden;
    }
    #appWrapper.forced-landscape{
      width:100dvh; height:100vw; position:absolute;
      top:50%; left:50%;
      margin-top:-50vw; margin-left:-50dvh;
    }

    /* Ambient glow */
    .bg-glow{
      position:absolute; inset:0; pointer-events:none;
      background:
        radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%),
        radial-gradient(circle at 85% 100%, rgba(255,255,255,0.03), transparent 60%);
      z-index:0;
    }

    /* Top nav */
    .top{
      position:absolute; top:0; left:0; right:0;
      padding:calc(16px + var(--safeTop)) calc(16px + var(--safeRight)) 16px calc(16px + var(--safeLeft));
      z-index:50;
      display:flex; align-items:center; justify-content:space-between; gap:12px;
      pointer-events:none;
      background:linear-gradient(180deg, rgba(5,5,5,.95) 0%, rgba(5,5,5,0) 100%);
    }
    .top > *{ pointer-events:auto; }
    .top-actions{ display:flex; align-items:center; gap:8px; }

    .back,.pill,.btn-icon{
      display:inline-flex; align-items:center; justify-content:center; gap:8px;
      padding:10px 16px; border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(15,15,15,.65);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      transition:all .2s ease;
    }
    .btn-icon{
      padding:10px; font-weight:800; color:var(--accent);
      width:38px; height:38px;
    }
    .btn-icon:active,.back:active{ transform:scale(.96); }
    .back{
      color:rgba(255,255,255,.9);
      font-weight:600; font-size:14px; text-decoration:none;
    }
    .pill{
      font-size:11px; letter-spacing:.12em; text-transform:uppercase;
      color:var(--text-muted); white-space:nowrap;
    }
    .pill b{ color:#fff; letter-spacing:.1em; font-weight:800; }

    /* Scroll container */
    .scroll-container{
      position:absolute; inset:0;
      overflow-y:auto; overflow-x:hidden;
      scroll-snap-type:y mandatory;
      scroll-behavior:smooth;
      -webkit-overflow-scrolling:touch;
      z-index:10;
    }
    .scroll-container::-webkit-scrollbar{ display:none; }

    /* Cards */
    .section-wrapper{
      height:100%; width:100%;
      scroll-snap-align:start; scroll-snap-stop:always;
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      padding:calc(90px + var(--safeTop)) calc(16px + var(--safeRight)) calc(60px + var(--safeBottom)) calc(16px + var(--safeLeft));
      position:relative;
    }
    .card{
      width:100%; max-width:var(--maxw);
      flex:1; min-height:0;
      border-radius:var(--radius);
      border:1px solid var(--card-border);
      background:var(--card-bg);
      backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
      box-shadow:var(--shadow);
      display:flex; flex-direction:column; overflow:hidden;
      opacity:.3; transform:scale(.92) translateY(30px);
      transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
    }
    .section-wrapper.is-active .card{ opacity:1; transform:scale(1) translateY(0); }

    .cardHeader{
      padding:24px 24px 20px;
      border-bottom:1px solid rgba(255,255,255,.06);
      background:rgba(0,0,0,.3);
      flex-shrink:0;
    }
    .kicker{
      font-size:11px; letter-spacing:.15em; text-transform:uppercase;
      color:var(--accent); margin-bottom:8px; font-weight:800;
    }
    .h1{
      margin:0;
      font-size:clamp(22px, 5vw, 28px);
      line-height:1.3;
      letter-spacing:-.01em;
      font-weight:800;
    }

    .cardBody{
      padding:24px;
      overflow-y:auto; -webkit-overflow-scrolling:touch;
      flex:1;
    }
    .cardBody::-webkit-scrollbar{ width:5px; }
    .cardBody::-webkit-scrollbar-track{ background:transparent; }
    .cardBody::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.2); border-radius:10px; }

    /* Typography */
    .big{
      font-size:clamp(28px, 6vw, 42px);
      line-height:1.15; font-weight:900;
      letter-spacing:-.03em;
      margin:0 0 24px;
    }
    .big .accent{
      background:linear-gradient(135deg, #ff8a4c, #ff4c00);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      color:var(--accent);
    }
    .lead{
      font-size:17px; line-height:1.6;
      color:rgba(255,255,255,.85);
      margin:0 0 16px;
    }
    .list{
      margin:20px 0; padding:0; list-style:none;
      color:rgba(255,255,255,.75);
      font-size:16px; line-height:1.6;
    }
    .list li{ position:relative; padding-left:24px; margin:14px 0; }
    .list li::before{ content:'→'; position:absolute; left:0; color:var(--accent); font-weight:900; }
    .list b{ color:#fff; }
    .quote{
      margin:28px 0 20px;
      padding:16px 20px;
      border-left:3px solid var(--accent);
      background:linear-gradient(90deg, var(--accent-glow), transparent);
      border-radius:0 12px 12px 0;
      color:rgba(255,255,255,.95);
      line-height:1.6; font-size:15px; font-style:italic;
    }

    /* Internal links */
    .internal-link{
      display:flex; justify-content:space-between; align-items:center;
      padding:16px 20px;
      border-radius:12px;
      background:rgba(0,0,0,.4);
      margin-bottom:10px;
      text-decoration:none;
      color:var(--text);
      border:1px solid rgba(255,255,255,.06);
      transition:.2s;
    }
    .internal-link:hover{
      border-color:var(--accent);
      background:rgba(255,103,31,.08);
      padding-left:24px;
    }
    .internal-link span{
      color:var(--text-muted);
      font-family:ui-monospace,SFMono-Regular,Consolas,monospace;
      font-size:12px;
    }

    /* CTA buttons */
    .cta-row{
      display:flex; gap:10px; flex-wrap:wrap;
      margin-top:16px;
    }
    .btn-primary,.btn-ghost{
      display:inline-flex; align-items:center; justify-content:center;
      gap:8px;
      padding:12px 14px;
      border-radius:12px;
      font-weight:800;
      font-size:14px;
      text-decoration:none;
      transition:transform .2s, filter .2s, border-color .2s, background .2s;
      user-select:none;
    }
    .btn-primary{
      background:var(--accent); color:#fff;
      border:1px solid rgba(255,255,255,.1);
    }
    .btn-ghost{
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.15);
      color:#fff;
    }
    .btn-primary:active,.btn-ghost:active{ transform:scale(.98); filter:brightness(1.05); }

    /* Subscribe box */
    .subbox{
      background:rgba(255,103,31,.06);
      border:1px solid rgba(255,103,31,.22);
      padding:18px;
      border-radius:16px;
      margin-top:18px;
    }
    .subbox .chips{
      display:flex; flex-wrap:wrap; gap:8px;
      margin:10px 0 12px;
      color:rgba(255,255,255,.65);
      font-size:12px;
    }
    .chip{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.35);
    }
    .subform{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center;
    }
    .subform input{
      flex:1;
      min-width:220px;
      padding:14px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(0,0,0,.4);
      color:#fff;
      outline:none;
      font-size:15px;
    }
    .subform input:focus{
      border-color:var(--accent);
      box-shadow:0 0 0 3px var(--accent-glow);
      background:rgba(0,0,0,.55);
    }
    .subform button{
      padding:14px 16px;
      border-radius:12px;
      border:none;
      background:var(--accent);
      color:#fff;
      font-weight:900;
      font-size:14px;
      display:inline-flex; align-items:center; gap:8px;
    }
    .subform button:active{ transform:scale(.98); }

    .success-state{
      text-align:center;
      padding:30px 14px;
    }
    .success-icon{
      font-size:44px;
      margin-bottom:10px;
      display:block;
    }
    .success-state h2{ margin:0 0 8px; font-size:22px; color:#fff; }
    .success-state p{ margin:0; color:var(--text-muted); line-height:1.6; font-size:15px; }

    /* Hint */
    .hint{
      position:absolute;
      bottom:calc(16px + var(--safeBottom));
      left:50%;
      transform:translateX(-50%);
      display:flex; flex-direction:column; align-items:center; gap:6px;
      color:rgba(255,255,255,.4);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:.1em;
      pointer-events:none;
      animation:pulse 2s infinite;
      z-index:100;
    }
    .hint svg{ width:14px; height:14px; stroke:currentColor; fill:none; stroke-width:2.5; }
    @keyframes pulse{
      0%,100%{ transform:translate(-50%,0); opacity:.6; }
      50%{ transform:translate(-50%,5px); opacity:1; }
    }
    .section-wrapper:last-child .hint{ display:none; }

    /* Toast + rotate popup */
    .translate-toast{
      position:fixed;
      top:calc(80px + var(--safeTop));
      left:50%;
      transform:translateX(-50%) translateY(-20px);
      background:rgba(20,20,22,.95);
      border:1px solid rgba(255,255,255,.15);
      backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
      color:#fff;
      padding:10px 16px 10px 20px;
      border-radius:999px;
      font-size:14px;
      display:flex; align-items:center; gap:16px;
      box-shadow:0 16px 40px rgba(0,0,0,.5);
      opacity:0; pointer-events:none;
      transition:all .3s cubic-bezier(.16,1,.3,1);
      z-index:9999;
    }
    .translate-toast.is-visible{
      opacity:1; pointer-events:auto;
      transform:translateX(-50%) translateY(0);
    }
    .btn-undo{
      color:var(--accent);
      font-weight:900;
      text-transform:uppercase;
      font-size:12px;
      letter-spacing:.05em;
      padding:6px 12px;
      background:rgba(255,103,31,.15);
      border-radius:999px;
    }
    .btn-undo:active{ background:rgba(255,103,31,.25); }

    .rotate-popup{
      position:fixed; bottom:80px; left:50%;
      transform:translateX(-50%) scale(.9);
      background:var(--accent);
      color:#fff;
      padding:12px 24px;
      border-radius:999px;
      font-size:14px; font-weight:900;
      display:flex; align-items:center; gap:10px;
      box-shadow:0 12px 30px rgba(255,103,31,.4);
      opacity:0; pointer-events:none;
      transition:all .3s cubic-bezier(.16,1,.3,1);
      z-index:9999;
      cursor:pointer;
    }
    .rotate-popup.is-visible{
      opacity:1; pointer-events:auto;
      transform:translateX(-50%) scale(1);
    }
    .rotate-popup:active{ transform:translateX(-50%) scale(.95); }
  </style>
</head>

<body>
  <div id="appWrapper">
    <div class="bg-glow"></div>

    <div class="top">
      <a class="back" href="#" data-back>← Back</a>
      <div class="top-actions">
        <button id="btnTheme" class="btn-icon" aria-label="Toggle theme" title="Toggle theme">☾</button>
        <button id="btnTranslate" class="btn-icon" aria-label="Translate" title="Translate to Hindi">A/अ</button>
        <div class="pill"><b id="secLabel">SEC 1/8</b> • <span id="secName">HOOK</span></div>
      </div>
    </div>

    <main class="scroll-container" id="scrollContainer"></main>
  </div>

  <div id="translationToast" class="translate-toast">
    <span id="toastMsg">Translated to Hindi</span>
    <button id="btnUndoTranslate" class="btn-undo">Undo</button>
  </div>
  <div id="rotatePopup" class="rotate-popup"></div>

  <script>
    (function(){
      "use strict";

      // ---------- Theme (invert method) ----------
      const THEME_KEY = "VIA_THEME";
      const btnTheme = document.getElementById("btnTheme");

      function applyTheme(theme){
        const isLight = theme === "light";
        document.body.classList.toggle("light", isLight);
        btnTheme.textContent = isLight ? "☼" : "☾";
        btnTheme.title = isLight ? "Switch to dark" : "Switch to light";
        localStorage.setItem(THEME_KEY, theme);
      }
      applyTheme(localStorage.getItem(THEME_KEY) || "dark");
      btnTheme.addEventListener("click", () => {
        const next = document.body.classList.contains("light") ? "dark" : "light";
        applyTheme(next);
      });

      // ---------- Content ----------
      const PRODUCT_ROUTE = "keychain"; // should match your router route (e.g. keychain -> keychain.html)
      const BLOGS_ROUTE   = "index";    // or "weekly-decision-reviews" if you use that as your hub

      const SECTIONS = [
        {
          name: "HOOK",
          kicker: "Product Psychology",
          title: {
            en: "Why a keychain can mean more than an expensive gift",
            hi: "क्यों एक कीचेन महंगे गिफ्ट से ज्यादा मायने रख सकती है"
          },
          html: {
            en: () => `
              <div class="big">The smallest objects become the <span class="accent">loudest</span> memories.</div>
              <p class="lead">Not because they’re expensive — because they’re <b>present</b>. Every day. In your pocket. In your hand. On your table.</p>
              <div class="quote">A keychain doesn’t compete with luxury. It competes with repetition.</div>
              <div class="cta-row">
                <a class="btn-primary" href="${PRODUCT_ROUTE}">View Keychain (3D Preview) →</a>
                <a class="btn-ghost" href="${BLOGS_ROUTE}">Browse all blogs →</a>
              </div>
            `,
            hi: () => `
              <div class="big">छोटी चीज़ें ही सबसे <span class="accent">बड़ी</span> याद बनती हैं।</div>
              <p class="lead">क्योंकि वे महंगी नहीं — <b>रोज़</b> साथ रहती हैं।</p>
              <div class="quote">कीचेन “लक्ज़री” से नहीं लड़ती — वो “रिपीट” से लड़ती है।</div>
              <div class="cta-row">
                <a class="btn-primary" href="${PRODUCT_ROUTE}">Keychain (3D) देखें →</a>
                <a class="btn-ghost" href="${BLOGS_ROUTE}">सभी ब्लॉग →</a>
              </div>
            `
          }
        },

        {
          name: "EVERYDAY",
          kicker: "The Real Reason",
          title: {
            en: "Everyday touch = everyday meaning",
            hi: "रोज़ का इस्तेमाल = रोज़ का मतलब"
          },
          html: {
            en: () => `
              <div class="big">Keychains win because they’re <span class="accent">used</span>, not stored.</div>
              <p class="lead">Most gifts become shelf objects. A keychain becomes a <b>daily trigger</b>.</p>
              <ul class="list">
                <li><b>Touch:</b> you feel it multiple times a day.</li>
                <li><b>Context:</b> it shows up during routine moments.</li>
                <li><b>Recall:</b> routine creates memory loops.</li>
              </ul>
              <div class="quote">If a gift is never touched, it never gets a second chance to remind someone.</div>
            `,
            hi: () => `
              <div class="big">कीचेन इसलिए जीतती है क्योंकि वो <span class="accent">चलती</span> रहती है।</div>
              <p class="lead">बहुत से गिफ्ट “रख दिए जाते हैं”। कीचेन “साथ रहती है”।</p>
              <ul class="list">
                <li><b>Touch:</b> दिन में कई बार।</li>
                <li><b>Context:</b> रोज़मर्रा के पल।</li>
                <li><b>Recall:</b> वही पल याद बनाते हैं।</li>
              </ul>
              <div class="quote">जो चीज़ इस्तेमाल नहीं होती — वो याद भी नहीं बनती।</div>
            `
          }
        },

        {
          name: "PERSONAL",
          kicker: "Personalization",
          title: {
            en: "Personalization isn’t decoration — it’s identity",
            hi: "पर्सनलाइज़ेशन सजावट नहीं — पहचान है"
          },
          html: {
            en: () => `
              <div class="big">A name or symbol turns an object into <span class="accent">belonging.</span></div>
              <p class="lead">When someone sees their name, their initials, or a shared inside joke — it signals: <b>“this was made for you.”</b></p>
              <ul class="list">
                <li><b>Names</b> feel intimate.</li>
                <li><b>Dates</b> anchor moments.</li>
                <li><b>Icons</b> represent identity (gym, bike, pet, brand).</li>
              </ul>
              <div class="quote">Personalization doesn’t add “luxury.” It adds ownership.</div>
            `,
            hi: () => `
              <div class="big">नाम/चिन्ह से चीज़ <span class="accent">अपनी</span> लगती है।</div>
              <p class="lead">ये बोलती है: <b>“यह आपके लिए बनाई गई है।”</b></p>
              <ul class="list">
                <li><b>नाम</b> अपनापन।</li>
                <li><b>डेट</b> याद।</li>
                <li><b>आइकन</b> पहचान।</li>
              </ul>
              <div class="quote">लक्ज़री नहीं — ownership बढ़ती है।</div>
            `
          }
        },

        {
          name: "3D",
          kicker: "Trust UX",
          title: {
            en: "Inspection creates trust (this is why 3D matters)",
            hi: "इंस्पेक्शन से भरोसा बनता है (3D इसलिए जरूरी है)"
          },
          html: {
            en: () => `
              <div class="big">People trust what they can <span class="accent">inspect.</span></div>
              <p class="lead">For 3D-printed products, a live preview is the closest thing to holding it in a shop.</p>
              <ul class="list">
                <li>Rotate it like you would in hand.</li>
                <li>Check thickness and edges.</li>
                <li>Look at the ring hole and geometry.</li>
              </ul>
              <div class="quote">The conversation shifts from “trust me” → “I can see it.”</div>
              <div class="cta-row">
                <a class="btn-primary" href="${PRODUCT_ROUTE}">Open 3D Preview →</a>
                <a class="btn-ghost" href="founder">How we build this UX →</a>
              </div>
            `,
            hi: () => `
              <div class="big">जो चीज़ आप <span class="accent">देख-परख</span> सकते हैं, उस पर भरोसा बढ़ता है।</div>
              <p class="lead">3D प्रोडक्ट के लिए लाइव प्रीव्यू = दुकान जैसा अनुभव।</p>
              <ul class="list">
                <li>रोटेट करें।</li>
                <li>एज/थिकनेस देखें।</li>
                <li>रिंग होल चेक करें।</li>
              </ul>
              <div class="quote">“trust me” से “मैं देख रहा हूँ”।</div>
              <div class="cta-row">
                <a class="btn-primary" href="${PRODUCT_ROUTE}">3D Preview खोलें →</a>
                <a class="btn-ghost" href="founder">UX कैसे बनाते हैं →</a>
              </div>
            `
          }
        },

        {
          name: "GIFTING",
          kicker: "Use Cases",
          title: {
            en: "When this is the perfect gift",
            hi: "यह कब सही गिफ्ट है"
          },
          html: {

        {

          title: {

            hi: "और ViaDecide पढ़ें"
          },
          html: {
            en: () => `
              <div class="big">If you like this style, you’ll like the <span class="accent">stack.</span></div>
              <p class="lead">Short, sectioned, scroll-first. Built for small operators and product sellers.</p>

            hi: () => `

              <p class="lead">Scroll-first, sectioned, calm.</p>

              <a href="discounts" class="internal-link">Discounts ≠ Strategy <span>→</span></a>
              <a href="pricing" class="internal-link">Pricing (Quiet Bleed) <span>→</span></a>

              <a href="memory" class="internal-link">Decision Memory <span>→</span></a>
              <a href="founder" class="internal-link">Founder <span>→</span></a>

              <div class="quote">One product. One page. One story.</div>
            `
          }
        }
      ];

      // ---------- Render ----------
      const container = document.getElementById("scrollContainer");
      const secLabel = document.getElementById("secLabel");
      const secName  = document.getElementById("secName");
      let currentLang = "en";

      function renderSections(){
        container.innerHTML = "";
        SECTIONS.forEach((sec, index) => {
          const wrap = document.createElement("div");
          wrap.className = "section-wrapper";
          wrap.setAttribute("data-index", index);
          wrap.setAttribute("data-name", sec.name);

          wrap.innerHTML = `
            <article class="card">
              <header class="cardHeader">
                <div class="kicker">${sec.kicker}</div>
                <h1 class="h1">${sec.title[currentLang]}</h1>
              </header>
              <div class="cardBody">
                ${sec.html[currentLang]()}
                <div style="height:85px; flex-shrink:0;"></div>
              </div>
            </article>
            <div class="hint">
              <span>Scroll for more</span>
              <svg viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
            </div>
          `;

          container.appendChild(wrap);
          observer.observe(wrap);
        });

        // wire subscribe after render
        wireSubscribe();
      }

      const observerOptions = { root: container, threshold: 0.6 };
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting){
            entry.target.classList.add("is-active");
            const i = parseInt(entry.target.getAttribute("data-index"), 10);
            secLabel.textContent = `SEC ${i + 1}/${SECTIONS.length}`;
            secName.textContent  = entry.target.getAttribute("data-name");
          } else {
            entry.target.classList.remove("is-active");
          }
        });
      }, observerOptions);

      // ---------- Translate ----------
      const btnTranslate = document.getElementById("btnTranslate");
      const toast = document.getElementById("translationToast");
      const btnUndo = document.getElementById("btnUndoTranslate");
      const toastMsg = document.getElementById("toastMsg");
      let toastTimer;

      function triggerTranslation(lang){
        currentLang = lang;
        renderSections();

        toast.classList.add("is-visible");
        if(lang === "hi"){
          toastMsg.textContent = "Translated to Hindi";
          btnUndo.style.display = "block";
        } else {
          toastMsg.textContent = "Reverted to English";
          btnUndo.style.display = "none";
        }
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove("is-visible"), 4000);
      }

      btnTranslate.addEventListener("click", () => {
        if(currentLang === "en") triggerTranslation("hi");
      });
      btnUndo.addEventListener("click", () => triggerTranslation("en"));

      // ---------- Subscribe (Formspree if set, else mailto fallback) ----------
      // If you have a Formspree endpoint, set it here:
      const FORMSPREE_ENDPOINT = ""; // e.g. "https://formspree.io/f/xxxxxxx"
      const SUBSCRIBE_TO = "dharam@viadecide.com";

      function wireSubscribe(){
        const form = document.getElementById("subscribeForm");
        const emailInput = document.getElementById("emailInput");
        const box = document.getElementById("subBox");
        const ok = document.getElementById("subSuccess");
        if(!form || !emailInput || !box || !ok) return;

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          const email = String(emailInput.value || "").trim();
          if(!email) return;

          // If endpoint exists -> send. Otherwise -> mailto.
          if(FORMSPREE_ENDPOINT){
            try{
              const res = await fetch(FORMSPREE_ENDPOINT, {
                method: "POST",
                headers: { "Content-Type": "application/json", "Accept": "application/json" },
                body: JSON.stringify({
                  email,
                  source: "keychain-blog",
                  context: "Subscribe: calm daily decision signal (keychain blog)"
                })
              });
              if(!res.ok) throw new Error("Bad response");
              box.style.display = "none";
              ok.style.display = "block";
              return;
            } catch(err){
              // fall back to mailto
              console.warn("Form submit failed; falling back to mailto.", err);
            }
          }

          const subject = encodeURIComponent("Subscribe: ViaDecide daily signal");
          const body = encodeURIComponent(
            `Hi,\n\nPlease subscribe this email to ViaDecide daily updates:\n\n${email}\n\nContext: keychain blog page\n\nThanks`
          );
          window.location.href = `mailto:${SUBSCRIBE_TO}?subject=${subject}&body=${body}`;

          // optimistic success UI
          box.style.display = "none";
          ok.style.display = "block";
        }, { once: true });
      }

      // ---------- Rotation popup (same as your standard) ----------
      const popup = document.getElementById("rotatePopup");
      const appWrapper = document.getElementById("appWrapper");
      let isForcedLandscape = false;
      let targetRotationAngle = 0;

      window.addEventListener("deviceorientation", (e) => {
        const gamma = e.gamma;
        if(gamma === null || typeof gamma === "undefined") return;

        const rotationThreshold = 45;
        const deadband = 25;

        if(!isForcedLandscape){
          if(gamma > rotationThreshold) showRotatePopup(90);
          else if(gamma < -rotationThreshold) showRotatePopup(-90);
          else hideRotatePopup();
        } else {
          if(Math.abs(gamma) < deadband) showRotatePopup(0);
          else hideRotatePopup();
        }
      });

      function showRotatePopup(angle){
        targetRotationAngle = angle;
        popup.classList.add("is-visible");
        popup.textContent = angle === 0 ? "Tap for Portrait" : "Tap for Landscape";
      }
      function hideRotatePopup(){
        popup.classList.remove("is-visible");
      }

      popup.addEventListener("click", () => {
        if(targetRotationAngle !== 0){
          appWrapper.classList.add("forced-landscape");
          appWrapper.style.transform = `rotate(${targetRotationAngle}deg)`;
          isForcedLandscape = true;
        } else {
          appWrapper.classList.remove("forced-landscape");
          appWrapper.style.transform = "none";
          isForcedLandscape = false;
        }
        hideRotatePopup();
      });

      // ---------- Start ----------
      renderSections();

    })();
  </script>
